<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GA Hotline Portal — General Affairs MRT</title>
<link rel="icon" type="image/png" href="logo.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#003D7E" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="GA Hotline" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>
/* ============================================================
   DESIGN TOKENS — MRT Jakarta inspired
   ============================================================ */
:root{
  --mrt-blue:      #003D7E;   /* deep brand blue */
  --mrt-blue-2:    #0F4C9C;
  --mrt-blue-3:    #1976D2;
  --mrt-blue-soft: #E8F0FB;
  --mrt-green:     #00A859;   /* brand green */
  --mrt-green-2:   #00C467;
  --mrt-green-soft:#E6F7EE;

  --bg:        #F4F7FB;
  --surface:   #FFFFFF;
  --surface-2: #F9FAFC;
  --border:    #E3E8F0;
  --border-2:  #EDF1F7;

  --text:      #0F1B2D;
  --text-2:    #3D4A60;
  --text-mut:  #6B7891;
  --text-soft: #97A2B5;

  --danger:    #DC2626;
  --warning:   #F59E0B;
  --info:      #0EA5E9;
  --success:   #16A34A;

  --shadow-sm: 0 1px 2px rgba(15,27,45,.06);
  --shadow:    0 4px 14px rgba(15,27,45,.08);
  --shadow-lg: 0 18px 40px rgba(15,27,45,.12);

  --radius:    14px;
  --radius-sm: 10px;
  --radius-lg: 20px;

  --sidebar-w: 260px;
  --sidebar-w-min: 76px;
  --header-h: 64px;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Inter','Plus Jakarta Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14.5px;
  line-height:1.55;
  letter-spacing:-0.011em;
  font-feature-settings:'cv02','cv03','cv04','cv11','ss01';
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  min-height:100vh;
}
h1,h2,h3,h4,.card-head h3{letter-spacing:-0.018em}
a{color:var(--mrt-blue-3);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer}
.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}

/* ============================================================
   SHARED UI ATOMS
   ============================================================ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 18px;font-weight:600;font-size:14px;
  border:none;border-radius:10px;cursor:pointer;
  transition:transform .08s ease, box-shadow .2s ease, background .2s ease, color .2s ease;
  white-space:nowrap;
}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--mrt-blue);color:#fff}
.btn-primary:hover{background:var(--mrt-blue-2)}
.btn-accent{background:var(--mrt-green);color:#fff}
.btn-accent:hover{background:var(--mrt-green-2)}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface-2);border-color:var(--mrt-blue-3);color:var(--mrt-blue)}
.btn-danger{background:#fff;color:var(--danger);border:1px solid #fecaca}
.btn-danger:hover{background:#fef2f2}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:8px}
.btn-icon{padding:8px;border-radius:8px;background:transparent;color:var(--text-2);border:1px solid var(--border)}
.btn-icon:hover{background:var(--mrt-blue-soft);color:var(--mrt-blue);border-color:var(--mrt-blue-3)}

.input,.select,.textarea{
  width:100%;
  padding:10px 12px;
  font-family:inherit;font-size:14px;color:var(--text);
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  transition:border-color .15s,box-shadow .15s;
  outline:none;
}
.textarea{resize:vertical;min-height:90px}
.input:focus,.select:focus,.textarea:focus{
  border-color:var(--mrt-blue-3);
  box-shadow:0 0 0 4px rgba(25,118,210,.12);
}
.input:disabled,.select:disabled{background:var(--surface-2);color:var(--text-mut)}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:13px;font-weight:600;color:var(--text-2)}
.field .hint{font-size:12px;color:var(--text-soft)}
.field-required label::after{content:' *';color:var(--danger)}

.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:999px;
  font-size:11.5px;font-weight:600;
  background:var(--surface-2);color:var(--text-2);
  white-space:nowrap;
}
.badge.status-belum{background:#FEF3C7;color:#92400E}
.badge.status-mencari{background:#DBEAFE;color:#1E40AF}
.badge.status-disiapkan{background:#E0E7FF;color:#3730A3}
.badge.status-tersedia{background:#CFFAFE;color:#155E75}
.badge.status-selesai{background:var(--mrt-green-soft);color:#065F46}
.badge.status-ditolak{background:#FEE2E2;color:#991B1B}

/* type-search combobox (Divisi/Departemen) */
.combo{position:relative}
.combo input[disabled]{background:#F1F4F9;color:var(--text-mut);cursor:not-allowed}
.combo-menu{position:absolute;z-index:60;left:0;right:0;top:calc(100% + 4px);
  background:#fff;border:1px solid var(--border);border-radius:10px;
  box-shadow:0 12px 30px rgba(2,32,71,.14);max-height:240px;overflow:auto;display:none}
.combo-menu.show{display:block}
.combo-item{padding:9px 12px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:8px;color:var(--text)}
.combo-item:hover,.combo-item.active{background:var(--mrt-blue-soft)}
.combo-item .material-symbols-rounded{font-size:18px;color:var(--text-mut)}
.combo-item.add{color:var(--mrt-blue);font-weight:600}
.combo-item.add .material-symbols-rounded{color:var(--mrt-blue)}
.combo-empty{padding:10px 12px;color:var(--text-mut);font-size:13px}

.toast-wrap{position:fixed;top:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:9999}
.toast{
  background:#fff;border-radius:12px;box-shadow:var(--shadow-lg);
  padding:14px 18px;display:flex;align-items:center;gap:10px;
  min-width:240px;max-width:380px;
  border-left:4px solid var(--mrt-blue-3);
  animation:toastIn .25s ease;
}
.toast.success{border-color:var(--mrt-green)}
.toast.error{border-color:var(--danger)}
.toast.warn{border-color:var(--warning)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ============================================================
   MODAL
   ============================================================ */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(15,27,45,.55);
  display:none;align-items:flex-start;justify-content:center;
  z-index:1000;padding:24px;overflow-y:auto;
  backdrop-filter:blur(2px);
}
.modal-backdrop.show{display:flex;animation:fadeIn .2s ease}
.modal{
  background:#fff;border-radius:18px;
  width:100%;max-width:560px;
  box-shadow:var(--shadow-lg);
  margin:auto;
  overflow:hidden;
  animation:modalIn .25s ease;
}
.modal.lg{max-width:780px}
.modal.sm{max-width:420px}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--border-2);
}
.modal-head h3{margin:0;font-size:17px;font-weight:700;color:var(--text)}
.modal-body{padding:22px}
.modal-foot{
  padding:14px 22px;border-top:1px solid var(--border-2);
  display:flex;gap:10px;justify-content:flex-end;background:var(--surface-2);
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{opacity:0;transform:translateY(-10px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ============================================================
   LANDING PAGE
   ============================================================ */
.public-nav{
  background:#fff;border-bottom:1px solid var(--border-2);
  position:sticky;top:0;z-index:50;
}
.public-nav-inner{
  max-width:1240px;margin:0 auto;padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.brand{display:flex;align-items:center;gap:12px;font-weight:700;color:var(--mrt-blue)}
.brand-mark{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,var(--mrt-blue) 0%,var(--mrt-blue-2) 60%,var(--mrt-green) 100%);
  display:flex;align-items:center;justify-content:center;color:#fff;
  font-weight:800;letter-spacing:.5px;font-size:14px;
  box-shadow:0 6px 14px rgba(0,61,126,.25);
  overflow:hidden;flex-shrink:0;
}
.brand-mark img{width:100%;height:100%;object-fit:contain;display:block}
.brand-mark.has-img{background:transparent;box-shadow:none}
.brand-name{display:flex;flex-direction:column;line-height:1.15}
.brand-name strong{font-size:16px}
.brand-name span{font-size:11px;color:var(--text-mut);font-weight:500;letter-spacing:.3px}
.nav-links{display:flex;gap:6px;align-items:center}
.nav-links a:not(.btn){
  padding:8px 14px;border-radius:8px;color:var(--text-2);font-weight:600;font-size:13.5px;
}
.nav-links a:not(.btn):hover{background:var(--mrt-blue-soft);color:var(--mrt-blue);text-decoration:none}
/* Admin login button override — green default, white on hover */
.nav-links a.btn-nav-admin{
  background:var(--mrt-green);
  color:#fff;
  border:2px solid var(--mrt-green);
  padding:6px 14px;
  transition:background .2s,color .2s,box-shadow .2s;
}
.nav-links a.btn-nav-admin:hover{
  background:#fff;
  color:var(--mrt-green);
  text-decoration:none;
  box-shadow:0 4px 12px rgba(0,168,89,.25);
}

.hero{
  position:relative;overflow:hidden;
  background:
    radial-gradient(900px 480px at 90% -10%, rgba(0,168,89,.18), transparent 60%),
    radial-gradient(700px 400px at -10% 110%, rgba(25,118,210,.18), transparent 60%),
    linear-gradient(135deg,#001B3D 0%,#003D7E 55%,#0F4C9C 100%);
  color:#fff;padding:64px 24px 96px;
}
.hero-inner{max-width:1240px;margin:0 auto;position:relative;z-index:2}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 14px;border-radius:999px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);
  font-size:12.5px;font-weight:600;margin-bottom:18px;
}
.hero h1{
  font-size:clamp(28px,4.4vw,46px);
  margin:0 0 14px;font-weight:800;letter-spacing:-.5px;line-height:1.1;
}
.hero h1 .accent{
  background:linear-gradient(90deg,var(--mrt-green-2),#A7F3D0);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero p{font-size:16px;max-width:680px;color:#D4DEF0;margin:0 0 28px;line-height:1.6}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.hero .btn-primary{background:#fff;color:var(--mrt-blue)}
.hero .btn-primary:hover{background:#E8F0FB}
.hero .btn-accent{background:var(--mrt-green);color:#fff}
.hero-shape{
  position:absolute;right:-100px;bottom:-100px;width:420px;height:420px;
  border-radius:50%;background:radial-gradient(circle, rgba(0,168,89,.18), transparent 60%);
  pointer-events:none;
}

.section{padding:56px 24px}
.section-inner{max-width:1240px;margin:0 auto}
.section-head{margin-bottom:28px}
.section-head .kicker{
  font-size:12px;font-weight:700;letter-spacing:1.2px;color:var(--mrt-green);
  text-transform:uppercase;margin-bottom:6px;
}
.section-head h2{margin:0 0 6px;font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.section-head p{margin:0;color:var(--text-mut);max-width:680px}

/* stats cards */
.stat-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:-50px;position:relative;z-index:5;
}
.stat-card{
  background:#fff;border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);border:1px solid var(--border-2);
  display:flex;align-items:center;gap:14px;
  transition:transform .15s,box-shadow .15s;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-icon{
  width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  background:var(--mrt-blue-soft);color:var(--mrt-blue);flex-shrink:0;
}
.stat-icon.green{background:var(--mrt-green-soft);color:var(--mrt-green)}
.stat-icon.warn{background:#FEF3C7;color:#B45309}
.stat-icon.purple{background:#EDE9FE;color:#6D28D9}
.stat-body{display:flex;flex-direction:column;min-width:0}
.stat-label{font-size:12.5px;color:var(--text-mut);font-weight:500}
.stat-value{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.5px}

/* card wrapper */
.card{
  background:#fff;border-radius:var(--radius);border:1px solid var(--border-2);
  box-shadow:var(--shadow-sm);
}
.card-pad{padding:24px}
.card-head{padding:18px 22px;border-bottom:1px solid var(--border-2);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-head h3{margin:0;font-size:16px;font-weight:700}
.card-body{padding:22px}

.split-2{display:grid;grid-template-columns:1.2fr 1fr;gap:20px}
/* v2.1: landing "Cara Penggunaan" list */
.landing-info{align-items:stretch}
.landing-info > .card{display:flex;flex-direction:column}
.howto-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:14px}
.howto-list li{display:flex;gap:12px;align-items:flex-start}
.howto-ic{flex-shrink:0;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:var(--mrt-blue-soft);color:var(--mrt-blue)}
.howto-ic .material-symbols-rounded{font-size:20px}
.howto-list li:nth-child(2) .howto-ic{background:#E6F7EE;color:var(--mrt-green)}
.howto-list li:nth-child(3) .howto-ic{background:#EDE9FE;color:#6D28D9}
.howto-list li:nth-child(4) .howto-ic{background:#FEF3C7;color:#92400E}
.howto-list strong{display:block;font-size:14px;margin-bottom:1px}
.howto-list p{margin:0;font-size:13px;color:var(--text-mut);line-height:1.45}
.split-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}

/* tracking */
.tracker-input-row{display:flex;gap:10px}
.tracker-input-row .input{flex:1}
.tracker-result{margin-top:18px;display:none}
.tracker-result.show{display:block}
.tracker-row{
  display:flex;justify-content:space-between;gap:12px;
  padding:10px 0;border-bottom:1px dashed var(--border-2);font-size:13.5px;
}
.tracker-row:last-child{border-bottom:none}
.tracker-row .k{color:var(--text-mut);font-weight:500}
.tracker-row .v{color:var(--text);font-weight:600;text-align:right}

/* how-to */
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.step{
  background:#fff;border:1px solid var(--border-2);border-radius:var(--radius);
  padding:22px;position:relative;
  transition:transform .15s,box-shadow .15s,border-color .15s;
}
.step:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--mrt-blue-3)}
.step-num{
  position:absolute;top:-14px;left:22px;
  width:32px;height:32px;border-radius:50%;
  background:var(--mrt-blue);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;
  box-shadow:0 6px 12px rgba(0,61,126,.3);
}
.step .material-symbols-rounded{font-size:28px;color:var(--mrt-green);margin:6px 0 10px;display:block}
.step h4{margin:0 0 6px;font-size:15px;font-weight:700;color:var(--text)}
.step p{margin:0;font-size:13px;color:var(--text-mut);line-height:1.55}

/* collapsible form */
.collapse-card{background:#fff;border:1px solid var(--border-2);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.collapse-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;cursor:pointer;
  background:linear-gradient(90deg,var(--mrt-blue-soft) 0%,#fff 100%);
  border-bottom:1px solid transparent;transition:border-color .2s;
}
.collapse-head:hover{background:linear-gradient(90deg,#DCE7F8 0%,#fff 100%)}
.collapse-head.open{border-bottom-color:var(--border-2)}
.collapse-head h3{margin:0;font-size:16px;font-weight:700;color:var(--mrt-blue);display:flex;align-items:center;gap:10px}
.collapse-head .chev{transition:transform .25s ease;color:var(--mrt-blue)}
.collapse-head.open .chev{transform:rotate(180deg)}
.collapse-body{display:none;padding:24px}
.collapse-body.open{display:block;animation:fadeIn .2s ease}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}

/* footer */
.public-footer{
  margin-top:40px;padding:32px 24px;
  background:#0B1A30;color:#9FB1CC;font-size:13px;
}
.public-footer-inner{max-width:1240px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}
.public-footer a{color:#CBD5E1}

/* ============================================================
   ADMIN LAYOUT
   ============================================================ */
.admin-layout{display:flex;min-height:100vh;background:var(--bg)}
.sidebar{
  width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border-2);
  flex-shrink:0;display:flex;flex-direction:column;
  transition:width .25s ease, transform .25s ease;
  position:sticky;top:0;height:100vh;z-index:100;
}
.sidebar.collapsed{width:var(--sidebar-w-min)}
.sidebar-top{
  display:flex;align-items:center;gap:12px;
  padding:18px;border-bottom:1px solid var(--border-2);
  height:var(--header-h);
}
.sidebar-top .brand-name{overflow:hidden;white-space:nowrap}
.sidebar.collapsed .brand-name{display:none}
.sidebar-nav{padding:14px 10px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;
  color:var(--text-2);font-weight:600;font-size:13.5px;
  cursor:pointer;transition:background .15s,color .15s;
  white-space:nowrap;
}
.nav-item:hover{background:var(--mrt-blue-soft);color:var(--mrt-blue);text-decoration:none}
.nav-item.active{background:var(--mrt-blue);color:#fff}
.nav-item.active .material-symbols-rounded{color:#fff}
.nav-item .material-symbols-rounded{color:var(--text-mut);font-size:22px;flex-shrink:0}
.nav-item:hover .material-symbols-rounded{color:var(--mrt-blue)}
.sidebar.collapsed .nav-label{display:none}
.sidebar.collapsed .nav-item{justify-content:center;padding:10px}
.sidebar-section-label{
  font-size:10px;font-weight:700;letter-spacing:0.08em;
  color:var(--text-mut);padding:14px 14px 6px;
  text-transform:uppercase;
}
.sidebar.collapsed .sidebar-section-label{display:none}

/* v2.1: collapsible sidebar groups */
.nav-group{margin-bottom:2px}
.nav-group-head{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:9px 14px 6px;cursor:pointer;user-select:none;border-radius:8px;
  font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--text-mut);transition:color .15s,background .15s;
}
.nav-group-head:hover{color:var(--mrt-blue);background:rgba(0,85,184,.05)}
.nav-group-head .chev{font-size:18px;transition:transform .22s ease;color:var(--text-mut)}
.nav-group.collapsed .chev{transform:rotate(-90deg)}
.nav-group-body{overflow:hidden;transition:max-height .25s ease;max-height:1000px}
.nav-group.collapsed .nav-group-body{max-height:0}
/* icon-only (rail) mode: hide group heads, always show items */
.sidebar.collapsed .nav-group-head{display:none}
.sidebar.collapsed .nav-group-body{max-height:none!important}
.sidebar.collapsed .nav-group{border-top:1px solid var(--border-2,#eef1f6);margin-top:4px;padding-top:4px}
.sidebar.collapsed .nav-group:first-child{border-top:none}
.nav-badge{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--danger);color:#fff;border-radius:10px;
  font-size:10px;font-weight:700;padding:1px 6px;min-width:18px;
  margin-left:6px;line-height:1.4;
}
.sidebar.collapsed .nav-badge{display:none}
.sidebar-foot{
  padding:14px;border-top:1px solid var(--border-2);
  display:flex;align-items:center;gap:10px;
}
.user-chip{
  display:flex;align-items:center;gap:10px;flex:1;min-width:0;
}
.user-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--mrt-blue),var(--mrt-green));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;flex-shrink:0;
}
.user-meta{display:flex;flex-direction:column;line-height:1.2;min-width:0;overflow:hidden}
.user-meta strong{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-meta span{font-size:11.5px;color:var(--text-mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar.collapsed .user-meta,.sidebar.collapsed .btn-logout-label{display:none}

.admin-main{flex:1;min-width:0;display:flex;flex-direction:column}
.admin-header{
  background:#fff;border-bottom:1px solid var(--border-2);
  height:var(--header-h);padding:0 22px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:sticky;top:0;z-index:50;
}
.admin-header h1{margin:0;font-size:18px;font-weight:700;color:var(--text)}
.admin-header .crumbs{font-size:12.5px;color:var(--text-mut)}
.hamburger{
  background:transparent;border:1px solid var(--border);
  border-radius:10px;padding:8px;color:var(--text-2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.hamburger:hover{background:var(--mrt-blue-soft);color:var(--mrt-blue);border-color:var(--mrt-blue-3)}

.admin-content{padding:24px;flex:1;overflow-x:hidden}

/* admin stat grid (smaller version) */
.adm-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}

/* Table */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border-2);background:#fff}
table.t{
  width:100%;border-collapse:separate;border-spacing:0;font-size:13.5px;min-width:760px;
}
.t thead th{
  background:var(--surface-2);color:var(--text-2);font-weight:700;
  text-align:left;padding:12px 14px;border-bottom:1px solid var(--border-2);
  white-space:nowrap;font-size:12.5px;letter-spacing:.3px;
}
.t thead th.sortable{cursor:pointer;user-select:none}
.t thead th.sortable:hover{background:#EEF2F8;color:var(--mrt-blue)}
.t thead th .sort-ic{font-size:14px;margin-left:2px;color:var(--text-soft)}
.t thead th.sort-asc .sort-ic,.t thead th.sort-desc .sort-ic{color:var(--mrt-blue)}
.t tbody td{
  padding:12px 14px;border-bottom:1px solid var(--border-2);color:var(--text);vertical-align:middle;
}
.t tbody tr:last-child td{border-bottom:none}
.t tbody tr:hover{background:var(--surface-2)}
.t .actions{display:flex;gap:6px;flex-wrap:wrap}
.t .actions-compact{display:flex;gap:3px;flex-wrap:nowrap;justify-content:flex-end}
.t .actions-compact .btn-icon{padding:5px;border-radius:7px}
.t .actions-compact .btn-icon .material-symbols-rounded{font-size:18px}
.t .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12.5px}
.t .kat-name{font-size:12px;color:var(--text-mut);display:block;line-height:1.25;margin-top:2px}

/* ---- Dense variant: smaller font + tighter padding so Daftar Permintaan
        fits on desktop without horizontal scroll (requested fix #1) ---- */
.t.t-dense{font-size:11.5px;min-width:0}
.t.t-dense thead th{padding:8px 9px;font-size:10.5px;letter-spacing:.2px}
.t.t-dense tbody td{padding:8px 9px}
.t.t-dense .mono{font-size:10.8px}
.t.t-dense .code-pill{padding:2px 7px;font-size:10.5px}
.t.t-dense .badge{padding:3px 8px;font-size:10px}
.t.t-dense .tag{padding:1px 6px;font-size:9.5px}
.t.t-dense .kat-name{font-size:10.5px;color:var(--text-mut);display:block;line-height:1.25;margin-top:1px}
.t.t-dense .actions-compact .btn-icon{padding:4px;border-radius:6px}
.t.t-dense .actions-compact .btn-icon .material-symbols-rounded{font-size:16px}

/* ---- Detail Permintaan block in detail popup (requested fix #3):
        preserve line-breaks, wrap nicely, never cut off ---- */
.detail-block{
  grid-column:1/-1;margin-top:4px;
  background:var(--surface-2);border:1px solid var(--border-2);
  border-left:3px solid var(--mrt-blue);border-radius:10px;
  padding:12px 14px;
}
.detail-block .detail-label{
  font-size:12px;font-weight:700;color:var(--mrt-blue);
  text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;
  display:flex;align-items:center;gap:6px;
}
.detail-block .detail-text{
  white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;
  font-size:13.5px;line-height:1.6;color:var(--text);font-weight:400;
}

/* ---- Payment module wide grid (requested fix #4) ---- */
.pay-table{font-size:11px;min-width:2600px}
.pay-table thead th{padding:8px 10px;font-size:10px;white-space:nowrap;background:var(--surface-2)}
.pay-table tbody td{padding:7px 10px;white-space:nowrap}
.pay-table .code-pill{padding:2px 7px;font-size:10px}
.pay-table .badge{padding:3px 8px;font-size:9.5px}
.pay-table td.num{font-family:'JetBrains Mono',ui-monospace,monospace;text-align:right}
.pay-table th.sticky-col,.pay-table td.sticky-col{
  position:sticky;left:0;z-index:2;background:#fff;box-shadow:1px 0 0 var(--border-2)
}
.pay-table thead th.sticky-col{background:var(--surface-2);z-index:3}
.pay-table tbody tr:hover td.sticky-col{background:var(--surface-2)}
.badge.pay-belum{background:#FEF3C7;color:#92400E}
.badge.pay-proses{background:#DBEAFE;color:#1E40AF}
.badge.pay-menunggu{background:#E0E7FF;color:#3730A3}
.badge.pay-lunas{background:var(--mrt-green-soft);color:#065F46}
.badge.pay-batal{background:#FEE2E2;color:#991B1B}
/* payment edit modal: 2-column responsive grid of fields */
.pay-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.pay-form-grid .field{margin-bottom:12px}
.pay-form-grid .field.full{grid-column:1/-1}
.pay-form-grid .field input.input,.pay-form-grid .field select.select{padding:8px 10px;font-size:13px}
.pay-section-title{grid-column:1/-1;font-size:12px;font-weight:700;color:var(--mrt-blue);
  text-transform:uppercase;letter-spacing:.4px;margin:6px 0 4px;padding-top:8px;border-top:1px dashed var(--border-2)}
.pay-section-title:first-child{border-top:none;padding-top:0}
.field .synced-tag{font-size:10px;font-weight:600;color:var(--mrt-green);background:var(--mrt-green-soft);
  padding:1px 6px;border-radius:6px;margin-left:6px}
.modal.xl{max-width:920px}

.empty-row{text-align:center;color:var(--text-mut);padding:32px!important}

.pagination{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:14px 4px 2px;font-size:13px;color:var(--text-mut);flex-wrap:wrap;
}
.pagination .pages{display:flex;gap:4px;align-items:center}
.page-btn{
  padding:6px 11px;border-radius:8px;border:1px solid var(--border);
  background:#fff;cursor:pointer;font-weight:600;font-size:13px;color:var(--text-2);
}
.page-btn:hover:not(:disabled){background:var(--mrt-blue-soft);color:var(--mrt-blue);border-color:var(--mrt-blue-3)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.page-btn.active{background:var(--mrt-blue);color:#fff;border-color:var(--mrt-blue)}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.toolbar .search{position:relative;flex:1;min-width:220px;max-width:380px}
.toolbar .search .material-symbols-rounded{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-mut);font-size:20px}
.toolbar .search .input{padding-left:38px}

/* Rating page */
.rating-page{
  min-height:100vh;background:
    radial-gradient(800px 400px at 20% 0%, var(--mrt-blue-soft), transparent 60%),
    radial-gradient(800px 400px at 80% 100%, var(--mrt-green-soft), transparent 60%),
    var(--bg);
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.rating-card{
  background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);
  max-width:560px;width:100%;padding:32px;
}
.stars{display:flex;gap:8px;justify-content:center;margin:16px 0 22px}
.star{
  font-size:42px;color:#D1D5DB;cursor:pointer;
  transition:transform .15s,color .15s;user-select:none;
}
.star:hover{transform:scale(1.1)}
.star.filled{color:#FBBF24}

/* Login */
.login-page{
  min-height:100vh;display:flex;align-items:stretch;
  background:linear-gradient(135deg,var(--mrt-blue) 0%,var(--mrt-blue-2) 55%,var(--mrt-green) 130%);
}
.login-left{
  flex:1;padding:48px;display:flex;flex-direction:column;justify-content:space-between;
  color:#fff;position:relative;overflow:hidden;
}
.login-left::before{
  content:'';position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle, rgba(0,168,89,.25), transparent 60%);
  right:-200px;bottom:-200px;pointer-events:none;
}
.login-left-top{position:relative;z-index:2}
.login-left h2{font-size:34px;margin:0 0 12px;font-weight:800;letter-spacing:-.4px;line-height:1.15}
.login-left p{margin:0;color:#CFDCEE;max-width:420px;line-height:1.6}
.login-left .quote{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);
  border-radius:14px;padding:18px 20px;position:relative;z-index:2;font-size:13.5px;color:#E2EAF6;
}
.login-right{
  flex:0 0 460px;background:#fff;display:flex;align-items:center;justify-content:center;padding:32px;
}
.login-box{width:100%;max-width:360px}
.login-box h3{margin:0 0 4px;font-size:22px;font-weight:800;color:var(--text)}
.login-box .sub{margin:0 0 24px;color:var(--text-mut);font-size:13.5px}

/* misc */
.muted{color:var(--text-mut)}
.right{text-align:right}
.center{text-align:center}
.flex{display:flex}
.gap-2{gap:8px}
.gap-3{gap:12px}
.between{justify-content:space-between}
.items-center{align-items:center}
.flex-1{flex:1}
.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-6{margin-top:24px}
.mb-0{margin-bottom:0}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.text-sm{font-size:13px}
.text-lg{font-size:16px}
.fw-700{font-weight:700}

.tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:8px;font-size:11.5px;font-weight:600;
  background:var(--mrt-blue-soft);color:var(--mrt-blue);
}
.tag.green{background:var(--mrt-green-soft);color:var(--mrt-green)}

.code-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 10px;border-radius:8px;
  background:var(--mrt-blue-soft);color:var(--mrt-blue);
  font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px;font-weight:600;
}
.copy-mini{
  background:transparent;border:none;color:var(--mrt-blue);cursor:pointer;
  padding:2px;border-radius:6px;display:inline-flex;align-items:center;
}
.copy-mini:hover{background:rgba(0,61,126,.1)}

.success-mark{
  width:74px;height:74px;border-radius:50%;
  background:var(--mrt-green-soft);color:var(--mrt-green);
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
  animation:popIn .35s cubic-bezier(.34,1.56,.64,1);
}
.success-mark .material-symbols-rounded{font-size:42px;font-variation-settings:'wght' 600}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.kvlist{display:grid;grid-template-columns:160px 1fr;gap:8px 16px;font-size:13.5px}
.kvlist .k{color:var(--text-mut);font-weight:500}
.kvlist .v{color:var(--text);font-weight:600;word-break:break-word}

/* ---- Notification bell ---- */
.bell-wrap{position:relative;display:inline-block}
.bell-btn{
  background:transparent;border:1px solid var(--border);
  border-radius:10px;padding:8px;color:var(--text-2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;position:relative;
  transition:background .15s,color .15s,border-color .15s;
}
.bell-btn:hover{background:var(--mrt-blue-soft);color:var(--mrt-blue);border-color:var(--mrt-blue-3)}
.bell-btn .badge-dot{
  position:absolute;top:3px;right:3px;
  min-width:18px;height:18px;border-radius:9px;padding:0 5px;
  background:#DC2626;color:#fff;font-size:10.5px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 2px #fff;
  animation:bellPulse 1.8s ease-in-out infinite;
}
@keyframes bellPulse{
  0%,100%{transform:scale(1);box-shadow:0 0 0 2px #fff, 0 0 0 0 rgba(220,38,38,.5)}
  50%{transform:scale(1.05);box-shadow:0 0 0 2px #fff, 0 0 0 6px rgba(220,38,38,0)}
}
.bell-panel{
  position:absolute;right:0;top:calc(100% + 8px);
  width:360px;max-width:calc(100vw - 32px);
  background:#fff;border:1px solid var(--border-2);border-radius:14px;
  box-shadow:var(--shadow-lg);z-index:200;
  display:none;overflow:hidden;
  animation:fadeIn .15s ease;
}
.bell-panel.show{display:block}
.bell-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border-2);
}
.bell-head h4{margin:0;font-size:14.5px;font-weight:700}
.bell-list{max-height:380px;overflow-y:auto}
.bell-item{
  display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border-2);
  transition:background .12s;
}
.bell-item:last-child{border-bottom:none}
.bell-item:hover{background:var(--surface-2)}
.bell-item.unread{background:linear-gradient(90deg,var(--mrt-blue-soft) 0%,transparent 50%)}
.bell-icon{
  width:34px;height:34px;border-radius:50%;
  background:var(--mrt-blue-soft);color:var(--mrt-blue);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.bell-content{flex:1;min-width:0}
.bell-content .title{font-size:13px;font-weight:700;color:var(--text);margin:0 0 2px}
.bell-content .body{font-size:12.5px;color:var(--text-2);line-height:1.45;margin:0}
.bell-content .when{font-size:11px;color:var(--text-soft);margin-top:4px}
.bell-empty{padding:32px 20px;text-align:center;color:var(--text-mut);font-size:13px}
.bell-foot{padding:10px 16px;border-top:1px solid var(--border-2);background:var(--surface-2);text-align:center}

/* Landing logged-in chip */
.landing-user-chip{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 12px;border-radius:999px;
  background:var(--mrt-blue-soft);color:var(--mrt-blue);
  font-size:13px;font-weight:600;
}
.landing-user-chip .av{
  width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,var(--mrt-blue),var(--mrt-green));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
}

/* ---- Mass upload stepper ---- */
.stepper{display:flex;gap:6px;margin-bottom:18px}
.stepper .stp{
  flex:1;padding:10px 12px;border-radius:10px;
  background:var(--surface-2);color:var(--text-mut);font-size:12.5px;font-weight:600;
  display:flex;align-items:center;gap:8px;border:1px solid var(--border-2);
}
.stepper .stp.done{background:var(--mrt-green-soft);color:var(--mrt-green);border-color:var(--mrt-green-soft)}
.stepper .stp.active{background:var(--mrt-blue);color:#fff;border-color:var(--mrt-blue)}
.stepper .stp .num{
  width:22px;height:22px;border-radius:50%;
  background:rgba(0,0,0,.07);color:inherit;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
}
.stepper .stp.active .num{background:rgba(255,255,255,.25)}

.drop-zone{
  border:2px dashed var(--border);border-radius:14px;
  padding:36px 20px;text-align:center;background:var(--surface-2);
  cursor:pointer;transition:border-color .15s,background .15s;
}
.drop-zone:hover,.drop-zone.drag{border-color:var(--mrt-blue-3);background:var(--mrt-blue-soft)}
.drop-zone .material-symbols-rounded{font-size:42px;color:var(--mrt-blue);margin-bottom:6px;display:block}

.preview-row{font-size:12.5px}
.preview-row.invalid{background:#FEF2F2}
.preview-row .err{color:var(--danger);font-size:11.5px;display:block}

/* ---- Tiket Saya page ---- */
.profile-card{
  background:linear-gradient(135deg,var(--mrt-blue) 0%,var(--mrt-blue-2) 60%,var(--mrt-green) 130%);
  color:#fff;border-radius:var(--radius);padding:22px 24px;margin-bottom:22px;
  display:flex;align-items:center;gap:18px;box-shadow:var(--shadow);
}
.profile-card .av-lg{
  width:60px;height:60px;border-radius:50%;
  background:rgba(255,255,255,.2);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;flex-shrink:0;
  border:2px solid rgba(255,255,255,.3);
}
.profile-card h3{margin:0;font-size:18px;font-weight:800}
.profile-card .meta{font-size:13px;color:#D4DEF0;display:flex;flex-wrap:wrap;gap:14px;margin-top:4px}
.profile-card .meta span{display:inline-flex;align-items:center;gap:4px}

.bucket-card{margin-bottom:18px}
.bucket-head{
  padding:14px 18px;border-bottom:1px solid var(--border-2);
  display:flex;justify-content:space-between;align-items:center;
}
.bucket-head h3{margin:0;font-size:14.5px;font-weight:700;display:flex;align-items:center;gap:8px}
.bucket-count{
  background:var(--mrt-blue);color:#fff;border-radius:999px;
  padding:2px 9px;font-size:11.5px;font-weight:700;min-width:24px;text-align:center;
}

/* version timeline */
.timeline{position:relative;padding-left:24px}
.timeline::before{
  content:'';position:absolute;left:8px;top:6px;bottom:6px;width:2px;
  background:linear-gradient(180deg,var(--mrt-blue),var(--mrt-green));
}
.tl-item{position:relative;padding:0 0 22px 0}
.tl-item::before{
  content:'';position:absolute;left:-21px;top:6px;width:14px;height:14px;border-radius:50%;
  background:#fff;border:3px solid var(--mrt-blue);
}
.tl-item .tl-ver{font-weight:800;color:var(--mrt-blue);font-size:15px}
.tl-item .tl-date{font-size:12px;color:var(--text-mut);margin-bottom:4px}
.tl-item .tl-txt{font-size:14px;color:var(--text-2);line-height:1.55}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 1024px){
  .split-2{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .steps{grid-template-columns:repeat(2,1fr)}
  .adm-stat-grid{grid-template-columns:repeat(2,1fr)}
  .login-left{display:none}
  .login-right{flex:1}
}
@media (max-width: 768px){
  .public-nav-inner{padding:12px 16px}
  .nav-links a:not(.btn){display:none}
  .hero{padding:44px 16px 80px}
  .section{padding:40px 16px}
  .form-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr 1fr;gap:12px;margin-top:-40px}
  .stat-card{padding:14px}
  .stat-value{font-size:20px}
  #ads-charts-row{grid-template-columns:1fr !important}

  /* sidebar slides in on mobile */
  .sidebar{
    position:fixed;left:0;top:0;height:100vh;
    transform:translateX(-100%);box-shadow:var(--shadow-lg);
  }
  .sidebar.mobile-open{transform:translateX(0)}
  .sidebar.collapsed{width:var(--sidebar-w)}  /* on mobile, "collapsed" still shows full when open */
  .admin-content{padding:16px}
  .admin-header{padding:0 14px}
  .admin-header h1{font-size:16px}
  .mobile-backdrop{

                <label>Divisi</label>

                         placeholder="Pilih Divisi terlebih dahulu…" disabled />

                </div>
                <span class="hint">Daftar menyesuaikan Divisi terpilih. Departemen baru otomatis terdaftar di bawahnya.</span>

              </div>

                        <option>Drop</option><option>Standby</option><option>Pick Up</option>
                      </select></div>
                    <div class="field"><label>Jam</label>
                      <input type="time" class="input" id="ko-jam" /></div>
                    <div class="field"><label>Titik Jemput</label>
                      <input type="text" class="input" id="ko-jemput" placeholder="Titik / lokasi penjemputan" /></div>
                    <div class="field"><label>Tujuan</label>
                      <input type="text" class="input" id="ko-tujuan" placeholder="Lokasi tujuan" /></div>
                  </div>
                </div>
              </div>
            </div>

            <div class="mt-3 flex gap-3" style="justify-content:flex-end">
              <button type="reset" class="btn btn-ghost"><span class="material-symbols-rounded">refresh</span>Reset</button>
              <button type="submit" class="btn btn-primary" id="submit-btn"><span class="material-symbols-rounded">send</span>Submit Permintaan</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <footer class="public-footer">

// Default value for a synced field, read from the parent request.
function paymentSyncedValue(field, req){
  if(!req) return '';
  if(field.syncedFund) return req.pakai_anggaran_ga === false ? 'Non General Affairs' : 'General Affairs';
  if(field.syncedActivity) return req.nama_kegiatan || req.detail_kebutuhan || '';
  if(field.syncedDate) return (req[field.syncedDate]||'').toString().slice(0,10);
  if(field.syncedPrice) return req.total_anggaran || req.estimasi_harga || 0;
  if(field.synced) return req[field.synced] != null ? req[field.synced] : '';
  return '';
}
// Whether a request flows into the Payment module (only GA-budget requests do).
function reqUsesGABudget(req){ return req && req.pakai_anggaran_ga !== false; }
// Merge a payment row with its request: synced columns fall back to the request
// value when the payment record hasn't overridden them yet.
function mergePayment(req, pay){
  const out = { request_id:req.id, status:'Belum Diproses' };
  PAYMENT_FIELDS.forEach(f => {
    const stored = pay ? pay[f.key] : undefined;
    if(stored !== undefined && stored !== null && stored !== ''){ out[f.key] = stored; }
    else { out[f.key] = paymentSyncedValue(f, req); }
  });
  if(pay){ out.id = pay.id; out._exists = true; } else { out._exists = false; }
  if(!out.status) out.status = 'Belum Diproses';
  if(!out.ga_payment_status) out.ga_payment_status = 'Not Complete Yet';
  out._req = req;
  out._isGA = reqUsesGABudget(req);
  return out;
}

  async listRequests(){
    if(!SUPA_CONFIGURED) return [...demo.requests].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    const { data, error } = await supa.from('requests').select('*').order('created_at',{ascending:false});
    if(error) throw error; return data || [];
  },
  async getRequest(id){
    if(!SUPA_CONFIGURED) return demo.requests.find(r=>r.id===id);
    const { data, error } = await supa.from('requests').select('*').eq('id',id).single();
    if(error) throw error; return data;
  },
  async getRequestByCode(code){
    const needle = (code || '').trim();
    if(!needle) return null;
    if(!SUPA_CONFIGURED){
      const lo = needle.toLowerCase();
      // Match either the internal code (FB-...) OR the SmartOffice code (free-form).
      return demo.requests.find(r =>
        (r.kode_permintaan || '').toLowerCase() === lo ||
        (r.kode_smartoffice || '').toLowerCase() === lo
      );
    }
    // Supabase: OR-filter on either column. .ilike is case-insensitive exact (no wildcards passed).
    const { data, error } = await supa.from('requests').select('*')
      .or(`kode_permintaan.ilike.${needle},kode_smartoffice.ilike.${needle}`)
      .limit(1);
    if(error) throw error;
    return (data && data[0]) || null;
  },
  async generateCode(prefix){
    if(!SUPA_CONFIGURED) return demo.nextCode(prefix);
    const { data, error } = await supa.rpc('fn_generate_request_code',{ p_prefix: prefix });
    if(error) throw error; return data;
  },
  async insertRequest(payload){
    if(!SUPA_CONFIGURED){
      const r = { id:'r'+(demo.requests.length+1), created_at:new Date().toISOString(), status:'Belum Dikonfirmasi', ...payload };
      demo.requests.unshift(r);
      // mirror SQL trigger: notify PIC on assignment
      if(r.pic_user_id){
        demo.notifications.unshift({
          id:'n'+(demo.notifications.length+1), user_id:r.pic_user_id, request_id:r.id,
          type:'assigned',
          title:'Anda ditugaskan sebagai PIC',
          body:`Permintaan ${r.kode_permintaan} (${r.kategori}) dari ${r.nama_pemesan} baru saja ditugaskan kepada Anda.`,
          read_at:null, created_at:new Date().toISOString()
        });
      }
      return r;
    }
    const { data, error } = await supa.from('requests').insert(payload).select().single();
    if(error) throw error; return data;
  },
  async updateRequest(id, patch){
    if(!SUPA_CONFIGURED){
      const i = demo.requests.findIndex(r=>r.id===id);
      const prev = demo.requests[i];
      // mirror SQL trigger trg_stamp_completed: stamp completed_at when status first → "Selesai"
      const next = { ...prev, ...patch };
      if(patch.status === 'Selesai' && prev.status !== 'Selesai' && !next.completed_at){
        next.completed_at = new Date().toISOString();
      }
      demo.requests[i] = next;
      // mirror SQL trigger trg_notify_pic: if pic changed, notify
      if(patch.pic_user_id && patch.pic_user_id !== prev.pic_user_id){
        const r = demo.requests[i];
        demo.notifications.unshift({
          id:'n'+(demo.notifications.length+1), user_id:r.pic_user_id, request_id:r.id,
          type:'assigned',
          title:'Anda ditugaskan sebagai PIC',
          body:`Permintaan ${r.kode_permintaan} (${r.kategori}) dari ${r.nama_pemesan} baru saja ditugaskan kepada Anda.`,
          read_at:null, created_at:new Date().toISOString()
        });
      }
      return demo.requests[i];
    }
    const { data, error } = await supa.from('requests').update(patch).eq('id',id).select().single();
    if(error) throw error; return data;
  },

      throw new Error('Format file harus JPG, PNG, atau PDF');
    }
    if(file.size > 5 * 1024 * 1024){
      throw new Error('Ukuran file maksimal 5 MB');
    }
    if(!SUPA_CONFIGURED){
      // In demo mode use a blob URL (works until page reload). Persisted into demo store anyway.
      const url = URL.createObjectURL(file);
      return { url, name:file.name };
    }
    const path = `evidence/${requestId}/${kind}-${Date.now()}.${ext}`;
    const { error: uErr } = await supa.storage.from('ga-attachments').upload(path, file, { upsert:true });
    if(uErr) throw uErr;
    const { data } = supa.storage.from('ga-attachments').getPublicUrl(path);
    return { url: data.publicUrl, name: file.name };

  async addKategori({name, kode, default_sla_hours, description}){
    const upperKode = (kode || '').trim().toUpperCase();
    const cur = session.get();
    if(!SUPA_CONFIGURED){
      // Check uniqueness
      if(demo.kategori.some(k => k.kode === upperKode))
        throw new Error('Kode "'+upperKode+'" sudah dipakai.');
      if(demo.kategori.some(k => k.name.toLowerCase() === (name||'').toLowerCase()))
        throw new Error('Nama "'+name+'" sudah dipakai.');
      const row = {
        id:'k'+Date.now(), name, kode:upperKode,
        default_sla_hours: Number(default_sla_hours) || 24,
        active:true, description:description||null,
        created_at:new Date().toISOString(),
        created_by: cur?.id || null
      };
      demo.kategori.push(row);
      // mirror to sla_targets
      demo.slaTargets.push({
        id:'sla'+Date.now(), kategori:name, kategori_kode:upperKode,
        target_hours: row.default_sla_hours,
        description: description||null,
        updated_at:new Date().toISOString()
      });
      _slaTargetsCache = null;
      return row;
    }
    const payload = {
      name, kode:upperKode,
      default_sla_hours: Number(default_sla_hours) || 24,
      description: description||null,
      created_by: cur?.id || null
    };
    const { data, error } = await supa.from('kategori_options').insert(payload).select().single();
    if(error) throw error;
    // Mirror into sla_targets so SLA tracking works immediately
    try{
      await supa.from('sla_targets').insert({
        kategori: name,
        kategori_kode: upperKode,
        target_hours: payload.default_sla_hours,
        description: description || null
      });

    _slaTargetsCache = null;
    return data;

  // v2.0: full update of a kategori (name / kode / SLA / description / active)
  async updateKategori(id, patch){
    const upperKode = patch.kode != null ? String(patch.kode).trim().toUpperCase() : undefined;
    if(!SUPA_CONFIGURED){
      const i = demo.kategori.findIndex(k => k.id === id);
      if(i < 0) return null;
      const old = demo.kategori[i];
      if(upperKode && demo.kategori.some(k => k.id!==id && k.kode===upperKode)) throw new Error('Kode "'+upperKode+'" sudah dipakai.');
      if(patch.name && demo.kategori.some(k => k.id!==id && k.name.toLowerCase()===patch.name.toLowerCase())) throw new Error('Nama "'+patch.name+'" sudah dipakai.');
      const upd = { ...old };
      if(patch.name!=null) upd.name = patch.name;
      if(upperKode) upd.kode = upperKode;
      if(patch.default_sla_hours!=null) upd.default_sla_hours = Number(patch.default_sla_hours)||old.default_sla_hours;
      if(patch.description!==undefined) upd.description = patch.description||null;
      if(patch.active!==undefined) upd.active = patch.active;
      demo.kategori[i] = upd;
      // keep sla_targets mirror in sync (match by old name)
      demo.slaTargets.forEach(s => { if(s.kategori===old.name){ s.kategori=upd.name; s.kategori_kode=upd.kode; s.target_hours=upd.default_sla_hours; } });
      _slaTargetsCache = null;
      return upd;
    }
    const clean = {};
    if(patch.name!=null) clean.name = patch.name;
    if(upperKode) clean.kode = upperKode;
    if(patch.default_sla_hours!=null) clean.default_sla_hours = Number(patch.default_sla_hours);
    if(patch.description!==undefined) clean.description = patch.description||null;
    if(patch.active!==undefined) clean.active = patch.active;
    const { data, error } = await supa.from('kategori_options').update(clean).eq('id',id).select().single();
    if(error) throw error;
    _slaTargetsCache = null;
    return data;
  },
  async deleteKategori(id){
    if(!SUPA_CONFIGURED){
      const k = demo.kategori.find(x => x.id === id);
      if(k){
        demo.slaTargets = demo.slaTargets.filter(s => s.kategori !== k.name);
        _slaTargetsCache = null;
      }
      demo.kategori = demo.kategori.filter(x => x.id !== id);

    const { error } = await supa.from('kategori_options').delete().eq('id',id);
    if(error) throw error;
    _slaTargetsCache = null;

  // Create new approval request
  async createApproval({request_id, approval_type, approver_user_id, meta}){
    const cur = session.get();
    const payload = {
      request_id, approval_type,
      requested_by: cur?.id || null,
      requested_at: new Date().toISOString(),
      approver_user_id: approver_user_id || null,
      status: 'pending',
      meta: meta || null
    };
    if(!SUPA_CONFIGURED){
      const row = { id:'apr'+Date.now(), ...payload, created_at:new Date().toISOString() };
      demo.approvals.unshift(row);
      // Notify the approver
      if(approver_user_id){
        const r = demo.requests.find(x => x.id === request_id);
        demo.notifications.unshift({
          id:'n'+(demo.notifications.length+1), user_id:approver_user_id, request_id,
          type:'approval_requested',
          title:'Permintaan persetujuan',
          body:`Permintaan ${r ? r.kode_permintaan : ''} membutuhkan persetujuan Anda untuk dilanjutkan ke Sedang Disiapkan.`,
          read_at:null, created_at:new Date().toISOString()
        });
      }
      return row;
    }
    const { data, error } = await supa.from('approvals').insert(payload).select().single();
    if(error) throw error;
    // Notify approver via Supabase
    if(approver_user_id){
      try{
        const { data: req } = await supa.from('requests').select('kode_permintaan').eq('id', request_id).single();
        await supa.from('notifications').insert({
          user_id: approver_user_id, request_id, type:'approval_requested',
          title:'Permintaan persetujuan',
          body:`Permintaan ${req?.kode_permintaan || ''} membutuhkan persetujuan Anda.`
        });
      }catch(e){ console.warn('[notify approval]', e); }
    }
    return data;
  },

      if(!error && data) return Array.isArray(data) ? data[0] : data;

    // Fallback (less secure): plaintext store, used only if fn_create_user
    // hasn't been added to the database yet.
    const ins = await supa.from('app_users').insert({
      username, full_name, role,
      jabatan: jabatan||null, lokasi_kerja: lokasi_kerja||null,

  async loginUser(username, password){
    if(!SUPA_CONFIGURED){
      const u = demo.users.find(x=>x.username===username && x.password===password && x.active);
      if(!u) throw new Error('Username atau password salah');
      return { id:u.id, username:u.username, full_name:u.full_name, role:u.role };
    }
    // 1) Preferred: bcrypt-checked match via SQL helper function
    try{
      const { data, error } = await supa.rpc('fn_login', { p_user: username, p_pass: password });
      if(error){
        // Network-level or permission error — report it explicitly
        if(/fetch|network|failed to fetch/i.test(error.message||'')){
          throw new Error('Tidak dapat terhubung ke Supabase. Periksa URL & ANON_KEY atau koneksi internet Anda.');
        }
        // If function is missing, fall through to plain compare; otherwise rethrow
        if(!/function .* does not exist|schema cache/i.test(error.message||'')){
          throw new Error('Login gagal: '+error.message);
        }
      } else if(data && data.length){
        return data[0];
      } else if(data){
        // RPC succeeded but returned no row → wrong credentials
        throw new Error('Username atau password salah');
      }
    }catch(e){
      // Re-throw our own user-facing errors; only swallow TypeError from raw fetch failures
      if(e && e.message && !/Failed to fetch/i.test(e.message)) throw e;
    }
    // 2) Fallback: direct query (works only for plaintext-stored passwords)
    try{
      const { data, error } = await supa.from('app_users')
        .select('id,username,full_name,role,active,password_hash')
        .eq('username',username).maybeSingle();
      if(error) throw error;
      if(!data || !data.active) throw new Error('Username atau password salah');
      if(data.password_hash !== password) throw new Error('Username atau password salah');
      return { id:data.id, username:data.username, full_name:data.full_name, role:data.role };
    }catch(e){
      if(/Failed to fetch/i.test(e.message||'')){
        throw new Error('Tidak dapat terhubung ke Supabase. Periksa URL & ANON_KEY di index.html atau koneksi internet Anda.');
      }
      throw e;
    }
  },

  async uploadAttachment(file){
    if(!SUPA_CONFIGURED) return null;
    const ext = file.name.split('.').pop();
    const path = `req/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
    const { error } = await supa.storage.from('ga-attachments').upload(path, file);
    if(error) throw error;
    const { data } = supa.storage.from('ga-attachments').getPublicUrl(path);
    return data.publicUrl;
  }

  const dt = new Date(d);
  return dt.toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
};

// ---------------- SLA helpers ----------------
// Cached SLA targets so the table & dashboard don't re-fetch on every render.
let _slaTargetsCache = null;
async function getSlaTargets(forceReload){
  if(forceReload || !_slaTargetsCache) _slaTargetsCache = await db.listSlaTargets();
  return _slaTargetsCache;
}
function slaTargetFor(kategori, targets){
  const t = targets.find(s => s.kategori === kategori);
  return t ? t.target_hours : null;
}
// Format duration in hours → "Xh Ym" or "Xd Yh" cleanly
function fmtDurationHours(h){
  if(h == null || isNaN(h)) return '—';
  if(h < 0) h = 0;
  if(h < 1)  return Math.round(h*60) + 'm';
  if(h < 48) return Math.floor(h) + 'j ' + Math.round((h - Math.floor(h)) * 60) + 'm';
  const days = Math.floor(h / 24);
  const rem  = Math.round(h - days*24);
  return days + 'h ' + rem + 'j';
}
// Compute resolution time (hours) for a request; null if not completed
function resolutionHours(r){
  if(!r.completed_at) return null;
  const start = new Date(r.created_at).getTime();
  const end   = new Date(r.completed_at).getTime();
  if(isNaN(start) || isNaN(end)) return null;
  return (end - start) / 36e5;     // ms → hours
}
// Returns { status: 'ontime'|'late'|'na', hoursUsed, hoursTarget, deltaHours }
function slaStatusFor(r, targets){
  const target = slaTargetFor(r.kategori, targets || []);
  const used   = resolutionHours(r);
  if(target == null || used == null) return { status:'na', hoursUsed:used, hoursTarget:target, deltaHours:null };
  return {
    status: used <= target ? 'ontime' : 'late',
    hoursUsed: used,
    hoursTarget: target,
    deltaHours: used - target
  };
}
const todayKey = () => {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}${String(d.getMonth()+1).padStart(2,'0')}${d.getFullYear()}`;
};

function toast(msg, type='info', timeout=3200){
  const wrap = $('#toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast ' + (type==='success'?'success':type==='error'?'error':type==='warn'?'warn':'');
  const icon = type==='success'?'check_circle':type==='error'?'error':type==='warn'?'warning':'info';
  el.innerHTML = `<span class="material-symbols-rounded" style="color:${type==='success'?'var(--mrt-green)':type==='error'?'var(--danger)':type==='warn'?'var(--warning)':'var(--mrt-blue-3)'}">${icon}</span><div>${msg}</div>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(10px)'; el.style.transition='all .2s'; setTimeout(()=>el.remove(),220); }, timeout);
}

function openModal(html, size=''){
  const root = $('#modal-root');
  const content = $('#modal-content');
  content.innerHTML = `<div class="modal ${size}">${html}</div>`;
  root.classList.add('show');
  // Close on backdrop click
  root.onclick = (e) => { if(e.target===root) closeModal(); };
  document.body.style.overflow = 'hidden';
}
function closeModal(){
  $('#modal-root').classList.remove('show');
  $('#modal-content').innerHTML = '';
  document.body.style.overflow = '';
}

function copyText(text, btn){
  navigator.clipboard.writeText(text).then(()=>{
    toast('Tersalin ke clipboard', 'success', 1800);
    if(btn){
      const old = btn.innerHTML;
      btn.innerHTML = '<span class="material-symbols-rounded" style="font-size:18px">check</span>';
      setTimeout(()=>{ btn.innerHTML = old; }, 1400);
    }
  });
}

function escapeHtml(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function csvDownload(filename, rows){
  if(!rows.length){ toast('Tidak ada data untuk diunduh','warn'); return; }
  const headers = Object.keys(rows[0]);
  const escape = (v) => {
    if(v===null||v===undefined) return '';
    const s = String(v).replace(/"/g,'""');
    return /[",\n]/.test(s) ? `"${s}"` : s;
  };
  const csv = [headers.join(','), ...rows.map(r => headers.map(h => escape(r[h])).join(','))].join('\n');
  const blob = new Blob(['\ufeff'+csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

/* v1.7: Refresh the badge count next to "Persetujuan" in the sidebar.
   Counts approvals where this user is the assigned approver and status = pending. */
async function refreshApprovalBadge(user){

async function captureDashboardJpg(){
  const host = document.querySelector('#dash-capture-host');
  if(!host){ toast('Dashboard tidak ditemukan','warn'); return; }
  if(typeof html2canvas === 'undefined'){
    toast('Library html2canvas belum termuat. Cek koneksi internet.','error');
    return;
  }
  const btn = document.querySelector('#dash-screenshot');
  const original = btn ? btn.innerHTML : '';
  if(btn){ btn.disabled = true; btn.innerHTML = '<span class="material-symbols-rounded">hourglass_top</span>Mengambil...'; }

  // Save scroll, then make sure no transient state (sticky bars, scroll position) affects capture
  const savedScroll = window.scrollY;
  window.scrollTo(0, 0);
  // Give the layout 2 frames to settle, then a tiny delay so Chart.js animations finish
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
  await new Promise(r => setTimeout(r, 200));

  try{
    // The dashboard may have content wider than offsetWidth on flex/grid layouts,
    // so use the larger of scrollWidth / offsetWidth and add an 8px right buffer
    // to absorb anti-aliasing or sub-pixel issues on the far edge of charts.
    const rawW = Math.max(host.scrollWidth, host.offsetWidth);
    const rawH = Math.max(host.scrollHeight, host.offsetHeight);
    const w = Math.ceil(rawW) + 8;
    const h = Math.ceil(rawH) + 8;

    const canvas = await html2canvas(host, {
      backgroundColor: '#FFFFFF',
      scale: 2,                // hi-DPI for crisp output
      useCORS: true,
      logging: false,
      width:  w,
      height: h,
      windowWidth:  Math.max(w, document.documentElement.clientWidth),
      windowHeight: Math.max(h, document.documentElement.clientHeight),
      x: 0,
      y: 0,
      scrollX: -window.scrollX,
      scrollY: -window.scrollY
    });
    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    const a = document.createElement('a');
    const ts = new Date().toISOString().slice(0,16).replace(/[:T]/g,'-');
    a.href = dataUrl;
    a.download = `dashboard-CRM-GA-${ts}.jpg`;
    a.click();
    toast('Screenshot Dashboard berhasil diunduh','success');
    db.logActivity({ action:'dashboard.screenshot', target_type:'dashboard', target_id:null,
      detail:`Screenshot Dashboard di-download (${a.download})` });
  }catch(err){
    console.error('[screenshot]', err);
    toast('Gagal mengambil screenshot: '+(err.message||''),'error');
  }finally{
    window.scrollTo(0, savedScroll);
    if(btn){ btn.disabled = false; btn.innerHTML = original; }
  }
}

/* ----- Backup Data (XLSX, multi-sheet) -----
   Sheets: Requests · Users · Ratings · Notifications · ActivityLogs ·
           SlaTargets · MataAnggaran · Divisi · Departemen · Lokasi · LokasiKerja · Tujuan · Version. */
async function downloadBackupXlsx(){
  if(typeof XLSX === 'undefined'){
    toast('Library SheetJS belum termuat. Cek koneksi internet.','error');
    return;
  }
  const btn = document.querySelector('#dash-backup');
  const original = btn ? btn.innerHTML : '';
  if(btn){ btn.disabled = true; btn.innerHTML = '<span class="material-symbols-rounded">hourglass_top</span>Menyiapkan backup...'; }
  try{
    // Pull every dataset in parallel
    const [reqs, users, slas, ma, divs, deps, lok, lk, tuj, ver, logs] = await Promise.all([
      db.listRequests().catch(()=>[]),
      db.listUsers().catch(()=>[]),
      db.listSlaTargets().catch(()=>[]),
      db.listMataAnggaran().catch(()=>[]),
      db.listDivisi().catch(()=>[]),
      db.listDepartemen().catch(()=>[]),
      db.listLokasi().catch(()=>[]),
      db.listLokasiKerja().catch(()=>[]),
      db.listTujuan().catch(()=>[]),
      db.listVersion().catch(()=>[]),
      db.listActivityLogs ? db.listActivityLogs({}).catch(()=>[]) : Promise.resolve([])
    ]);

    // Ratings: walk request ids
    let ratings = [];
    for(const r of reqs){
      try{
        const rt = await db.getRatingByRequest(r.id);
        if(rt) ratings.push({ ...rt, kode_permintaan:r.kode_permintaan, nama_pemesan:r.nama_pemesan });
      }catch{}
    }

    // Notifications (best-effort)
    let notifs = [];
    try{
      if(typeof supa !== 'undefined' && SUPA_CONFIGURED){
        const { data } = await supa.from('notifications').select('*').order('created_at',{ascending:false}).limit(5000);
        notifs = data || [];
      } else {
        notifs = (typeof demo !== 'undefined' && demo.notifications) ? [...demo.notifications] : [];
      }
    }catch{}

    const wb = XLSX.utils.book_new();
    const addSheet = (name, rows) => {
      const ws = XLSX.utils.json_to_sheet(rows && rows.length ? rows : [{ note:'(kosong)' }]);
      XLSX.utils.book_append_sheet(wb, ws, name.slice(0,31));   // Excel sheet name max 31 chars
    };

    // Flatten requests + add SLA info per row
    const slaMap = {}; (slas||[]).forEach(s => slaMap[s.kategori] = s.target_hours);
    const reqsOut = (reqs||[]).map(r => {
      const target = slaMap[r.kategori] || null;
      let resolusiJam = '';
      let slaStatus = 'Belum Selesai';
      if(r.completed_at){
        const ms = new Date(r.completed_at) - new Date(r.created_at);
        resolusiJam = (ms / 36e5).toFixed(2);
        if(target != null) slaStatus = (Number(resolusiJam) <= target) ? 'On-time' : 'Terlambat';
      }
      return {
        ID: r.id,
        Kode_Permintaan: r.kode_permintaan,
        Kode_SmartOffice: r.kode_smartoffice||'',
        Kategori: r.kategori,
        Sumber: r.sumber_pemesanan,
        Nama_Pemesan: r.nama_pemesan,
        Nama_Kegiatan: r.nama_kegiatan||'',
        Divisi: r.divisi||'',
        Departemen: r.departemen||'',
        Mata_Anggaran: r.mata_anggaran||'',
        Lokasi_Kebutuhan: r.lokasi_kebutuhan||'',
        Tujuan_Kebutuhan: r.tujuan_kebutuhan||'',
        Tanggal_Kebutuhan: r.tanggal_kebutuhan,
        Detail: r.detail_kebutuhan,
        Estimasi_Harga: r.estimasi_harga||0,
        Total_Anggaran: r.total_anggaran||0,
        Status: r.status,
        Keterangan: r.keterangan||'',
        Vendor: r.nama_vendor||'',
        PIC_GA: r.nama_pic_ga||'',
        Estimasi_Selesai: r.estimasi_penyelesaian||'',
        Tgl_Dibuat: r.created_at,
        Tgl_Selesai: r.completed_at||'',
        SLA_Target_Jam: target ?? '',
        Resolusi_Jam: resolusiJam,
        SLA_Status: slaStatus,
        Bukti_Foto_URL: r.bukti_foto_url||'',
        Bukti_TandaTerima_URL: r.bukti_tt_url||'',
        Completed_At_Edited_By: r.completed_at_edited_by||'',
        Completed_At_Edited_At: r.completed_at_edited_at||'',
        Completed_At_Edit_Reason: r.completed_at_edit_reason||''
      };
    });

    addSheet('Requests',      reqsOut);
    addSheet('Users',         (users||[]).map(u => ({
      ID:u.id, Username:u.username, Nama_Lengkap:u.full_name, Role:u.role,
      Jabatan:u.jabatan||'', Lokasi_Kerja:u.lokasi_kerja||'',
      Active: u.active === false ? 'Nonaktif' : 'Aktif',
      Dibuat: u.created_at||''
    })));
    addSheet('Ratings',       (ratings||[]).map(r => ({
      ID:r.id, Request_ID:r.request_id, Kode_Permintaan:r.kode_permintaan||'',
      Nama_Pemesan:r.nama_pemesan||'',
      Rating:r.rating, Kritik_Saran:r.kritik_saran||'', Dibuat:r.created_at
    })));
    addSheet('Notifications', (notifs||[]).map(n => ({
      ID:n.id, User_ID:n.user_id, Request_ID:n.request_id,
      Type:n.type, Title:n.title, Body:n.body, Read_At:n.read_at||'', Created_At:n.created_at
    })));
    addSheet('ActivityLogs',  (logs||[]).map(l => ({
      ID:l.id, Waktu:l.created_at, User_ID:l.user_id||'', Username:l.username||'',
      Action:l.action, Target_Type:l.target_type||'', Target_ID:l.target_id||'',
      Detail:l.detail||''
    })));
    addSheet('SlaTargets',    (slas||[]).map(s => ({
      Kategori:s.kategori, Kategori_Kode:s.kategori_kode, Target_Jam:s.target_hours,
      Deskripsi:s.description||'', Updated_At:s.updated_at||''
    })));
    addSheet('MataAnggaran',  (ma||[]).map(m => ({ Nama:m.name, Kode:m.kode||'', Deskripsi:m.description||'' })));
    addSheet('Divisi',        (divs||[]).map(d => ({ ID:d.id, Nama:d.name })));
    addSheet('Departemen',    (deps||[]).map(d => {
      const dv = (divs||[]).find(x => x.id === d.divisi_id);
      return { ID:d.id, Nama:d.name, Divisi:dv?dv.name:'', Divisi_ID:d.divisi_id };
    }));
    addSheet('Lokasi',        (lok||[]).map(o => ({ Nama:o.name })));
    addSheet('LokasiKerja',   (lk||[]).map(o => ({ Nama:o.name })));
    addSheet('Tujuan',        (tuj||[]).map(o => ({ Nama:o.name })));
    addSheet('Version',       (ver||[]).map(v => ({ Versi:v.version, Tanggal:v.release_date, Perubahan:v.changes })));

    const ts = new Date().toISOString().slice(0,10);
    const fname = `backup-CRM-GA-${ts}.xlsx`;
    XLSX.writeFile(wb, fname);
    toast('Backup berhasil diunduh','success');
    db.logActivity({ action:'backup.download', target_type:'backup', target_id:null,
      detail:`Backup XLSX di-download (${fname})` });
  }catch(err){
    console.error('[backup]', err);
    toast('Gagal membuat backup: '+(err.message||''),'error');
  }finally{
    if(btn){ btn.disabled = false; btn.innerHTML = original; }
  }
}

/* Session — persisted in localStorage so closing/reopening tab,
   and bouncing between landing and admin, never logs the user out. */
const session = {
  get(){ try{ return JSON.parse(localStorage.getItem('ga_session')); }catch{ return null; } },
  set(u){ localStorage.setItem('ga_session', JSON.stringify(u)); },
  clear(){ localStorage.removeItem('ga_session'); }
};

/* ============================================================
   ROUTER
   ============================================================ */
function parseHash(){
  const h = location.hash.replace(/^#\/?/, '');
  if(!h || h.startsWith('dashboard') || h.startsWith('tracker') || h.startsWith('howto') || h.startsWith('form')) {
    return { route:'landing', anchor:h };
  }
  const parts = h.split('/');
  return { route: parts[0]||'landing', param: parts[1]||null };
}
function navigate(to){ location.hash = to; }

function mount(templateId){
  const tpl = document.getElementById(templateId);
  $('#app').innerHTML = '';
  $('#app').appendChild(tpl.content.cloneNode(true));
}

async function route(){
  const { route: r, anchor, param } = parseHash();

  if(r === 'login')        return renderLogin();
  if(r === 'admin')        return renderAdmin(param || 'dashboard');
  if(r === 'rate')         return renderRating(param);
  if(r === 'version')      return renderVersionPublic();
  // default
  await renderLanding();
  if(anchor){
    setTimeout(()=>{
      const el = document.getElementById(anchor);
      if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
    }, 100);
  }
}
window.addEventListener('hashchange', route);
