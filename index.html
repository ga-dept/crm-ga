/* ============================================================
   v2.0: MANAJEMEN ANGGARAN
   Funds (kategori anggaran), top-up, CDP bulanan, dan laporan realisasi.
   Realisasi = jumlah Grand Total pembayaran (anggaran GA) yang ditautkan
   ke fund. Mengikuti format reporting 2024 (Anggaran vs Realisasi, by Fund,
   CDP Rencana vs Realisasi, distribusi Invoice/Kas Kecil, by Lokasi).
   ============================================================ */
const _BULAN = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
function payGrandTotal(m){
  return Number(m.grand_total) || (Number(m.quantity)>0 && Number(m.price)>0 ? Number(m.quantity)*Number(m.price) : Number(m.price)||0);
}
function payDateKey(m){ return m.submit_date || m.invoice_date || (m._req && m._req.created_at) || null; }

async function viewAdminAnggaran(c){
  const year = new Date().getFullYear();
  c.innerHTML = `<div class="card"><div class="card-body"><div class="muted">Memuat data anggaran…</div></div></div>`;

  let funds=[], topups=[], cdp=[], merged=[];
  try{
    const [reqs, pays, fundsL, topupsL, cdpL] = await Promise.all([
      db.listRequests().catch(()=>[]),
      db.listPayments().catch(()=>[]),
      db.listFunds().catch(()=>[]),
      db.listFundTopups().catch(()=>[]),
      db.listCdpPlans().catch(()=>[])
    ]);
    funds = fundsL; topups = topupsL; cdp = cdpL;
    const byReq = {}; (pays||[]).forEach(p => { byReq[p.request_id] = p; });
    merged = reqs.filter(r => reqUsesGABudget(r)).map(r => mergePayment(r, byReq[r.id]));
  }catch(err){
    c.innerHTML = `<div class="card card-pad" style="color:#991B1B">Gagal memuat data anggaran: ${escapeHtml(err.message||'')}</div>`;
    return;
  }

  // ---- computations ----
  const anggaranByFund = {}; funds.forEach(f => anggaranByFund[f.id] = 0);
  topups.forEach(t => { anggaranByFund[t.fund_id] = (anggaranByFund[t.fund_id]||0) + (Number(t.nominal)||0); });
  const realisasiByFund = {}; funds.forEach(f => realisasiByFund[f.id] = 0);
  let unassignedRealisasi = 0;
  merged.forEach(m => {
    const gt = payGrandTotal(m);
    if(m.fund_id && realisasiByFund[m.fund_id] !== undefined) realisasiByFund[m.fund_id] += gt;
    else unassignedRealisasi += gt;
  });
  const totalAnggaran = Object.values(anggaranByFund).reduce((a,b)=>a+b,0);
  const totalRealisasi = Object.values(realisasiByFund).reduce((a,b)=>a+b,0) + unassignedRealisasi;
  const totalSisa = totalAnggaran - totalRealisasi;
  const pct = totalAnggaran>0 ? Math.round(totalRealisasi/totalAnggaran*100) : 0;

  // realisasi per month (current year) + per jenis pembayaran + per lokasi
  const realisasiByMonth = Array(12).fill(0);
  const byJenis = {}; const byLokasi = {};
  merged.forEach(m => {
    const gt = payGrandTotal(m); const dk = payDateKey(m);
    if(dk){ const d = new Date(dk); if(d.getFullYear()===year) realisasiByMonth[d.getMonth()] += gt; }
    const j = m.jenis_pembayaran || 'Lainnya'; byJenis[j] = (byJenis[j]||0) + gt;
    const l = (m.location || m._req.lokasi_kebutuhan || 'Lainnya'); byLokasi[l] = (byLokasi[l]||0) + gt;
  });
  const cdpByMonth = Array(12).fill(0);
  cdp.filter(p => Number(p.tahun)===year).forEach(p => { const b=Number(p.bulan)-1; if(b>=0&&b<12) cdpByMonth[b]+=Number(p.rencana)||0; });

  c.innerHTML = `
    <div class="adm-stat-grid">
      <div class="stat-card"><div class="stat-icon" style="background:#FEF3C7;color:#92400E"><span class="material-symbols-rounded">savings</span></div>
        <div class="stat-body"><span class="stat-label">Total Anggaran</span><span class="stat-value" style="font-size:17px">${fmtRupiah(totalAnggaran)}</span></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#FEE2E2;color:#991B1B"><span class="material-symbols-rounded">trending_down</span></div>
        <div class="stat-body"><span class="stat-label">Total Realisasi</span><span class="stat-value" style="font-size:17px">${fmtRupiah(totalRealisasi)}</span></div></div>
      <div class="stat-card"><div class="stat-icon green"><span class="material-symbols-rounded">account_balance_wallet</span></div>
        <div class="stat-body"><span class="stat-label">Sisa Anggaran</span><span class="stat-value" style="font-size:17px">${fmtRupiah(totalSisa)}</span></div></div>
      <div class="stat-card"><div class="stat-icon purple"><span class="material-symbols-rounded">percent</span></div>
        <div class="stat-body"><span class="stat-label">Terpakai</span><span class="stat-value">${pct}%</span></div></div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="card-head">
        <h3>Fund &amp; Anggaran</h3>
        <button class="btn btn-primary btn-sm" id="ang-add-fund"><span class="material-symbols-rounded">add</span>Tambah Fund</button>
      </div>
      <div class="card-body">
        <div class="table-wrap"><table class="t t-dense">
          <thead><tr>
            <th>Fund</th><th style="text-align:right">Anggaran</th><th style="text-align:right">Realisasi</th>
            <th style="text-align:right">Sisa</th><th style="width:140px">Terpakai</th><th style="width:160px;text-align:right">Aksi</th>
          </tr></thead>
          <tbody>
          ${funds.length ? funds.map(f=>{
            const ang = anggaranByFund[f.id]||0, real = realisasiByFund[f.id]||0, sisa = ang-real;
            const p = ang>0 ? Math.min(100, Math.round(real/ang*100)) : 0;
            const barColor = p>=90 ? '#DC2626' : (p>=70 ? '#F59E0B' : '#00A859');
            return `<tr>
              <td><strong>${escapeHtml(f.name)}</strong>${f.active===false?' <span class="badge status-ditolak">nonaktif</span>':''}${f.keterangan?`<div class="muted text-sm">${escapeHtml(f.keterangan)}</div>`:''}</td>
              <td style="text-align:right">${fmtRupiah(ang)}</td>
              <td style="text-align:right">${fmtRupiah(real)}</td>
              <td style="text-align:right;color:${sisa<0?'#DC2626':'inherit'}">${fmtRupiah(sisa)}</td>
              <td><div style="height:8px;border-radius:6px;background:#EDF1F7;overflow:hidden"><div style="height:100%;width:${p}%;background:${barColor}"></div></div><span class="text-sm muted">${p}%</span></td>
              <td style="text-align:right;white-space:nowrap">
                <button class="btn-icon" data-ang-topup="${f.id}" title="Top-up anggaran" style="color:var(--mrt-green)"><span class="material-symbols-rounded">add_card</span></button>
                <button class="btn-icon" data-ang-edit="${f.id}" title="Edit"><span class="material-symbols-rounded">edit</span></button>
                <button class="btn-icon" data-ang-del="${f.id}" title="Hapus"><span class="material-symbols-rounded">delete</span></button>
              </td>
            </tr>`;
          }).join('') : `<tr><td colspan="6" class="empty-row">Belum ada fund. Klik "Tambah Fund".</td></tr>`}
          ${unassignedRealisasi>0?`<tr style="background:#FEF9F2"><td><em>Tanpa fund (belum ditautkan)</em></td><td style="text-align:right">—</td><td style="text-align:right">${fmtRupiah(unassignedRealisasi)}</td><td colspan="3" class="muted text-sm">Tautkan pembayaran ke fund via menu Payment → kolom "Sumber Anggaran".</td></tr>`:''}
          </tbody></table></div>
      </div>
    </div>

    <div class="split-2" style="margin-top:14px">
      <div class="card" style="margin:0"><div class="card-head"><h3>Anggaran vs Realisasi per Fund</h3></div>
        <div class="card-body"><div style="position:relative;height:240px"><canvas id="ang-chart-fund"></canvas></div></div></div>
      <div class="card" style="margin:0"><div class="card-head"><h3>Realisasi by Fund</h3></div>
        <div class="card-body"><div style="position:relative;height:240px"><canvas id="ang-chart-byfund"></canvas></div></div></div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="card-head"><h3>CDP (Cash Disbursement Plan) ${year}</h3>
        <span class="muted text-sm">Rencana per bulan vs realisasi pembayaran</span></div>
      <div class="card-body">
        <div style="position:relative;height:220px"><canvas id="ang-chart-cdp"></canvas></div>
        <div class="table-wrap" style="margin-top:12px"><table class="t t-dense">
          <thead><tr><th>Bulan</th><th style="text-align:right">Rencana (CDP)</th><th style="text-align:right">Realisasi</th><th style="text-align:right">Selisih</th><th style="width:80px;text-align:right">Aksi</th></tr></thead>
          <tbody>
          ${_BULAN.map((b,i)=>{
            const plan = cdpByMonth[i]||0, real = realisasiByMonth[i]||0;
            return `<tr>
              <td>${b} ${year}</td>
              <td style="text-align:right">${plan?fmtRupiah(plan):'—'}</td>
              <td style="text-align:right">${real?fmtRupiah(real):'—'}</td>
              <td style="text-align:right;color:${(plan-real)<0?'#DC2626':'inherit'}">${(plan||real)?fmtRupiah(plan-real):'—'}</td>
              <td style="text-align:right"><button class="btn-icon" data-cdp-edit="${i+1}" title="Set rencana"><span class="material-symbols-rounded">edit</span></button></td>
            </tr>`;
          }).join('')}
          </tbody></table></div>
      </div>
    </div>

    <div class="split-2" style="margin-top:14px">
      <div class="card" style="margin:0"><div class="card-head"><h3>Distribusi Biaya (Jenis Pembayaran)</h3></div>
        <div class="card-body"><div style="position:relative;height:240px"><canvas id="ang-chart-jenis"></canvas></div></div></div>
      <div class="card" style="margin:0"><div class="card-head"><h3>Penggunaan Biaya by Lokasi</h3></div>
        <div class="card-body"><div style="position:relative;height:240px"><canvas id="ang-chart-lokasi"></canvas></div></div></div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="card-head"><h3>Riwayat Top-up Anggaran</h3></div>
      <div class="card-body">
        <div class="table-wrap"><table class="t t-dense">
          <thead><tr><th>Tanggal</th><th>Fund</th><th style="text-align:right">Nominal</th><th>Sumber</th><th>Keterangan</th><th style="width:60px;text-align:right">Aksi</th></tr></thead>
          <tbody>
          ${topups.length ? topups.slice().sort((a,b)=>new Date(b.tanggal)-new Date(a.tanggal)).map(t=>`<tr>
            <td>${fmtDate(t.tanggal)}</td>
            <td>${escapeHtml((funds.find(f=>f.id===t.fund_id)||{}).name||'—')}</td>
            <td style="text-align:right">${fmtRupiah(t.nominal)}</td>
            <td>${escapeHtml(t.sumber||'—')}</td>
            <td>${escapeHtml(t.keterangan||'—')}</td>
            <td style="text-align:right"><button class="btn-icon" data-topup-del="${t.id}" title="Hapus"><span class="material-symbols-rounded">delete</span></button></td>
          </tr>`).join('') : `<tr><td colspan="6" class="empty-row">Belum ada top-up</td></tr>`}
          </tbody></table></div>
      </div>
    </div>
  `;

  // ---- charts ----
  if(typeof Chart !== 'undefined'){
    const palette = ['#7C7468','#1F5C99','#C9622B','#3E7D52','#D9B26A','#8AA0BC','#A8554E','#5B8C7D'];
    const fundLabels = funds.map(f=>f.name);
    const cf = $('#ang-chart-fund'); if(cf) new Chart(cf.getContext('2d'),{
      type:'bar',
      data:{ labels:fundLabels.map(l=>l.length>16?l.slice(0,15)+'…':l),
        datasets:[
          {label:'Anggaran', data:funds.map(f=>anggaranByFund[f.id]||0), backgroundColor:'#D9B26A', borderRadius:6},
          {label:'Realisasi', data:funds.map(f=>realisasiByFund[f.id]||0), backgroundColor:'#C9622B', borderRadius:6}
        ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}},tooltip:{callbacks:{label:(x)=>x.dataset.label+': '+fmtRupiah(x.parsed.y)}}},scales:{x:{ticks:{font:{size:9}}},y:{beginAtZero:true,ticks:{callback:v=>'Rp '+Number(v).toLocaleString('id-ID'),font:{size:8}}}}}
    });
    const cbf = $('#ang-chart-byfund'); if(cbf) new Chart(cbf.getContext('2d'),{
      type:'doughnut',
      data:{ labels:fundLabels, datasets:[{data:funds.map(f=>realisasiByFund[f.id]||0), backgroundColor:palette, borderColor:'#fff', borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:12}},tooltip:{callbacks:{label:(x)=>x.label+': '+fmtRupiah(x.parsed)}}},cutout:'50%'}
    });
    const cc = $('#ang-chart-cdp'); if(cc) new Chart(cc.getContext('2d'),{
      type:'bar',
      data:{ labels:_BULAN.map(b=>b+' '+String(year).slice(2)),
        datasets:[
          {label:'Rencana (CDP)', data:cdpByMonth, backgroundColor:'#D9B26A', borderRadius:5},
          {label:'Realisasi', data:realisasiByMonth, backgroundColor:'#C9622B', borderRadius:5}
        ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}},tooltip:{callbacks:{label:(x)=>x.dataset.label+': '+fmtRupiah(x.parsed.y)}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'Rp '+Number(v).toLocaleString('id-ID'),font:{size:8}}}}}
    });
    const jLabels=Object.keys(byJenis), jData=jLabels.map(k=>byJenis[k]);
    const cj=$('#ang-chart-jenis'); if(cj && jLabels.length) new Chart(cj.getContext('2d'),{
      type:'doughnut', data:{labels:jLabels,datasets:[{data:jData,backgroundColor:palette,borderColor:'#fff',borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:12}},tooltip:{callbacks:{label:(x)=>x.label+': '+fmtRupiah(x.parsed)}}},cutout:'55%'}
    });
    const lLabels=Object.keys(byLokasi), lData=lLabels.map(k=>byLokasi[k]);
    const cl=$('#ang-chart-lokasi'); if(cl && lLabels.length) new Chart(cl.getContext('2d'),{
      type:'doughnut', data:{labels:lLabels,datasets:[{data:lData,backgroundColor:palette,borderColor:'#fff',borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:12}},tooltip:{callbacks:{label:(x)=>x.label+': '+fmtRupiah(x.parsed)}}},cutout:'55%'}
    });
  }

  // ---- fund add/edit ----
  function fundModal(item){
    const v = item||{};
    return `
      <div class="modal-head"><h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">savings</span> ${item?'Edit':'Tambah'} Fund</h3>
        <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button></div>
      <div class="modal-body">
        <div class="field field-required"><label>Nama Fund</label><input class="input" id="f-name" value="${escapeHtml(v.name||'')}" placeholder="mis. Penyedia Jasa Outsourcing"/></div>
        <div class="field"><label>Keterangan</label><input class="input" id="f-ket" value="${escapeHtml(v.keterangan||'')}"/></div>
        <div class="field"><label>Status</label><select class="select" id="f-active"><option value="true" ${v.active!==false?'selected':''}>Aktif</option><option value="false" ${v.active===false?'selected':''}>Nonaktif</option></select></div>
      </div>
      <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Batal</button><button class="btn btn-primary" id="f-save"><span class="material-symbols-rounded">save</span>Simpan</button></div>`;
  }
  $('#ang-add-fund').addEventListener('click', ()=>{
    openModal(fundModal(null),'md');
    $('#f-save').addEventListener('click', async ()=>{
      const name=$('#f-name').value.trim(); if(!name){ toast('Nama wajib','warn'); return; }
      try{ await db.addFund({ name, keterangan:$('#f-ket').value.trim()||null, active:$('#f-active').value!=='false' });
        db.logActivity({action:'anggaran.create',target_type:'fund',detail:`Tambah fund: ${name}`});
        closeModal(); toast('Fund ditambahkan','success'); viewAdminAnggaran(c);
      }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
    });
  });
  $$('button[data-ang-edit]', c).forEach(b=>b.addEventListener('click', ()=>{
    const f=funds.find(x=>x.id===b.dataset.angEdit); openModal(fundModal(f),'md');
    $('#f-save').addEventListener('click', async ()=>{
      const name=$('#f-name').value.trim(); if(!name){ toast('Nama wajib','warn'); return; }
      try{ await db.updateFund(f.id,{ name, keterangan:$('#f-ket').value.trim()||null, active:$('#f-active').value!=='false' });
        db.logActivity({action:'anggaran.update',target_type:'fund',target_id:f.id,detail:`Edit fund: ${name}`});
        closeModal(); toast('Fund diperbarui','success'); viewAdminAnggaran(c);
      }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
    });
  }));
  $$('button[data-ang-del]', c).forEach(b=>b.addEventListener('click', async ()=>{
    const f=funds.find(x=>x.id===b.dataset.angDel);
    if(!confirm(`Hapus fund "${f?.name}" beserta riwayat top-up-nya?`)) return;
    try{ await db.deleteFund(f.id);
      db.logActivity({action:'anggaran.delete',target_type:'fund',target_id:f.id,detail:`Hapus fund: ${f?.name}`});
      toast('Fund dihapus','success'); viewAdminAnggaran(c);
    }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
  }));

  // ---- top-up ----
  $$('button[data-ang-topup]', c).forEach(b=>b.addEventListener('click', ()=>{
    const f=funds.find(x=>x.id===b.dataset.angTopup);
    openModal(`
      <div class="modal-head"><h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-green)">add_card</span> Top-up Anggaran</h3>
        <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button></div>
      <div class="modal-body">
        <div class="field"><label>Fund</label><input class="input" value="${escapeHtml(f.name)}" disabled/></div>
        <div class="form-grid">
          <div class="field field-required"><label>Nominal</label><input class="input pf-money" id="tu-nominal" inputmode="numeric" placeholder="Rp 0"/></div>
          <div class="field field-required"><label>Tanggal</label><input type="date" class="input" id="tu-tgl" value="${new Date().toISOString().slice(0,10)}"/></div>
        </div>
        <div class="field"><label>Sumber Anggaran</label><input class="input" id="tu-sumber" placeholder="mis. RKAP 2024 / Revisi Anggaran"/></div>
        <div class="field"><label>Keterangan</label><input class="input" id="tu-ket"/></div>
      </div>
      <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Batal</button><button class="btn btn-primary" id="tu-save"><span class="material-symbols-rounded">save</span>Simpan</button></div>
    `,'md');
    $('#tu-nominal').addEventListener('input', e=>{ const d=e.target.value.replace(/\D/g,''); e.target.value=d?'Rp '+Number(d).toLocaleString('id-ID'):''; });
    $('#tu-save').addEventListener('click', async ()=>{
      const nominal=Number(($('#tu-nominal').value||'').replace(/\D/g,''))||0;
      if(nominal<=0){ toast('Nominal wajib diisi','warn'); return; }
      try{ await db.addFundTopup({ fund_id:f.id, nominal, tanggal:$('#tu-tgl').value||new Date().toISOString().slice(0,10), sumber:$('#tu-sumber').value.trim()||null, keterangan:$('#tu-ket').value.trim()||null });
        db.logActivity({action:'anggaran.topup',target_type:'fund',target_id:f.id,detail:`Top-up ${f.name}: ${fmtRupiah(nominal)}`});
        closeModal(); toast('Top-up tersimpan','success'); viewAdminAnggaran(c);
      }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
    });
  }));
  $$('button[data-topup-del]', c).forEach(b=>b.addEventListener('click', async ()=>{
    if(!confirm('Hapus top-up ini?')) return;
    try{ await db.deleteFundTopup(b.dataset.topupDel); toast('Top-up dihapus','success'); viewAdminAnggaran(c); }
    catch(err){ toast('Gagal: '+(err.message||''),'error'); }
  }));

  // ---- CDP plan ----
  $$('button[data-cdp-edit]', c).forEach(b=>b.addEventListener('click', ()=>{
    const bulan=Number(b.dataset.cdpEdit);
    const existing = cdp.find(p=>Number(p.tahun)===year && Number(p.bulan)===bulan && !p.fund_id);
    openModal(`
      <div class="modal-head"><h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">event</span> Rencana CDP — ${_BULAN[bulan-1]} ${year}</h3>
        <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button></div>
      <div class="modal-body">
        <div class="field field-required"><label>Rencana Pencairan (CDP)</label><input class="input pf-money" id="cdp-nominal" inputmode="numeric" value="${existing&&existing.rencana?'Rp '+Number(existing.rencana).toLocaleString('id-ID'):''}" placeholder="Rp 0"/></div>
        <div class="field"><label>Keterangan</label><input class="input" id="cdp-ket" value="${escapeHtml(existing?.keterangan||'')}"/></div>
      </div>
      <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Batal</button><button class="btn btn-primary" id="cdp-save"><span class="material-symbols-rounded">save</span>Simpan</button></div>
    `,'sm');
    $('#cdp-nominal').addEventListener('input', e=>{ const d=e.target.value.replace(/\D/g,''); e.target.value=d?'Rp '+Number(d).toLocaleString('id-ID'):''; });
    $('#cdp-save').addEventListener('click', async ()=>{
      const rencana=Number(($('#cdp-nominal').value||'').replace(/\D/g,''))||0;
      try{ await db.upsertCdpPlan({ fund_id:null, tahun:year, bulan, rencana, keterangan:$('#cdp-ket').value.trim()||null });
        db.logActivity({action:'anggaran.cdp',target_type:'cdp',detail:`Set CDP ${_BULAN[bulan-1]} ${year}: ${fmtRupiah(rencana)}`});
        closeModal(); toast('Rencana CDP tersimpan','success'); viewAdminAnggaran(c);
      }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
    });
  }));
}

/* ============================================================
   v1.7: PERSETUJUAN (Approvals)
   Lists pending approvals for the current user (as Kepala Departemen).
   ============================================================ */
async function viewAdminApprovals(c){
  const me = session.get();
  c.innerHTML = `
    <div class="card">
      <div class="card-head"><h3>Persetujuan Saya</h3></div>
      <div class="card-body">
        <p class="muted text-sm" style="margin:0 0 14px">
          Daftar permintaan yang menunggu persetujuan Anda sebagai <strong>Kepala Departemen</strong>.
          Untuk Direct Purchase, PIC tidak dapat melanjutkan ke "Sedang Disiapkan" sebelum Anda menyetujui.
        </p>
        <div id="apr-list-host"></div>
      </div>
    </div>
  `;

  async function refresh(){
    const pending = await db.listMyPendingApprovals(me.id);
    const host = $('#apr-list-host');
    if(!pending.length){
      host.innerHTML = '<div class="muted center" style="padding:24px"><span class="material-symbols-rounded" style="font-size:48px;color:var(--mrt-green)">check_circle</span><br>Tidak ada permintaan yang menunggu persetujuan Anda.</div>';
      return;
    }
    // Fetch each request's details
    const enriched = await Promise.all(pending.map(async (a) => {
      const r = await db.getRequest(a.request_id);
      return { ...a, request: r };
    }));
    host.innerHTML = `
      <div class="table-wrap"><table class="t">
        <thead><tr>
          <th style="width:44px">#</th>
          <th>Kode Permintaan</th>
          <th>Kategori</th>
          <th>Pemesan</th>
          <th>PIC</th>
          <th>Diminta</th>
          <th style="width:240px;text-align:right">Aksi</th>
        </tr></thead>
        <tbody>
        ${enriched.map((a,i) => `
          <tr>

function openApprovalDecideModal(approvalId, decision, onDone){
  const isApprove = decision === 'approved';
  openModal(`
    <div class="modal-head">
      <h3>
        <span class="material-symbols-rounded" style="vertical-align:-6px;color:${isApprove?'var(--mrt-green)':'var(--danger)'}">${isApprove?'check_circle':'cancel'}</span>
        ${isApprove?'Setujui Permintaan':'Tolak Permintaan'}
      </h3>
      <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Catatan ${isApprove?'(opsional)':'(wajib)'}</label>
        <textarea class="textarea" id="apr-reason" placeholder="${isApprove?'Mis. anggaran tersedia, vendor sudah dikonfirmasi.':'Mis. anggaran belum tersedia di kuartal ini.'}"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn ${isApprove?'btn-primary':''}" id="apr-save" style="${isApprove?'':'background:var(--danger);color:#fff'}">
        <span class="material-symbols-rounded">${isApprove?'check':'close'}</span>${isApprove?'Setujui':'Tolak'}
      </button>
    </div>
  `, 'sm');
  $('#apr-save').addEventListener('click', async () => {
    const reason = $('#apr-reason').value.trim();
    if(!isApprove && !reason){ toast('Alasan wajib diisi untuk penolakan','warn'); return; }
    try{
      const updated = await db.decideApproval(approvalId, decision, reason);
      db.logActivity({
        action: 'approval.'+decision,
        target_type:'approval', target_id:approvalId,
        detail:`Approval di-${isApprove?'setujui':'tolak'}${reason?': '+reason:''}`,
        meta:{ approval_id:approvalId, decision }
      });
      // If approved, also notify the original requester via a notification
      if(isApprove && updated){
        try{
          const cur = session.get();
          if(typeof supa !== 'undefined' && SUPA_CONFIGURED){
            await supa.from('notifications').insert({
              user_id: updated.requested_by, request_id: updated.request_id,
              type:'approval_granted',
              title:'Permintaan disetujui',
              body:'Approval Kepala Departemen telah diberikan. Anda dapat melanjutkan ke Sedang Disiapkan.'
            });
          }else{
            demo.notifications.unshift({
              id:'n'+(demo.notifications.length+1), user_id: updated.requested_by, request_id: updated.request_id,
              type:'approval_granted',
              title:'Permintaan disetujui',
              body:`Approval Kepala Departemen telah diberikan. Anda dapat melanjutkan ke Sedang Disiapkan.`,
              read_at:null, created_at:new Date().toISOString()
            });
          }
        }catch{}
      }
      closeModal();
      toast(isApprove?'Disetujui':'Ditolak','success');
      onDone && onDone();
      // Refresh sidebar badge
      refreshApprovalBadge(session.get());
    }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
  });
}

/* ----- v1.9: Supabase-format backup (one CSV per table, zipped) -----
   Headers match the DB columns so each CSV can be imported directly into the
   matching Supabase table via Table Editor → Import data from CSV. */
async function gatherBackupTables(){
  const safe = (p) => p.catch(()=>[]);
  const reqs = await safe(db.listRequests());
  // ratings: walk request ids
  const ratings = [];
  for(const r of reqs){
    try{ const rt = await db.getRatingByRequest(r.id); if(rt) ratings.push(rt); }catch{}
  }
  let approvals = [];
  try{
    if(SUPA_CONFIGURED){ const { data } = await supa.from('approvals').select('*'); approvals = data||[]; }
    else approvals = [...demo.approvals];
  }catch{}
  const [users, pays, logs, slas, ma, divs, deps, ken, kat, lok, lk, tuj, ver] = await Promise.all([
    safe(db.listUsers()), safe(db.listPayments()),
    db.listActivityLogs ? safe(db.listActivityLogs({})) : Promise.resolve([]),
    safe(db.listSlaTargets()), safe(db.listMataAnggaran()), safe(db.listDivisi()),
    safe(db.listDepartemen()), safe(db.listKendaraan()), safe(db.listKategori()),
    safe(db.listLokasi()), safe(db.listLokasiKerja()), safe(db.listTujuan()), safe(db.listVersion())
  ]);
  // sanitize app_users: never export passwords
  const usersSafe = users.map(u => { const c = {...u}; delete c.password; return c; });
  return [
    { table:'requests',               rows:reqs },
    { table:'payments',               rows:pays },
    { table:'ratings',                rows:ratings },
    { table:'approvals',              rows:approvals },
    { table:'app_users',              rows:usersSafe },
    { table:'activity_logs',          rows:logs },
    { table:'sla_targets',            rows:slas },
    { table:'mata_anggaran_options',  rows:ma },
    { table:'divisi_options',         rows:divs },
    { table:'departemen_options',     rows:deps },
    { table:'kendaraan_options',      rows:ken },
    { table:'kategori_options',       rows:kat },
    { table:'lokasi_options',         rows:lok },
    { table:'lokasi_kerja_options',   rows:lk },
    { table:'tujuan_options',         rows:tuj },
    { table:'version_history',        rows:ver }
  ];
}
function tableToCsv(rows){
  if(!rows || !rows.length) return '';
  const keys = Array.from(rows.reduce((s,r)=>{ Object.keys(r).forEach(k=>{ if(!k.startsWith('_')) s.add(k); }); return s; }, new Set()));
  const esc = (val) => {
    if(val == null) return '';
    let v = (typeof val === 'object') ? JSON.stringify(val) : String(val);
    if(/[",\n\r]/.test(v)) v = '"' + v.replace(/"/g,'""') + '"';
    return v;
  };
  const lines = [keys.join(',')];
  rows.forEach(r => lines.push(keys.map(k => esc(r[k])).join(',')));
  return lines.join('\r\n');
}
async function downloadBackupCsvZip(btn){
  if(typeof JSZip === 'undefined'){ toast('Library JSZip belum termuat. Cek koneksi internet.','error'); return; }
  const orig = btn ? btn.innerHTML : '';
  if(btn){ btn.disabled = true; btn.innerHTML = '<span class="material-symbols-rounded">hourglass_top</span>Menyiapkan…'; }
  try{
    const tables = await gatherBackupTables();
    const zip = new JSZip();
    let totalRows = 0;
    tables.forEach(t => { zip.file(t.table + '.csv', tableToCsv(t.rows)); totalRows += (t.rows||[]).length; });
    // small README so the recipient knows how to import
    zip.file('_README.txt',
      'Backup GASS CRM — format Supabase (CSV per tabel).\n' +
      'Cara restore: Supabase → Table Editor → pilih tabel → Insert → Import data from CSV → unggah file <tabel>.csv.\n' +
      'Header tiap CSV sudah sesuai nama kolom tabel. Kolom JSON (mis. kendaraan_detail) tersimpan sebagai teks JSON.\n' +
      `Dibuat: ${new Date().toISOString()} · Total ${tables.length} tabel · ${totalRows} baris.\n`);
    const blob = await zip.generateAsync({ type:'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `backup-gass-crm-${new Date().toISOString().slice(0,10)}.zip`;
    a.click();
    setTimeout(()=> URL.revokeObjectURL(a.href), 4000);
    toast('Backup CSV (Supabase) berhasil diunduh','success');
    db.logActivity({ action:'backup.csv', target_type:'backup', detail:`Download backup CSV (${tables.length} tabel, ${totalRows} baris)` });
  }catch(err){
    console.error('[backup csv]', err);
    toast('Gagal membuat backup: '+(err.message||''),'error');
  }finally{
    if(btn){ btn.disabled = false; btn.innerHTML = orig; }
  }
}
// Rough estimate of DB payload size (proxy for Supabase storage) vs free-tier quota.
async function estimateStorage(){
  const tables = await gatherBackupTables();
  let bytes = 0;
  tables.forEach(t => { try{ bytes += new Blob([JSON.stringify(t.rows||[])]).size; }catch{} });
  return { bytes, tables: tables.map(t => ({ table:t.table, rows:(t.rows||[]).length, bytes: (()=>{ try{ return new Blob([JSON.stringify(t.rows||[])]).size; }catch{ return 0; } })() })) };
}

      $('#mu-confirm').addEventListener('click', () => doSubmit());
    } else if(step === 3){
      $('#mu-foot').innerHTML = '';
    }
  }

  // Detect the column delimiter from the header line. Excel on an
  // Indonesian/European Windows locale saves CSV with ';' (and Google
  // Sheets export can use a tab), which previously made every column
  // look "missing" because the parser only knew about ','.
  function detectDelimiter(text){
    const firstLine = (text.split('\n')[0] || '');
    const counts = { ',':0, ';':0, '\t':0 };
    let inQ = false;
    for(const ch of firstLine){
      if(ch === '"'){ inQ = !inQ; continue; }
      if(inQ) continue;
      if(ch in counts) counts[ch]++;
    }
    let best = ',', bestN = counts[','];
    for(const d of [';','\t']){ if(counts[d] > bestN){ best = d; bestN = counts[d]; } }
    return best;
  }

  // CSV parser — supports quoted fields, escaped quotes, and ','/';'/tab delimiters
  function parseCSV(text){
    text = text.replace(/^\uFEFF/, '').replace(/\r\n?/g, '\n');
    const DELIM = detectDelimiter(text);
    const rows = []; let cur = []; let field = ''; let inQ = false;
    for(let i=0; i<text.length; i++){
      const ch = text[i];
      if(inQ){
        if(ch === '"' && text[i+1] === '"'){ field += '"'; i++; }
        else if(ch === '"'){ inQ = false; }
        else field += ch;
      } else {
        if(ch === '"'){ inQ = true; }
        else if(ch === DELIM){ cur.push(field); field = ''; }
        else if(ch === '\n'){ cur.push(field); rows.push(cur); cur = []; field = ''; }
        else field += ch;
      }
    }
    if(field.length || cur.length){ cur.push(field); rows.push(cur); }
    // drop trailing empty rows
    while(rows.length && rows[rows.length-1].every(c => !c || !c.trim())) rows.pop();
    return rows;
  }

  function handleFile(file){
    if(!file.name.toLowerCase().endsWith('.csv')){ toast('File harus berformat .csv','warn'); return; }
    if(file.size > 2*1024*1024){ toast('File terlalu besar (maks 2 MB)','warn'); return; }
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const rows = parseCSV(reader.result);
        if(rows.length < 2){ toast('CSV kosong atau tanpa header','warn'); return; }
        // Normalize header cells: collapse non-breaking spaces / extra
        // whitespace and compare case-insensitively, then snap each cell
        // back to its canonical column label so downstream lookups work.
        const norm = s => (s||'').replace(/\u00A0/g,' ').replace(/\s+/g,' ').trim().toLowerCase();
        const header = rows[0].map(h => {
          const col = COLS.find(c => norm(c.label) === norm(h));
          return col ? col.label : (h||'').trim();
        });
        // Validate header presence
        const missingCols = COLS.filter(c => c.required && !header.includes(c.label));
        if(missingCols.length){
          toast('Kolom wajib hilang: ' + missingCols.map(c=>c.label).join(', '), 'error', 6000);
          return;
        }
        if(rows.length > 501){
          toast('Maksimal 500 baris data per upload','warn'); return;
        }
        parsedRows = rows.slice(1).map((arr, idx) => {
          const obj = {}; header.forEach((h, i) => obj[h] = (arr[i]||'').trim());
          return validateRow(obj, idx + 2); // +2 because line 1 is header
        });
        validRows = parsedRows.filter(p => p.errors.length === 0).map(p => p.payload);
        setStep(2);
      }catch(err){
        console.error(err);
        toast('Gagal membaca CSV: '+(err.message||''), 'error');
      }
    };
    reader.readAsText(file, 'UTF-8');
  }

  // Excel almost always rewrites an ISO date (2026-06-02) into the
  // locale display format (e.g. 02/06/2026) when the file is opened and
  // re-saved. Accept the common variants and normalize back to ISO
  // YYYY-MM-DD. Returns null if the value can't be understood.
  function normalizeDate(s){
    s = (s||'').trim();
    if(!s) return null;
    const pad = n => String(n).padStart(2,'0');
    const build = (y,mo,d) => {
      if(mo<1||mo>12||d<1||d>31) return null;
      const dt = new Date(Date.UTC(y,mo-1,d));
      if(dt.getUTCFullYear()!==y || dt.getUTCMonth()!==mo-1 || dt.getUTCDate()!==d) return null;
      return `${y}-${pad(mo)}-${pad(d)}`;
    };
    let m;
    // ISO-like: 2026-06-02  (also tolerate / or . as separator)
    if((m = s.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})$/)))
      return build(+m[1], +m[2], +m[3]);
    // Day/Month/Year: 02/06/2026, 6-2-2026 — default to D/M/Y (locale ID),
    // but auto-correct to M/D/Y if the numbers only make sense that way.
    if((m = s.match(/^(\d{1,2})[-/.](\d{1,2})[-/.](\d{4})$/))){
      let d = +m[1], mo = +m[2];
      if(d <= 12 && mo > 12){ const t = d; d = mo; mo = t; }  // it was M/D/Y
      return build(+m[3], mo, d);
    }
    return null;
  }

  function validateRow(obj, lineNum){
    const errors = [];
    const get = (label) => (obj[label] || '').trim();
    const kategori = get('Kategori');
    if(!kategori) errors.push('Kategori kosong');
    else if(!KATEGORI_KODE[kategori]) errors.push('Kategori tidak dikenali');

    const sumber = get('Sumber Pemesanan');
    if(!sumber) errors.push('Sumber Pemesanan kosong');

    const nama = get('Nama Pemesan');
    if(!nama) errors.push('Nama Pemesan kosong');

    const tglRaw = get('Tanggal Kebutuhan');
    const tgl = normalizeDate(tglRaw);
    if(!tglRaw) errors.push('Tanggal Kebutuhan kosong');
    else if(!tgl) errors.push('Format tanggal tidak dikenali (gunakan YYYY-MM-DD atau DD/MM/YYYY)');

    const detail = get('Detail Kebutuhan');
    if(!detail) errors.push('Detail Kebutuhan kosong');

    const harga = get('Estimasi Harga');
    if(harga && !/^\d+$/.test(harga.replace(/[.,\s]/g,''))) errors.push('Estimasi Harga harus angka');

    const divisi = get('Divisi');
    const departemen = get('Departemen');
    if(departemen && !divisi) errors.push('Departemen diisi tetapi Divisi kosong');

    const payload = errors.length ? null : {
      kategori,
      kategori_kode: KATEGORI_KODE[kategori],
      kode_smartoffice: get('Kode SmartOffice') || null,
      sumber_pemesanan: sumber,
      nama_pemesan: nama,
      nama_kegiatan: get('Nama Kegiatan') || null,
      lokasi_kebutuhan: get('Lokasi Kebutuhan') || null,
      tujuan_kebutuhan: get('Tujuan Kebutuhan') || null,
      tanggal_kebutuhan: tgl,
      detail_kebutuhan: detail,
      estimasi_harga: harga ? Number(harga.replace(/[.,\s]/g,'')) : 0,
      divisi: divisi || null,
      departemen: departemen || null,
      status: 'Belum Dikonfirmasi'
    };
    return { line: lineNum, raw: obj, errors, payload };
  }

  // Ensure every Divisi / Departemen named in the upload exists in the
  // master tables. Missing ones are created on the fly so they appear in
  // the dropdowns; request rows are then normalized to the master's
  // canonical spelling (so filters & dropdowns match exactly).
  async function ensureMasters(msg){
    const lc = s => (s||'').trim().toLowerCase();
    if(msg) msg.textContent = 'Memeriksa master Divisi & Departemen...';
    let divList = await db.listDivisi().catch(()=>[]);
    let depList = await db.listDepartemen().catch(()=>[]);
    let createdDiv = 0, createdDep = 0;

    // 1) Divisi — unique names referenced in the file (case-insensitive)
    const wantDiv = [];
    validRows.forEach(r => {
      const n = (r.divisi||'').trim();
      if(n && !wantDiv.some(x => lc(x) === lc(n))) wantDiv.push(n);
    });
    for(const name of wantDiv){
      if(divList.some(d => lc(d.name) === lc(name))) continue;
      try{
        const row = await db.addDivisi({ name });
        if(row) divList.push(row);
        createdDiv++;
      }catch(err){
        // Likely created concurrently — refetch the list and carry on
        console.warn('addDivisi gagal:', name, err);
        divList = await db.listDivisi().catch(()=>divList);
      }
    }

    // 2) Departemen — needs a parent Divisi (ensured in step 1 above)
    const wantDep = [];
    validRows.forEach(r => {
      const dep = (r.departemen||'').trim();
      const div = (r.divisi||'').trim();
      if(dep && div && !wantDep.some(x => lc(x.dep)===lc(dep) && lc(x.div)===lc(div)))
        wantDep.push({ dep, div });
    });
    for(const {dep, div} of wantDep){
      const divObj = divList.find(d => lc(d.name) === lc(div));
      if(!divObj) continue;
      if(depList.some(d => d.divisi_id === divObj.id && lc(d.name) === lc(dep))) continue;
      try{
        const row = await db.addDepartemen({ name:dep, divisi_id:divObj.id });
        if(row) depList.push(row);
        createdDep++;
      }catch(err){
        console.warn('addDepartemen gagal:', dep, err);
        depList = await db.listDepartemen().catch(()=>depList);
      }
    }

    // 3) Normalize each request row to the master's canonical spelling
    validRows.forEach(r => {
      if(r.divisi){
        const d = divList.find(x => lc(x.name) === lc(r.divisi));
        if(d) r.divisi = d.name;
      }
      if(r.departemen && r.divisi){
        const d = divList.find(x => lc(x.name) === lc(r.divisi));
        const dep = d && depList.find(x => x.divisi_id === d.id && lc(x.name) === lc(r.departemen));
        if(dep) r.departemen = dep.name;
      }
    });

    return { createdDiv, createdDep };
  }

  async function doSubmit(){
    setStep(3);
    const msg = $('#mu-progress-msg');
    // Auto-create any Divisi / Departemen referenced in the file that
    // don't exist in the master tables yet, so they show up in dropdowns.
    let createdDiv = 0, createdDep = 0;
    try{
      const res = await ensureMasters(msg);
      createdDiv = res.createdDiv; createdDep = res.createdDep;
    }catch(err){ console.warn('ensureMasters gagal', err); }
    let inserted = 0; let failed = 0;
    for(let i = 0; i < validRows.length; i++){

function generateQRDataURL(text, size){
  size = size || 140;
  if(typeof QRCode === 'undefined'){
    console.warn('QRCode library not loaded; skipping QR');
    return null;
  }
  // qrcodejs renders into a DOM node; use a hidden div to extract canvas
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
  document.body.appendChild(wrap);
  try{
    new QRCode(wrap, {
      text: text, width: size, height: size,
      colorDark: '#003D7E', colorLight: '#FFFFFF',
      correctLevel: QRCode.CorrectLevel.M
    });
    const canvas = wrap.querySelector('canvas');
    let dataUrl = null;
    if(canvas){
      dataUrl = canvas.toDataURL('image/png');
    } else {
      // Fallback: qrcodejs may render <img> in some browsers
      const img = wrap.querySelector('img');
      if(img) dataUrl = img.src;
    }
    return dataUrl;
  }finally{
    setTimeout(() => wrap.remove(), 0);
  }
}

function loadImageAsDataURL(url){
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try{
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
        canvas.getContext('2d').drawImage(img, 0, 0);
        resolve(canvas.toDataURL('image/png'));
      }catch(_){ resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

async function downloadTandaTerima(req){
  if(!window.jspdf || !window.jspdf.jsPDF){
    toast('Library PDF belum termuat. Coba lagi sebentar.', 'warn');
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const W = doc.internal.pageSize.getWidth();    // 210
  const H = doc.internal.pageSize.getHeight();   // 297
  const M = 14;                                  // margin

  // ----- Header (logo + title) -----
  const logoData = await loadImageAsDataURL('logo.png');
  if(logoData){
    try{ doc.addImage(logoData, 'PNG', M, M, 22, 22); }catch{}
  } else {
    // Fallback brand mark (gradient-like solid box)
    doc.setFillColor(0, 61, 126);
    doc.roundedRect(M, M, 22, 22, 3, 3, 'F');
    doc.setTextColor(255);
    doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    doc.text('GA', M + 11, M + 13, { align:'center' });
  }

  doc.setTextColor(0, 61, 126);
  doc.setFont('helvetica','bold');
  doc.setFontSize(16);
  doc.text('TANDA TERIMA PERMINTAAN', M + 28, M + 9);
  doc.setTextColor(80);
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.text('General Affairs Department · PT MRT Jakarta', M + 28, M + 15);
  doc.text('GA Hotline Portal', M + 28, M + 20);

  // Code pill on the right
  doc.setFillColor(232, 240, 251);
  doc.setDrawColor(232, 240, 251);
  const codeText = req.kode_permintaan || '-';
  doc.setFontSize(11);
  const codeWidth = doc.getTextWidth(codeText) + 10;
  doc.roundedRect(W - M - codeWidth, M + 4, codeWidth, 10, 2, 2, 'F');
  doc.setTextColor(0, 61, 126);
  doc.setFont('helvetica','bold');
  doc.text(codeText, W - M - codeWidth / 2, M + 11, { align:'center' });

  // Divider
  doc.setDrawColor(0, 168, 89);
  doc.setLineWidth(0.8);
  doc.line(M, M + 26, W - M, M + 26);
  doc.setDrawColor(200);
  doc.setLineWidth(0.2);

  // ----- Intro text -----
  let y = M + 34;
  doc.setTextColor(50);
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.text('Dokumen ini menjadi bukti bahwa permintaan berikut telah diproses dan tersedia untuk diserahkan.', M, y);
  y += 8;

  // ----- Detail table -----
  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.setTextColor(0, 61, 126);
  doc.text('DETAIL PERMINTAAN', M, y);
  y += 2;

  const fmtDateID = (d) => {
    if(!d) return '—';
    const dt = new Date(d);
    return dt.toLocaleDateString('id-ID', { day:'2-digit', month:'long', year:'numeric' });
  };

  const rows = [
    ['Kode Permintaan',        req.kode_permintaan || '—'],
    ['Kode SmartOffice',       req.kode_smartoffice || '—'],
    ['Kategori',               req.kategori || '—'],
    ['Sumber Pemesanan',       req.sumber_pemesanan || '—'],
    ['Nama Pemesan',           req.nama_pemesan || '—'],
    ['Nama Kegiatan',          req.nama_kegiatan || '—'],
    ['Lokasi Kebutuhan',       req.lokasi_kebutuhan || '—'],
    ['Tujuan Kebutuhan',       req.tujuan_kebutuhan || '—'],
    ['Tanggal Kebutuhan',      fmtDateID(req.tanggal_kebutuhan)],
    ['Detail Kebutuhan',       req.detail_kebutuhan || '—'],
    ['Estimasi Harga',         req.estimasi_harga ? fmtRupiah(req.estimasi_harga) : '—'],
    ['Total Anggaran',         req.total_anggaran ? fmtRupiah(req.total_anggaran) : '—'],
    ['Nama Vendor',            req.nama_vendor || '—'],
    ['PIC General Affairs',    req.nama_pic_ga || '—'],
    ['Estimasi Penyelesaian',  fmtDateID(req.estimasi_penyelesaian)],
    ['Status',                 req.status || '—']
  ];

  doc.autoTable({
    startY: y + 2,
    margin: { left: M, right: M },
    head: [['Keterangan', 'Nilai']],
    body: rows,
    theme: 'grid',
    styles: { font:'helvetica', fontSize:9.5, cellPadding:2.4, lineColor:[227,232,240], textColor:[30,40,55] },
    headStyles: { fillColor:[0,61,126], textColor:[255,255,255], fontStyle:'bold', halign:'left' },
    columnStyles: { 0:{ cellWidth:60, fontStyle:'bold', textColor:[80,90,110], fillColor:[249,250,252] }, 1:{ cellWidth:'auto' } }
  });

  let afterTableY = doc.lastAutoTable.finalY + 8;

  // ----- QR code (bottom-right of detail block) -----
  const ratingUrl = location.origin + location.pathname + '#/rate/' + req.id;
  const qrData = generateQRDataURL(ratingUrl, 220);

  // If page space tight, add a new page
  const needed = 70; // signature block + qr area
  if(afterTableY + needed > H - 16){
    doc.addPage();
    afterTableY = M;
  }

  const qrSize = 32;
  const qrX = W - M - qrSize;
  const qrY = afterTableY;
  if(qrData){
    try{ doc.addImage(qrData, 'PNG', qrX, qrY, qrSize, qrSize); }catch{}
  }
  // QR caption
  doc.setFont('helvetica','bold');
  doc.setFontSize(8.5);
  doc.setTextColor(0, 61, 126);
  doc.text('PENILAIAN PELAYANAN', qrX + qrSize/2, qrY + qrSize + 4, { align:'center' });
  doc.setFont('helvetica','normal');
  doc.setFontSize(7.5);
  doc.setTextColor(100);
  doc.text('Scan QR untuk menilai (skala 1-5 bintang)', qrX + qrSize/2, qrY + qrSize + 8, { align:'center' });

  // Notes column on the left of the QR
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(0, 61, 126);
  doc.text('KETERANGAN', M, afterTableY + 4);
  doc.setFont('helvetica','normal');
  doc.setFontSize(9.5);
  doc.setTextColor(50);
  const keteranganLines = doc.splitTextToSize(req.keterangan || '(tidak ada keterangan)', qrX - M - 8);
  doc.text(keteranganLines, M, afterTableY + 10);

  // ----- Signature block at the bottom -----
  let sigY = Math.max(afterTableY + qrSize + 16, H - 60);
  if(sigY + 50 > H - 14) sigY = H - 60;

  doc.setDrawColor(0, 168, 89);
  doc.setLineWidth(0.5);
  doc.line(M, sigY - 4, W - M, sigY - 4);

  const colW = (W - M*2 - 14) / 2;
  // Left column: Diserahkan oleh
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(0, 61, 126);
  doc.text('Diserahkan oleh,', M, sigY + 2);
  doc.setFont('helvetica','normal');
  doc.setTextColor(50);
  doc.setFontSize(9.5);
  doc.text('General Affairs Department', M, sigY + 7);
  doc.text('PT MRT Jakarta', M, sigY + 11.5);
  // signature space (line)
  doc.setDrawColor(180);
  doc.setLineWidth(0.3);
  doc.line(M, sigY + 38, M + colW - 8, sigY + 38);
  doc.setFont('helvetica','italic');
  doc.setFontSize(8.5);
  doc.setTextColor(120);
  doc.text('(Nama lengkap & tanda tangan)', M + 2, sigY + 43);
  if(req.nama_pic_ga){
    doc.setFont('helvetica','bold');
    doc.setFontSize(9.5);
    doc.setTextColor(50);
    doc.text(req.nama_pic_ga, M, sigY + 36);
  }

  // Right column: Diterima oleh
  const rx = M + colW + 14;
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(0, 61, 126);
  doc.text('Diterima oleh,', rx, sigY + 2);
  doc.setFont('helvetica','normal');
  doc.setTextColor(50);
  doc.setFontSize(9.5);
  doc.text(req.nama_pemesan || '(Nama Pemesan)', rx, sigY + 7);
  if(req.nama_kegiatan){
    doc.text(req.nama_kegiatan, rx, sigY + 11.5);
  }
  doc.setDrawColor(180);
  doc.setLineWidth(0.3);
  doc.line(rx, sigY + 38, rx + colW - 8, sigY + 38);
  doc.setFont('helvetica','italic');
  doc.setFontSize(8.5);
  doc.setTextColor(120);
  doc.text('(Nama lengkap & tanda tangan)', rx + 2, sigY + 43);

  // ----- Footer -----
  doc.setFontSize(7.5);
  doc.setTextColor(140);
  const issued = new Date().toLocaleString('id-ID', { day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
  doc.text('Dicetak: ' + issued + ' · GA Hotline Portal · v1.4.0', W/2, H - 8, { align:'center' });

  // Save
  const safeCode = (req.kode_permintaan || 'tanda-terima').replace(/[^A-Za-z0-9_-]/g,'_');
  doc.save(`tanda-terima-${safeCode}.pdf`);
}

/* ----------- PUBLIC: VERSION ----------- */
async function renderVersionPublic(){
  mount('tpl-version');
  const v = await db.listVersion();
  $('#timeline').innerHTML = v.length ? v.map(x=>`
    <div class="tl-item">
      <div class="tl-ver">v${escapeHtml(x.version)}</div>
      <div class="tl-date">${fmtDate(x.release_date)}</div>
      <div class="tl-txt">${escapeHtml(x.changes)}</div>
    </div>
  `).join('') : '<div class="muted">Belum ada catatan versi.</div>';
}

/* ----------- PUBLIC: RATING ----------- */
async function renderRating(id){
  mount('tpl-rating');
  const body = $('#rating-body');
  if(!id){ body.innerHTML = '<div class="muted">Tautan tidak valid.</div>'; return; }
  let req;
  try{ req = await db.getRequest(id); }catch(_){}
  if(!req){ body.innerHTML = '<div class="muted">Permintaan tidak ditemukan.</div>'; return; }
  if(req.status!=='Selesai'){
    body.innerHTML = `<div class="muted">Permintaan ini belum berstatus <em>Selesai</em>, sehingga belum dapat dinilai.</div>`;
    return;
  }
  const existing = await db.getRatingByRequest(id);
  if(existing){
    body.innerHTML = `
      <h3 style="margin:0 0 8px">Terima kasih!</h3>
      <p class="muted text-sm">Penilaian untuk permintaan ini sudah pernah dikirim.</p>
      <div class="card-pad" style="background:var(--surface-2);border-radius:12px;margin-top:14px">
        <div class="kvlist">
          <div class="k">Kode</div><div class="v"><span class="code-pill">${escapeHtml(req.kode_permintaan)}</span></div>
          <div class="k">Rating</div><div class="v" style="color:#FBBF24;font-size:18px">${'★'.repeat(existing.rating)}${'☆'.repeat(5-existing.rating)}</div>
          <div class="k">Kritik/Saran</div><div class="v">${escapeHtml(existing.kritik_saran||'—')}</div>
        </div>
      </div>
      <div class="mt-4"><a href="#/" class="btn btn-ghost"><span class="material-symbols-rounded">home</span>Kembali ke Beranda</a></div>
    `;
    return;
  }

  body.innerHTML = `
    <h3 style="margin:0 0 4px">Nilai Pelayanan Kami</h3>
    <p class="muted text-sm" style="margin:0 0 14px">Mohon luangkan waktu untuk memberikan penilaian. Masukan Anda sangat berarti.</p>

    <div class="card-pad" style="background:var(--surface-2);border-radius:12px;margin-bottom:18px">
      <div class="kvlist">
        <div class="k">Kode</div><div class="v"><span class="code-pill">${escapeHtml(req.kode_permintaan)}</span></div>
        <div class="k">Kategori</div><div class="v">${escapeHtml(req.kategori)}</div>
        <div class="k">Pemesan</div><div class="v">${escapeHtml(req.nama_pemesan)}</div>
        <div class="k">Detail</div><div class="v">${escapeHtml(req.detail_kebutuhan)}</div>
        <div class="k">Vendor</div><div class="v">${escapeHtml(req.nama_vendor||'—')}</div>
        <div class="k">PIC GA</div><div class="v">${escapeHtml(req.nama_pic_ga||'—')}</div>
      </div>
    </div>

    <div class="field field-required" style="margin-bottom:6px"><label>Skor Kepuasan</label></div>
    <div class="stars" id="stars">
      ${[1,2,3,4,5].map(n=>`<span class="star material-symbols-rounded" data-v="${n}">star</span>`).join('')}
    </div>
    <div class="field"><label>Kritik / Saran</label>
      <textarea class="textarea" id="ks" placeholder="Tuliskan masukan, kritik, atau apresiasi Anda..."></textarea></div>
    <button class="btn btn-primary" id="submit-rate" style="width:100%"><span class="material-symbols-rounded">send</span>Kirim Penilaian</button>
    <p class="text-sm muted center mt-4"><a href="#/">Kembali ke beranda</a></p>
  `;
  let val = 0;
  $$('.star').forEach(s => s.addEventListener('click', ()=>{
    val = Number(s.dataset.v);
    $$('.star').forEach(x => x.classList.toggle('filled', Number(x.dataset.v)<=val));
  }));
  $('#submit-rate').addEventListener('click', async () => {
    if(!val){ toast('Pilih skor kepuasan terlebih dahulu','warn'); return; }
    try{
      await db.insertRating({ request_id:id, rating:val, kritik_saran:$('#ks').value || null });
      body.innerHTML = `
        <div class="center">
          <div class="success-mark"><span class="material-symbols-rounded">check</span></div>
          <h3 style="margin:0 0 6px">Terima kasih!</h3>
          <p class="muted">Penilaian Anda telah kami terima dan akan menjadi bahan evaluasi tim GA.</p>
          <div class="mt-4"><a href="#/" class="btn btn-primary"><span class="material-symbols-rounded">home</span>Kembali ke Beranda</a></div>
        </div>
      `;
    }catch(err){ console.error(err); toast(err.message||'Gagal mengirim penilaian','error'); }
  });
}
