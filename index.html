function pcReimProcess(id){
  const r=_pcCache.reimburse.find(x=>x.id===id); if(!r) return;
  const me = session.get();
  const stage = pcWfStage(r);
  const curIdx = stage===PC_WF_DONE ? PC_WF.length : pcWfIndex(stage);
  const def = stage===PC_WF_DONE ? null : pcWfDef(stage);
  const canAct = def ? pcWfHasPerm(def.perm) : false;
  const moneyVal = (v)=> v ? ('Rp '+Number(v).toLocaleString('id-ID')) : '';

  // --- stepper ---
  const stepper = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
    ${PC_WF.map((s,i)=>`<div style="flex:1;min-width:118px;text-align:center;padding:7px 8px;border-radius:8px;font-size:11.5px;line-height:1.25;${i<curIdx?'background:#dcfce7;color:#166534':i===curIdx?'background:var(--mrt-blue);color:#fff':'background:#f1f5f9;color:#64748b'}">${i+1}. ${s.label}<div style="font-size:10px;opacity:.85;margin-top:2px">${s.role}</div></div>`).join('')}
    <div style="flex:1;min-width:92px;text-align:center;padding:7px 8px;border-radius:8px;font-size:11.5px;${stage===PC_WF_DONE?(r.wf_final_status==='cancel'?'background:#fee2e2;color:#991b1b':'background:#dcfce7;color:#166534'):'background:#f1f5f9;color:#64748b'}">Selesai${stage===PC_WF_DONE&&r.wf_final_status==='cancel'?' (Cancel)':''}</div>
  </div>`;

  // --- ringkasan tahap yang sudah selesai ---
  const actorOf = (k)=> (k==='pic_loket'?r.wf_pic_by:k==='verifikasi_ppk'?r.wf_verif_by:k==='transfer_pk'?r.wf_pk_by:k==='spp_ppk'?r.wf_spp_by:r.wf_return_by)||'—';
  function doneBlock(s){
    const i=pcWfIndex(s.key); if(i>=curIdx) return '';
    const start=pcWfStageStart(r,s.key), done=pcWfStageDone(r,s.key), h=pcSlaHours(s.key);
    let detail='—';
    if(s.key==='pic_loket') detail=`User: ${escapeHtml(r.wf_user||'—')} · Lampiran: ${[r.wf_file_formulir?'Formulir':'',r.wf_file_invoice?'Invoice':'',r.wf_file_pendukung?'Pendukung':''].filter(Boolean).join(', ')||'—'}`;
    else if(s.key==='verifikasi_ppk') detail=`Verifikasi: ${r.wf_verif_status==='sesuai'?'Sesuai':r.wf_verif_status==='tidak'?'Tidak sesuai':'—'} · Tgl permohonan transfer: ${pcFmtTgl(r.wf_transfer_req_date)}`;
    else if(s.key==='transfer_pk') detail=`Sumber biaya: ${escapeHtml(r.wf_sumber_biaya||r.sumber||'—')} · Nominal disetujui: ${fmtRupiah(r.wf_nominal_disetujui)}${r.wf_file_bukti_pk?' · Bukti ✓':''}`;
    else if(s.key==='spp_ppk') detail=`No. SPP: ${escapeHtml(r.no_spp||'—')}${r.wf_revisi_finance?` · Revisi finance (${pcFmtTgl(r.wf_revisi_date)}) · Penyesuaian ${fmtRupiah(r.wf_nominal_penyesuaian)} · SPP baru ${escapeHtml(r.wf_no_spp_penyesuaian||'—')}`:''}`;
    else if(s.key==='pengembalian_pk') detail=`Pengembalian: ${fmtRupiah(r.wf_nominal_pengembalian)} (${pcFmtTgl(r.wf_pengembalian_date)}) · ${escapeHtml(r.wf_nama_pengembalian||'—')} → ${escapeHtml(r.wf_sumber_kas_tujuan||'—')} · Status: ${r.wf_final_status==='cancel'?'Cancel':'Done'}`;
    return `<div style="border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:#f8fafc">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
        <strong style="font-size:13px"><span class="material-symbols-rounded" style="font-size:16px;vertical-align:-3px;color:#16a34a">check_circle</span> ${i+1}. ${s.label} <span class="muted" style="font-weight:500">— ${s.role}</span></strong>
        ${pcWfSlaBadge(start,h,done)}
      </div>
      <div class="text-sm muted" style="margin-top:4px">${detail}</div>
      <div class="text-sm muted" style="margin-top:2px">Oleh ${escapeHtml(actorOf(s.key))} · ${done?fmtDateTime(done):'—'}</div>
    </div>`;
  }
  const doneHtml = PC_WF.map(doneBlock).join('');

  // --- form tahap aktif ---
  function activeFormHtml(k){
    if(k==='pic_loket') return `<div class="form-grid">
      <div class="field"><label>Lokasi Loket</label><input class="input" id="wf-loket" value="${escapeHtml(r.loket||'')}"/></div>
      <div class="field"><label>Penerima Loket</label><input class="input" id="wf-penerima" value="${escapeHtml(r.penerima||'')}"/></div>
      <div class="field"><label>Tanggal</label><input class="input" type="date" id="wf-tanggal" value="${escapeHtml((r.tanggal||'').slice(0,10))}"/></div>
      <div class="field"><label>Kategori</label><input class="input" id="wf-kategori" value="${escapeHtml(r.kategori||'')}"/></div>
      <div class="field"><label>User</label><input class="input" id="wf-user" value="${escapeHtml(r.wf_user||'')}"/></div>
      <div class="field"><label>Departemen</label><input class="input" id="wf-dep" value="${escapeHtml(r.departemen||'')}"/></div>
      <div class="field full"><label>Kegiatan</label><input class="input" id="wf-kegiatan" value="${escapeHtml(r.kegiatan||'')}"/></div>
      <div class="field"><label>No. Rekening</label><input class="input" id="wf-rek" value="${escapeHtml(r.rekening||'')}"/></div>
      <div class="field"><label>Nominal</label><input class="input pc-money-wf" id="wf-nominal" inputmode="numeric" value="${moneyVal(r.nominal)}"/></div>
      <div class="field"><label>Formulir Petty Cash (PDF ≤2MB)</label><input class="input" type="file" accept="application/pdf" id="wf-f-formulir"/>${r.wf_file_formulir?`<span class="hint"><a href="${r.wf_file_formulir}" target="_blank">berkas saat ini</a></span>`:''}</div>
      <div class="field"><label>Bukti Invoice (PDF ≤2MB)</label><input class="input" type="file" accept="application/pdf" id="wf-f-invoice"/>${r.wf_file_invoice?`<span class="hint"><a href="${r.wf_file_invoice}" target="_blank">berkas saat ini</a></span>`:''}</div>
      <div class="field"><label>Dokumen Pendukung (PDF ≤2MB, opsional)</label><input class="input" type="file" accept="application/pdf" id="wf-f-pendukung"/>${r.wf_file_pendukung?`<span class="hint"><a href="${r.wf_file_pendukung}" target="_blank">berkas saat ini</a></span>`:''}</div>
    </div>`;
    if(k==='verifikasi_ppk') return `<div class="form-grid">
      <div class="field field-required"><label>Verifikasi Dokumen</label><select class="select" id="wf-verif"><option value="sesuai">Sesuai</option><option value="tidak">Tidak sesuai</option></select></div>
      <div class="field"><label>Tanggal Permohonan Transfer</label><input class="input" type="date" id="wf-trfreq" value="${escapeHtml(r.wf_transfer_req_date||'')}"/></div>
      <div class="field full"><label>Catatan (opsional)</label><textarea class="textarea" id="wf-verif-note" style="min-height:54px">${escapeHtml(r.wf_verif_catatan||'')}</textarea></div>
    </div><p class="muted text-sm" style="margin-top:6px"><span class="material-symbols-rounded" style="font-size:16px;vertical-align:-3px">info</span> Pilih <strong>Tidak sesuai</strong> untuk mengembalikan workflow ke PIC Loket.</p>`;
    if(k==='transfer_pk') return `<div class="form-grid">
      <div class="field"><label>Konfirmasi Pengajuan</label><select class="select" id="wf-konf"><option value="ya">Dikonfirmasi</option><option value="tidak">Belum</option></select></div>
      <div class="field"><label>Verifikasi Kelengkapan Dokumen</label><select class="select" id="wf-keleng"><option value="ya">Lengkap</option><option value="tidak">Belum lengkap</option></select></div>
      <div class="field"><label>Sumber Biaya</label><select class="select" id="wf-sumber">${PC_SUMBER.map(s=>`<option ${(r.wf_sumber_biaya||r.sumber)===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="field"><label>Nominal Disetujui</label><input class="input pc-money-wf" id="wf-nom-setuju" inputmode="numeric" value="${moneyVal(r.wf_nominal_disetujui||r.nominal)}"/></div>
      <div class="field full"><label>Bukti Pendukung (PDF ≤5MB)</label><input class="input" type="file" accept="application/pdf" id="wf-f-bukti"/>${r.wf_file_bukti_pk?`<span class="hint"><a href="${r.wf_file_bukti_pk}" target="_blank">berkas saat ini</a></span>`:''}</div>
    </div>`;
    if(k==='spp_ppk') return `<div class="form-grid">
      <div class="field field-required"><label>Nomor SPP</label><input class="input" id="wf-nospp" value="${escapeHtml(r.no_spp||'')}" placeholder="022/SPP/GA-MRT/III/2026"/></div>
      <div class="field"><label>Revisi Finance?</label><select class="select" id="wf-revisi"><option value="tidak" ${!r.wf_revisi_finance?'selected':''}>Tidak</option><option value="ya" ${r.wf_revisi_finance?'selected':''}>Ya</option></select></div>
      <div class="field" id="wf-revisi-date-wrap" style="${r.wf_revisi_finance?'':'display:none'}"><label>Tanggal Revisi</label><input class="input" type="date" id="wf-revisi-date" value="${escapeHtml(r.wf_revisi_date||'')}"/></div>
      <div class="field"><label>Nominal Penyesuaian</label><input class="input pc-money-wf" id="wf-nom-peny" inputmode="numeric" value="${moneyVal(r.wf_nominal_penyesuaian)}"/></div>
      <div class="field"><label>No. SPP Penyesuaian</label><input class="input" id="wf-nospp-peny" value="${escapeHtml(r.wf_no_spp_penyesuaian||'')}"/></div>
    </div>`;
    if(k==='pengembalian_pk') return `<div class="form-grid">
      <div class="field"><label>Nominal Pengembalian</label><input class="input pc-money-wf" id="wf-nom-kembali" inputmode="numeric" value="${moneyVal(r.wf_nominal_pengembalian)}"/></div>
      <div class="field"><label>Tanggal Pengembalian</label><input class="input" type="date" id="wf-tgl-kembali" value="${escapeHtml(r.wf_pengembalian_date||'')}"/></div>
      <div class="field"><label>No. Rekening Asal</label><input class="input" id="wf-rek-asal" value="${escapeHtml(r.wf_rek_asal||'')}"/></div>
      <div class="field"><label>Nama</label><input class="input" id="wf-nama" value="${escapeHtml(r.wf_nama_pengembalian||'')}"/></div>
      <div class="field"><label>Sumber Kas Tujuan</label><input class="input" id="wf-kas-tujuan" value="${escapeHtml(r.wf_sumber_kas_tujuan||'')}"/></div>
      <div class="field field-required"><label>Status</label><select class="select" id="wf-final"><option value="done">Done</option><option value="cancel">Cancel</option></select></div>
    </div>`;
    return '';
  }

  let activeHtml='';
  if(stage===PC_WF_DONE){
    activeHtml = `<div style="text-align:center;padding:12px;background:${r.wf_final_status==='cancel'?'#fee2e2':'#dcfce7'};border-radius:10px;color:${r.wf_final_status==='cancel'?'#991b1b':'#166534'};font-weight:600"><span class="material-symbols-rounded" style="vertical-align:-5px">${r.wf_final_status==='cancel'?'cancel':'verified'}</span> Workflow ${r.wf_final_status==='cancel'?'dibatalkan (Cancel)':'selesai (Done)'}</div>`;
  } else if(!canAct){
    activeHtml = `<div style="padding:12px 14px;background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;color:#9a3412"><span class="material-symbols-rounded" style="vertical-align:-5px">hourglass_top</span> Tahap aktif: <strong>${def.label}</strong> — menunggu <strong>${def.role}</strong>. Akun Anda tidak memiliki izin untuk tahap ini.</div>`;
  } else {
    const start=pcWfStageStart(r,stage), h=pcSlaHours(stage);
    activeHtml = `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin:4px 0 8px"><strong style="font-size:14px;color:var(--mrt-blue)">${curIdx+1}. ${def.label} <span class="muted" style="font-weight:500">— ${def.role}</span></strong>${pcWfSlaBadge(start,h,null)}</div><form id="wf-form" onsubmit="return false">${activeFormHtml(stage)}</form>`;
  }

  const btnLabel = stage==='pic_loket'?'Kirim ke Pembantu Pemegang Kas':stage==='verifikasi_ppk'?'Simpan Verifikasi':stage==='transfer_pk'?'Teruskan ke SPP':stage==='spp_ppk'?'Teruskan ke Pengembalian':'Selesaikan Workflow';
  const footHtml = `<button class="btn btn-ghost" onclick="closeModal()">Tutup</button>` + ((stage!==PC_WF_DONE && canAct) ? `<button class="btn btn-primary" id="wf-save"><span class="material-symbols-rounded">save</span><span id="wf-save-label">${btnLabel}</span></button>` : '');

  openModal(`
    <div class="modal-head"><h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">conveyor_belt</span> Proses Workflow — ${escapeHtml(r.kode)}</h3><button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button></div>
    <div class="modal-body">${stepper}${doneHtml}${activeHtml}</div>
    <div class="modal-foot">${footHtml}</div>`,'xl');

  // money formatter dalam modal
  $$('.pc-money-wf').forEach(inp=>inp.addEventListener('input',e=>{ const d=e.target.value.replace(/\D/g,''); e.target.value=d?'Rp '+Number(d).toLocaleString('id-ID'):''; }));
  // verifikasi: relabel tombol sesuai pilihan
  const vsel=$('#wf-verif');
  if(vsel){ const relabel=()=>{ const lb=$('#wf-save-label'); if(lb) lb.textContent = vsel.value==='tidak' ? 'Kembalikan ke PIC Loket' : 'Teruskan ke Pemegang Kas'; const sb=$('#wf-save'); if(sb) sb.style.background = vsel.value==='tidak' ? '#dc2626' : ''; }; vsel.addEventListener('change', relabel); relabel(); }
  // spp: toggle tanggal revisi
  const rsel=$('#wf-revisi');
  if(rsel) rsel.addEventListener('change', ()=>{ const w=$('#wf-revisi-date-wrap'); if(w) w.style.display = rsel.value==='ya'?'':'none'; });

  const val=(i)=>{ const el=$('#'+i); return el? (el.value||'').trim() : ''; };
  const money=(i)=>{ const el=$('#'+i); return el? (Number((el.value||'').replace(/\D/g,''))||0) : 0; };
  async function pcWfUpload(inp, kind, maxMB){
    const f = inp && inp.files && inp.files[0]; if(!f) return null;
    const ext=(f.name.split('.').pop()||'').toLowerCase();
    if(ext!=='pdf') throw new Error('Berkas '+kind+' harus PDF');
    if(f.size > maxMB*1024*1024) throw new Error('Berkas '+kind+' maksimal '+maxMB+'MB');
    const res = await db.uploadEvidence(r.id, f, kind);
    return res && res.url ? res.url : null;
  }
  async function submitStage(){
    const nowIso=new Date().toISOString(); const who=me?.full_name||'-';
    let patch={};
    try{
      if(stage==='pic_loket'){
        const upF=await pcWfUpload($('#wf-f-formulir'),'pc-formulir',2);
        const upI=await pcWfUpload($('#wf-f-invoice'),'pc-invoice',2);
        const upD=await pcWfUpload($('#wf-f-pendukung'),'pc-pendukung',2);
        patch={ loket:val('wf-loket')||null, penerima:val('wf-penerima')||null, tanggal:val('wf-tanggal')||null,
          kategori:val('wf-kategori')||null, wf_user:val('wf-user')||null, departemen:val('wf-dep')||null,
          kegiatan:val('wf-kegiatan')||null, rekening:val('wf-rek')||null, nominal:money('wf-nominal')||r.nominal,
          wf_pic_at:nowIso, wf_pic_by:who, wf_stage:'verifikasi_ppk', status:'Input' };
        if(upF) patch.wf_file_formulir=upF; if(upI) patch.wf_file_invoice=upI; if(upD) patch.wf_file_pendukung=upD;
      } else if(stage==='verifikasi_ppk'){

      } else if(stage==='transfer_pk'){

        patch={ wf_konfirmasi:val('wf-konf')==='ya', wf_kelengkapan:val('wf-keleng')==='ya', wf_sumber_biaya:val('wf-sumber')||null,
          sumber:val('wf-sumber')||r.sumber, wf_nominal_disetujui:money('wf-nom-setuju'),
          wf_pk_at:nowIso, wf_pk_by:who, wf_stage:'spp_ppk', status:'Ditransfer' };
        if(upB) patch.wf_file_bukti_pk=upB;
      } else if(stage==='spp_ppk'){
        const rev=val('wf-revisi')==='ya';
        patch={ no_spp:val('wf-nospp')||null, wf_revisi_finance:rev, wf_revisi_date: rev?(val('wf-revisi-date')||null):null,
          wf_nominal_penyesuaian:money('wf-nom-peny'), wf_no_spp_penyesuaian:val('wf-nospp-peny')||null,
          wf_spp_at:nowIso, wf_spp_by:who, wf_stage:'pengembalian_pk', status:'SPP Terbit' };
      } else if(stage==='pengembalian_pk'){
        const fin=val('wf-final')||'done';
        patch={ wf_nominal_pengembalian:money('wf-nom-kembali'), wf_pengembalian_date:val('wf-tgl-kembali')||null,
          wf_rek_asal:val('wf-rek-asal')||null, wf_nama_pengembalian:val('wf-nama')||null, wf_sumber_kas_tujuan:val('wf-kas-tujuan')||null,
          wf_final_status:fin, wf_return_at:nowIso, wf_return_by:who, wf_stage:PC_WF_DONE, status: fin==='cancel'?'Revisi':'Selesai' };
      } else { return; }
      await pcdb.update('reimburse', id, patch);
      pcdb.log('reimburse.workflow', `${r.kode} · ${stage} → ${patch.wf_stage}`);
      await pcLoadAll(); closeModal(); renderPettyTab(); toast('Tahap workflow tersimpan','success');
    }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
  }
  if($('#wf-save')) $('#wf-save').addEventListener('click', submitStage);
}

// v2.9: pengurut baris tabel (kolom tanggal & total numerik diperlakukan khusus)
function pcSortRows(rows, key, dir){
  const mul = dir==='asc' ? 1 : -1;
  const numeric = (key==='total_biaya');
  return rows.slice().sort((a,b)=>{
    let av=a[key], bv=b[key];
    if(numeric){ return ((Number(av)||0)-(Number(bv)||0))*mul; }
    av=(av==null?'':String(av)).toLowerCase();
    bv=(bv==null?'':String(bv)).toLowerCase();
    if(key==='tanggal'){ return (av<bv?-1:av>bv?1:0)*mul; }   // ISO yyyy-mm-dd sudah urut leksikografis
    return av.localeCompare(bv,'id')*mul;
  });
}

    + `<span style="opacity:${dn?1:.35};color:${dn?'var(--mrt-blue)':'inherit'}">▼</span></span>`;

   TAB: SPP — dokumen A4 portrait (format identik) + cetak
   ============================================================ */
function pcTerbilang(n){
  n=Math.floor(Math.abs(Number(n)||0));
  const sat=['','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan','sepuluh','sebelas'];
  function f(x){ if(x<12) return sat[x]; if(x<20) return f(x-10)+' belas'; if(x<100) return f(Math.floor(x/10))+' puluh'+(x%10?' '+f(x%10):'');
    if(x<200) return 'seratus'+(x%100?' '+f(x%100):''); if(x<1000) return f(Math.floor(x/100))+' ratus'+(x%100?' '+f(x%100):'');
    if(x<2000) return 'seribu'+(x%1000?' '+f(x%1000):''); if(x<1e6) return f(Math.floor(x/1000))+' ribu'+(x%1000?' '+f(x%1000):'');
    if(x<1e9) return f(Math.floor(x/1e6))+' juta'+(x%1e6?' '+f(x%1e6):''); return f(Math.floor(x/1e9))+' miliar'+(x%1e9?' '+f(x%1e9):''); }
  if(n===0) return 'nol rupiah';
  return (f(n).replace(/\s+/g,' ').trim()+' rupiah');
}
function pcSppDocHtml(d){
  d=d||{}; const nominal=Number(d.nominal)||0;

/* v2.8: generator nomor SPP berurutan — format NNN/SPP/GA-MRT/<bulan romawi>/<tahun> */
function pcGenSppNo(){
  const roman=['','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
  const now=new Date(); let max=0;
  (_pcCache.reimburse||[]).forEach(r=>{ const m=String(r.no_spp||'').match(/^\s*(\d+)/); if(m){ const n=parseInt(m[1],10); if(n>max) max=n; } });
  return String(max+1).padStart(3,'0')+'/SPP/GA-MRT/'+roman[now.getMonth()+1]+'/'+now.getFullYear();
}

  if(typeof Chart!=='undefined'){

        </tr>
      `).join('')}

      }catch(err){ toast('Gagal menghapus','error'); }

      $('#new-lok').value=''; toast('Lokasi ditambahkan','success'); refresh();
    }catch(err){ toast('Gagal menambah: '+(err.message||''),'error'); }
  });
  $('#add-lokker').addEventListener('click', async () => {
    const v = $('#new-lokker').value.trim(); if(!v) return;
    try{
      await db.addLokasiKerja(v);
      db.logActivity({ action:'masterdata.create', target_type:'lokker', detail:'Tambah lokasi kerja: '+v });
      $('#new-lokker').value=''; toast('Lokasi kerja ditambahkan','success'); refresh();
    }catch(err){ toast('Gagal menambah: '+(err.message||''),'error'); }
  });
  $('#add-tuj').addEventListener('click', async () => {
    const v = $('#new-tuj').value.trim(); if(!v) return;
    try{
      await db.addTujuan(v);
      db.logActivity({ action:'masterdata.create', target_type:'tuj', detail:'Tambah tujuan kebutuhan: '+v });
      $('#new-tuj').value=''; toast('Tujuan ditambahkan','success'); refresh();
    }catch(err){ toast('Gagal menambah: '+(err.message||''),'error'); }
  });
  $('#add-ma').addEventListener('click', async () => {
    const name = $('#new-ma-name').value.trim();
    const kode = $('#new-ma-kode').value.trim();
    if(!name){ toast('Nama mata anggaran wajib diisi','warn'); return; }
    try{

      $('#new-ma-name').value=''; $('#new-ma-kode').value='';
      toast('Mata anggaran ditambahkan','success'); refresh();
    }catch(err){ toast('Gagal menambah: '+(err.message||''),'error'); }
  });
}

/* ----------- ADMIN: MASTER KARYAWAN (v2.5) -----------
   CRUD nama karyawan + penempatan Divisi & Departemen. Dipakai sebagai sumber
   typesearch (mis. PIC, penerima, dll). CRUD: Super Admin / Admin. */
let _karState = { search:'', filterDiv:'', filterDep:'' };
async function viewAdminKaryawan(c){
  const me = session.get();
  const canManage = !!me && ['superadmin','admin'].includes(me.role);
  c.innerHTML = `
    <div class="card">
      <div class="card-head">
        <h3>Master Karyawan</h3>
        <div class="flex gap-2">
          ${canManage?'<button class="btn btn-primary btn-sm" id="kar-add"><span class="material-symbols-rounded" style="font-size:18px">person_add</span>Tambah Karyawan</button>':''}
          <button class="btn btn-ghost btn-sm" id="kar-csv"><span class="material-symbols-rounded" style="font-size:18px">download</span>CSV</button>
        </div>
      </div>
      <div class="card-body">
        <p class="muted text-sm" style="margin:-6px 0 12px">Kelola daftar nama karyawan beserta penempatan Divisi & Departemen. Data ini menjadi sumber pencarian (typesearch) di form-form lain.</p>
        <div class="toolbar" style="flex-wrap:wrap">
          <div class="search"><span class="material-symbols-rounded">search</span><input class="input" id="kar-search" placeholder="Cari nama / jabatan..." value="${escapeHtml(_karState.search)}"/></div>
          <select class="select sel-search" id="kar-fdiv" style="max-width:240px"><option value="">Semua Divisi</option></select>
          <select class="select sel-search" id="kar-fdep" style="max-width:240px"><option value="">Semua Departemen</option></select>
        </div>
        <div id="kar-host"></div>
      </div>
    </div>`;

  const [divisi, departemen, karyawan] = await Promise.all([ db.listDivisi(), db.listDepartemen(), db.listKaryawan() ]);
  const divName = (id)=> (divisi.find(d=>d.id===id)||{}).name || '—';
  const depName = (id)=> (departemen.find(d=>d.id===id)||{}).name || '—';

  const fdiv = $('#kar-fdiv'), fdep = $('#kar-fdep'), search = $('#kar-search');
  fdiv.innerHTML = '<option value="">Semua Divisi</option>' + divisi.map(d=>`<option value="${d.id}" ${_karState.filterDiv===d.id?'selected':''}>${escapeHtml(d.name)}</option>`).join('');
  fdep.innerHTML = '<option value="">Semua Departemen</option>' + departemen.map(d=>`<option value="${d.id}" ${_karState.filterDep===d.id?'selected':''}>${escapeHtml(d.name)}</option>`).join('');

  function draw(){
    const host = $('#kar-host');
    let rows = karyawan.slice();
    const q = (_karState.search||'').toLowerCase();
    if(q) rows = rows.filter(k => (k.nama||'').toLowerCase().includes(q) || (k.jabatan||'').toLowerCase().includes(q));
    if(_karState.filterDiv) rows = rows.filter(k => k.divisi_id === _karState.filterDiv);
    if(_karState.filterDep) rows = rows.filter(k => k.departemen_id === _karState.filterDep);
    rows.sort((a,b)=>(a.nama||'').localeCompare(b.nama||''));
    host.innerHTML = `<div class="table-wrap"><table class="t t-dense"><thead><tr>
      <th>Nama</th><th>Jabatan</th><th>Divisi</th><th>Departemen</th><th>Status</th>${canManage?'<th style="text-align:right">Aksi</th>':''}
    </tr></thead><tbody>
      ${rows.length ? rows.map(k=>`<tr>
        <td class="fw-700">${escapeHtml(k.nama)}</td>
        <td>${escapeHtml(k.jabatan||'—')}</td>
        <td>${escapeHtml(divName(k.divisi_id))}</td>
        <td>${escapeHtml(depName(k.departemen_id))}</td>
        <td>${k.active===false?'<span class="badge gray">Nonaktif</span>':'<span class="badge status-selesai">Aktif</span>'}</td>
        ${canManage?`<td style="text-align:right"><div class="actions-compact"><button class="btn-icon" data-edit="${k.id}"><span class="material-symbols-rounded" style="font-size:17px">edit</span></button><button class="btn-icon" data-del="${k.id}"><span class="material-symbols-rounded" style="font-size:17px">delete</span></button></div></td>`:''}
      </tr>`).join('') : `<tr><td colspan="${canManage?6:5}" class="empty-row">Belum ada karyawan</td></tr>`}
    </tbody></table></div>`;
    if(canManage){
      $$('button[data-edit]', host).forEach(b=>b.addEventListener('click', ()=>openKaryawanEdit(b.dataset.edit, divisi, departemen, karyawan, ()=>viewAdminKaryawan(c))));
      $$('button[data-del]', host).forEach(b=>b.addEventListener('click', async ()=>{ const k=karyawan.find(x=>x.id===b.dataset.del); if(!k||!confirm(`Hapus karyawan "${k.nama}"?`))return; await db.deleteKaryawan(k.id); db.logActivity({action:'karyawan.delete',target_type:'karyawan',target_id:k.id,detail:`Hapus karyawan ${k.nama}`}); toast('Karyawan dihapus','success'); viewAdminKaryawan(c); }));
    }
  }
  search.addEventListener('input', e=>{ _karState.search=e.target.value; draw(); });
  fdiv.addEventListener('change', e=>{ _karState.filterDiv=e.target.value; draw(); });
  fdep.addEventListener('change', e=>{ _karState.filterDep=e.target.value; draw(); });
  if($('#kar-add')) $('#kar-add').addEventListener('click', ()=>openKaryawanEdit(null, divisi, departemen, karyawan, ()=>viewAdminKaryawan(c)));
  $('#kar-csv').addEventListener('click', ()=>{ csvDownload('karyawan-'+new Date().toISOString().slice(0,10)+'.csv', karyawan.map(k=>({Nama:k.nama,Jabatan:k.jabatan||'',Divisi:divName(k.divisi_id),Departemen:depName(k.departemen_id),Status:k.active===false?'Nonaktif':'Aktif'}))); });
  enhanceSearchable(c);
  draw();
}

function openKaryawanEdit(id, divisi, departemen, karyawan, onDone){
  const isNew = !id;
  const k = isNew ? {} : karyawan.find(x=>x.id===id) || {};
  const depOptions = (divId)=> departemen.filter(d=>!divId || d.divisi_id===divId);
  openModal(`
    <div class="modal-head"><h3>${isNew?'Tambah':'Edit'} Karyawan</h3><button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button></div>
    <div class="modal-body"><form id="kar-form"><div class="form-grid">
      <div class="field full field-required"><label>Nama Karyawan</label><input class="input" name="nama" value="${escapeHtml(k.nama||'')}" required/></div>
      <div class="field"><label>Jabatan</label><input class="input" name="jabatan" value="${escapeHtml(k.jabatan||'')}" placeholder="Mis. Staff GA"/></div>
      <div class="field"><label>Status</label><select class="select" name="active"><option value="true" ${k.active!==false?'selected':''}>Aktif</option><option value="false" ${k.active===false?'selected':''}>Nonaktif</option></select></div>
      <div class="field field-required"><label>Divisi</label><select class="select sel-search" name="divisi_id" id="kar-div"><option value="">— pilih —</option>${divisi.map(d=>`<option value="${d.id}" ${k.divisi_id===d.id?'selected':''}>${escapeHtml(d.name)}</option>`).join('')}</select></div>
      <div class="field field-required"><label>Departemen</label><select class="select sel-search" name="departemen_id" id="kar-dep"><option value="">— pilih —</option>${depOptions(k.divisi_id).map(d=>`<option value="${d.id}" ${k.departemen_id===d.id?'selected':''}>${escapeHtml(d.name)}</option>`).join('')}</select></div>
    </div></form></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Batal</button><button class="btn btn-primary" id="kar-save"><span class="material-symbols-rounded">save</span>Simpan</button></div>`, 'lg');

  // Departemen mengikuti Divisi terpilih
  $('#kar-div').addEventListener('change', e=>{
    const dep = $('#kar-dep');
    dep.innerHTML = '<option value="">— pilih —</option>' + depOptions(e.target.value).map(d=>`<option value="${d.id}">${escapeHtml(d.name)}</option>`).join('');
    refreshSearchable(dep);
  });
  enhanceSearchable(document.getElementById('modal-content'));
  $('#kar-save').addEventListener('click', async ()=>{
    const fd = new FormData($('#kar-form'));
    const nama = (fd.get('nama')||'').toString().trim();
    if(!nama){ toast('Nama wajib diisi','warn'); return; }
    if(!fd.get('divisi_id')){ toast('Divisi wajib dipilih','warn'); return; }
    if(!fd.get('departemen_id')){ toast('Departemen wajib dipilih','warn'); return; }
    const row = { nama, jabatan:(fd.get('jabatan')||'').toString().trim()||null, divisi_id:fd.get('divisi_id'), departemen_id:fd.get('departemen_id'), active: fd.get('active')==='true' };
    try{
      if(isNew){ const ins=await db.addKaryawan(row); db.logActivity({action:'karyawan.create',target_type:'karyawan',target_id:ins?.id,detail:`Tambah karyawan ${nama}`}); }
      else { await db.updateKaryawan(id, row); db.logActivity({action:'karyawan.update',target_type:'karyawan',target_id:id,detail:`Update karyawan ${nama}`}); }
      closeModal(); toast('Karyawan tersimpan','success'); if(typeof onDone==='function') onDone();
    }catch(err){ toast('Gagal menyimpan: '+(err.message||''),'error'); }
  });
}

      <div class="card-head">
        <h3>Kategori Pemesanan</h3>
        <button class="btn btn-primary btn-sm" id="add-kat-btn"><span class="material-symbols-rounded">add</span>Tambah Kategori</button>
      </div>
      <div class="card-body">
        <div class="callout" style="background:var(--mrt-blue-soft);padding:12px 14px;border-radius:8px;border-left:3px solid var(--mrt-blue);margin-bottom:14px">
          <strong>Cara kerja Kategori:</strong>
          Setiap kategori punya <strong>Nama</strong>, <strong>Kode prefix</strong> (mis. <code>FB</code>, <code>VEH</code>), dan <strong>SLA default</strong> dalam jam.
          Kode prefix akan dipakai di kode permintaan (<code>FB-200520260001</code>). SLA dapat di-edit lebih lanjut di menu <strong>SLA Target</strong>.
          Kategori non-aktif tidak muncul di form publik, tapi tiket lama tetap tersimpan utuh.
        </div>
        <div id="kat-table-host"></div>
      </div>
    </div>
  `;
  $('#add-kat-btn').addEventListener('click', () => openKategoriAddModal(renderKat));

  async function renderKat(){
    const items = await db.listKategori();
    const host = $('#kat-table-host');
    if(!items.length){ host.innerHTML = '<div class="muted">Belum ada kategori. Klik "Tambah Kategori" di kanan atas.</div>'; return; }
    host.innerHTML = `
      <div class="table-wrap"><table class="t">
        <thead><tr>
          <th style="width:44px">#</th>
          <th>Nama Kategori</th>
          <th style="width:100px">Kode</th>
          <th style="width:140px">SLA Default</th>
          <th>Deskripsi</th>
          <th style="width:100px">Status</th>
          <th style="width:120px;text-align:right">Aksi</th>
        </tr></thead>
        <tbody>
          ${items.map((k,i) => `
            <tr>
              <td>${i+1}</td>
              <td><strong>${escapeHtml(k.name)}</strong></td>
              <td><span class="tag">${escapeHtml(k.kode)}</span></td>
              <td><strong style="color:var(--mrt-blue)">${k.default_sla_hours} jam</strong> <span class="text-sm muted">(${fmtDurationHours(k.default_sla_hours)})</span></td>
              <td><span class="text-sm">${escapeHtml(k.description||'—')}</span></td>
              <td>${k.active
                ? '<span class="badge status-selesai">Aktif</span>'
                : '<span class="badge gray">Non-aktif</span>'}</td>
              <td style="text-align:right;white-space:nowrap">
                <button class="btn-icon" data-edit="${k.id}" title="Edit"><span class="material-symbols-rounded">edit</span></button>
                <button class="btn-icon" data-toggle="${k.id}" title="${k.active?'Nonaktifkan':'Aktifkan'}"><span class="material-symbols-rounded">${k.active?'visibility_off':'visibility'}</span></button>
                <button class="btn-icon" data-del="${k.id}" title="Hapus"><span class="material-symbols-rounded">delete</span></button>
              </td>
            </tr>
          `).join('')}
        </tbody></table></div>
    `;
    $$('button[data-edit]', host).forEach(b => b.addEventListener('click', () => {
      const k = items.find(x => x.id === b.dataset.edit);
      if(!k) return;
      openModal(`
        <div class="modal-head">
          <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">category</span> Edit Kategori</h3>
          <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
        </div>
        <div class="modal-body">
          <div class="field field-required"><label>Nama Kategori</label>
            <input class="input" id="kat-e-name" value="${escapeHtml(k.name)}"/></div>
          <div class="form-grid">
            <div class="field field-required"><label>Kode Prefix</label>
              <input class="input" id="kat-e-kode" maxlength="6" value="${escapeHtml(k.kode)}" style="text-transform:uppercase"/></div>
            <div class="field field-required"><label>SLA Default (jam)</label>
              <input class="input" id="kat-e-sla" type="number" min="1" max="9999" value="${escapeHtml(k.default_sla_hours)}"/></div>
            <div class="field"><label>Status</label>
              <select class="select" id="kat-e-active"><option value="true" ${k.active!==false?'selected':''}>Aktif</option><option value="false" ${k.active===false?'selected':''}>Non-aktif</option></select></div>
            <div class="field full"><label>Deskripsi</label>
              <textarea class="textarea" id="kat-e-desc">${escapeHtml(k.description||'')}</textarea></div>
          </div>
          <span class="hint">Mengubah Kode tidak mengubah kode permintaan lama yang sudah tercatat.</span>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
          <button class="btn btn-primary" id="kat-e-save"><span class="material-symbols-rounded">save</span>Simpan</button>
        </div>
      `, 'md');
      $('#kat-e-save').addEventListener('click', async () => {
        const name = $('#kat-e-name').value.trim();
        const kode = $('#kat-e-kode').value.trim().toUpperCase();
        const hours = Number($('#kat-e-sla').value);
        if(!name || !kode || !hours){ toast('Lengkapi field wajib','warn'); return; }
        if(!/^[A-Z0-9-]{2,6}$/.test(kode)){ toast('Kode harus 2-6 huruf/angka/dash','warn'); return; }
        try{
          await db.updateKategori(k.id, { name, kode, default_sla_hours:hours, description:$('#kat-e-desc').value.trim()||null, active:$('#kat-e-active').value!=='false' });
          db.logActivity({ action:'kategori.update', target_type:'kategori', target_id:k.id, detail:`Edit kategori: ${name} (${kode})` });
          await refreshKategoriKode();
          closeModal(); toast('Kategori diperbarui','success'); renderKat();
        }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
      });
    }));
    $$('button[data-toggle]', host).forEach(b => b.addEventListener('click', async () => {
      const id = b.dataset.toggle; const k = items.find(x => x.id === id);
      try{
        await db.updateKategoriActive(id, !k.active);
        db.logActivity({ action:'kategori.toggle', target_type:'kategori', target_id:id, detail:`Set ${k.name} → ${!k.active?'Aktif':'Non-aktif'}` });
        await refreshKategoriKode();
        toast('Status diubah','success'); renderKat();
      }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
    }));
    $$('button[data-del]', host).forEach(b => b.addEventListener('click', async () => {
      const id = b.dataset.del; const k = items.find(x => x.id === id);
      if(!confirm(`Hapus kategori "${k.name}" beserta SLA target-nya?\n\nTiket lama dengan kategori ini akan tetap ada tetapi tidak dapat dibuat permintaan baru.`)) return;
      try{
        await db.deleteKategori(id);
        db.logActivity({ action:'kategori.delete', target_type:'kategori', target_id:id, detail:`Hapus kategori: ${k.name} (${k.kode})` });
        await refreshKategoriKode();
        toast('Kategori dihapus','success'); renderKat();
      }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
    }));
  }
  renderKat();
}

function openKategoriAddModal(onDone){
  openModal(`
    <div class="modal-head">
      <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">category</span> Tambah Kategori</h3>
      <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div class="modal-body">
      <form id="kat-add-form">
        <div class="field field-required">
          <label>Nama Kategori</label>
          <input class="input" name="name" required placeholder="Mis. Vehicle Request"/>
          <span class="hint">Nama lengkap kategori, akan ditampilkan di form publik.</span>
        </div>
        <div class="form-grid">
          <div class="field field-required">
            <label>Kode Prefix</label>
            <input class="input" name="kode" required maxlength="6" pattern="[A-Za-z0-9-]+" placeholder="Mis. VEH" style="text-transform:uppercase"/>
            <span class="hint">2-6 huruf/angka. Akan dipakai sebagai prefix kode permintaan: <code>VEH-DDMMYYYY####</code>.</span>
          </div>
          <div class="field field-required">
            <label>SLA Default (jam)</label>
            <input class="input" name="default_sla_hours" required type="number" min="1" max="9999" placeholder="24"/>
            <span class="hint">Mis. <strong>4</strong> = 4 jam, <strong>24</strong> = 1 hari, <strong>168</strong> = 1 minggu.</span>
          </div>
          <div class="field full">
            <label>Deskripsi (opsional)</label>
            <textarea class="textarea" name="description" placeholder="Penjelasan kategori atau aturan khusus."></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="kat-save"><span class="material-symbols-rounded">save</span>Simpan</button>
    </div>
  `, 'md');

  $('#kat-save').addEventListener('click', async () => {
    const fd = new FormData($('#kat-add-form'));
    const name = (fd.get('name')||'').trim();
    const kode = (fd.get('kode')||'').trim().toUpperCase();
    const hours = Number(fd.get('default_sla_hours'));
    const desc = (fd.get('description')||'').trim() || null;
    if(!name || !kode || !hours){ toast('Lengkapi field yang wajib','warn'); return; }
    if(!/^[A-Z0-9-]{2,6}$/.test(kode)){ toast('Kode harus 2-6 huruf/angka/dash','warn'); return; }
    try{
      const row = await db.addKategori({ name, kode, default_sla_hours:hours, description:desc });
      db.logActivity({ action:'kategori.create', target_type:'kategori', target_id:row.id, detail:`Tambah kategori: ${name} (${kode}) · SLA ${hours} jam` });
      await refreshKategoriKode();
      closeModal();
      toast('Kategori ditambahkan','success');
      onDone && onDone();
    }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
  });
}

/* ============================================================
   v1.7: DIVISI — dedicated page
   ============================================================ */
async function viewAdminDivisi(c){
  c.innerHTML = `
    <div class="card">
      <div class="card-head">
        <h3>Divisi</h3>
        <div class="flex gap-2">
          <input class="input" id="div-search" placeholder="Cari divisi..." style="max-width:240px"/>
          <button class="btn btn-primary btn-sm" id="add-div-btn"><span class="material-symbols-rounded">add</span>Tambah</button>
        </div>
      </div>
      <div class="card-body">
        <p class="muted text-sm" style="margin:0 0 12px">
          Unit organisasi tingkat atas (mis. Direktorat). Setiap divisi memiliki sejumlah Departemen.
          Menghapus divisi akan menghapus seluruh departemen di bawahnya (cascade).
        </p>
        <div id="div-list-host"></div>
      </div>
    </div>
  `;

  async function refresh(){
    const [divs, deps] = await Promise.all([db.listDivisi(), db.listDepartemen()]);
    const q = ($('#div-search').value || '').toLowerCase();
    const filtered = q ? divs.filter(d => d.name.toLowerCase().includes(q)) : divs;
    const host = $('#div-list-host');
    if(!filtered.length){ host.innerHTML = '<div class="muted">'+(q?'Tidak ada hasil pencarian.':'Belum ada divisi.')+'</div>'; return; }
    host.innerHTML = `
      <div class="table-wrap"><table class="t">
        <thead><tr>
          <th style="width:44px">#</th>
          <th>Nama Divisi</th>
          <th style="width:160px">Jumlah Departemen</th>
          <th style="width:110px;text-align:right">Aksi</th>
        </tr></thead>
        <tbody>
        ${filtered.map((d, i) => {
          const cnt = deps.filter(x => x.divisi_id === d.id).length;
          return `<tr>
            <td>${i+1}</td>
            <td><strong>${escapeHtml(d.name)}</strong></td>
            <td>${cnt} departemen</td>
            <td style="text-align:right;white-space:nowrap">
              <button class="btn-icon" data-div-edit="${d.id}" title="Edit / Ubah Nama"><span class="material-symbols-rounded">edit</span></button>
              <button class="btn-icon" data-div-del="${d.id}" title="Hapus"><span class="material-symbols-rounded">delete</span></button>
            </td>
          </tr>`;
        }).join('')}
        </tbody></table></div>`;
    $$('button[data-div-del]', host).forEach(b => b.addEventListener('click', async () => {
      const id = b.dataset.divDel;
      const item = divs.find(x => x.id === id);
      const cnt = deps.filter(x => x.divisi_id === id).length;
      const msg = cnt > 0
        ? `Hapus Divisi "${item?.name}" beserta ${cnt} departemen di bawahnya?`
        : `Hapus Divisi "${item?.name}"?`;
      if(!confirm(msg)) return;
      try{
        await db.deleteDivisi(id);
        db.logActivity({ action:'masterdata.delete', target_type:'divisi', target_id:id, detail:`Hapus divisi: ${item?.name||id}${cnt>0?` (+${cnt} departemen)`:''}` });
        toast('Divisi dihapus','success'); refresh();
      }catch(err){ toast('Gagal menghapus: '+(err.message||''),'error'); }
    }));

    // Edit / rename divisi
    $$('button[data-div-edit]', host).forEach(b => b.addEventListener('click', () => {
      const id = b.dataset.divEdit;
      const item = divs.find(x => x.id === id);
      if(!item) return;
      openModal(`
        <div class="modal-head">
          <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">edit</span> Edit Divisi</h3>
          <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
        </div>
        <div class="modal-body">
          <div class="field field-required">
            <label>Nama Divisi</label>
            <input class="input" id="div-edit-name" value="${escapeHtml(item.name)}"/>
          </div>
          <span class="hint">Mengubah nama divisi tidak mengubah data permintaan yang sudah tercatat sebelumnya.</span>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
          <button class="btn btn-primary" id="div-edit-save"><span class="material-symbols-rounded">save</span>Simpan</button>
        </div>
      `, 'sm');
      $('#div-edit-name').focus();
      $('#div-edit-save').addEventListener('click', async () => {
        const v = $('#div-edit-name').value.trim();
        if(!v){ toast('Nama wajib diisi','warn'); return; }
        if(v.toLowerCase() === item.name.toLowerCase()){ closeModal(); return; }
        if(divs.some(x => x.id !== id && (x.name||'').toLowerCase() === v.toLowerCase())){ toast('Nama divisi sudah dipakai','warn'); return; }
        try{
          await db.updateDivisi(id, { name:v });
          db.logActivity({ action:'masterdata.update', target_type:'divisi', target_id:id, detail:`Ubah nama divisi: ${item.name} → ${v}` });
          closeModal(); toast('Divisi diperbarui','success'); refresh();
        }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
      });
    }));
  }
  $('#div-search').addEventListener('input', refresh);
  await refresh();

  $('#add-div-btn').addEventListener('click', () => {
    openModal(`
      <div class="modal-head">
        <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">account_tree</span> Tambah Divisi</h3>
        <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
      </div>
      <div class="modal-body">
        <div class="field field-required">
          <label>Nama Divisi</label>
          <input class="input" id="div-new-name" placeholder="Mis. Direktorat Operasi & Pemeliharaan"/>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
        <button class="btn btn-primary" id="div-new-save"><span class="material-symbols-rounded">save</span>Simpan</button>
      </div>
    `, 'sm');
    $('#div-new-save').addEventListener('click', async () => {
      const v = $('#div-new-name').value.trim();
      if(!v){ toast('Nama wajib','warn'); return; }
      const list = await db.listDivisi().catch(()=>[]);
      if(list.some(x => (x.name||'').toLowerCase() === v.toLowerCase())){ toast('Nama divisi sudah ada','warn'); return; }
      try{
        await db.addDivisi({ name:v });
        db.logActivity({ action:'masterdata.create', target_type:'divisi', detail:'Tambah divisi: '+v });
        closeModal(); toast('Divisi ditambahkan','success'); refresh();
      }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
    });
  });
}

/* ============================================================
   v1.7: DEPARTEMEN — dedicated page with filter, Kepala Departemen setting
   ============================================================ */
async function viewAdminDepartemen(c){
  c.innerHTML = `
    <div class="card">
      <div class="card-head">
        <h3>Departemen</h3>
        <div class="flex gap-2">
          <select class="select" id="dep-filter-div" style="max-width:280px">
            <option value="">Semua Divisi</option>
          </select>
          <input class="input" id="dep-search" placeholder="Cari departemen..." style="max-width:200px"/>
          <button class="btn btn-primary btn-sm" id="add-dep-btn"><span class="material-symbols-rounded">add</span>Tambah</button>
        </div>
      </div>
      <div class="card-body">
        <p class="muted text-sm" style="margin:0 0 12px">
          Departemen tergabung di bawah satu Divisi. <strong>Kepala Departemen</strong> dipakai untuk approval workflow Direct Purchase
          (transisi Mencari Penyedia → Sedang Disiapkan membutuhkan persetujuan Kepala Departemen yang ditunjuk).
        </p>
        <div id="dep-list-host"></div>
      </div>
    </div>
  `;

  async function refresh(){
    const [divs, deps, users] = await Promise.all([db.listDivisi(), db.listDepartemen(), db.listUsers()]);

    // Populate Divisi filter
    const selDiv = $('#dep-filter-div');
    const prevVal = selDiv.value;
    selDiv.innerHTML = '<option value="">Semua Divisi</option>' +
      divs.map(d => `<option value="${escapeHtml(d.id)}" ${d.id===prevVal?'selected':''}>${escapeHtml(d.name)}</option>`).join('');

    const filterDivId = selDiv.value;
    const q = ($('#dep-search').value || '').toLowerCase();
    let filtered = deps;
    if(filterDivId) filtered = filtered.filter(d => d.divisi_id === filterDivId);
    if(q) filtered = filtered.filter(d => d.name.toLowerCase().includes(q));

    const host = $('#dep-list-host');
    if(!filtered.length){ host.innerHTML = '<div class="muted">Tidak ada departemen sesuai filter.</div>'; return; }

    host.innerHTML = `
      <div class="table-wrap"><table class="t">
        <thead><tr>
          <th style="width:44px">#</th>
          <th>Nama Departemen</th>
          <th>Divisi</th>
          <th>Kepala Departemen</th>
          <th style="width:110px;text-align:right">Aksi</th>
        </tr></thead>
        <tbody>
        ${filtered.map((d, i) => {
          const dv = divs.find(x => x.id === d.divisi_id);
          const kep = d.kepala_departemen_user_id ? users.find(u => u.id === d.kepala_departemen_user_id) : null;
          return `<tr>
            <td>${i+1}</td>
            <td><strong>${escapeHtml(d.name)}</strong></td>
            <td><span class="text-sm">${dv ? escapeHtml(dv.name) : '—'}</span></td>
            <td>${kep
              ? `<strong>${escapeHtml(kep.full_name)}</strong> <span class="text-sm muted">· ${escapeHtml(kep.jabatan||kep.role)}</span>`
              : '<span class="muted text-sm">— belum ditunjuk —</span>'}</td>
            <td style="text-align:right;white-space:nowrap">
              <button class="btn-icon" data-dep-edit="${d.id}" title="Edit Departemen"><span class="material-symbols-rounded">edit</span></button>
              <button class="btn-icon" data-dep-del="${d.id}" title="Hapus"><span class="material-symbols-rounded">delete</span></button>
            </td>
          </tr>`;
        }).join('')}
        </tbody></table></div>`;

    // Wire full edit (name + divisi + kepala departemen)
    $$('button[data-dep-edit]', host).forEach(b => b.addEventListener('click', () => {
      const id = b.dataset.depEdit;
      const dep = deps.find(d => d.id === id);
      if(!dep) return;
      openModal(`
        <div class="modal-head">
          <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">edit</span> Edit Departemen</h3>
          <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
        </div>
        <div class="modal-body">
          <div class="field field-required">
            <label>Divisi</label>
            <select class="select" id="dep-edit-div">
              ${divs.map(d => `<option value="${escapeHtml(d.id)}" ${d.id===dep.divisi_id?'selected':''}>${escapeHtml(d.name)}</option>`).join('')}
            </select>
          </div>
          <div class="field field-required">
            <label>Nama Departemen</label>
            <input class="input" id="dep-edit-name" value="${escapeHtml(dep.name)}"/>
          </div>
          <div class="field">
            <label>Kepala Departemen</label>
            <select class="select" id="dep-edit-kep">
              <option value="">— belum ditunjuk —</option>
              ${users.filter(u => u.active !== false).map(u => `<option value="${u.id}" ${u.id===dep.kepala_departemen_user_id?'selected':''}>${escapeHtml(u.full_name)} · ${escapeHtml(u.jabatan||u.role)}</option>`).join('')}
            </select>
            <span class="hint">Kepala Departemen menerima notifikasi & otoritas approval Direct Purchase di departemen ini.</span>
          </div>
          <span class="hint">Mengubah data master tidak mengubah permintaan yang sudah tercatat sebelumnya.</span>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
          <button class="btn btn-primary" id="dep-edit-save"><span class="material-symbols-rounded">save</span>Simpan</button>
        </div>
      `, 'md');
      $('#dep-edit-name').focus();
      $('#dep-edit-save').addEventListener('click', async () => {
        const divId = $('#dep-edit-div').value;
        const v = $('#dep-edit-name').value.trim();
        const kep = $('#dep-edit-kep').value || null;
        if(!divId){ toast('Pilih Divisi','warn'); return; }
        if(!v){ toast('Nama wajib diisi','warn'); return; }
        if(deps.some(x => x.id !== id && x.divisi_id === divId && (x.name||'').toLowerCase() === v.toLowerCase())){
          toast('Departemen dengan nama itu sudah ada di divisi tersebut','warn'); return;
        }
        try{
          await db.updateDepartemen(id, { name:v, divisi_id:divId, kepala_departemen_user_id:kep });
          const dvNew = divs.find(x => x.id === divId);
          const detailParts = [];
          if(v !== dep.name) detailParts.push(`nama: ${dep.name} → ${v}`);
          if(divId !== dep.divisi_id) detailParts.push(`divisi → ${dvNew ? dvNew.name : divId}`);
          if((kep||null) !== (dep.kepala_departemen_user_id||null)){
            const ku = kep ? users.find(u => u.id === kep) : null;
            detailParts.push(`kepala → ${ku ? ku.full_name : '(kosong)'}`);
          }
          db.logActivity({
            action:'masterdata.update', target_type:'departemen', target_id:id,
            detail:`Edit departemen "${dep.name}"${detailParts.length?': '+detailParts.join(', '):''}`
          });
          closeModal(); toast('Departemen diperbarui','success'); refresh();
        }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
      });
    }));

    // Wire delete
    $$('button[data-dep-del]', host).forEach(b => b.addEventListener('click', async () => {
      const id = b.dataset.depDel;
      const item = deps.find(x => x.id === id);
      if(!confirm(`Hapus Departemen "${item?.name}"?`)) return;
      try{
        await db.deleteDepartemen(id);
        db.logActivity({ action:'masterdata.delete', target_type:'departemen', target_id:id, detail:`Hapus departemen: ${item?.name||id}` });
        toast('Dihapus','success'); refresh();
      }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
    }));
  }

  $('#dep-filter-div').addEventListener('change', refresh);
  $('#dep-search').addEventListener('input', refresh);
  await refresh();

  $('#add-dep-btn').addEventListener('click', () => {
    db.listDivisi().then(divs => {
      openModal(`
        <div class="modal-head">
          <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">groups</span> Tambah Departemen</h3>
          <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
        </div>
        <div class="modal-body">
          <div class="field field-required">
            <label>Divisi</label>
            <select class="select" id="dep-new-div">
              <option value="">-- Pilih Divisi --</option>
              ${divs.map(d => `<option value="${escapeHtml(d.id)}">${escapeHtml(d.name)}</option>`).join('')}
            </select>
          </div>
          <div class="field field-required">
            <label>Nama Departemen</label>
            <input class="input" id="dep-new-name" placeholder="Mis. General Affairs"/>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
          <button class="btn btn-primary" id="dep-new-save"><span class="material-symbols-rounded">save</span>Simpan</button>
        </div>
      `, 'md');
      $('#dep-new-save').addEventListener('click', async () => {
        const divId = $('#dep-new-div').value;
        const v = $('#dep-new-name').value.trim();
        if(!divId){ toast('Pilih Divisi dulu','warn'); return; }
        if(!v){ toast('Nama wajib','warn'); return; }
        const list = await db.listDepartemen(divId).catch(()=>[]);
        if(list.some(x => (x.name||'').toLowerCase() === v.toLowerCase())){ toast('Departemen dengan nama itu sudah ada di divisi ini','warn'); return; }
        try{
          await db.addDepartemen({ name:v, divisi_id:divId });
          db.logActivity({ action:'masterdata.create', target_type:'departemen', detail:'Tambah departemen: '+v });
          closeModal(); toast('Departemen ditambahkan','success'); refresh();
        }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
      });
    });
  });
}

          pada formulir kategori <strong>Kendaraan Operasional</strong>.
        </p>

    return `

      <div class="modal-body">

          <div class="field"><label>No. HP</label><input class="input" id="ko-f-hp" value="${escapeHtml(v.no_hp||'')}"/></div>

          <div class="field"><label>Keterangan (tipe mobil)</label><input class="input" id="ko-f-ket" value="${escapeHtml(v.keterangan||'')}" placeholder="Mis. Toyota - Zenix"/></div>
          <div class="field"><label>Status</label><select class="select" id="ko-f-active"><option value="true" ${v.active!==false?'selected':''}>Aktif</option><option value="false" ${v.active===false?'selected':''}>Nonaktif</option></select></div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
        <button class="btn btn-primary" id="ko-save"><span class="material-symbols-rounded">save</span>Simpan</button>
      </div>`;
  }
  function readForm(){
    return {
      nama_driver: $('#ko-f-driver').value.trim(),
      no_hp:       $('#ko-f-hp').value.trim() || null,
      nomor_polisi:$('#ko-f-nopol').value.trim(),
      posisi:      $('#ko-f-posisi').value || null,
      ownership:   $('#ko-f-own').value || null,
      ev_status:   $('#ko-f-ev').value || null,
      ga_ge:       $('#ko-f-gage').value || null,
      keterangan:  $('#ko-f-ket').value.trim() || null,
      active:      $('#ko-f-active').value !== 'false'

  }

  async function refresh(){
    const list = await db.listKendaraan().catch(()=>[]);
    const q = ($('#ko-search').value||'').toLowerCase();
    const filtered = q ? list.filter(v =>
      (v.nama_driver||'').toLowerCase().includes(q) ||

    host.innerHTML = `

          <th style="width:40px">#</th><th>Nama Driver</th><th>No. HP</th><th>Nomor Polisi</th>
          <th>Posisi</th><th>Ownership</th><th>Jenis</th><th>GA/GE</th><th>Keterangan</th><th>Status</th>
          <th style="width:96px;text-align:right">Aksi</th>
        </tr></thead>
        <tbody>
        ${filtered.map((v,i)=>`<tr>
          <td>${i+1}</td>
          <td><strong>${escapeHtml(v.nama_driver||'')}</strong></td>
          <td>${escapeHtml(v.no_hp||'—')}</td>
          <td>${escapeHtml(v.nomor_polisi||'—')}</td>
          <td>${escapeHtml(v.posisi||'—')}</td>
          <td>${escapeHtml(v.ownership||'—')}</td>
          <td>${v.ev_status?`<span class="badge ${v.ev_status==='EV'?'status-selesai':'gray'}">${escapeHtml(v.ev_status)}</span>`:'—'}</td>
          <td>${escapeHtml(v.ga_ge||'—')}</td>
          <td>${escapeHtml(v.keterangan||'—')}</td>
          <td>${v.active===false?'<span class="badge status-ditolak">Nonaktif</span>':'<span class="badge status-selesai">Aktif</span>'}</td>
          <td style="text-align:right;white-space:nowrap">
            <button class="btn-icon" data-ko-edit="${v.id}" title="Edit"><span class="material-symbols-rounded">edit</span></button>
            <button class="btn-icon" data-ko-del="${v.id}" title="Hapus"><span class="material-symbols-rounded">delete</span></button>
          </td>

    $$('button[data-ko-edit]', host).forEach(b => b.addEventListener('click', () => {
      const item = filtered.find(x => x.id === b.dataset.koEdit);
      openModal(modalForm(item), 'lg');
      $('#ko-save').addEventListener('click', async () => {
        const row = readForm();
        if(!row.nama_driver){ toast('Nama driver wajib','warn'); return; }
        if(!row.nomor_polisi){ toast('Nomor polisi wajib','warn'); return; }
        try{
          await db.updateKendaraan(item.id, row);
          db.logActivity({ action:'masterdata.update', target_type:'kendaraan', target_id:item.id, detail:`Edit armada: ${row.nama_driver} (${row.nomor_polisi})` });
          closeModal(); toast('Armada diperbarui','success'); refresh();
        }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
      });
    }));
    $$('button[data-ko-del]', host).forEach(b => b.addEventListener('click', async () => {
      const item = filtered.find(x => x.id === b.dataset.koDel);
      if(!confirm(`Hapus armada "${item?.nama_driver}" (${item?.nomor_polisi})?`)) return;
      try{
        await db.deleteKendaraan(item.id);
        db.logActivity({ action:'masterdata.delete', target_type:'kendaraan', target_id:item.id, detail:`Hapus armada: ${item?.nama_driver}` });
        toast('Armada dihapus','success'); refresh();
      }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
    }));
  }

  $('#ko-search').addEventListener('input', refresh);
  $('#ko-add').addEventListener('click', () => {
    openModal(modalForm(null), 'lg');
    $('#ko-save').addEventListener('click', async () => {
      const row = readForm();
      if(!row.nama_driver){ toast('Nama driver wajib','warn'); return; }
      if(!row.nomor_polisi){ toast('Nomor polisi wajib','warn'); return; }
      try{
        await db.addKendaraan(row);
        db.logActivity({ action:'masterdata.create', target_type:'kendaraan', detail:`Tambah armada: ${row.nama_driver} (${row.nomor_polisi})` });
        closeModal(); toast('Armada ditambahkan','success'); refresh();
      }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
    });
  });
  await refresh();
}

/* ============================================================
   v2.0: MANAJEMEN ANGGARAN
   Funds (kategori anggaran), top-up, CDP bulanan, dan laporan realisasi.
   Realisasi = jumlah Grand Total pembayaran (anggaran GA) yang ditautkan
   ke fund. Mengikuti format reporting 2024 (Anggaran vs Realisasi, by Fund,
   CDP Rencana vs Realisasi, distribusi Invoice/Kas Kecil, by Lokasi).
   ============================================================ */
const _BULAN = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
function payGrandTotal(m){
  return Number(m.grand_total) || (Number(m.quantity)>0 && Number(m.price)>0 ? Number(m.quantity)*Number(m.price) : Number(m.price)||0);
}
function payDateKey(m){ return m.submit_date || m.invoice_date || (m._req && m._req.created_at) || null; }

async function viewAdminAnggaran(c){
  const year = new Date().getFullYear();
  c.innerHTML = `<div class="card"><div class="card-body"><div class="muted">Memuat data anggaran…</div></div></div>`;

  let funds=[], topups=[], cdp=[], merged=[], recurringGA=[], pettyGA=[];
  try{
    const [reqs, pays, fundsL, topupsL, cdpL, recurringL, pettyL] = await Promise.all([
      db.listRequests().catch(()=>[]),
      db.listPayments().catch(()=>[]),
      db.listMataAnggaran().catch(()=>[]),   // v2.0.1: funds = Mata Anggaran (single source of truth)
      db.listFundTopups().catch(()=>[]),
      db.listCdpPlans().catch(()=>[]),
      db.listRecurring().catch(()=>[]),       // v2.3: tagihan rutin GA juga menambah realisasi
      pcdb.list('reimburse').catch(()=>[])     // v2.4: petty cash Fund GA juga menambah realisasi
    ]);
    funds = fundsL; topups = topupsL; cdp = cdpL;
    const byReq = {}; (pays||[]).forEach(p => { byReq[p.request_id] = p; });
    merged = reqs.filter(r => reqUsesGABudget(r)).map(r => mergePayment(r, byReq[r.id]));
    recurringGA = (recurringL||[]).filter(rp => rp.pakai_anggaran_ga);
    pettyGA = (pettyL||[]).filter(p => p.sumber === 'Fund GA');
  }catch(err){
    c.innerHTML = `<div class="card card-pad" style="color:#991B1B">Gagal memuat data anggaran: ${escapeHtml(err.message||'')}</div>`;
    return;
  }

  // ---- computations (keyed by Mata Anggaran id; realisasi matched by name) ----
  const nameById = {}; funds.forEach(f => { nameById[f.id] = f.name; });
  const idByName = {}; funds.forEach(f => { idByName[f.name] = f.id; });
  const anggaranByFund = {}; funds.forEach(f => anggaranByFund[f.id] = 0);
  topups.forEach(t => { if(anggaranByFund[t.fund_id]!==undefined) anggaranByFund[t.fund_id] += (Number(t.nominal)||0); });
  const realisasiByFund = {}; funds.forEach(f => realisasiByFund[f.id] = 0);
  let unassignedRealisasi = 0;
  merged.forEach(m => {
    const gt = payGrandTotal(m);
    const fid = idByName[m.mata_anggaran];   // payment stores the Mata Anggaran NAME
    if(fid && realisasiByFund[fid] !== undefined) realisasiByFund[fid] += gt;
    else unassignedRealisasi += gt;
  });
  // v2.3: tagihan rutin GA menambah realisasi (di-match by Mata Anggaran name).
  // Dilacak terpisah (realisasiRutin*) agar pelaporan tetap bisa membedakannya.
  let realisasiRutinTotal = 0;
  recurringGA.forEach(rp => {
    const gt = Number(rp.nominal)||0;
    realisasiRutinTotal += gt;
    const fid = idByName[rp.mata_anggaran];
    if(fid && realisasiByFund[fid] !== undefined) realisasiByFund[fid] += gt;
    else unassignedRealisasi += gt;
  });
  // v2.4: petty cash Fund GA juga menambah realisasi (match by Mata Anggaran name), dilacak terpisah.
  let realisasiPettyTotal = 0;
  pettyGA.forEach(p => {
    const gt = Number(p.nominal)||0;
    realisasiPettyTotal += gt;
    const fid = idByName[p.mata_anggaran];
    if(fid && realisasiByFund[fid] !== undefined) realisasiByFund[fid] += gt;
    else unassignedRealisasi += gt;
  });
  const totalAnggaran = Object.values(anggaranByFund).reduce((a,b)=>a+b,0);
  const totalRealisasi = Object.values(realisasiByFund).reduce((a,b)=>a+b,0) + unassignedRealisasi;
  const totalSisa = totalAnggaran - totalRealisasi;
  const pct = totalAnggaran>0 ? Math.round(totalRealisasi/totalAnggaran*100) : 0;

  // realisasi per month (current year) + per jenis pembayaran + per lokasi
  const realisasiByMonth = Array(12).fill(0);
  const byJenis = {}; const byLokasi = {};
  merged.forEach(m => {
    const gt = payGrandTotal(m); const dk = payDateKey(m);
    if(dk){ const d = new Date(dk); if(d.getFullYear()===year) realisasiByMonth[d.getMonth()] += gt; }
    const j = m.jenis_pembayaran || 'Lainnya'; byJenis[j] = (byJenis[j]||0) + gt;
    const l = (m.location || m._req.lokasi_kebutuhan || 'Lainnya'); byLokasi[l] = (byLokasi[l]||0) + gt;
  });
  const cdpByMonth = Array(12).fill(0);
  cdp.filter(p => Number(p.tahun)===year).forEach(p => { const b=Number(p.bulan)-1; if(b>=0&&b<12) cdpByMonth[b]+=Number(p.rencana)||0; });
  // v2.3: tagihan rutin GA ditampilkan sebagai kategori tersendiri pada distribusi & per-bulan
  recurringGA.forEach(rp => {
    const gt = Number(rp.nominal)||0;
    byJenis['Pembayaran Rutin'] = (byJenis['Pembayaran Rutin']||0) + gt;
    if(rp.tanggal_jatuh_tempo){ const d = new Date(rp.tanggal_jatuh_tempo); if(d.getFullYear()===year) realisasiByMonth[d.getMonth()] += gt; }
  });
  // v2.4: petty cash GA sebagai kategori tersendiri pada distribusi & per-bulan
  pettyGA.forEach(p => {
    const gt = Number(p.nominal)||0;
    byJenis['Petty Cash'] = (byJenis['Petty Cash']||0) + gt;
    if(p.tanggal){ const d = new Date(p.tanggal); if(d.getFullYear()===year) realisasiByMonth[d.getMonth()] += gt; }
  });

  c.innerHTML = `
    <div class="adm-stat-grid">
      <div class="stat-card"><div class="stat-icon" style="background:#FEF3C7;color:#92400E"><span class="material-symbols-rounded">savings</span></div>
        <div class="stat-body"><span class="stat-label">Total Anggaran</span><span class="stat-value" style="font-size:17px">${fmtRupiah(totalAnggaran)}</span></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#FEE2E2;color:#991B1B"><span class="material-symbols-rounded">trending_down</span></div>
        <div class="stat-body"><span class="stat-label">Total Realisasi</span><span class="stat-value" style="font-size:17px">${fmtRupiah(totalRealisasi)}</span></div></div>
      <div class="stat-card"><div class="stat-icon green"><span class="material-symbols-rounded">account_balance_wallet</span></div>
        <div class="stat-body"><span class="stat-label">Sisa Anggaran</span><span class="stat-value" style="font-size:17px">${fmtRupiah(totalSisa)}</span></div></div>
      <div class="stat-card"><div class="stat-icon purple"><span class="material-symbols-rounded">percent</span></div>
        <div class="stat-body"><span class="stat-label">Terpakai</span><span class="stat-value">${pct}%</span></div></div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="card-head">
        <h3>Fund / Mata Anggaran &amp; Realisasi</h3>
        <a class="btn btn-ghost btn-sm" href="#/admin/masterdata"><span class="material-symbols-rounded">settings</span>Kelola Mata Anggaran</a>
      </div>
      <div class="card-body">
        <div class="table-wrap"><table class="t t-dense">
          <thead><tr>
            <th>Fund</th><th style="text-align:right">Anggaran</th><th style="text-align:right">Realisasi</th>
            <th style="text-align:right">Sisa</th><th style="width:140px">Terpakai</th><th style="width:160px;text-align:right">Aksi</th>
          </tr></thead>
          <tbody>
          ${funds.length ? funds.map(f=>{
            const ang = anggaranByFund[f.id]||0, real = realisasiByFund[f.id]||0, sisa = ang-real;
            const p = ang>0 ? Math.min(100, Math.round(real/ang*100)) : 0;
            const barColor = p>=90 ? '#DC2626' : (p>=70 ? '#F59E0B' : '#00A859');
            return `<tr>
              <td><strong>${escapeHtml(f.name)}</strong>${f.active===false?' <span class="badge status-ditolak">nonaktif</span>':''}${f.keterangan?`<div class="muted text-sm">${escapeHtml(f.keterangan)}</div>`:''}</td>
              <td style="text-align:right">${fmtRupiah(ang)}</td>
              <td style="text-align:right">${fmtRupiah(real)}</td>
              <td style="text-align:right;color:${sisa<0?'#DC2626':'inherit'}">${fmtRupiah(sisa)}</td>
              <td><div style="height:8px;border-radius:6px;background:#EDF1F7;overflow:hidden"><div style="height:100%;width:${p}%;background:${barColor}"></div></div><span class="text-sm muted">${p}%</span></td>
              <td style="text-align:right;white-space:nowrap">
                <button class="btn-icon" data-ang-topup="${f.id}" title="Top-up anggaran" style="color:var(--mrt-green)"><span class="material-symbols-rounded">add_card</span></button>
              </td>
            </tr>`;
          }).join('') : `<tr><td colspan="6" class="empty-row">Belum ada Mata Anggaran. Tambahkan di Master Data → Anggaran.</td></tr>`}
          ${unassignedRealisasi>0?`<tr style="background:#FEF9F2"><td><em>Tanpa mata anggaran</em></td><td style="text-align:right">—</td><td style="text-align:right">${fmtRupiah(unassignedRealisasi)}</td><td colspan="3" class="muted text-sm">Tetapkan "Number Fund (Mata Anggaran)" pada pembayaran terkait via menu Payment.</td></tr>`:''}
          </tbody></table></div>
      </div>
    </div>

    <div class="split-2" style="margin-top:14px">
      <div class="card" style="margin:0"><div class="card-head"><h3>Anggaran vs Realisasi per Fund</h3></div>
        <div class="card-body"><div style="position:relative;height:240px"><canvas id="ang-chart-fund"></canvas></div></div></div>
      <div class="card" style="margin:0"><div class="card-head"><h3>Realisasi by Fund</h3></div>
        <div class="card-body"><div style="position:relative;height:240px"><canvas id="ang-chart-byfund"></canvas></div></div></div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="card-head"><h3>CDP (Cash Disbursement Plan) ${year}</h3>
        <span class="muted text-sm">Rencana per bulan vs realisasi pembayaran</span></div>
      <div class="card-body">
        <div style="position:relative;height:220px"><canvas id="ang-chart-cdp"></canvas></div>
        <div class="table-wrap" style="margin-top:12px"><table class="t t-dense">
          <thead><tr><th>Bulan</th><th style="text-align:right">Rencana (CDP)</th><th style="text-align:right">Realisasi</th><th style="text-align:right">Selisih</th><th style="width:80px;text-align:right">Aksi</th></tr></thead>
          <tbody>
          ${_BULAN.map((b,i)=>{
            const plan = cdpByMonth[i]||0, real = realisasiByMonth[i]||0;
            return `<tr>
              <td>${b} ${year}</td>
              <td style="text-align:right">${plan?fmtRupiah(plan):'—'}</td>
              <td style="text-align:right">${real?fmtRupiah(real):'—'}</td>

async function viewAdminApprovals(c){
  const me = session.get();

        </p>

  async function refresh(){

      return { ...a, request: r };
    }));
    host.innerHTML = `
      <div class="table-wrap"><table class="t">
        <thead><tr>
          <th style="width:44px">#</th>
          <th>Kode Permintaan</th>
          <th>Kategori</th>
          <th>Pemesan</th>
          <th>PIC</th>
          <th>Diminta</th>
          <th style="width:240px;text-align:right">Aksi</th>
        </tr></thead>
        <tbody>
        ${enriched.map((a,i) => `
          <tr>
            <td>${i+1}</td>
            <td><span class="code-pill">${escapeHtml(a.request?.kode_permintaan||'?')}</span></td>
            <td><span class="tag">${escapeHtml(a.request?.kategori_kode||'')}</span> <span class="text-sm">${escapeHtml(a.request?.kategori||'')}</span></td>
            <td><div>${escapeHtml(a.request?.nama_pemesan||'')}</div><div class="text-sm muted">${escapeHtml(a.request?.departemen||'')}</div></td>
            <td>${escapeHtml(a.request?.nama_pic_ga||'—')}</td>
            <td class="text-sm muted">${fmtDateTime(a.requested_at)}</td>
            <td style="text-align:right;white-space:nowrap">
              <button class="btn btn-ghost btn-sm" data-detail="${a.request?.id}"><span class="material-symbols-rounded">visibility</span></button>
              <button class="btn btn-primary btn-sm" data-approve="${a.id}"><span class="material-symbols-rounded">check</span>Setujui</button>
              <button class="btn btn-sm" data-reject="${a.id}" style="background:#FEE2E2;color:#991B1B"><span class="material-symbols-rounded">close</span>Tolak</button>
            </td>
          </tr>
        `).join('')}
        </tbody></table></div>`;
    $$('button[data-detail]', host).forEach(b => b.addEventListener('click', () => openRequestDetail(b.dataset.detail)));
    $$('button[data-approve]', host).forEach(b => b.addEventListener('click', () => openApprovalDecideModal(b.dataset.approve, 'approved', refresh)));
    $$('button[data-reject]', host).forEach(b => b.addEventListener('click', () => openApprovalDecideModal(b.dataset.reject, 'rejected', refresh)));
  }
  refresh();
}

function openApprovalDecideModal(approvalId, decision, onDone){
  const isApprove = decision === 'approved';
  openModal(`
    <div class="modal-head">
      <h3>
        <span class="material-symbols-rounded" style="vertical-align:-6px;color:${isApprove?'var(--mrt-green)':'var(--danger)'}">${isApprove?'check_circle':'cancel'}</span>
        ${isApprove?'Setujui Permintaan':'Tolak Permintaan'}
      </h3>
      <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Catatan ${isApprove?'(opsional)':'(wajib)'}</label>
        <textarea class="textarea" id="apr-reason" placeholder="${isApprove?'Mis. anggaran tersedia, vendor sudah dikonfirmasi.':'Mis. anggaran belum tersedia di kuartal ini.'}"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn ${isApprove?'btn-primary':''}" id="apr-save" style="${isApprove?'':'background:var(--danger);color:#fff'}">
        <span class="material-symbols-rounded">${isApprove?'check':'close'}</span>${isApprove?'Setujui':'Tolak'}
      </button>
    </div>
  `, 'sm');
  $('#apr-save').addEventListener('click', async () => {
    const reason = $('#apr-reason').value.trim();
    if(!isApprove && !reason){ toast('Alasan wajib diisi untuk penolakan','warn'); return; }
    try{
      const updated = await db.decideApproval(approvalId, decision, reason);
      db.logActivity({
        action: 'approval.'+decision,
        target_type:'approval', target_id:approvalId,
        detail:`Approval di-${isApprove?'setujui':'tolak'}${reason?': '+reason:''}`,
        meta:{ approval_id:approvalId, decision }
      });
      // If approved, also notify the original requester via a notification
      if(isApprove && updated){
        try{
          const cur = session.get();
          if(typeof supa !== 'undefined' && SUPA_CONFIGURED){
            await supa.from('notifications').insert({
              user_id: updated.requested_by, request_id: updated.request_id,
              type:'approval_granted',
              title:'Permintaan disetujui',
              body:'Approval Kepala Departemen telah diberikan. Anda dapat melanjutkan ke Sedang Disiapkan.'
            });
          }else{
            demo.notifications.unshift({
              id:'n'+(demo.notifications.length+1), user_id: updated.requested_by, request_id: updated.request_id,
              type:'approval_granted',
              title:'Permintaan disetujui',
              body:`Approval Kepala Departemen telah diberikan. Anda dapat melanjutkan ke Sedang Disiapkan.`,
              read_at:null, created_at:new Date().toISOString()
            });
          }
        }catch{}
      }
      closeModal();
      toast(isApprove?'Disetujui':'Ditolak','success');
      onDone && onDone();
      // Refresh sidebar badge
      refreshApprovalBadge(session.get());
    }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
  });
}
