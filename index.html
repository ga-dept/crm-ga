            <div class="tracker-row"><span class="k">Estimasi Selesai</span><span class="v">${fmtDate(r.estimasi_penyelesaian)}</span></div>
            ${r.status==='Selesai' && !rating ? `
              <div class="mt-3"><a href="#/rate/${r.id}" class="btn btn-accent btn-sm"><span class="material-symbols-rounded">star</span>Beri Penilaian</a></div>` : ''}
            ${rating ? `
              <div class="mt-3"><span class="tag green">Sudah dinilai · ${rating.rating}★</span></div>` : ''}
          `;
        }catch(err){
          console.error(err);
          trackResult.innerHTML = `<div class="muted">Gagal memuat data. Coba lagi.</div>`;
        }
      };
      trackBtn.addEventListener('click', doTrack);
      trackInput.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); doTrack(); } });
    }
  }catch(err){ console.error('[tracker]', err); }

  // --- Form collapse + handlers (wrapped, defensive) ---
  setupRequestForm();
}

/* ============================================================
   DIVISI ↔ DEPARTEMEN FIELDS (cascading + auto-add) — fix #2
   ------------------------------------------------------------
   Bugs fixed vs. the old inline version:
   • After a successful submit the dropdowns + "new" text inputs are now
     reset cleanly (state desync no longer lingers).
   • Newly auto-added Divisi/Departemen are reloaded so they appear on the
     next submission without a full page reload.
   • Master lists (divs/deps) are kept inside the controller and reloaded by
     refresh(), so the change-handler never reads a stale closure array.
   • Choosing "+ Tambah Divisi baru" no longer hard-locks Departemen into
     "new" mode — the user may still leave Departemen empty.
   ============================================================ */
let _divDepCtl = null;
function setupDivisiDepartemenFields(initial){
  const inDiv  = $('#input-divisi');
  const inDep  = $('#input-departemen');
  const menuDiv = $('#menu-divisi');
  const menuDep = $('#menu-departemen');
  if(!inDiv || !inDep) return null;

  let divs = (initial && initial.divs) || [];
  let deps = (initial && initial.deps) || [];
  const lc = s => (s||'').trim().toLowerCase();
  const findDiv = () => divs.find(x => lc(x.name) === lc(inDiv.value)) || null;

  function buildDivItems(){
    const q = lc(inDiv.value);
    let list = divs.slice().sort((a,b)=> a.name.localeCompare(b.name));
    if(q) list = list.filter(d => lc(d.name).includes(q));
    const items = list.map(d => ({ type:'opt', label:d.name }));
    const exact = divs.some(d => lc(d.name) === q);
    if(inDiv.value.trim() && !exact) items.push({ type:'add', label:`Tambah "${inDiv.value.trim()}"`, value:inDiv.value.trim() });
    return items;
  }
  function buildDepItems(){
    const did = findDiv()?.id || null;
    const q = lc(inDep.value);
    let pool = did ? deps.filter(d => d.divisi_id === did) : [];
    pool = pool.slice().sort((a,b)=> a.name.localeCompare(b.name));
    if(q) pool = pool.filter(d => lc(d.name).includes(q));
    const items = pool.map(d => ({ type:'opt', label:d.name }));
    const exact = did && deps.some(d => d.divisi_id===did && lc(d.name)===q);
    if(inDep.value.trim() && !exact) items.push({ type:'add', label:`Tambah "${inDep.value.trim()}"`, value:inDep.value.trim() });
    return items;
  }
  function renderMenu(menu, items){
    if(!items.length){ menu.innerHTML = '<div class="combo-empty">Ketik untuk menambah baru…</div>'; return; }
    menu.innerHTML = items.map((it,i)=>
      `<div class="combo-item ${it.type==='add'?'add':''}" data-i="${i}" role="option">
         <span class="material-symbols-rounded">${it.type==='add'?'add_circle':'corporate_fare'}</span>
         <span>${escapeHtml(it.label)}</span>
       </div>`).join('');
  }
  function bindCombo(input, menu, buildItems, onChoose){
    let items = [], active = -1;
    const open = () => { items = buildItems(); renderMenu(menu, items); menu.classList.add('show'); input.setAttribute('aria-expanded','true'); active = -1; wire(); };
    const close = () => { menu.classList.remove('show'); input.setAttribute('aria-expanded','false'); active = -1; };
    const wire = () => $$('.combo-item', menu).forEach(el =>
      el.addEventListener('mousedown', e => { e.preventDefault(); onChoose(items[+el.dataset.i]); close(); }));
    const paint = () => { const els = $$('.combo-item', menu); els.forEach((el,i)=> el.classList.toggle('active', i===active)); if(els[active]) els[active].scrollIntoView({block:'nearest'}); };
    input.addEventListener('focus', open);
    input.addEventListener('input', () => { if(input===inDiv) syncDepEnabled(); open(); });
    input.addEventListener('keydown', e => {
      if(!menu.classList.contains('show')){ if(e.key==='ArrowDown') open(); return; }
      const els = $$('.combo-item', menu);
      if(e.key==='ArrowDown'){ e.preventDefault(); active = Math.min(active+1, els.length-1); paint(); }
      else if(e.key==='ArrowUp'){ e.preventDefault(); active = Math.max(active-1, 0); paint(); }
      else if(e.key==='Enter'){ if(active>=0 && items[active]){ e.preventDefault(); onChoose(items[active]); close(); } }
      else if(e.key==='Escape'){ close(); }
    });
    input.addEventListener('blur', () => setTimeout(close, 130));
  }
  function syncDepEnabled(){
    const hasDiv = !!inDiv.value.trim();
    inDep.disabled = !hasDiv;
    inDep.placeholder = hasDiv ? 'Ketik untuk mencari Departemen…' : 'Pilih Divisi terlebih dahulu…';
    if(!hasDiv) inDep.value = '';
  }

  bindCombo(inDiv, menuDiv, buildDivItems, (it) => {
    if(!it) return;
    inDiv.value = it.type==='opt' ? it.label : (it.value||'');
    syncDepEnabled();
    inDep.value = '';
  });
  bindCombo(inDep, menuDep, buildDepItems, (it) => {
    if(!it) return;
    inDep.value = it.type==='opt' ? it.label : (it.value||'');
  });

  function reset(){
    inDiv.value=''; inDep.value=''; syncDepEnabled();
    menuDiv.classList.remove('show'); menuDep.classList.remove('show');
  }
  async function refresh(){
    try{ divs = await db.listDivisi().catch(()=>divs); deps = await db.listDepartemen().catch(()=>deps); }
    catch(e){ console.warn('[divdep refresh]', e); }
    reset();
  }
  syncDepEnabled();
  return { refresh, reset, getDivs:()=>divs, getDeps:()=>deps };
}

function setupRequestForm(){
  const formToggle = $('#form-toggle');
  const formBody = $('#form-body');
  if(formToggle && formBody){
    const toggleFn = () => {
      const willOpen = !formToggle.classList.contains('open');
      formToggle.classList.toggle('open', willOpen);
      formBody.classList.toggle('open', willOpen);
      formToggle.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
    };
    formToggle.addEventListener('click', toggleFn);
    formToggle.addEventListener('keydown', e => { if(e.key==='Enter' || e.key===' '){ e.preventDefault(); toggleFn(); } });
    // Auto-open when the user jumps to the form (nav / hero CTA / direct hash)
    const openForm = () => { formToggle.classList.add('open'); formBody.classList.add('open'); formToggle.setAttribute('aria-expanded','true'); };
    $$('a[href="#form"]').forEach(a => a.addEventListener('click', () => setTimeout(openForm, 60)));
    if(location.hash === '#form') setTimeout(openForm, 60);
  }

  const form = $('#request-form');
  if(!form) return;

  const katSel = form.querySelector('select[name="kategori"]');
  const kodePreview = $('#kode-preview');
  const smartoffField = $('#smartoffice-field');
  const inputHarga = $('#input-harga');
  const koSection = $('#ko-section');
  let _koDriversLoaded = false;

  async function ensureKoDrivers(){
    if(_koDriversLoaded) return;
    const sel = $('#ko-driver');
    if(!sel) return;
    try{
      const fleet = await db.listKendaraan().catch(()=>[]);
      sel.innerHTML = '<option value="">— Pilih armada —</option>' +
        fleet.filter(v => v.active !== false).map(v =>
          `<option value="${escapeHtml(v.id)}">${escapeHtml(v.nama_driver)} · ${escapeHtml(v.nomor_polisi||'')} (${escapeHtml(v.keterangan||v.ownership||'')})</option>`).join('');
      _koDriversLoaded = true;
    }catch(e){ console.warn('[ko drivers]', e); }
  }

  if(katSel) katSel.addEventListener('change', () => {
    const k = KATEGORI_KODE[katSel.value];
    if(k){
      if(kodePreview) kodePreview.value = `${k}-${todayKey()}#### (nomor urut otomatis saat submit)`;
      if(smartoffField) smartoffField.style.display = SMARTOFFICE_REQUIRED.includes(k) ? '' : 'none';
    } else {
      if(kodePreview) kodePreview.value = '';
      if(smartoffField) smartoffField.style.display = 'none';
    }
    // Kendaraan Operasional booking section
    const isKO = katSel.value === KO_KATEGORI;
    if(koSection) koSection.style.display = isKO ? '' : 'none';
    if(isKO) ensureKoDrivers();
  });

  // Rupiah formatter
  if(inputHarga) inputHarga.addEventListener('input', e => {
    const digits = e.target.value.replace(/\D/g,'');
    e.target.value = digits ? 'Rp ' + Number(digits).toLocaleString('id-ID') : '';
  });

  // Submit
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = $('#submit-btn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="material-symbols-rounded">hourglass_top</span>Mengirim...';

    try{
      const fd = new FormData(form);
      const kategori = fd.get('kategori');
      if(!kategori) throw new Error('Pilih kategori terlebih dahulu');
      const prefix = KATEGORI_KODE[kategori];
      const kode = await db.generateCode(prefix);

      // Validate file
      const fileInput = $('#input-lampiran');
      let lampiran_url = null;
      if(fileInput && fileInput.files.length){
        const f = fileInput.files[0];
        if(f.size > 2*1024*1024) throw new Error('Lampiran melebihi 2 MB');
        const okType = ['application/pdf','image/png','image/jpeg'].includes(f.type);
        if(!okType) throw new Error('Tipe lampiran harus PDF/PNG/JPG');
        try{ lampiran_url = await db.uploadAttachment(f); }
        catch(uerr){ console.warn('Upload skipped:', uerr); }
      }

      const hargaDigits = (fd.get('estimasi_harga')||'').toString().replace(/\D/g,'');

      // Resolve Divisi & Departemen — the user may pick an existing one
      // OR type a brand-new name, which gets auto-added to the master.
      // Fix #2: best-effort auto-add. Even if the master insert is blocked
      // (RLS / race / duplicate), the request still records the typed names
      // and never throws, so the form can't get stuck "sometimes".
      // Resolve Divisi & Departemen from the type-search inputs (name-based).
      // The user types a name; if it does not exist yet it is auto-added to the
      // master (best-effort — a blocked insert still records the typed name so
      // the submit never gets stuck).
      const lcEq = (a,b) => (a||'').trim().toLowerCase() === (b||'').trim().toLowerCase();
      let divList = await db.listDivisi().catch(() => []);
      let divisiName = (fd.get('divisi') || '').toString().trim() || null;
      let resolvedDivisiId = '';
      if(divisiName){
        let d = divList.find(x => lcEq(x.name, divisiName));
        if(!d){
          try{ d = await db.addDivisi({ name: divisiName }); }
          catch(divErr){
            console.warn('addDivisi gagal:', divErr);
            divList = await db.listDivisi().catch(() => divList);
            d = divList.find(x => lcEq(x.name, divisiName));
          }
        }
        if(d){ divisiName = d.name; resolvedDivisiId = d.id; }
      }

      let departemenName = (fd.get('departemen') || '').toString().trim() || null;
      if(departemenName && resolvedDivisiId){
        let depList = await db.listDepartemen().catch(() => []);
        let dep = depList.find(x => x.divisi_id === resolvedDivisiId && lcEq(x.name, departemenName));
        if(!dep){
          try{ dep = await db.addDepartemen({ name: departemenName, divisi_id: resolvedDivisiId }); }
          catch(depErr){
            console.warn('addDepartemen gagal:', depErr);
            depList = await db.listDepartemen().catch(() => depList);
            dep = depList.find(x => x.divisi_id === resolvedDivisiId && lcEq(x.name, departemenName));
          }
        }
        departemenName = dep ? dep.name : departemenName;
      }
      // (departemen typed without a resolvable divisi keeps its typed name)

      // v1.9: Kendaraan Operasional booking detail (when that category is chosen)
      let kendaraan_detail = null;
      if(kategori === KO_KATEGORI){
        const drvSel = $('#ko-driver');
        const drvId = drvSel ? drvSel.value : '';
        const drvLabel = drvId && drvSel.selectedOptions[0] ? drvSel.selectedOptions[0].textContent : '';
        kendaraan_detail = {
          area:        $('#ko-area')?.value || '',
          driver_id:   drvId || '',
          driver_label:drvLabel || '',
          kontak:      $('#ko-kontak')?.value || '',
          prioritas:   $('#ko-prioritas')?.value || '',
          jenis_layanan: $('#ko-layanan')?.value || '',
          jam:         $('#ko-jam')?.value || '',
          titik_jemput:$('#ko-jemput')?.value || '',
          tujuan:      $('#ko-tujuan')?.value || ''
        };
      }

      const payload = {
        kode_permintaan: kode,
        kode_smartoffice: fd.get('kode_smartoffice') || null,
        kategori,
        kategori_kode: prefix,
        sumber_pemesanan: fd.get('sumber_pemesanan'),
        nama_pemesan: fd.get('nama_pemesan'),
        nama_kegiatan: fd.get('nama_kegiatan') || null,
        lokasi_kebutuhan: fd.get('lokasi_kebutuhan') || null,
        tujuan_kebutuhan: fd.get('tujuan_kebutuhan') || null,
        divisi:        divisiName,
        departemen:    departemenName,
        tanggal_kebutuhan: fd.get('tanggal_kebutuhan'),
        detail_kebutuhan: fd.get('detail_kebutuhan'),
        estimasi_harga: hargaDigits ? Number(hargaDigits) : 0,
        lampiran_url,
        pakai_anggaran_ga: true,
        kendaraan_detail,
        status: 'Belum Dikonfirmasi'
      };

      const inserted = await db.insertRequest(payload);
      db.logActivity({
        user_id:null, username:null, full_name:payload.nama_pemesan,
        action:'request.create.public',
        target_type:'request', target_id:inserted?.id,
        detail:`Permintaan baru ${kode} dari ${payload.nama_pemesan} (${payload.kategori})`
      });

      // success popup
      openModal(`
        <div class="modal-body center">
          <div class="success-mark"><span class="material-symbols-rounded">check</span></div>
          <h3 style="margin:0 0 8px;font-size:18px">Terima kasih!</h3>
          <p class="muted" style="margin:0 0 14px">Permintaan Anda dengan kode berikut telah kami terima.</p>
          <div class="flex gap-2 items-center" style="justify-content:center;margin-bottom:8px">
            <span class="code-pill" id="copy-code-src">${escapeHtml(kode)}</span>
            <button class="copy-mini" id="copy-code-btn" title="Salin"><span class="material-symbols-rounded">content_copy</span></button>
          </div>
          <p class="muted text-sm" style="margin:10px 0 0">Mohon tunggu informasi pengambilan yang akan disampaikan oleh tim General Affairs.</p>
        </div>
        <div class="modal-foot" style="justify-content:center">
          <button class="btn btn-primary" onclick="closeModal()"><span class="material-symbols-rounded">close</span>Tutup</button>
        </div>
      `, 'sm');
      $('#copy-code-btn').addEventListener('click', (ev)=> copyText(kode, ev.currentTarget));

      form.reset();
      if(kodePreview) kodePreview.value = '';
      if(smartoffField) smartoffField.style.display='none';
      // Fix #2: reload masters + reset the Divisi/Departemen fields so any
      // freshly auto-added entry shows next time and no stale "new" input lingers.
      if(_divDepCtl){ try{ await _divDepCtl.refresh(); }catch{} }
      toast('Permintaan tersimpan','success');
      // refresh stats lightly
      try{
        const reqs = await db.listRequests();
        const a = $('#stat-total'); if(a) a.textContent = reqs.length;
        const t = $('#stat-today'); if(t) t.textContent = reqs.filter(r=>r.created_at && r.created_at.slice(0,10)===new Date().toISOString().slice(0,10)).length;
      }catch{}
    }catch(err){
      console.error(err);
      toast(err.message || 'Gagal mengirim permintaan','error');
    }finally{
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<span class="material-symbols-rounded">send</span>Submit Permintaan';
    }
  });
}

async function renderAdmin(page){
  if(!session.get()){ navigate('/login'); return; }
  mount('tpl-admin');

  const u = session.get();
  $('#user-name').textContent = u.full_name;
  $('#user-role').textContent = u.role;
  $('#user-avatar').textContent = (u.full_name||'A').slice(0,1).toUpperCase();

  const doLogout = () => {
    db.logActivity({ action:'auth.logout', target_type:'auth', detail:'Logout' });
    if(_bellTimer){ clearInterval(_bellTimer); _bellTimer = null; }
    session.clear(); toast('Berhasil keluar','info'); navigate('/');
  };
  $('#logout-btn-side').onclick = doLogout;
  $('#logout-btn-top').onclick  = doLogout;

  // Sidebar nav
  // v2.1: gate whole groups by role, then gate individual items
  $$('#admin-nav .nav-group').forEach(g => {
    const allowed = g.dataset.allowedRoles ? g.dataset.allowedRoles.split(',').map(s=>s.trim()) : null;
    if(allowed && !allowed.includes(u.role)) g.style.display = 'none';
  });
  $$('#admin-nav .sidebar-section-label').forEach(lab => {
    const allowed = lab.dataset.allowedRoles ? lab.dataset.allowedRoles.split(',').map(s=>s.trim()) : null;
    if(allowed && !allowed.includes(u.role)) lab.style.display = 'none';
  });
  $$('#admin-nav .nav-item').forEach(it => {
    // Role gating: hide items the user isn't allowed to access
    // - ROUTE_ROLES[route] → authoritative per-route allow list
    // - data-requires-role="superadmin" → only that role
    // - data-allowed-roles="superadmin,admin" → comma-separated list
    const rr = ROUTE_ROLES[it.dataset.route];
    if(rr && !rr.includes(u.role)){ it.style.display = 'none'; return; }
    const reqRole = it.dataset.requiresRole;
    const allowed = it.dataset.allowedRoles ? it.dataset.allowedRoles.split(',').map(s => s.trim()) : null;
    if(reqRole && u.role !== reqRole){
      it.style.display = 'none';
      return;
    }
    if(allowed && !allowed.includes(u.role)){
      it.style.display = 'none';
      return;
    }
    it.classList.toggle('active', it.dataset.route===page);
    it.addEventListener('click', e => { e.preventDefault(); navigate('/admin/'+it.dataset.route); });
  });

  // v2.1: hide any group whose items are all hidden; collapse/expand wiring
  let collapsedGroups = {};
  try{ collapsedGroups = JSON.parse(localStorage.getItem('gass-nav-groups')||'{}'); }catch{}
  $$('#admin-nav .nav-group').forEach(g => {
    if(g.style.display === 'none') return;
    const items = $$('.nav-item', g);
    const anyVisible = items.some(i => i.style.display !== 'none');
    if(!anyVisible){ g.style.display = 'none'; return; }
    const key = g.dataset.group;
    // restore persisted state; keep the group containing the active route open
    const hasActive = items.some(i => i.dataset.route === page && i.style.display !== 'none');
    if(collapsedGroups[key] && !hasActive) g.classList.add('collapsed');
    const head = $('.nav-group-head', g);
    if(head) head.addEventListener('click', () => {
      g.classList.toggle('collapsed');
      collapsedGroups[key] = g.classList.contains('collapsed');
      try{ localStorage.setItem('gass-nav-groups', JSON.stringify(collapsedGroups)); }catch{}
    });
  });

  // v1.7: Refresh approval badge count
  refreshApprovalBadge(u);

  // Hamburger
  const sidebar = $('#sidebar');
  const backdrop = $('#mobile-backdrop');
  const ham = $('#hamburger-btn');
  const isMobile = () => window.innerWidth <= 768;
  ham.addEventListener('click', () => {
    if(isMobile()){
      sidebar.classList.toggle('mobile-open');
      backdrop.classList.toggle('show', sidebar.classList.contains('mobile-open'));
    } else {
      sidebar.classList.toggle('collapsed');
    }
  });
  backdrop.addEventListener('click', () => {
    sidebar.classList.remove('mobile-open');
    backdrop.classList.remove('show');
  });
  // Close mobile sidebar on nav click
  $$('#admin-nav .nav-item').forEach(it => it.addEventListener('click', ()=>{
    if(isMobile()){ sidebar.classList.remove('mobile-open'); backdrop.classList.remove('show'); }
  }));

  // --- Notification bell ---
  setupBell(u);

  const titles = {
    dashboard:'Dashboard',
    myticket:'Tiket Saya',
    approvals:'Persetujuan',
    requests:'Daftar Permintaan',
    ratings:'Daftar Penilaian',
    payments:'Payment',
    masterdata:'Master Data',
    kategori:'Kategori Pemesanan',
    divisi:'Divisi',
    departemen:'Departemen',
    kendaraan:'Armada Kendaraan',
    anggaran:'Manajemen Anggaran',
    users:'Manajemen User',
    slatargets:'SLA Target',
    activity:'Log Aktivitas',
    version:'Riwayat Versi'
  };
  $('#admin-title').textContent = titles[page] || 'Admin';
  $('#admin-crumbs').textContent = 'Admin · '+ (titles[page]||'');

  const c = $('#admin-content');

  // Role-based access control for direct URL navigation (mirrors sidebar gating)
  const access = ROUTE_ROLES;
  const allowed = access[page];
  if(allowed && !allowed.includes(u.role)){
    const roleStr  = allowed.map(r => ROLE_LABEL[r] || r).join(' / ');
    c.innerHTML = `
      <div class="card card-pad center" style="background:#FEF3C7;border-color:#FCD34D">
        <span class="material-symbols-rounded" style="font-size:48px;color:#92400E">lock</span>
        <h3 style="margin:8px 0;color:#92400E">Akses Ditolak</h3>
        <p class="muted">Halaman <strong>${titles[page]||page}</strong> hanya dapat diakses oleh <strong>${roleStr}</strong>.</p>
        <a class="btn btn-primary" href="#/admin/dashboard" style="margin-top:8px">Kembali ke Dashboard</a>
      </div>`;
    return;
  }

  if(page==='dashboard')       await viewAdminDashboard(c);

/* ----------- NOTIFICATION BELL ----------- */
let _bellTimer = null;
function setupBell(user){
  const btn = $('#bell-btn');
  const panel = $('#bell-panel');
  const list = $('#bell-list');
  const badge = $('#bell-badge');

  async function refresh(){
    try{
      const items = await db.listNotifications(user.id, { limit: 50 });
      const unread = items.filter(n => !n.read_at).length;
      badge.style.display = unread > 0 ? 'flex' : 'none';
      badge.textContent = unread > 9 ? '9+' : String(unread);

      if(!items.length){
        list.innerHTML = '<div class="bell-empty"><span class="material-symbols-rounded" style="font-size:36px;color:var(--text-soft);display:block;margin-bottom:6px">notifications_off</span>Tidak ada notifikasi</div>';
        return;
      }
      list.innerHTML = items.map(n => {
        const ago = relTime(n.created_at);
        const icon = n.type==='assigned' ? 'assignment_ind' : n.type==='status_change' ? 'sync' : 'notifications';
        return `
          <div class="bell-item ${!n.read_at?'unread':''}" data-id="${n.id}" data-req="${n.request_id||''}">
            <div class="bell-icon"><span class="material-symbols-rounded" style="font-size:20px">${icon}</span></div>
            <div class="bell-content">
              <p class="title">${escapeHtml(n.title)}</p>
              <p class="body">${escapeHtml(n.body||'')}</p>
              <div class="when">${ago}</div>
            </div>
          </div>`;
      }).join('');
      // Click on item -> open request detail (if any)
      $$('.bell-item', list).forEach(el => el.addEventListener('click', () => {
        const reqId = el.dataset.req;
        if(reqId){
          panel.classList.remove('show');
          openRequestDetail(reqId);
        }
      }));
    }catch(err){ console.error('[bell]', err); }
  }

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    panel.classList.toggle('show');
    if(panel.classList.contains('show')) refresh();
  });
  // Remove any prior document listener (when re-entering admin shell)
  if(window._bellDocHandler) document.removeEventListener('click', window._bellDocHandler);
  window._bellDocHandler = (e) => {
    const wrap = document.getElementById('bell-wrap');
    if(!wrap) return;            // admin not mounted right now
    if(!wrap.contains(e.target)) wrap.querySelector('.bell-panel')?.classList.remove('show');
  };
  document.addEventListener('click', window._bellDocHandler);

  $('#mark-all-read').addEventListener('click', async (e) => {
    e.stopPropagation();
    try{
      await db.markAllNotificationsRead(user.id);
      await refresh();
      toast('Semua notifikasi ditandai sudah dibaca','success', 1500);
    }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
  });

  // initial badge + polling
  refresh();
  if(_bellTimer) clearInterval(_bellTimer);
  _bellTimer = setInterval(refresh, 30000);
}

function relTime(iso){
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if(diff < 60)   return 'Baru saja';
  if(diff < 3600) return Math.floor(diff/60) + ' menit lalu';
  if(diff < 86400) return Math.floor(diff/3600) + ' jam lalu';
  if(diff < 604800) return Math.floor(diff/86400) + ' hari lalu';
  return fmtDate(iso);
}

        Detail: r.detail_kebutuhan,
        Estimasi_Harga: r.estimasi_harga||0,
        Status: r.status,
        Keterangan: r.keterangan||'',
        Total_Anggaran: r.total_anggaran||0,
        Vendor: r.nama_vendor||'',
        PIC_GA: r.nama_pic_ga||'',
        Estimasi_Selesai: r.estimasi_penyelesaian||'',
        Tgl_Dibuat: r.created_at,
        Tgl_Selesai: r.completed_at||'',
        SLA_Target_Jam: sla.hoursTarget != null ? sla.hoursTarget : '',
        Resolusi_Jam: sla.hoursUsed != null ? sla.hoursUsed.toFixed(2) : '',
        SLA_Status: slaLabel,
        Bukti_Foto: r.bukti_foto_url||'',
        Bukti_TandaTerima: r.bukti_tt_url||''
      };
    });
    csvDownload('daftar-permintaan-'+new Date().toISOString().slice(0,10)+'.csv', rows);
  });
  $('#mass-upload-btn').addEventListener('click', () => openMassUploadModal());
}

function renderRequestsTable(host, data, opts){
  const compact = opts && opts.compact;
  const s = _adminReqsState;
  const targets = _slaTargetsCache || [];
  // v2.0: Daftar Permintaan CRUD hanya Superadmin; PIC hanya tiket miliknya.
  const _me = session.get();
  const canEditReq = (r) => !!_me && (_me.role === 'superadmin' || (_me.role === 'pic' && r.nama_pic_ga === _me.full_name));

  // Filter
  let rows = data.slice();
  if(s.search){
    rows = rows.filter(r =>
      (r.kode_permintaan||'').toLowerCase().includes(s.search) ||
      (r.nama_pemesan||'').toLowerCase().includes(s.search) ||
      (r.detail_kebutuhan||'').toLowerCase().includes(s.search) ||
      (r.kategori||'').toLowerCase().includes(s.search)
    );
  }
  if(s.filterStatus)   rows = rows.filter(r => r.status===s.filterStatus);
  if(s.filterKategori) rows = rows.filter(r => r.kategori===s.filterKategori);
  if(s.filterSumber)   rows = rows.filter(r => r.sumber_pemesanan===s.filterSumber);
  if(s.filterPic)      rows = rows.filter(r => (r.nama_pic_ga||'')===s.filterPic);
  if(s.filterSla){
    rows = rows.filter(r => {
      const slaSt = slaStatusFor(r, targets).status;
      return slaSt === s.filterSla;
    });
  }

  // Sort
  rows.sort((a,b) => {
    let av = a[s.sort], bv = b[s.sort];
    if(av===null||av===undefined) av='';
    if(bv===null||bv===undefined) bv='';
    if(typeof av==='string') av = av.toLowerCase();
    if(typeof bv==='string') bv = bv.toLowerCase();
    if(av<bv) return s.dir==='asc'?-1:1;
    if(av>bv) return s.dir==='asc'?1:-1;
    return 0;
  });

  const total = rows.length;
  const totalPages = Math.max(1, Math.ceil(total / s.pageSize));
  if(s.page > totalPages) s.page = totalPages;
  const start = (s.page-1)*s.pageSize;
  const pageRows = rows.slice(start, start + s.pageSize);

  const sortIcon = (col) => {
    if(s.sort!==col) return '<span class="material-symbols-rounded sort-ic">unfold_more</span>';
    return `<span class="material-symbols-rounded sort-ic">${s.dir==='asc'?'arrow_drop_up':'arrow_drop_down'}</span>`;
  };
  const sortClass = (col) => s.sort===col ? (s.dir==='asc'?'sort-asc':'sort-desc') : '';

  host.innerHTML = `
    <div class="table-wrap">
      <table class="t${compact?'':' t-dense'}">
        <thead>
          <tr>
            <th style="width:40px">#</th>
            <th class="sortable ${sortClass('kode_permintaan')}" data-col="kode_permintaan">Kode${sortIcon('kode_permintaan')}</th>
            <th class="sortable ${sortClass('kategori')}" data-col="kategori">Kategori${sortIcon('kategori')}</th>
            <th class="sortable ${sortClass('nama_pemesan')}" data-col="nama_pemesan">Pemesan${sortIcon('nama_pemesan')}</th>
            <th class="sortable ${sortClass('tanggal_kebutuhan')}" data-col="tanggal_kebutuhan">Tgl Kebutuhan${sortIcon('tanggal_kebutuhan')}</th>
            <th>Detail</th>
            <th class="sortable ${sortClass('estimasi_harga')}" data-col="estimasi_harga">Estimasi${sortIcon('estimasi_harga')}</th>
            <th class="sortable ${sortClass('status')}" data-col="status">Status${sortIcon('status')}</th>
            ${!compact ? '<th>SLA</th>' : ''}
            <th style="text-align:right">Aksi</th>
          </tr>
        </thead>
        <tbody>
          ${pageRows.length ? pageRows.map((r,i)=>{
            // Compute SLA cell
            let slaCell = '';
            if(!compact){
              const sla = slaStatusFor(r, targets);
              if(sla.status === 'ontime'){
                slaCell = `<td><span class="badge status-selesai" title="Selesai dalam ${fmtDurationHours(sla.hoursUsed)} (target ${fmtDurationHours(sla.hoursTarget)})">On-time</span><div class="text-sm muted" style="margin-top:2px">${fmtDurationHours(sla.hoursUsed)}</div></td>`;
              } else if(sla.status === 'late'){
                slaCell = `<td><span class="badge status-ditolak" title="Selesai dalam ${fmtDurationHours(sla.hoursUsed)} (target ${fmtDurationHours(sla.hoursTarget)})">Terlambat</span><div class="text-sm" style="color:var(--danger);margin-top:2px">+${fmtDurationHours(sla.deltaHours)}</div></td>`;
              } else if(sla.hoursTarget != null){
                slaCell = `<td><span class="text-sm muted">target ${fmtDurationHours(sla.hoursTarget)}</span></td>`;
              } else {
                slaCell = `<td><span class="text-sm muted">—</span></td>`;
              }
            }
            return `
            <tr>
              <td>${start+i+1}</td>
              <td><span class="code-pill">${escapeHtml(r.kode_permintaan)}</span></td>
              <td><span class="tag">${escapeHtml(r.kategori_kode||'')}</span><span class="kat-name">${escapeHtml(r.kategori)}</span></td>
              <td><div class="fw-700">${escapeHtml(r.nama_pemesan)}</div><div class="text-sm muted">${escapeHtml(r.sumber_pemesanan||'')}</div></td>
              <td>${fmtDate(r.tanggal_kebutuhan)}</td>
              <td style="max-width:190px"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${escapeHtml(r.detail_kebutuhan||'')}">${escapeHtml(r.detail_kebutuhan||'')}</div></td>
              <td class="mono">${fmtRupiah(r.estimasi_harga)}</td>
              <td><span class="badge ${STATUS_CLASS[r.status]||''}">${escapeHtml(r.status)}</span></td>
              ${slaCell}
              <td style="white-space:nowrap">
                <div class="actions-compact">
                  <button class="btn-icon" data-act="view" data-id="${r.id}" title="Detail"><span class="material-symbols-rounded">visibility</span></button>
                  ${!compact?`
                    ${canEditReq(r)?`<button class="btn-icon" data-act="edit" data-id="${r.id}" title="Edit / Update Status"><span class="material-symbols-rounded">edit</span></button>`:''}
                    ${r.status==='Tersedia' ? `<button class="btn-icon" data-act="pdf" data-id="${r.id}" title="Download tanda terima PDF" style="color:var(--mrt-green)"><span class="material-symbols-rounded">picture_as_pdf</span></button>` : ''}
                    ${r.status==='Selesai' ? `<button class="btn-icon" data-act="link" data-id="${r.id}" title="Salin tautan penilaian"><span class="material-symbols-rounded">link</span></button>` : ''}
                    ${canEditReq(r)?`<button class="btn-icon" data-act="del" data-id="${r.id}" title="Hapus"><span class="material-symbols-rounded">delete</span></button>`:''}
                  `:''}
                </div>
              </td>
            </tr>
          `;}).join('') : `<tr><td colspan="${compact?9:10}" class="empty-row">Belum ada permintaan</td></tr>`}
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <div>Menampilkan <strong>${pageRows.length}</strong> dari <strong>${total}</strong> data</div>
      <div class="pages">
        <button class="page-btn" id="pg-prev" ${s.page===1?'disabled':''}><span class="material-symbols-rounded" style="font-size:18px">chevron_left</span></button>
        ${Array.from({length:totalPages}).map((_,i)=>{
          const p=i+1;
          if(totalPages>7){
            if(p!==1 && p!==totalPages && Math.abs(p-s.page)>1){
              if(p===2 || p===totalPages-1) return '<span style="padding:0 4px">…</span>';
              return '';
            }
          }
          return `<button class="page-btn ${p===s.page?'active':''}" data-page="${p}">${p}</button>`;
        }).join('')}
        <button class="page-btn" id="pg-next" ${s.page===totalPages?'disabled':''}><span class="material-symbols-rounded" style="font-size:18px">chevron_right</span></button>
      </div>
    </div>
  `;

  // sort handlers
  $$('th.sortable', host).forEach(th => th.addEventListener('click', () => {
    const col = th.dataset.col;
    if(s.sort===col) s.dir = s.dir==='asc'?'desc':'asc';
    else { s.sort = col; s.dir = 'asc'; }
    renderRequestsTable(host, data, opts);
  }));
  // pagination
  $('#pg-prev', host)?.addEventListener('click', () => { if(s.page>1){ s.page--; renderRequestsTable(host, data, opts); } });
  $('#pg-next', host)?.addEventListener('click', () => { if(s.page<totalPages){ s.page++; renderRequestsTable(host, data, opts); } });
  $$('button[data-page]', host).forEach(b => b.addEventListener('click', () => { s.page = Number(b.dataset.page); renderRequestsTable(host, data, opts); }));
  // row actions
  $$('button[data-act]', host).forEach(b => b.addEventListener('click', async () => {
    const id = b.dataset.id; const act = b.dataset.act;
    if(act==='view')      openRequestDetail(id);
    else if(act==='edit') openRequestEdit(id);
    else if(act==='link') {
      const link = location.origin + location.pathname + '#/rate/' + id;
      copyText(link, b);
      const r = _adminReqsCache.find(x => x.id === id);
      db.logActivity({ action:'request.link_copy', target_type:'request', target_id:id,
                       detail:`Salin tautan penilaian untuk ${r?.kode_permintaan||id}` });
    }
    else if(act==='pdf'){
      const r = _adminReqsCache.find(x => x.id === id);
      if(r){
        downloadTandaTerima(r);
        db.logActivity({ action:'request.pdf_download', target_type:'request', target_id:id,
                         detail:`Download tanda terima ${r.kode_permintaan}` });
      }
    }
    else if(act==='del')  {
      if(confirm('Hapus permintaan ini? Tindakan ini tidak bisa dibatalkan.')){
        try{
          const r = _adminReqsCache.find(x => x.id === id);
          await db.deleteRequest(id);
          db.logActivity({ action:'request.delete', target_type:'request', target_id:id,
                           detail:`Hapus permintaan ${r?.kode_permintaan||id}` });
          _adminReqsCache = await db.listRequests();
          renderRequestsTable(host, _adminReqsCache, opts);
          toast('Permintaan dihapus','success');
        }catch(err){ console.error(err); toast('Gagal menghapus','error'); }
      }
    }
  }));
}

async function openRequestEdit(id){
  const r = await db.getRequest(id);
  if(!r) return;
  const me = session.get();
  const isSuperadmin = me?.role === 'superadmin';
  // v2.0: only Superadmin (any ticket) or the assigned PIC may edit a request.
  const mayEdit = me && (me.role === 'superadmin' || (me.role === 'pic' && r.nama_pic_ga === me.full_name));
  if(!mayEdit){ toast('Hanya Superadmin atau PIC yang ditugaskan yang dapat mengubah permintaan ini.','warn'); return; }
  const [lok, tuj, picUsers, ma, divs, deps] = await Promise.all([
    db.listLokasi(), db.listTujuan(), db.listPicUsers(),
    db.listMataAnggaran(), db.listDivisi(), db.listDepartemen()
  ]);

  // Resolve the divisi for the existing departemen (if any), so the dropdown starts correct
  const initialDivisiId = (() => {
    if(!r.departemen) {
      // user might have selected divisi without departemen; match by name
      const d = divs.find(x => x.name === r.divisi);
      return d ? d.id : '';
    }
    const dep = deps.find(d => d.name === r.departemen);
    return dep ? dep.divisi_id : '';
  })();

  // Pre-format the existing completed_at for display in the optional override input
  const completedLocal = r.completed_at
    ? new Date(r.completed_at).toISOString().slice(0,16)  // for datetime-local input
    : '';

  // v1.7: For DP tickets, check approval status to display a banner in the modal
  let approvalBanner = '';
  if(r.kategori === 'Direct Purchase'){
    let lastApr = null;
    try{
      if(SUPA_CONFIGURED){
        const { data } = await supa.from('approvals').select('*')
          .eq('request_id', r.id).eq('approval_type','dp_prepare')
          .order('requested_at',{ascending:false}).limit(1);
        lastApr = data && data[0];
      }else{
        lastApr = demo.approvals.find(a => a.request_id === r.id && a.approval_type === 'dp_prepare') || null;
      }
    }catch{}

    if(lastApr){
      const userName = (() => {
        const u = picUsers.find(x => x.id === lastApr.approver_user_id);
        return u ? u.full_name : '(unknown)';
      })();
      const decidedBy = (() => {
        const u = lastApr.decided_by ? picUsers.find(x => x.id === lastApr.decided_by) : null;
        return u ? u.full_name : '';
      })();
      if(lastApr.status === 'pending'){
        approvalBanner = `<div style="margin-bottom:14px;padding:12px 14px;border-radius:10px;background:#FEF3C7;border-left:3px solid #F59E0B">
          <strong style="color:#92400E"><span class="material-symbols-rounded" style="vertical-align:-4px">pending</span> Menunggu Persetujuan Kepala Departemen</strong>
          <div class="text-sm" style="margin-top:4px;color:#92400E">
            Approval diminta ke <strong>${escapeHtml(userName)}</strong> pada ${fmtDateTime(lastApr.requested_at)}.
            Status tiket tidak dapat dilanjutkan ke "Sedang Disiapkan" sampai disetujui.
          </div>
        </div>`;
      } else if(lastApr.status === 'approved'){
        approvalBanner = `<div style="margin-bottom:14px;padding:12px 14px;border-radius:10px;background:var(--mrt-green-soft);border-left:3px solid var(--mrt-green)">
          <strong style="color:var(--mrt-green)"><span class="material-symbols-rounded" style="vertical-align:-4px">check_circle</span> Disetujui oleh ${escapeHtml(decidedBy)}</strong>
          <div class="text-sm" style="margin-top:4px;color:var(--mrt-green)">
            Disetujui ${fmtDateTime(lastApr.decided_at)}${lastApr.reason?' · '+escapeHtml(lastApr.reason):''}.
            Anda dapat melanjutkan ke "Sedang Disiapkan".
          </div>
        </div>`;
      } else if(lastApr.status === 'rejected'){
        approvalBanner = `<div style="margin-bottom:14px;padding:12px 14px;border-radius:10px;background:#FEE2E2;border-left:3px solid var(--danger)">
          <strong style="color:#991B1B"><span class="material-symbols-rounded" style="vertical-align:-4px">cancel</span> Ditolak oleh ${escapeHtml(decidedBy)}</strong>
          <div class="text-sm" style="margin-top:4px;color:#991B1B">
            Ditolak ${fmtDateTime(lastApr.decided_at)} · alasan: ${escapeHtml(lastApr.reason||'(tidak ada catatan)')}.
            Ajukan permintaan persetujuan baru dengan mengubah status ke "Sedang Disiapkan" lagi.
          </div>
        </div>`;
      }
    }
  }

  openModal(`
    <div class="modal-head">
      <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">edit_note</span> Edit Permintaan</h3>
      <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div class="modal-body">
      ${approvalBanner}
      <form id="edit-form">
        <div class="field"><label>Kode Permintaan</label><input class="input" disabled value="${escapeHtml(r.kode_permintaan)}"></div>
        <div class="form-grid">
          <div class="field"><label>Kode SmartOffice</label><input class="input" name="kode_smartoffice" value="${escapeHtml(r.kode_smartoffice||'')}" placeholder="Isi untuk FB/EV/OS/DP"/></div>
          <div class="field field-required"><label>Status</label>
            <select class="select" name="status" id="ed-status" required>${STATUSES.map(s=>`<option ${s===r.status?'selected':''}>${s}</option>`).join('')}</select>
          </div>
          <div class="field full field-required"><label>Keterangan</label>
            <textarea class="textarea" name="keterangan" required>${escapeHtml(r.keterangan||'')}</textarea>
            <span class="hint">Wajib diisi. Akan tampil di halaman tracking pemohon.</span>
          </div>
          <div class="field"><label>Total Anggaran (Rp)</label><input class="input" name="total_anggaran" id="ed-anggaran" inputmode="numeric" value="${r.total_anggaran?'Rp '+Number(r.total_anggaran).toLocaleString('id-ID'):''}"/></div>
          <div class="field"><label>Nama Vendor</label><input class="input" name="nama_vendor" value="${escapeHtml(r.nama_vendor||'')}"/></div>
          <div class="field"><label>PIC GA${me?.role === 'pic' ? ' <span class="hint" style="color:var(--text-mut)">(read-only)</span>' : ''}</label>
            <select class="select" name="pic_user_id" id="ed-pic"${me?.role === 'pic' ? ' disabled' : ''}>
              <option value="">— Belum ditugaskan —</option>
              ${picUsers.map(u => `<option value="${u.id}" ${u.id===r.pic_user_id?'selected':''}>${escapeHtml(u.full_name)} · ${escapeHtml(u.jabatan||u.role)}</option>`).join('')}
            </select>
            <span class="hint">${me?.role === 'pic'
              ? 'Hanya superadmin/admin yang dapat mengubah penugasan PIC.'
              : 'PIC akan menerima notifikasi otomatis ketika ditugaskan.'}</span>
          </div>
          <div class="field"><label>Estimasi Penyelesaian</label><input class="input" type="date" name="estimasi_penyelesaian" value="${r.estimasi_penyelesaian||''}"/></div>
          <div class="field"><label>Lokasi Kebutuhan</label>
            <select class="select" name="lokasi_kebutuhan">
              <option value="">(kosong)</option>
              ${lok.map(o=>`<option ${o.name===r.lokasi_kebutuhan?'selected':''}>${escapeHtml(o.name)}</option>`).join('')}
            </select></div>
          <div class="field"><label>Tujuan Kebutuhan</label>
            <select class="select" name="tujuan_kebutuhan">
              <option value="">(kosong)</option>
              ${tuj.map(o=>`<option ${o.name===r.tujuan_kebutuhan?'selected':''}>${escapeHtml(o.name)}</option>`).join('')}
            </select></div>
          <div class="field"><label>Divisi</label>
            <select class="select" name="divisi" id="ed-divisi">
              <option value="">(kosong)</option>
              ${divs.map(d => `<option value="${escapeHtml(d.id)}" ${d.name===r.divisi?'selected':''}>${escapeHtml(d.name)}</option>`).join('')}
            </select>
            <span class="hint">Pilih Divisi dulu, daftar Departemen akan otomatis menyesuaikan.</span>
          </div>
          <div class="field"><label>Departemen</label>
            <select class="select" name="departemen" id="ed-departemen">
              <option value="">(kosong)</option>
              ${deps.filter(d => d.divisi_id === initialDivisiId).map(d => `<option ${d.name===r.departemen?'selected':''}>${escapeHtml(d.name)}</option>`).join('')}
            </select>
            <span class="hint">Daftar tergantung pilihan Divisi di atas.</span>
          </div>
          <div class="field"><label>Mata Anggaran</label>
            <select class="select" name="mata_anggaran">
              <option value="">(kosong)</option>
              ${ma.map(m => `<option ${m.name===r.mata_anggaran?'selected':''}>${escapeHtml(m.name)}${m.kode?' — '+escapeHtml(m.kode):''}</option>`).join('')}
            </select>
            <span class="hint">Daftar Mata Anggaran dikelola di menu Master Data.</span>
          </div>
          <div class="field"><label>Sumber Anggaran</label>
            <select class="select" name="pakai_anggaran_ga" id="ed-anggaran-ga">
              <option value="true"  ${r.pakai_anggaran_ga!==false?'selected':''}>Menggunakan Anggaran GA</option>
              <option value="false" ${r.pakai_anggaran_ga===false?'selected':''}>Bukan Anggaran GA</option>
            </select>
            <span class="hint">Hanya yang <strong>Menggunakan Anggaran GA</strong> yang masuk ke modul Payment.</span>
          </div>
          <div class="field full"><label>Detail Kebutuhan</label>
            <textarea class="textarea" name="detail_kebutuhan">${escapeHtml(r.detail_kebutuhan||'')}</textarea></div>
        </div>

        <!-- Evidence upload section (shows reminder when status = Selesai) -->
        <div id="ed-evidence-block" style="margin-top:14px;padding:14px;border-radius:10px;background:var(--mrt-green-soft);border:1px solid #BBF7D0;display:none">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span class="material-symbols-rounded" style="color:var(--mrt-green)">verified</span>
            <strong style="color:var(--mrt-green)">Bukti Penyelesaian</strong>
            <span class="badge gray" style="font-size:11px;font-weight:600">Opsional</span>
          </div>
          <p class="muted text-sm" style="margin:0 0 10px">
            Upload bukti penyerahan untuk verifikasi & audit. Format: JPG, PNG, atau PDF. Maks 5 MB per file.
          </p>
          <div class="form-grid">
            <div class="field">
              <label>📷 Bukti Foto Kegiatan</label>
              ${r.bukti_foto_url
                ? `<div class="text-sm" style="margin:2px 0 4px"><a href="${escapeHtml(r.bukti_foto_url)}" target="_blank" style="color:var(--mrt-green);font-weight:600"><span class="material-symbols-rounded" style="font-size:14px;vertical-align:-2px">check_circle</span> File terupload</a></div>`
                : ''}
              <input type="file" class="input" name="bukti_foto_file" accept=".jpg,.jpeg,.png,.pdf" />
              <span class="hint">Foto saat barang/jasa diserahkan ke pemohon.</span>
            </div>
            <div class="field">
              <label>📝 Bukti Tanda Terima</label>
              ${r.bukti_tt_url
                ? `<div class="text-sm" style="margin:2px 0 4px"><a href="${escapeHtml(r.bukti_tt_url)}" target="_blank" style="color:var(--mrt-green);font-weight:600"><span class="material-symbols-rounded" style="font-size:14px;vertical-align:-2px">check_circle</span> File terupload</a></div>`
                : ''}
              <input type="file" class="input" name="bukti_tt_file" accept=".jpg,.jpeg,.png,.pdf" />
              <span class="hint">Scan/foto dokumen tanda terima yang sudah ditandatangani.</span>
            </div>
          </div>
        </div>

        ${isSuperadmin && r.completed_at ? `
        <!-- Superadmin-only: completed_at override -->
        <div style="margin-top:14px;padding:14px;border-radius:10px;background:#FEF3C7;border:1px solid #FCD34D">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span class="material-symbols-rounded" style="color:#92400E">history_edu</span>
            <strong style="color:#92400E">Override Tanggal Selesai (Superadmin)</strong>
          </div>
          <p class="muted text-sm" style="margin:0 0 10px">
            Gunakan ini hanya bila tanggal sistem berbeda dari aktual (mis. status di-update terlambat).
            Ini akan memengaruhi perhitungan SLA tiket ini.
          </p>
          <div class="form-grid">
            <div class="field">
              <label>Saat ini tercatat</label>
              <input class="input" disabled value="${fmtDateTime(r.completed_at)}"/>
              ${r.completed_at_edited_by ? `<span class="hint">Pernah diedit oleh superadmin pada ${fmtDateTime(r.completed_at_edited_at)}</span>` : ''}
            </div>
            <div class="field">
              <label>Tanggal/Jam Aktual Selesai</label>
              <input class="input" type="datetime-local" name="completed_at_override" id="ed-completed" value="${completedLocal}"/>
            </div>
            <div class="field full"><label>Alasan Perubahan <span class="hint" style="color:var(--danger)">(wajib bila tanggal diubah)</span></label>
              <textarea class="textarea" name="completed_at_reason" id="ed-completed-reason" placeholder="Mis. status di-update terlambat karena PIC libur Jumat–Senin"></textarea>
            </div>
          </div>
        </div>` : ''}
      </form>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="ed-save"><span class="material-symbols-rounded">save</span>Simpan</button>
    </div>
  `, 'lg');

  // Rupiah formatter
  const angg = $('#ed-anggaran');
  angg.addEventListener('input', e => {
    const d = e.target.value.replace(/\D/g,'');
    e.target.value = d ? 'Rp '+Number(d).toLocaleString('id-ID') : '';
  });

  // Toggle evidence block visibility based on status
  const statusSel = $('#ed-status');
  const evidenceBlock = $('#ed-evidence-block');
  const toggleEvidence = () => {
    evidenceBlock.style.display = (statusSel.value === 'Selesai') ? 'block' : 'none';
  };
  statusSel.addEventListener('change', toggleEvidence);
  toggleEvidence();

  // Cascading dropdown: Divisi → Departemen
  const divisiSel = $('#ed-divisi');
  const departSel = $('#ed-departemen');
  divisiSel?.addEventListener('change', () => {
    const divId = divisiSel.value;
    const opts = deps.filter(d => d.divisi_id === divId);
    departSel.innerHTML = '<option value="">(kosong)</option>' +
      opts.map(d => `<option>${escapeHtml(d.name)}</option>`).join('');
  });

  $('#ed-save').addEventListener('click', async () => {
    const fd = new FormData($('#edit-form'));
    if(!fd.get('keterangan')){ toast('Keterangan wajib diisi','warn'); return; }
    const adjusted = (fd.get('total_anggaran')||'').toString().replace(/\D/g,'');
    // v1.7: PIC role cannot modify the assigned PIC — fall back to the original value
    const isPicRole = me?.role === 'pic';
    const pic_user_id = isPicRole ? (r.pic_user_id || null) : (fd.get('pic_user_id') || null);
    const picUser = picUsers.find(u => u.id === pic_user_id);
    const newStatus = fd.get('status');

    // Resolve divisi name from selected id (form holds the divisi UUID)
    const divisiId = fd.get('divisi') || '';
    const divObj = divs.find(d => d.id === divisiId);

    const patch = {
      kode_smartoffice: fd.get('kode_smartoffice') || null,
      status: newStatus,
      keterangan: fd.get('keterangan'),
      total_anggaran: adjusted ? Number(adjusted) : 0,
      nama_vendor: fd.get('nama_vendor') || null,
      pic_user_id: pic_user_id,
      nama_pic_ga: picUser ? picUser.full_name : (isPicRole ? r.nama_pic_ga : null),
      estimasi_penyelesaian: fd.get('estimasi_penyelesaian') || null,
      lokasi_kebutuhan: fd.get('lokasi_kebutuhan') || null,
      tujuan_kebutuhan: fd.get('tujuan_kebutuhan') || null,
      divisi:        divObj ? divObj.name : null,
      departemen:    fd.get('departemen') || null,
      mata_anggaran: fd.get('mata_anggaran') || null,
      detail_kebutuhan: fd.get('detail_kebutuhan') || null,
      pakai_anggaran_ga: fd.get('pakai_anggaran_ga') !== 'false'
    };

    // Friendly reminder if user is closing the ticket without evidence (status = Selesai)
    const fotoFile = $('input[name="bukti_foto_file"]')?.files?.[0];
    const ttFile   = $('input[name="bukti_tt_file"]')?.files?.[0];
    if(newStatus === 'Selesai' && !fotoFile && !ttFile && !r.bukti_foto_url && !r.bukti_tt_url){
      const ok = confirm('Anda menyelesaikan tiket tanpa upload bukti (foto atau tanda terima).\n\n'
        + 'Walaupun opsional, bukti sangat membantu audit. Lanjutkan tanpa bukti?');
      if(!ok) return;
    }

    // ===== v1.7: DP Approval workflow =====
    // For Direct Purchase tickets transitioning from "Mencari Penyedia" → "Sedang Disiapkan",
    // approval from Kepala Departemen is required BEFORE the status can be changed.
    // Logic:
    //   - If approval already exists & is "approved" → allow transition
    //   - If approval is "pending" → block, tell user to wait
    //   - If approval is "rejected" → block, prompt to start a new one
    //   - If no approval exists → block, prompt to create approval request (and don't save status change)
    const isDPCategory = r.kategori === 'Direct Purchase';
    const isPrepareTransition = r.status === 'Mencari Penyedia' && newStatus === 'Sedang Disiapkan';
    if(isDPCategory && isPrepareTransition){
      // Check existing approval
      let existing = null;
      try{ existing = await db.getPendingApproval(id, 'dp_prepare'); }catch{}
      // Look for any non-pending decisions too
      let lastDecision = null;
      if(SUPA_CONFIGURED){
        try{
          const { data } = await supa.from('approvals').select('*')
            .eq('request_id', id).eq('approval_type','dp_prepare')
            .order('requested_at',{ascending:false}).limit(1);
          lastDecision = data && data[0];
        }catch{}
      }else{
        lastDecision = demo.approvals.find(a => a.request_id === id && a.approval_type === 'dp_prepare') || null;
      }

      // If there's an approved approval, we're good
      const isApproved = lastDecision && lastDecision.status === 'approved';
      if(!isApproved){
        // Need to either create one or block
        if(existing && existing.status === 'pending'){
          toast('Approval Kepala Departemen masih menunggu — silakan tunggu keputusan.','warn',6000);
          return;
        }
        // Find Kepala Departemen for this request's departemen
        let kepalaUserId = null;
        let kepalaName = null;
        if(r.departemen){
          const dep = deps.find(d => d.name === r.departemen);
          if(dep && dep.kepala_departemen_user_id){
            kepalaUserId = dep.kepala_departemen_user_id;
            const u = picUsers.find(x => x.id === kepalaUserId);
            kepalaName = u ? u.full_name : null;
          }
        }
        if(!kepalaUserId){
          toast('Departemen tiket ini belum memiliki Kepala Departemen. Hubungi superadmin/admin untuk menugaskan.','error',7000);
          return;
        }
        const ok = confirm(
          `Tiket Direct Purchase memerlukan persetujuan Kepala Departemen sebelum dapat lanjut ke "Sedang Disiapkan".\n\n` +
          `Kepala Departemen: ${kepalaName}\n\n` +
          `Klik OK untuk mengirim permintaan persetujuan. Status tetap "Mencari Penyedia" sampai disetujui.`
        );
        if(!ok) return;
        try{
          await db.createApproval({
            request_id: id,
            approval_type: 'dp_prepare',
            approver_user_id: kepalaUserId,
            meta: { from_status:r.status, to_status:newStatus, kode_permintaan:r.kode_permintaan }
          });
          db.logActivity({
            action:'approval.request',
            target_type:'request', target_id:id,
            detail:`Minta persetujuan ${r.kode_permintaan} (DP) → Kepala Departemen ${kepalaName}`,
            meta:{ approver_user_id:kepalaUserId, departemen:r.departemen }
          });
          closeModal();
          toast('Permintaan persetujuan dikirim ke '+kepalaName,'success',5000);
          refreshApprovalBadge(session.get());
        }catch(err){
          toast('Gagal mengirim permintaan persetujuan: '+(err.message||''),'error');
        }
        return;   // Do NOT proceed with status change
      }
      // else: approved → fall through, allow status change
    }
    // ===== /v1.7 DP Approval =====

    // Disable save button to prevent double-submit during upload
    const btn = $('#ed-save');
    btn.disabled = true; btn.innerHTML = '<span class="material-symbols-rounded">hourglass_top</span>Menyimpan...';

    try{
      // Upload evidence files first (if any)
      if(fotoFile){
        try{
          const { url } = await db.uploadEvidence(id, fotoFile, 'foto');
          patch.bukti_foto_url = url;
        }catch(e){ toast('Gagal upload bukti foto: '+(e.message||''),'error'); btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan'; return; }
      }
      if(ttFile){
        try{
          const { url } = await db.uploadEvidence(id, ttFile, 'tt');
          patch.bukti_tt_url = url;
        }catch(e){ toast('Gagal upload bukti tanda terima: '+(e.message||''),'error'); btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan'; return; }
      }

      const changes = [];
      if(r.status !== patch.status) changes.push(`status: ${r.status} → ${patch.status}`);
      if((r.nama_pic_ga||'') !== (patch.nama_pic_ga||'')) changes.push(`PIC: ${r.nama_pic_ga||'—'} → ${patch.nama_pic_ga||'—'}`);
      if(patch.bukti_foto_url && patch.bukti_foto_url !== r.bukti_foto_url) changes.push('bukti foto diupload');
      if(patch.bukti_tt_url && patch.bukti_tt_url !== r.bukti_tt_url) changes.push('bukti tanda terima diupload');

      await db.updateRequest(id, patch);
      db.logActivity({
        action: r.status !== patch.status ? 'request.status_change' : 'request.update',
        target_type:'request', target_id:id,
        detail: `${r.kode_permintaan}: ${changes.join(' · ') || 'detail diperbarui'}`,
        meta: { from_status:r.status, to_status:patch.status }
      });

      // Handle completed_at override (superadmin only)
      if(isSuperadmin && fd.has('completed_at_override')){
        const newCompleted = fd.get('completed_at_override');
        const newIso = newCompleted ? new Date(newCompleted).toISOString() : null;
        const prevIso = r.completed_at;
        // only act if the value actually changed
        if(newIso && newIso !== prevIso){
          const reason = (fd.get('completed_at_reason') || '').trim();
          if(!reason){
            toast('Alasan perubahan tanggal selesai wajib diisi','warn');
            btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan';
            return;
          }
          await db.overrideCompletedAt(id, newIso, reason);
          db.logActivity({
            action:'request.completed_at_override',
            target_type:'request', target_id:id,
            detail:`${r.kode_permintaan}: tanggal selesai ${fmtDateTime(prevIso)} → ${fmtDateTime(newIso)} · alasan: ${reason}`,
            meta:{ from:prevIso, to:newIso, reason }
          });
        }
      }

      _adminReqsCache = await db.listRequests();
      const host = $('#req-table-host'); if(host) renderRequestsTable(host, _adminReqsCache, {compact:false});
      const dh = $('#ads-table-host'); if(dh) renderRequestsTable(dh, _adminReqsCache, {compact:true});
      closeModal();
      toast('Permintaan diperbarui','success');
    }catch(err){
      console.error(err); toast('Gagal menyimpan: '+(err.message||''),'error');
      btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan';
    }
  });
}

/* ----------- ADMIN: RATINGS ----------- */
let _ratingsState = { page:1, pageSize:10, sort:'created_at', dir:'desc', search:'' };

async function viewAdminRatings(c){
  c.innerHTML = `
    <div class="card">
      <div class="card-head">
        <h3>Daftar Penilaian</h3>
        <button class="btn btn-ghost btn-sm" id="csv-rate"><span class="material-symbols-rounded" style="font-size:18px">download</span>Download CSV</button>
      </div>
      <div class="card-body">
        <div class="toolbar">
          <div class="search"><span class="material-symbols-rounded">search</span>
            <input type="text" class="input" id="rate-search" placeholder="Cari kode atau pemesan..." />
          </div>
        </div>
        <div id="rate-table-host"></div>
      </div>
    </div>
  `;
  const [reqs, ratings] = await Promise.all([db.listRequests(), db.listRatings()]);
  // Build row set = ALL completed requests, with rating status
  const completed = reqs.filter(r=>r.status==='Selesai');
  const ratingByReq = new Map(ratings.map(rt=>[rt.request_id, rt]));
  const rows = completed.map(r => {
    const rt = ratingByReq.get(r.id);
    return {
      id: r.id,
      kode: r.kode_permintaan,
      kategori: r.kategori,
      pemesan: r.nama_pemesan,
      vendor: r.nama_vendor || '',
      pic_ga: r.nama_pic_ga || '',
      status_nilai: rt ? 'Sudah Dinilai' : 'Belum Dinilai',
      rating: rt ? rt.rating : null,
      kritik: rt ? rt.kritik_saran : '',
      created_at: rt ? rt.created_at : r.created_at,
      _request: r,
      _rating: rt
    };
  });

  function render(){
    const host = $('#rate-table-host');
    const s = _ratingsState;
    let view = rows.slice();
    if(s.search){
      view = view.filter(x =>
        (x.kode||'').toLowerCase().includes(s.search) ||
        (x.pemesan||'').toLowerCase().includes(s.search)
      );
    }
    view.sort((a,b)=>{
      let av=a[s.sort], bv=b[s.sort];
      if(av==null) av=''; if(bv==null) bv='';
      if(typeof av==='string') av=av.toLowerCase();
      if(typeof bv==='string') bv=bv.toLowerCase();
      return av<bv?(s.dir==='asc'?-1:1):av>bv?(s.dir==='asc'?1:-1):0;
    });
    const total = view.length;
    const totalPages = Math.max(1, Math.ceil(total / s.pageSize));
    if(s.page>totalPages) s.page=totalPages;
    const start = (s.page-1)*s.pageSize;
    const slice = view.slice(start, start+s.pageSize);

/* ----------- ADMIN: PAYMENT (v1.8) -----------
   Every request automatically appears here. Payment-specific fields are stored
   in the `payments` table (1:1 with requests) and can be edited by ANY user.
   Fields tagged "sinkron" default to the value from the request detail but
   remain overridable. */
let _payMerged = [];
let _fundsCache = [];
let _payState = { page:1, pageSize:15, search:'', filterStatus:'', filterCategory:'', sort:'created_at', dir:'desc' };

function fundName(id){ const f = _fundsCache.find(x => x.id === id); return f ? f.name : ''; }

function payCellHtml(m, f){
  const v = m[f.key];
  if(f.key === 'ga_payment_status'){
    const sv = v || 'Not Complete Yet';
    return `<span class="badge ${GA_PAYMENT_STATUS_CLASS[sv]||'pay-belum'}">${escapeHtml(sv)}</span>`;
  }
  if(f.type === 'fundselect'){ const n = fundName(v); return n ? escapeHtml(n) : '—'; }
  if(f.type === 'date')  return v ? fmtDate(v) : '—';
  if(f.type === 'money') return (v!=null && v!=='' && Number(v)>0) ? fmtRupiah(v) : '—';
  if(f.type === 'number')return (v!=null && v!=='') ? escapeHtml(v) : '—';
  const s = String(v==null ? '' : v);
  if(!s) return '—';
  if(f.type === 'textarea' || s.length > 40){
    const short = s.length > 40 ? s.slice(0,40)+'…' : s;
    return `<span title="${escapeHtml(s)}">${escapeHtml(short)}</span>`;
  }
  return escapeHtml(s);
}

function filterPayments(){
  const s = _payState;
  let rows = _payMerged.slice();
  if(s.search){
    rows = rows.filter(m =>
      (m._req.kode_permintaan||'').toLowerCase().includes(s.search) ||
      (m._req.nama_pemesan||'').toLowerCase().includes(s.search) ||
      (m.vendor_name||'').toLowerCase().includes(s.search) ||
      (m._req.kode_smartoffice||'').toLowerCase().includes(s.search)
    );
  }
  if(s.filterStatus)   rows = rows.filter(m => (m.ga_payment_status||'Not Complete Yet') === s.filterStatus);
  if(s.filterCategory) rows = rows.filter(m => m._req.kategori === s.filterCategory);

  // Sorting: 'created_at' (default) or any payment column key, plus 'kode'/'pemesan'
  const dir = s.dir === 'asc' ? 1 : -1;
  const getVal = (m, key) => {
    if(key === 'created_at') return new Date(m._req.created_at).getTime();
    if(key === 'kode') return (m._req.kode_permintaan||'').toLowerCase();
    if(key === 'pemesan') return (m._req.nama_pemesan||'').toLowerCase();
    if(key === 'fund_id') return fundName(m.fund_id).toLowerCase();
    const f = PAYMENT_FIELDS.find(x => x.key === key);
    let v = m[key];
    if(f && (f.type==='money'||f.type==='number')) return Number(v)||0;
    if(f && f.type==='date') return v ? new Date(v).getTime() : 0;
    return String(v==null?'':v).toLowerCase();
  };
  rows.sort((a,b) => {
    const va = getVal(a, s.sort), vb = getVal(b, s.sort);
    if(va < vb) return -1*dir; if(va > vb) return 1*dir; return 0;
  });
  return rows;
}

function renderPaymentsTable(host){
  const s = _payState;

  const start = (s.page-1)*s.pageSize;
  const pageRows = rows.slice(start, start + s.pageSize);

  const cols = PAYMENT_FIELDS; // ordered exactly as requested
  const arrow = (key) => s.sort===key ? (s.dir==='asc'?' ▲':' ▼') : '';
  const headCells = cols.map(f => `<th class="pay-sort" data-sort="${f.key}" style="cursor:pointer${(f.type==='money'||f.type==='number')?';text-align:right':''}">${escapeHtml(f.label)}${f.synced||f.syncedDate||f.syncedPrice?' <span style="color:var(--mrt-green);font-size:9px">●</span>':''}${arrow(f.key)}</th>`).join('');

  host.innerHTML = `
    <div class="table-wrap">
      <table class="t pay-table">
        <thead>
          <tr>
            <th class="sticky-col pay-sort" data-sort="kode" style="min-width:170px;cursor:pointer">Permintaan${arrow('kode')}</th>
            <th class="pay-sort" data-sort="pemesan" style="cursor:pointer">Pemesan${arrow('pemesan')}</th>
            ${headCells}
          </tr>
        </thead>
        <tbody>
          ${pageRows.length ? pageRows.map(m => `
            <tr>
              <td class="sticky-col">
                <div style="display:flex;align-items:center;gap:6px">
                  <button class="btn-icon" data-edit="${m.request_id}" title="Edit pembayaran" style="color:var(--mrt-blue)"><span class="material-symbols-rounded" style="font-size:18px">edit</span></button>
                  <div>
                    <span class="code-pill">${escapeHtml(m._req.kode_permintaan)}</span>
                    <div style="margin-top:2px"><span class="tag">${escapeHtml(m._req.kategori_kode||'')}</span></div>
                  </div>
                </div>
              </td>
              <td>${escapeHtml(m._req.nama_pemesan||'—')}</td>
              ${cols.map(f => `<td${(f.type==='money'||f.type==='number')?' class="num"':''}>${payCellHtml(m,f)}</td>`).join('')}
            </tr>
          `).join('') : `<tr><td colspan="${cols.length+2}" class="empty-row">Belum ada permintaan</td></tr>`}
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <div>Menampilkan <strong>${pageRows.length}</strong> dari <strong>${total}</strong> permintaan</div>
      <div class="pages">
        <button class="page-btn" id="pay-prev" ${s.page===1?'disabled':''}><span class="material-symbols-rounded" style="font-size:18px">chevron_left</span></button>
        <span style="padding:0 10px;font-size:13px">Hal. ${s.page} / ${totalPages}</span>
        <button class="page-btn" id="pay-next" ${s.page===totalPages?'disabled':''}><span class="material-symbols-rounded" style="font-size:18px">chevron_right</span></button>
      </div>
    </div>
  `;

  $('#pay-prev', host)?.addEventListener('click', () => { if(s.page>1){ s.page--; renderPaymentsTable(host); } });
  $('#pay-next', host)?.addEventListener('click', () => { if(s.page<totalPages){ s.page++; renderPaymentsTable(host); } });
  $$('button[data-edit]', host).forEach(b => b.addEventListener('click', () => openPaymentEdit(b.dataset.edit)));
  $$('th.pay-sort', host).forEach(th => th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if(s.sort === col) s.dir = s.dir === 'asc' ? 'desc' : 'asc';
    else { s.sort = col; s.dir = 'asc'; }
    renderPaymentsTable(host);
  }));
}

function openPaymentEdit(requestId){
  const m = _payMerged.find(x => x.request_id === requestId);
  if(!m){ toast('Data tidak ditemukan','error'); return; }
  const req = m._req;
  const me = session.get();
  // Only Admin Payment (and Superadmin) may edit the GA payment workflow status.
  const canGA = !!me && (me.role === 'admin_payment' || me.role === 'superadmin');

  const fieldHtml = (f) => {
    const syncedTag = (f.synced||f.syncedDate||f.syncedPrice||f.syncedFund||f.syncedActivity) ? '<span class="synced-tag">sinkron</span>' : '';
    const lockGA = f.adminPaymentOnly && !canGA;
    const disAttr = lockGA ? ' disabled' : '';
    const lockHint = lockGA ? ' <span class="hint" style="color:var(--text-mut)">(hanya Admin Payment)</span>' : '';
    let val = m[f.key];
    if(f.type === 'date' && val) val = String(val).slice(0,10);
    const full = f.type === 'textarea' ? ' full' : '';
    let control;
    if(f.type === 'select'){
      const opts = ['<option value=""></option>'].concat((f.options||[]).map(o => `<option ${String(val)===o?'selected':''}>${escapeHtml(o)}</option>`)).join('');
      control = `<select class="select" data-pf="${f.key}"${disAttr}>${opts}</select>`;
    } else if(f.type === 'fundselect'){
      const opts = ['<option value="">— pilih sumber anggaran —</option>'].concat(
        _fundsCache.filter(x=>x.active!==false).map(o => `<option value="${escapeHtml(o.id)}" ${String(val)===String(o.id)?'selected':''}>${escapeHtml(o.name)}</option>`)).join('');
      control = `<select class="select" data-pf="${f.key}"${disAttr}>${opts}</select>`;
    } else if(f.type === 'textarea'){
      control = `<textarea class="textarea" data-pf="${f.key}" style="min-height:70px"${disAttr}>${escapeHtml(val||'')}</textarea>`;
    } else if(f.type === 'date'){
      control = `<input type="date" class="input" data-pf="${f.key}" value="${escapeHtml(val||'')}"${disAttr} />`;
    } else if(f.type === 'money'){
      const disp = (val!=null && val!=='' && Number(val)>0) ? 'Rp ' + Number(val).toLocaleString('id-ID') : '';
      control = `<input type="text" class="input pf-money" inputmode="numeric" data-pf="${f.key}" value="${escapeHtml(disp)}" placeholder="Rp 0"${disAttr} />`;
    } else if(f.type === 'number'){
      control = `<input type="number" class="input" data-pf="${f.key}" value="${escapeHtml(val??'')}" min="0" step="any"${disAttr} />`;
    } else {
      control = `<input type="text" class="input" data-pf="${f.key}" value="${escapeHtml(val||'')}"${disAttr} />`;
    }
    return `<div class="field${full}"><label>${escapeHtml(f.label)}${syncedTag}${lockHint}</label>${control}</div>`;
  };

  const group = (keys) => PAYMENT_FIELDS.filter(f => keys.includes(f.key)).map(fieldHtml).join('');

  openModal(`
    <div class="modal-head">
      <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">payments</span> Update Payment</h3>
      <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:14px;padding:10px 12px;background:var(--mrt-blue-soft);border-radius:10px;font-size:13px">
        <strong>${escapeHtml(req.kode_permintaan)}</strong> · ${escapeHtml(req.kategori)} · Pemesan: ${escapeHtml(req.nama_pemesan)}
        <div class="muted text-sm" style="margin-top:2px">Field bertanda <span class="synced-tag">sinkron</span> terisi otomatis dari Detail Permintaan dan tetap bisa diubah.</div>
      </div>
      <div class="pay-form-grid">
        <div class="pay-section-title">Identitas & Organisasi</div>
        ${group(['activity_name','fund','fund_id','vendor_name','pic_user_name','fund_owner','tanggal_permintaan','tanggal_kebutuhan','location','sub_location','directorate','division','department','category','sub_category','administrator','user_sap'])}
        <div class="pay-section-title">Dokumen Pengadaan</div>
        ${group(['proforma_number','proforma_date','pr_number','pr_date','po_number','po_date','gr_number','gr_date','invoice_number','invoice_date','description_fund','submit_date'])}
        <div class="pay-section-title">Pembayaran</div>
        ${group(['cost_type','cost_purpose','jenis_pembayaran','quantity','price','grand_total','ga_payment_status'])}
        ${group(['note'])}
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="pay-save"><span class="material-symbols-rounded">save</span>Simpan</button>
    </div>
  `, 'xl');

  // Rupiah formatter for money inputs
  $$('.pf-money').forEach(inp => inp.addEventListener('input', e => {
    const digits = e.target.value.replace(/\D/g,'');
    e.target.value = digits ? 'Rp ' + Number(digits).toLocaleString('id-ID') : '';
    maybeSuggestGrandTotal();
  }));
  // Auto-suggest Grand Total = Quantity × Price when GT is still empty
  function readMoney(key){ const el=$(`[data-pf="${key}"]`); if(!el) return 0; return Number((el.value||'').replace(/\D/g,''))||0; }
  function maybeSuggestGrandTotal(){
    const gtEl = $('[data-pf="grand_total"]');
    if(!gtEl || gtEl.dataset.touched === '1') return;
    const qty = Number(($('[data-pf="quantity"]')?.value)||0) || 0;
    const price = readMoney('price');
    if(qty > 0 && price > 0){ gtEl.value = 'Rp ' + (qty*price).toLocaleString('id-ID'); }
  }
  $('[data-pf="quantity"]')?.addEventListener('input', maybeSuggestGrandTotal);
  $('[data-pf="grand_total"]')?.addEventListener('input', e => { e.target.dataset.touched = '1'; });

  $('#pay-save').addEventListener('click', async () => {
    const btn = $('#pay-save'); btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-rounded">hourglass_top</span>Menyimpan…';
    try{
      const patch = {};
      PAYMENT_FIELDS.forEach(f => {
        if(f.adminPaymentOnly && !canGA) return; // do not let non-Admin-Payment touch GA status
        const el = $(`[data-pf="${f.key}"]`);
        if(!el) return;
        let v = el.value;
        if(f.type === 'money')  v = v ? Number(v.replace(/\D/g,'')) : 0;
        else if(f.type === 'number') v = v==='' ? null : Number(v);
        else v = (v||'').trim() || null;
        patch[f.key] = v;
      });
      if(!patch.status) patch.status = 'Belum Diproses';
      if(canGA && !patch.ga_payment_status) patch.ga_payment_status = 'Not Complete Yet';
      await db.upsertPayment(requestId, patch);
      db.logActivity({ action:'payment.update', target_type:'payment', target_id:requestId,
                       detail:`Update payment ${req.kode_permintaan} (status: ${patch.status})` });
      // update local cache (preserve fields the current user could not edit)
      const idx = _payMerged.findIndex(x => x.request_id === requestId);
      if(idx >= 0){
        const base = {}; PAYMENT_FIELDS.forEach(f => { base[f.key] = m[f.key]; });
        _payMerged[idx] = mergePayment(req, { request_id:requestId, ...base, ...patch });
      }
      closeModal();
      const host = $('#pay-table-host'); if(host) renderPaymentsTable(host);
      toast('Data pembayaran tersimpan','success');
    }catch(err){
      console.error(err);
      toast('Gagal menyimpan: '+(err.message||''),'error');
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan';
    }
  });
}
