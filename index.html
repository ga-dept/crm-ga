              ${tuj.map(o=>`<option ${o.name===r.tujuan_kebutuhan?'selected':''}>${escapeHtml(o.name)}</option>`).join('')}
            </select></div>
          <div class="field"><label>Divisi</label>
            <select class="select" name="divisi" id="ed-divisi">
              <option value="">(kosong)</option>
              ${divs.map(d => `<option value="${escapeHtml(d.id)}" ${d.name===r.divisi?'selected':''}>${escapeHtml(d.name)}</option>`).join('')}
            </select>
            <span class="hint">Pilih Divisi dulu, daftar Departemen akan otomatis menyesuaikan.</span>
          </div>
          <div class="field"><label>Departemen</label>
            <select class="select" name="departemen" id="ed-departemen">
              <option value="">(kosong)</option>
              ${deps.filter(d => d.divisi_id === initialDivisiId).map(d => `<option ${d.name===r.departemen?'selected':''}>${escapeHtml(d.name)}</option>`).join('')}
            </select>
            <span class="hint">Daftar tergantung pilihan Divisi di atas.</span>
          </div>
          <div class="field"><label>Mata Anggaran</label>
            <select class="select" name="mata_anggaran">
              <option value="">(kosong)</option>
              ${ma.map(m => `<option value="${escapeHtml(m.name)}" ${m.name===r.mata_anggaran?'selected':''}>${m.kode?escapeHtml(m.kode)+' - ':''}${escapeHtml(m.name)}</option>`).join('')}
            </select>
            <span class="hint">Daftar Mata Anggaran dikelola di menu Master Data.</span>
          </div>
          <div class="field"><label>Sumber Anggaran</label>
            <select class="select" name="pakai_anggaran_ga" id="ed-anggaran-ga">
              <option value="true"  ${r.pakai_anggaran_ga!==false?'selected':''}>Menggunakan Anggaran GA</option>
              <option value="false" ${r.pakai_anggaran_ga===false?'selected':''}>Bukan Anggaran GA</option>
            </select>
            <span class="hint">Hanya yang <strong>Menggunakan Anggaran GA</strong> yang masuk ke modul Payment.</span>
          </div>
          <div class="field full"><label>Detail Kebutuhan</label>
            <textarea class="textarea" name="detail_kebutuhan">${escapeHtml(r.detail_kebutuhan||'')}</textarea></div>
        </div>

        <!-- Evidence upload section (shows reminder when status = Selesai) -->
        <div id="ed-evidence-block" style="margin-top:14px;padding:14px;border-radius:10px;background:var(--mrt-green-soft);border:1px solid #BBF7D0;display:none">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span class="material-symbols-rounded" style="color:var(--mrt-green)">verified</span>
            <strong style="color:var(--mrt-green)">Bukti Penyelesaian</strong>
            <span class="badge gray" style="font-size:11px;font-weight:600">Opsional</span>
          </div>
          <p class="muted text-sm" style="margin:0 0 10px">
            Upload bukti penyerahan untuk verifikasi & audit. Format: JPG, PNG, atau PDF. Maks 5 MB per file.
          </p>
          <div class="form-grid">
            <div class="field">
              <label>📷 Bukti Foto Kegiatan</label>
              ${r.bukti_foto_url
                ? `<div class="text-sm" style="margin:2px 0 4px"><a href="${escapeHtml(r.bukti_foto_url)}" target="_blank" style="color:var(--mrt-green);font-weight:600"><span class="material-symbols-rounded" style="font-size:14px;vertical-align:-2px">check_circle</span> File terupload</a></div>`
                : ''}
              <input type="file" class="input" name="bukti_foto_file" accept=".jpg,.jpeg,.png,.pdf" />
              <span class="hint">Foto saat barang/jasa diserahkan ke pemohon.</span>
            </div>
            <div class="field">
              <label>📝 Bukti Tanda Terima</label>
              ${r.bukti_tt_url
                ? `<div class="text-sm" style="margin:2px 0 4px"><a href="${escapeHtml(r.bukti_tt_url)}" target="_blank" style="color:var(--mrt-green);font-weight:600"><span class="material-symbols-rounded" style="font-size:14px;vertical-align:-2px">check_circle</span> File terupload</a></div>`
                : ''}
              <input type="file" class="input" name="bukti_tt_file" accept=".jpg,.jpeg,.png,.pdf" />
              <span class="hint">Scan/foto dokumen tanda terima yang sudah ditandatangani.</span>
            </div>
          </div>
        </div>

        ${isSuperadmin && r.completed_at ? `
        <!-- Superadmin-only: completed_at override -->
        <div style="margin-top:14px;padding:14px;border-radius:10px;background:#FEF3C7;border:1px solid #FCD34D">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span class="material-symbols-rounded" style="color:#92400E">history_edu</span>
            <strong style="color:#92400E">Override Tanggal Selesai (Superadmin)</strong>
          </div>
          <p class="muted text-sm" style="margin:0 0 10px">
            Gunakan ini hanya bila tanggal sistem berbeda dari aktual (mis. status di-update terlambat).
            Ini akan memengaruhi perhitungan SLA tiket ini.
          </p>
          <div class="form-grid">
            <div class="field">
              <label>Saat ini tercatat</label>
              <input class="input" disabled value="${fmtDateTime(r.completed_at)}"/>
              ${r.completed_at_edited_by ? `<span class="hint">Pernah diedit oleh superadmin pada ${fmtDateTime(r.completed_at_edited_at)}</span>` : ''}
            </div>
            <div class="field">
              <label>Tanggal/Jam Aktual Selesai</label>
              <input class="input" type="datetime-local" name="completed_at_override" id="ed-completed" value="${completedLocal}"/>
            </div>
            <div class="field full"><label>Alasan Perubahan <span class="hint" style="color:var(--danger)">(wajib bila tanggal diubah)</span></label>
              <textarea class="textarea" name="completed_at_reason" id="ed-completed-reason" placeholder="Mis. status di-update terlambat karena PIC libur Jumat–Senin"></textarea>
            </div>
          </div>
        </div>` : ''}
      </form>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="ed-save"><span class="material-symbols-rounded">save</span>Simpan</button>
    </div>
  `, 'lg');

  // Rupiah formatter
  const angg = $('#ed-anggaran');
  angg.addEventListener('input', e => {
    const d = e.target.value.replace(/\D/g,'');
    e.target.value = d ? 'Rp '+Number(d).toLocaleString('id-ID') : '';
  });

  // Toggle evidence block visibility based on status
  const statusSel = $('#ed-status');
  const evidenceBlock = $('#ed-evidence-block');
  const toggleEvidence = () => {
    evidenceBlock.style.display = (statusSel.value === 'Selesai') ? 'block' : 'none';
  };
  statusSel.addEventListener('change', toggleEvidence);
  toggleEvidence();

  // Cascading dropdown: Divisi → Departemen
  const divisiSel = $('#ed-divisi');
  const departSel = $('#ed-departemen');
  divisiSel?.addEventListener('change', () => {
    const divId = divisiSel.value;
    const opts = deps.filter(d => d.divisi_id === divId);
    departSel.innerHTML = '<option value="">(kosong)</option>' +
      opts.map(d => `<option>${escapeHtml(d.name)}</option>`).join('');
  });

  $('#ed-save').addEventListener('click', async () => {
    const fd = new FormData($('#edit-form'));
    if(!fd.get('keterangan')){ toast('Keterangan wajib diisi','warn'); return; }
    const adjusted = (fd.get('total_anggaran')||'').toString().replace(/\D/g,'');
    // v1.7: PIC role cannot modify the assigned PIC — fall back to the original value
    const isPicRole = me?.role === 'pic';
    const pic_user_id = isPicRole ? (r.pic_user_id || null) : (fd.get('pic_user_id') || null);
    const picUser = picUsers.find(u => u.id === pic_user_id);
    const newStatus = fd.get('status');

    // Resolve divisi name from selected id (form holds the divisi UUID)
    const divisiId = fd.get('divisi') || '';
    const divObj = divs.find(d => d.id === divisiId);

    const patch = {
      kode_smartoffice: fd.get('kode_smartoffice') || null,
      status: newStatus,
      keterangan: fd.get('keterangan'),
      total_anggaran: adjusted ? Number(adjusted) : 0,
      nama_vendor: fd.get('nama_vendor') || null,
      pic_user_id: pic_user_id,
      nama_pic_ga: picUser ? picUser.full_name : (isPicRole ? r.nama_pic_ga : null),
      estimasi_penyelesaian: fd.get('estimasi_penyelesaian') || null,
      lokasi_kebutuhan: fd.get('lokasi_kebutuhan') || null,
      tujuan_kebutuhan: fd.get('tujuan_kebutuhan') || null,
      divisi:        divObj ? divObj.name : null,
      departemen:    fd.get('departemen') || null,
      mata_anggaran: fd.get('mata_anggaran') || null,
      detail_kebutuhan: fd.get('detail_kebutuhan') || null,
      pakai_anggaran_ga: fd.get('pakai_anggaran_ga') !== 'false'
    };

    // Friendly reminder if user is closing the ticket without evidence (status = Selesai)
    const fotoFile = $('input[name="bukti_foto_file"]')?.files?.[0];
    const ttFile   = $('input[name="bukti_tt_file"]')?.files?.[0];
    if(newStatus === 'Selesai' && !fotoFile && !ttFile && !r.bukti_foto_url && !r.bukti_tt_url){
      const ok = confirm('Anda menyelesaikan tiket tanpa upload bukti (foto atau tanda terima).\n\n'
        + 'Walaupun opsional, bukti sangat membantu audit. Lanjutkan tanpa bukti?');
      if(!ok) return;
    }

    // ===== v1.7: DP Approval workflow =====
    // For Direct Purchase tickets transitioning from "Mencari Penyedia" → "Sedang Disiapkan",
    // approval from Kepala Departemen is required BEFORE the status can be changed.
    // Logic:
    //   - If approval already exists & is "approved" → allow transition
    //   - If approval is "pending" → block, tell user to wait
    //   - If approval is "rejected" → block, prompt to start a new one
    //   - If no approval exists → block, prompt to create approval request (and don't save status change)
    const isDPCategory = r.kategori === 'Direct Purchase';
    const isPrepareTransition = r.status === 'Mencari Penyedia' && newStatus === 'Sedang Disiapkan';
    if(isDPCategory && isPrepareTransition){
      // Check existing approval
      let existing = null;
      try{ existing = await db.getPendingApproval(id, 'dp_prepare'); }catch{}
      // Look for any non-pending decisions too
      let lastDecision = null;
      if(SUPA_CONFIGURED){
        try{
          const { data } = await supa.from('approvals').select('*')
            .eq('request_id', id).eq('approval_type','dp_prepare')
            .order('requested_at',{ascending:false}).limit(1);
          lastDecision = data && data[0];
        }catch{}
      }else{
        lastDecision = demo.approvals.find(a => a.request_id === id && a.approval_type === 'dp_prepare') || null;
      }

      // If there's an approved approval, we're good
      const isApproved = lastDecision && lastDecision.status === 'approved';
      if(!isApproved){
        // Need to either create one or block
        if(existing && existing.status === 'pending'){
          toast('Approval Kepala Departemen masih menunggu — silakan tunggu keputusan.','warn',6000);
          return;
        }
        // Find Kepala Departemen for this request's departemen
        let kepalaUserId = null;
        let kepalaName = null;
        if(r.departemen){
          const dep = deps.find(d => d.name === r.departemen);
          if(dep && dep.kepala_departemen_user_id){
            kepalaUserId = dep.kepala_departemen_user_id;
            const u = picUsers.find(x => x.id === kepalaUserId);
            kepalaName = u ? u.full_name : null;
          }
        }
        if(!kepalaUserId){
          toast('Departemen tiket ini belum memiliki Kepala Departemen. Hubungi superadmin/admin untuk menugaskan.','error',7000);
          return;
        }
        const ok = confirm(
          `Tiket Direct Purchase memerlukan persetujuan Kepala Departemen sebelum dapat lanjut ke "Sedang Disiapkan".\n\n` +
          `Kepala Departemen: ${kepalaName}\n\n` +
          `Klik OK untuk mengirim permintaan persetujuan. Status tetap "Mencari Penyedia" sampai disetujui.`
        );
        if(!ok) return;
        try{
          await db.createApproval({
            request_id: id,
            approval_type: 'dp_prepare',
            approver_user_id: kepalaUserId,
            meta: { from_status:r.status, to_status:newStatus, kode_permintaan:r.kode_permintaan }
          });
          db.logActivity({
            action:'approval.request',
            target_type:'request', target_id:id,
            detail:`Minta persetujuan ${r.kode_permintaan} (DP) → Kepala Departemen ${kepalaName}`,
            meta:{ approver_user_id:kepalaUserId, departemen:r.departemen }
          });
          closeModal();
          toast('Permintaan persetujuan dikirim ke '+kepalaName,'success',5000);
          refreshApprovalBadge(session.get());
        }catch(err){
          toast('Gagal mengirim permintaan persetujuan: '+(err.message||''),'error');
        }
        return;   // Do NOT proceed with status change
      }
      // else: approved → fall through, allow status change
    }
    // ===== /v1.7 DP Approval =====

    // Disable save button to prevent double-submit during upload
    const btn = $('#ed-save');
    btn.disabled = true; btn.innerHTML = '<span class="material-symbols-rounded">hourglass_top</span>Menyimpan...';

    try{
      // Upload evidence files first (if any)
      if(fotoFile){
        try{
          const { url } = await db.uploadEvidence(id, fotoFile, 'foto');
          patch.bukti_foto_url = url;
        }catch(e){ toast('Gagal upload bukti foto: '+(e.message||''),'error'); btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan'; return; }
      }
      if(ttFile){
        try{
          const { url } = await db.uploadEvidence(id, ttFile, 'tt');
          patch.bukti_tt_url = url;
        }catch(e){ toast('Gagal upload bukti tanda terima: '+(e.message||''),'error'); btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan'; return; }
      }

      const changes = [];
      if(r.status !== patch.status) changes.push(`status: ${r.status} → ${patch.status}`);
      if((r.nama_pic_ga||'') !== (patch.nama_pic_ga||'')) changes.push(`PIC: ${r.nama_pic_ga||'—'} → ${patch.nama_pic_ga||'—'}`);
      if(patch.bukti_foto_url && patch.bukti_foto_url !== r.bukti_foto_url) changes.push('bukti foto diupload');
      if(patch.bukti_tt_url && patch.bukti_tt_url !== r.bukti_tt_url) changes.push('bukti tanda terima diupload');

      await db.updateRequest(id, patch);
      db.logActivity({
        action: r.status !== patch.status ? 'request.status_change' : 'request.update',
        target_type:'request', target_id:id,
        detail: `${r.kode_permintaan}: ${changes.join(' · ') || 'detail diperbarui'}`,
        meta: { from_status:r.status, to_status:patch.status }
      });

      // Handle completed_at override (superadmin only)
      if(isSuperadmin && fd.has('completed_at_override')){
        const newCompleted = fd.get('completed_at_override');
        const newIso = newCompleted ? new Date(newCompleted).toISOString() : null;
        const prevIso = r.completed_at;
        // only act if the value actually changed
        if(newIso && newIso !== prevIso){
          const reason = (fd.get('completed_at_reason') || '').trim();
          if(!reason){
            toast('Alasan perubahan tanggal selesai wajib diisi','warn');
            btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan';
            return;
          }
          await db.overrideCompletedAt(id, newIso, reason);
          db.logActivity({
            action:'request.completed_at_override',
            target_type:'request', target_id:id,
            detail:`${r.kode_permintaan}: tanggal selesai ${fmtDateTime(prevIso)} → ${fmtDateTime(newIso)} · alasan: ${reason}`,
            meta:{ from:prevIso, to:newIso, reason }
          });
        }
      }

      _adminReqsCache = await db.listRequests();
      const host = $('#req-table-host'); if(host) renderRequestsTable(host, _adminReqsCache, {compact:false});
      const dh = $('#ads-table-host'); if(dh) renderRequestsTable(dh, _adminReqsCache, {compact:true});
      closeModal();
      toast('Permintaan diperbarui','success');
    }catch(err){
      console.error(err); toast('Gagal menyimpan: '+(err.message||''),'error');
      btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan';
    }
  });
}

/* ----------- ADMIN: RATINGS ----------- */
let _ratingsState = { page:1, pageSize:10, sort:'created_at', dir:'desc', search:'' };

async function viewAdminRatings(c){
  c.innerHTML = `
    <div class="card">
      <div class="card-head">
        <h3>Daftar Penilaian</h3>
        <button class="btn btn-ghost btn-sm" id="csv-rate"><span class="material-symbols-rounded" style="font-size:18px">download</span>Download CSV</button>
      </div>
      <div class="card-body">
        <div class="toolbar">
          <div class="search"><span class="material-symbols-rounded">search</span>
            <input type="text" class="input" id="rate-search" placeholder="Cari kode atau pemesan..." />
          </div>
        </div>
        <div id="rate-table-host"></div>
      </div>
    </div>
  `;
  const [reqs, ratings] = await Promise.all([db.listRequests(), db.listRatings()]);
  // Build row set = ALL completed requests, with rating status
  const completed = reqs.filter(r=>r.status==='Selesai');
  const ratingByReq = new Map(ratings.map(rt=>[rt.request_id, rt]));
  const rows = completed.map(r => {
    const rt = ratingByReq.get(r.id);
    return {
      id: r.id,
      kode: r.kode_permintaan,
      kategori: r.kategori,
      pemesan: r.nama_pemesan,
      vendor: r.nama_vendor || '',
      pic_ga: r.nama_pic_ga || '',
      status_nilai: rt ? 'Sudah Dinilai' : 'Belum Dinilai',
      rating: rt ? rt.rating : null,
      kritik: rt ? rt.kritik_saran : '',
      created_at: rt ? rt.created_at : r.created_at,
      _request: r,
      _rating: rt
    };
  });

  function render(){
    const host = $('#rate-table-host');
    const s = _ratingsState;
    let view = rows.slice();
    if(s.search){
      view = view.filter(x =>
        (x.kode||'').toLowerCase().includes(s.search) ||
        (x.pemesan||'').toLowerCase().includes(s.search)
      );
    }
    view.sort((a,b)=>{
      let av=a[s.sort], bv=b[s.sort];
      if(av==null) av=''; if(bv==null) bv='';
      if(typeof av==='string') av=av.toLowerCase();
      if(typeof bv==='string') bv=bv.toLowerCase();
      return av<bv?(s.dir==='asc'?-1:1):av>bv?(s.dir==='asc'?1:-1):0;
    });
    const total = view.length;
    const totalPages = Math.max(1, Math.ceil(total / s.pageSize));
    if(s.page>totalPages) s.page=totalPages;
    const start = (s.page-1)*s.pageSize;
    const slice = view.slice(start, start+s.pageSize);

    const sortIcon = (col) => s.sort===col
      ? `<span class="material-symbols-rounded sort-ic">${s.dir==='asc'?'arrow_drop_up':'arrow_drop_down'}</span>`
      : '<span class="material-symbols-rounded sort-ic">unfold_more</span>';

    host.innerHTML = `
      <div class="table-wrap">
        <table class="t">
          <thead><tr>
            <th style="width:48px">#</th>
            <th class="sortable" data-col="kode">Kode${sortIcon('kode')}</th>
            <th class="sortable" data-col="kategori">Kategori${sortIcon('kategori')}</th>
            <th class="sortable" data-col="pemesan">Pemesan${sortIcon('pemesan')}</th>
            <th>Vendor</th>
            <th>PIC GA</th>
            <th class="sortable" data-col="rating">Rating${sortIcon('rating')}</th>
            <th class="sortable" data-col="status_nilai">Status Penilaian${sortIcon('status_nilai')}</th>
            <th style="text-align:right">Info</th>
          </tr></thead>
          <tbody>
            ${slice.length ? slice.map((x,i)=>`
              <tr>
                <td>${start+i+1}</td>
                <td><span class="code-pill">${escapeHtml(x.kode)}</span></td>
                <td>${escapeHtml(x.kategori)}</td>
                <td>${escapeHtml(x.pemesan)}</td>
                <td>${escapeHtml(x.vendor||'—')}</td>
                <td>${escapeHtml(x.pic_ga||'—')}</td>
                <td>${x.rating ? x.rating + ' ★' : '—'}</td>
                <td>${x.status_nilai==='Sudah Dinilai'
                  ? '<span class="badge status-selesai">Sudah Dinilai</span>'
                  : '<span class="badge status-belum">Belum Dinilai</span>'}</td>
                <td style="text-align:right">
                  <button class="btn-icon" data-id="${x.id}" data-act="info" title="Detail penilaian"><span class="material-symbols-rounded">info</span></button>
                </td>
              </tr>
            `).join('') : `<tr><td colspan="9" class="empty-row">Belum ada data</td></tr>`}
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <div>Menampilkan <strong>${slice.length}</strong> dari <strong>${total}</strong> data</div>
        <div class="pages">
          <button class="page-btn" id="rpg-prev" ${s.page===1?'disabled':''}><span class="material-symbols-rounded" style="font-size:18px">chevron_left</span></button>
          ${Array.from({length:totalPages}).map((_,i)=>`<button class="page-btn ${i+1===s.page?'active':''}" data-page="${i+1}">${i+1}</button>`).join('')}
          <button class="page-btn" id="rpg-next" ${s.page===totalPages?'disabled':''}><span class="material-symbols-rounded" style="font-size:18px">chevron_right</span></button>
        </div>
      </div>
    `;
    $$('th.sortable', host).forEach(th => th.addEventListener('click', ()=>{
      const col = th.dataset.col;
      if(s.sort===col) s.dir = s.dir==='asc'?'desc':'asc';
      else { s.sort = col; s.dir = 'asc'; }
      render();
    }));
    $('#rpg-prev', host)?.addEventListener('click', ()=>{ if(s.page>1){s.page--;render();} });
    $('#rpg-next', host)?.addEventListener('click', ()=>{ if(s.page<totalPages){s.page++;render();} });
    $$('button[data-page]', host).forEach(b => b.addEventListener('click', ()=>{ s.page=Number(b.dataset.page); render(); }));
    $$('button[data-act="info"]', host).forEach(b => b.addEventListener('click', () => {
      const x = rows.find(r=>r.id===b.dataset.id);
      if(!x) return;
      openModal(`
        <div class="modal-head">
          <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">reviews</span> Detail Penilaian</h3>
          <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
        </div>
        <div class="modal-body">
          <div class="kvlist">
            <div class="k">Kode Permintaan</div><div class="v"><span class="code-pill">${escapeHtml(x.kode)}</span></div>
            <div class="k">Kategori</div><div class="v">${escapeHtml(x.kategori)}</div>
            <div class="k">Pemesan</div><div class="v">${escapeHtml(x.pemesan)}</div>

/* ----------- ADMIN: PAYMENT (v1.8) -----------
   Every request automatically appears here. Payment-specific fields are stored
   in the `payments` table (1:1 with requests) and can be edited by ANY user.
   Fields tagged "sinkron" default to the value from the request detail but
   remain overridable. */
let _payMerged = [];
let _fundsCache = [];
let _payState = { page:1, pageSize:15, search:'', filterStatus:'', filterCategory:'', sort:'created_at', dir:'desc' };
// v2.2: state khusus halaman Payment Non-GA
let _payNonGA = [];
let _payNonGAState = { page:1, pageSize:15, search:'', filterStatus:'', sort:'created_at', dir:'desc' };
let _pngBulkSel = new Set();   // v2.6: pilihan hapus massal Payment Non-GA (Super Admin)

// v2.2: ringkas "Terakhir diubah: <tgl> oleh <nama>" untuk payment non-GA
function nonGaLastChangeHtml(m){
  if(!m.non_ga_last_changed_at) return '<span class="muted text-sm">Belum pernah diubah</span>';
  const when = fmtDateTime(m.non_ga_last_changed_at);
  const who  = m.non_ga_last_changed_by ? ' oleh '+escapeHtml(m.non_ga_last_changed_by) : '';
  return `<span class="muted text-sm">Terakhir diubah: ${when}${who}</span>`;
}

function fundName(idOrName){ const f = _fundsCache.find(x => x.id === idOrName || x.name === idOrName); return f ? f.name : (idOrName||''); }

function payCellHtml(m, f){
  const v = m[f.key];
  if(f.key === 'ga_payment_status'){
    const sv = v || 'Not Complete Yet';
    return `<span class="badge ${GA_PAYMENT_STATUS_CLASS[sv]||'pay-belum'}">${escapeHtml(sv)}</span>`;
  }
  if(f.type === 'mataselect'){ return v ? escapeHtml(v) : '—'; }
  if(f.type === 'date')  return v ? fmtDate(v) : '—';
  if(f.type === 'money') return (v!=null && v!=='' && Number(v)>0) ? fmtRupiah(v) : '—';
  if(f.type === 'number')return (v!=null && v!=='') ? escapeHtml(v) : '—';
  const s = String(v==null ? '' : v);
  if(!s) return '—';
  if(f.type === 'textarea' || s.length > 40){
    const short = s.length > 40 ? s.slice(0,40)+'…' : s;
    return `<span title="${escapeHtml(s)}">${escapeHtml(short)}</span>`;
  }
  return escapeHtml(s);
}

function filterPayments(){
  const s = _payState;
  let rows = _payMerged.slice();
  if(s.search){
    rows = rows.filter(m =>
      (m._req.kode_permintaan||'').toLowerCase().includes(s.search) ||
      (m._req.nama_pemesan||'').toLowerCase().includes(s.search) ||
      (m.vendor_name||'').toLowerCase().includes(s.search) ||
      (m._req.kode_smartoffice||'').toLowerCase().includes(s.search)
    );
  }
  if(s.filterStatus)   rows = rows.filter(m => (m.ga_payment_status||'Not Complete Yet') === s.filterStatus);
  if(s.filterCategory) rows = rows.filter(m => m._req.kategori === s.filterCategory);

  // Sorting: 'created_at' (default) or any payment column key, plus 'kode'/'pemesan'
  const dir = s.dir === 'asc' ? 1 : -1;
  const getVal = (m, key) => {
    if(key === 'created_at') return new Date(m._req.created_at).getTime();
    if(key === 'kode') return (m._req.kode_permintaan||'').toLowerCase();
    if(key === 'pemesan') return (m._req.nama_pemesan||'').toLowerCase();
    if(key === 'mata_anggaran') return String(m.mata_anggaran||'').toLowerCase();
    const f = PAYMENT_FIELDS.find(x => x.key === key);
    let v = m[key];
    if(f && (f.type==='money'||f.type==='number')) return Number(v)||0;
    if(f && f.type==='date') return v ? new Date(v).getTime() : 0;
    return String(v==null?'':v).toLowerCase();
  };
  rows.sort((a,b) => {
    const va = getVal(a, s.sort), vb = getVal(b, s.sort);
    if(va < vb) return -1*dir; if(va > vb) return 1*dir; return 0;
  });
  return rows;
}

function renderPaymentsTable(host){
  const s = _payState;
  const rows = filterPayments();
  const total = rows.length;
  const totalPages = Math.max(1, Math.ceil(total / s.pageSize));
  if(s.page > totalPages) s.page = totalPages;
  const start = (s.page-1)*s.pageSize;
  const pageRows = rows.slice(start, start + s.pageSize);

  const cols = PAYMENT_FIELDS; // ordered exactly as requested
  const arrow = (key) => s.sort===key ? (s.dir==='asc'?' ▲':' ▼') : '';
  const headCells = cols.map(f => `<th class="pay-sort" data-sort="${f.key}" style="cursor:pointer${(f.type==='money'||f.type==='number')?';text-align:right':''}">${escapeHtml(f.label)}${f.synced||f.syncedDate||f.syncedPrice?' <span style="color:var(--mrt-green);font-size:9px">●</span>':''}${arrow(f.key)}</th>`).join('');

  host.innerHTML = `
    <div class="table-wrap">
      <table class="t pay-table">
        <thead>
          <tr>
            <th class="sticky-col pay-sort" data-sort="kode" style="min-width:170px;cursor:pointer">Permintaan${arrow('kode')}</th>
            <th class="pay-sort" data-sort="pemesan" style="cursor:pointer">Pemesan${arrow('pemesan')}</th>
            ${headCells}
          </tr>
        </thead>
        <tbody>
          ${pageRows.length ? pageRows.map(m => `
            <tr>
              <td class="sticky-col">
                <div style="display:flex;align-items:center;gap:6px">
                  <button class="btn-icon" data-edit="${m.request_id}" title="Edit pembayaran" style="color:var(--mrt-blue)"><span class="material-symbols-rounded" style="font-size:18px">edit</span></button>
                  <div>
                    <span class="code-pill">${escapeHtml(m._req.kode_permintaan)}</span>
                    <div style="margin-top:2px"><span class="tag">${escapeHtml(m._req.kategori_kode||'')}</span></div>
                  </div>
                </div>
              </td>
              <td>${escapeHtml(m._req.nama_pemesan||'—')}</td>
              ${cols.map(f => `<td${(f.type==='money'||f.type==='number')?' class="num"':''}>${payCellHtml(m,f)}</td>`).join('')}
            </tr>
          `).join('') : `<tr><td colspan="${cols.length+2}" class="empty-row">Belum ada permintaan</td></tr>`}
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <div>Menampilkan <strong>${pageRows.length}</strong> dari <strong>${total}</strong> permintaan</div>
      <div class="pages">
        <button class="page-btn" id="pay-prev" ${s.page===1?'disabled':''}><span class="material-symbols-rounded" style="font-size:18px">chevron_left</span></button>
        <span style="padding:0 10px;font-size:13px">Hal. ${s.page} / ${totalPages}</span>
        <button class="page-btn" id="pay-next" ${s.page===totalPages?'disabled':''}><span class="material-symbols-rounded" style="font-size:18px">chevron_right</span></button>
      </div>
    </div>
  `;

  $('#pay-prev', host)?.addEventListener('click', () => { if(s.page>1){ s.page--; renderPaymentsTable(host); } });
  $('#pay-next', host)?.addEventListener('click', () => { if(s.page<totalPages){ s.page++; renderPaymentsTable(host); } });
  $$('button[data-edit]', host).forEach(b => b.addEventListener('click', () => openPaymentEdit(b.dataset.edit)));
  $$('th.pay-sort', host).forEach(th => th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if(s.sort === col) s.dir = s.dir === 'asc' ? 'desc' : 'asc';
    else { s.sort = col; s.dir = 'asc'; }
    renderPaymentsTable(host);
  }));
}

function openPaymentEdit(requestId){
  const m = _payMerged.find(x => x.request_id === requestId);
  if(!m){ toast('Data tidak ditemukan','error'); return; }
  const req = m._req;
  const me = session.get();
  // Only Admin Payment (and Superadmin) may edit the GA payment workflow status.
  const canGA = !!me && (me.role === 'admin_payment' || me.role === 'superadmin');
  const isSuper = !!me && me.role === 'superadmin';
  // v2.0.1: once a payment is "Paid", it is locked for everyone except Superadmin.
  const paidLock = (m.ga_payment_status === 'Paid') && !isSuper;

  const fieldHtml = (f) => {
    const locked = payFieldLocked(f);              // synced → edit via Data Permintaan only
    const lockGA = f.adminPaymentOnly && !canGA;
    const dis = (locked || lockGA || paidLock);
    const disAttr = dis ? ' disabled' : '';
    const reqStar = f.req ? '<span style="color:#DC2626">*</span>' : '';
    const syncedTag = locked ? '<span class="synced-tag">sinkron</span>' : '';
    const lockHint = locked ? '<div class="hint" style="color:var(--text-mut)">Diubah via Data Permintaan</div>'
                    : (lockGA ? '<div class="hint" style="color:var(--text-mut)">Hanya Admin Payment</div>' : '');
    let val = m[f.key];
    if(f.type === 'date' && val) val = String(val).slice(0,10);
    const full = f.type === 'textarea' ? ' full' : '';
    let control;
    if(f.type === 'select'){
      const ph = `<option value="" disabled ${(!val||val==='')?'selected':''}>— pilih —</option>`;
      const opts = ph + (f.options||[]).map(o => `<option ${String(val)===o?'selected':''}>${escapeHtml(o)}</option>`).join('');
      control = `<select class="select" data-pf="${f.key}"${disAttr}>${opts}</select>`;
    } else if(f.type === 'mataselect'){
      // Number Fund — dropdown dari master Mata Anggaran (stores the NAME, synced with budgeting)
      const ph = `<option value="" disabled ${(!val||val==='')?'selected':''}>— pilih mata anggaran —</option>`;
      const opts = ph + (_fundsCache||[]).map(o => `<option value="${escapeHtml(o.name)}" ${String(val)===String(o.name)?'selected':''}>${o.kode?escapeHtml(o.kode)+' - ':''}${escapeHtml(o.name)}</option>`).join('');
      control = `<select class="select" data-pf="${f.key}"${disAttr}>${opts}</select>`;
    } else if(f.type === 'textarea'){
      control = `<textarea class="textarea" data-pf="${f.key}" style="min-height:70px"${disAttr}>${escapeHtml(val||'')}</textarea>`;
    } else if(f.type === 'date'){
      control = `<input type="date" class="input" data-pf="${f.key}" value="${escapeHtml(val||'')}"${disAttr} />`;
    } else if(f.type === 'money'){
      const disp = (val!=null && val!=='' && Number(val)>0) ? 'Rp ' + Number(val).toLocaleString('id-ID') : '';
      control = `<input type="text" class="input pf-money" inputmode="numeric" data-pf="${f.key}" value="${escapeHtml(disp)}" placeholder="Rp 0"${disAttr} />`;
    } else if(f.type === 'number'){
      control = `<input type="number" class="input" data-pf="${f.key}" value="${escapeHtml(val??'')}" min="0" step="any"${disAttr} />`;
    } else {
      control = `<input type="text" class="input" data-pf="${f.key}" value="${escapeHtml(val||'')}"${disAttr} />`;
    }
    return `<div class="field${full}${dis?' field-locked':''}"><label>${escapeHtml(f.label)} ${reqStar}${syncedTag}</label>${control}${lockHint}</div>`;
  };

  const group = (keys) => PAYMENT_FIELDS.filter(f => keys.includes(f.key)).map(fieldHtml).join('');

  const paidBanner = paidLock ? `
      <div style="margin-bottom:14px;padding:10px 12px;background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;font-size:13px;color:#991B1B">
        <span class="material-symbols-rounded" style="vertical-align:-5px;font-size:18px">lock</span>
        Pembayaran ini berstatus <strong>Paid</strong> dan terkunci. Hanya <strong>Super Admin</strong> yang dapat mengubahnya.
      </div>` : '';

  openModal(`
    <div class="modal-head">
      <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">payments</span> Update Payment</h3>
      <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div class="modal-body">
      ${paidBanner}
      <div style="margin-bottom:14px;padding:10px 12px;background:var(--mrt-blue-soft);border-radius:10px;font-size:13px">
        <strong>${escapeHtml(req.kode_permintaan)}</strong> · ${escapeHtml(req.kategori)} · Pemesan: ${escapeHtml(req.nama_pemesan)}
        <div class="muted text-sm" style="margin-top:2px">Tanda <span style="color:#DC2626">*</span> wajib diisi. Field <span class="synced-tag">sinkron</span> hanya bisa diubah melalui <strong>Data Permintaan</strong>.</div>
      </div>
      <div class="pay-form-grid">
        <div class="pay-section-title">Identitas & Organisasi</div>
        ${group(['activity_name','fund','mata_anggaran','vendor_name','pic_user_name','fund_owner','tanggal_permintaan','tanggal_kebutuhan','location','sub_location','directorate','division','department','category','sub_category','administrator','user_sap'])}
        <div class="pay-section-title">Dokumen Pengadaan</div>
        ${group(['proforma_number','proforma_date','pr_number','pr_date','po_number','po_date','gr_number','gr_date','invoice_number','invoice_date','description_fund','submit_date'])}
        <div class="pay-section-title">Pembayaran</div>
        ${group(['cost_type','cost_purpose','subsidi','jenis_pembayaran','quantity','price','grand_total','ga_payment_status'])}
        ${group(['note'])}
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">${paidLock?'Tutup':'Batal'}</button>
      ${paidLock?'':'<button class="btn btn-primary" id="pay-save"><span class="material-symbols-rounded">save</span>Simpan</button>'}
    </div>
  `, 'xl');

  if(paidLock) return; // locked: nothing editable to wire

  // Rupiah formatter for money inputs
  $$('.pf-money').forEach(inp => inp.addEventListener('input', e => {
    const digits = e.target.value.replace(/\D/g,'');
    e.target.value = digits ? 'Rp ' + Number(digits).toLocaleString('id-ID') : '';
    maybeSuggestGrandTotal();
  }));
  // Auto-suggest Grand Total = Quantity × Price when GT is still empty
  function readMoney(key){ const el=$(`[data-pf="${key}"]`); if(!el) return 0; return Number((el.value||'').replace(/\D/g,''))||0; }
  function maybeSuggestGrandTotal(){
    const gtEl = $('[data-pf="grand_total"]');
    if(!gtEl || gtEl.dataset.touched === '1') return;
    const qty = Number(($('[data-pf="quantity"]')?.value)||0) || 0;
    const price = readMoney('price');
    if(qty > 0 && price > 0){ gtEl.value = 'Rp ' + (qty*price).toLocaleString('id-ID'); }
  }
  $('[data-pf="quantity"]')?.addEventListener('input', maybeSuggestGrandTotal);
  $('[data-pf="grand_total"]')?.addEventListener('input', e => { e.target.dataset.touched = '1'; });

  $('#pay-save').addEventListener('click', async () => {
    // --- v2.0.1: validate required fields before saving ---
    const readVal = (f) => {
      const el = $(`[data-pf="${f.key}"]`);
      if(!el) return m[f.key]; // locked/synced field not in DOM-editable form → use current value
      let v = el.value;
      if(f.type === 'money')  return v ? Number(v.replace(/\D/g,'')) : 0;
      if(f.type === 'number') return v==='' ? null : Number(v);
      return (v||'').trim();
    };
    const missing = [];
    PAYMENT_FIELDS.forEach(f => {
      if(!f.req) return;
      const v = payFieldLocked(f) ? m[f.key] : readVal(f); // locked fields inherit from request
      const empty = (v==null) || v==='' || (f.type==='money' && Number(v)<=0);
      if(empty) missing.push({ f, locked: payFieldLocked(f) });
    });
    if(missing.length){
      const lockedMissing = missing.filter(x=>x.locked).map(x=>x.f.label);
      const openMissing = missing.filter(x=>!x.locked).map(x=>x.f.label);
      let msg = 'Lengkapi field wajib: ' + [...openMissing, ...lockedMissing].slice(0,6).join(', ') + (missing.length>6?', …':'');
      if(lockedMissing.length) msg += `. Field sinkron (${lockedMissing.slice(0,3).join(', ')}) diisi melalui Data Permintaan.`;
      toast(msg, 'warn');
      return;
    }
    const btn = $('#pay-save'); btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-rounded">hourglass_top</span>Menyimpan…';
    try{
      const patch = {};
      PAYMENT_FIELDS.forEach(f => {
        if(f.adminPaymentOnly && !canGA) return;  // non-Admin-Payment can't touch GA status
        if(payFieldLocked(f)) return;             // synced fields are owned by the request — never overwrite here
        const el = $(`[data-pf="${f.key}"]`);
        if(!el) return;
        let v = el.value;
        if(f.type === 'money')  v = v ? Number(v.replace(/\D/g,'')) : 0;
        else if(f.type === 'number') v = v==='' ? null : Number(v);
        else v = (v||'').trim() || null;
        patch[f.key] = v;
      });
      if(canGA && !patch.ga_payment_status) patch.ga_payment_status = 'Not Complete Yet';
      await db.upsertPayment(requestId, patch);
      db.logActivity({ action:'payment.update', target_type:'payment', target_id:requestId,
                       detail:`Update payment ${req.kode_permintaan} (status: ${patch.ga_payment_status||m.ga_payment_status})` });
      // update local cache (preserve fields the current user could not edit)
      const idx = _payMerged.findIndex(x => x.request_id === requestId);
      if(idx >= 0){
        const base = {}; PAYMENT_FIELDS.forEach(f => { base[f.key] = m[f.key]; });
        _payMerged[idx] = mergePayment(req, { request_id:requestId, ...base, ...patch });
      }
      closeModal();
      const host = $('#pay-table-host'); if(host) renderPaymentsTable(host);
      toast('Data pembayaran tersimpan','success');
    }catch(err){
      console.error(err);
      toast('Gagal menyimpan: '+(err.message||''),'error');
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan';
    }
  });
}

function filterPaymentsNonGA(){
  const s = _payNonGAState;
  let rows = _payNonGA.slice();
  if(s.search){
    rows = rows.filter(m =>
      (m._req.kode_permintaan||'').toLowerCase().includes(s.search) ||
      (m._req.nama_pemesan||'').toLowerCase().includes(s.search) ||
      (m.vendor_name||'').toLowerCase().includes(s.search) ||
      (m._req.kode_smartoffice||'').toLowerCase().includes(s.search)
    );
  }
  if(s.filterStatus) rows = rows.filter(m => (m.non_ga_status||'On Progress') === s.filterStatus);
  const dir = s.dir === 'asc' ? 1 : -1;
  const getVal = (m) => {
    if(s.sort === 'kode') return (m._req.kode_permintaan||'').toLowerCase();
    if(s.sort === 'pemesan') return (m._req.nama_pemesan||'').toLowerCase();
    if(s.sort === 'status') return (m.non_ga_status||'').toLowerCase();
    return new Date(m._req.created_at).getTime();
  };
  rows.sort((a,b) => { const va=getVal(a), vb=getVal(b); return va<vb?-1*dir:va>vb?1*dir:0; });
  return rows;
}

/* ============================================================
   ADMIN: PEMBAYARAN RUTIN (v2.3)
   Tagihan berkala (pulsa, telepon, internet, listrik, dll). 1 record = 1 tagihan
   dengan 1 tanggal jatuh tempo. Diajukan PIC, diproses Admin Payment.
   • GA  → status lengkap (Not Complete Yet … Paid)
   • Non-GA → status sederhana (On Progress / Paid / Revision)
   • Reminder otomatis: pop-up (bisa di-close) + lonceng pada H-14, H-7, H-6…H-0.
   • Nominal GA menambah realisasi anggaran (lihat Manajemen Anggaran).
   ============================================================ */
let _recurringCache = [];
let _recurringState = { page:1, pageSize:15, search:'', filterStatus:'', filterJenis:'', filterSource:'', filterDue:'', sort:'tanggal_jatuh_tempo', dir:'asc' };
let _recurringChecked = false;   // pop-up reminder hanya sekali per sesi halaman

// Selisih hari dari hari ini (00:00) ke tanggal jatuh tempo. Negatif = lewat tempo.
function daysUntil(dateStr){
  if(!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(dateStr); due.setHours(0,0,0,0);
  return Math.round((due - today) / 86400000);
}
function recurringEffStatus(rp){ return rp.pakai_anggaran_ga ? (rp.ga_status||'Not Complete Yet') : (rp.non_ga_status||'On Progress'); }
function recurringIsPaid(rp){ return recurringEffStatus(rp) === 'Paid'; }
function recurringDueBadge(rp){
  if(recurringIsPaid(rp)) return '<span class="badge status-selesai">Lunas</span>';
  const d = daysUntil(rp.tanggal_jatuh_tempo);
  if(d === null) return '<span class="badge gray">—</span>';
  if(d < 0)  return `<span class="badge status-ditolak">Terlambat ${Math.abs(d)} hari</span>`;
  if(d === 0) return '<span class="badge status-ditolak">Jatuh tempo hari ini</span>';
  if(d <= 7)  return `<span class="badge status-belum">H-${d}</span>`;
  if(d <= 14) return `<span class="badge status-tersedia">H-${d}</span>`;
  return `<span class="badge gray">H-${d}</span>`;
}

  }

  $('#rp-search').addEventListener('input', e => { _recurringState.search = e.target.value.toLowerCase(); _recurringState.page = 1; renderRecurringTable(host); });
  $('#rp-filter-due').addEventListener('change', e => { _recurringState.filterDue = e.target.value; _recurringState.page = 1; renderRecurringTable(host); });
  $('#rp-filter-source').addEventListener('change', e => { _recurringState.filterSource = e.target.value; _recurringState.page = 1; renderRecurringTable(host); });
  $('#rp-filter-jenis').addEventListener('change', e => { _recurringState.filterJenis = e.target.value; _recurringState.page = 1; renderRecurringTable(host); });
  if($('#rp-add')) $('#rp-add').addEventListener('click', () => openRecurringEdit(null, load));
  $('#rp-csv').addEventListener('click', () => {
    const rows = filterRecurring().map(rp => ({
      Nama: rp.nama, Jenis: rp.jenis, Vendor: rp.vendor||'',
      Nominal: rp.nominal||0,
      Sumber: rp.pakai_anggaran_ga ? 'Anggaran GA' : 'Bukan Anggaran GA',
      Mata_Anggaran: rp.mata_anggaran||'',
      Jatuh_Tempo: rp.tanggal_jatuh_tempo||'',
      Status: recurringEffStatus(rp),
      PIC: rp.pic_user_name||'',
      Keterangan: rp.keterangan||'',
      Terakhir_Diubah: rp.last_changed_at ? String(rp.last_changed_at).slice(0,19).replace('T',' ') : '',
      Diubah_Oleh: rp.last_changed_by||''
    }));
    csvDownload('pembayaran-rutin-'+new Date().toISOString().slice(0,10)+'.csv', rows);
  });

  // simpan fungsi load agar bisa dipanggil ulang setelah CRUD
  host._reload = load;
  await load();
}

function filterRecurring(){
  const s = _recurringState;
  let rows = _recurringCache.slice();
  if(s.search){
    rows = rows.filter(rp =>
      (rp.nama||'').toLowerCase().includes(s.search) ||
      (rp.vendor||'').toLowerCase().includes(s.search) ||
      (rp.jenis||'').toLowerCase().includes(s.search));
  }
  if(s.filterJenis)  rows = rows.filter(rp => rp.jenis === s.filterJenis);
  if(s.filterSource === 'ga')    rows = rows.filter(rp => rp.pakai_anggaran_ga);
  if(s.filterSource === 'nonga') rows = rows.filter(rp => !rp.pakai_anggaran_ga);
  if(s.filterStatus) rows = rows.filter(rp => recurringEffStatus(rp) === s.filterStatus);
  if(s.filterDue === 'overdue') rows = rows.filter(rp => !recurringIsPaid(rp) && (daysUntil(rp.tanggal_jatuh_tempo) ?? 99) < 0);
  if(s.filterDue === 'd7')      rows = rows.filter(rp => !recurringIsPaid(rp) && (daysUntil(rp.tanggal_jatuh_tempo) ?? 99) <= 7);
  if(s.filterDue === 'd14')     rows = rows.filter(rp => !recurringIsPaid(rp) && (daysUntil(rp.tanggal_jatuh_tempo) ?? 99) <= 14);
  if(s.filterDue === 'unpaid')  rows = rows.filter(rp => !recurringIsPaid(rp));

  const dir = s.dir === 'asc' ? 1 : -1;
  const getVal = (rp) => {
    if(s.sort === 'nama')    return (rp.nama||'').toLowerCase();
    if(s.sort === 'nominal') return Number(rp.nominal)||0;
    if(s.sort === 'status')  return recurringEffStatus(rp).toLowerCase();
    return (rp.tanggal_jatuh_tempo||''); // default: jatuh tempo
  };
  rows.sort((a,b)=>{ const va=getVal(a), vb=getVal(b); return va<vb?-1*dir:va>vb?1*dir:0; });
  return rows;
}

function renderRecurringTable(host){
  const s = _recurringState;
  const me = session.get();
  const canManage = !!me && ['superadmin','admin','admin_payment','pic'].includes(me.role);
  const canDelete = !!me && ['superadmin','admin_payment'].includes(me.role);
  const rows = filterRecurring();
  const total = rows.length;
  const totalPages = Math.max(1, Math.ceil(total / s.pageSize));
  if(s.page > totalPages) s.page = totalPages;
  const start = (s.page-1)*s.pageSize;
  const pageRows = rows.slice(start, start + s.pageSize);
  const arrow = (key) => s.sort===key ? (s.dir==='asc'?' ▲':' ▼') : '';

  host.innerHTML = `
    <div class="table-wrap">
      <table class="t">
        <thead><tr>
          <th class="pay-sort" data-sort="nama" style="cursor:pointer">Tagihan${arrow('nama')}</th>
          <th>Jenis</th>
          <th>Vendor</th>
          <th class="pay-sort" data-sort="nominal" style="cursor:pointer;text-align:right">Nominal${arrow('nominal')}</th>
          <th>Sumber</th>
          <th class="pay-sort" data-sort="tanggal_jatuh_tempo" style="cursor:pointer">Jatuh Tempo${arrow('tanggal_jatuh_tempo')}</th>
          <th class="pay-sort" data-sort="status" style="cursor:pointer">Status${arrow('status')}</th>
          <th>PIC</th>
          <th style="text-align:right">Aksi</th>
        </tr></thead>
        <tbody>
          ${pageRows.length ? pageRows.map(rp => {
            const st = recurringEffStatus(rp);
            const stCls = rp.pakai_anggaran_ga ? (GA_PAYMENT_STATUS_CLASS[st]||'pay-belum') : (NON_GA_STATUS_CLASS[st]||'pay-proses');
            const d = daysUntil(rp.tanggal_jatuh_tempo);
            const rowStyle = (!recurringIsPaid(rp) && d!==null && d<0) ? ' style="background:#FEF2F2"' : '';
            return `
            <tr${rowStyle}>
              <td><div class="fw-700">${escapeHtml(rp.nama)}</div>${rp.keterangan?`<div class="text-sm muted" style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${escapeHtml(rp.keterangan)}">${escapeHtml(rp.keterangan)}</div>`:''}</td>
              <td><span class="tag">${escapeHtml(rp.jenis||'—')}</span></td>
              <td>${escapeHtml(rp.vendor||'—')}</td>
              <td class="mono" style="text-align:right">${rp.nominal?fmtRupiah(rp.nominal):'—'}</td>
              <td>${rp.pakai_anggaran_ga?'<span class="badge status-selesai">GA</span>':'<span class="badge gray">Non-GA</span>'}</td>
              <td>${fmtDate(rp.tanggal_jatuh_tempo)}<div style="margin-top:3px">${recurringDueBadge(rp)}</div></td>
              <td><span class="badge ${stCls}">${escapeHtml(st)}</span></td>
              <td>${escapeHtml(rp.pic_user_name||'—')}</td>
              <td style="text-align:right"><div class="actions-compact">
                <button class="btn-icon" data-edit="${rp.id}" title="Edit / Update"><span class="material-symbols-rounded" style="font-size:18px">edit</span></button>
                ${canDelete?`<button class="btn-icon" data-del="${rp.id}" title="Hapus"><span class="material-symbols-rounded" style="font-size:18px">delete</span></button>`:''}
              </div></td>
            </tr>`;
          }).join('') : `<tr><td colspan="9" class="empty-row">Belum ada tagihan rutin</td></tr>`}
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <div>Menampilkan <strong>${pageRows.length}</strong> dari <strong>${total}</strong> tagihan</div>
      <div class="pages">
        <button class="page-btn" id="rp-prev" ${s.page===1?'disabled':''}><span class="material-symbols-rounded" style="font-size:18px">chevron_left</span></button>
        <span style="padding:0 10px;font-size:13px">Hal. ${s.page} / ${totalPages}</span>
        <button class="page-btn" id="rp-next" ${s.page===totalPages?'disabled':''}><span class="material-symbols-rounded" style="font-size:18px">chevron_right</span></button>
      </div>
    </div>
  `;

  const reload = host._reload || (()=>renderRecurringTable(host));
  $('#rp-prev', host)?.addEventListener('click', () => { if(s.page>1){ s.page--; renderRecurringTable(host); } });
  $('#rp-next', host)?.addEventListener('click', () => { if(s.page<totalPages){ s.page++; renderRecurringTable(host); } });
  $$('th.pay-sort', host).forEach(th => th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if(s.sort === col) s.dir = s.dir === 'asc' ? 'desc' : 'asc';
    else { s.sort = col; s.dir = 'asc'; }
    renderRecurringTable(host);
  }));
  $$('button[data-edit]', host).forEach(b => b.addEventListener('click', () => openRecurringEdit(b.dataset.edit, reload)));
  $$('button[data-del]', host).forEach(b => b.addEventListener('click', async () => {

      toast('Tagihan dihapus','success');
      reload();
    }catch(err){ toast('Gagal menghapus: '+(err.message||''),'error'); }
  }));
}

async function openRecurringEdit(id, onDone){
  const me = session.get();
  const isNew = !id;
  const rp = isNew ? null : _recurringCache.find(x => x.id === id);
  if(!isNew && !rp){ toast('Data tidak ditemukan','error'); return; }
  const canStatus = !!me && ['admin_payment','superadmin'].includes(me.role);
  const [funds, picUsers] = await Promise.all([ db.listMataAnggaran().catch(()=>[]), db.listPicUsers().catch(()=>[]) ]);

  const cur = {
    nama: rp?.nama || '', jenis: rp?.jenis || '', vendor: rp?.vendor || '',
    nominal: rp?.nominal || '', pakai_anggaran_ga: rp ? rp.pakai_anggaran_ga !== false : true,
    mata_anggaran: rp?.mata_anggaran || '', pic_user_id: rp?.pic_user_id || (me?.role==='pic'? me.id : ''),
    tanggal_jatuh_tempo: rp?.tanggal_jatuh_tempo || '',
    ga_status: rp?.ga_status || 'Not Complete Yet', non_ga_status: rp?.non_ga_status || 'On Progress',
    keterangan: rp?.keterangan || ''
  };
  const nominalDisp = cur.nominal ? 'Rp ' + Number(cur.nominal).toLocaleString('id-ID') : '';

  openModal(`
    <div class="modal-head">
      <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--mrt-blue)">event_repeat</span> ${isNew?'Tambah':'Edit'} Tagihan Rutin</h3>
      <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div class="modal-body">
      <form id="rp-form">
        <div class="form-grid">
          <div class="field full field-required"><label>Nama Tagihan</label>
            <input class="input" name="nama" value="${escapeHtml(cur.nama)}" placeholder="Mis. Tagihan Pulsa Kantor" required/></div>
          <div class="field field-required"><label>Jenis</label>
            <input class="input" name="jenis" list="rp-jenis-list" value="${escapeHtml(cur.jenis)}" placeholder="Pulsa, Telepon, Internet, ..." autocomplete="off"/>
            <datalist id="rp-jenis-list">${[...new Set([...RECURRING_JENIS, ..._recurringCache.map(r=>r.jenis).filter(Boolean)])].map(j=>`<option value="${escapeHtml(j)}"></option>`).join('')}</datalist>
            <span class="hint">Pilih dari saran atau ketik jenis baru sendiri.</span></div>
          <div class="field"><label>Vendor / Penyedia</label>
            <input class="input" name="vendor" value="${escapeHtml(cur.vendor)}" placeholder="Mis. Telkomsel"/></div>
          <div class="field field-required"><label>Nominal (Rp)</label>
            <input class="input" name="nominal" id="rp-nominal" inputmode="numeric" value="${escapeHtml(nominalDisp)}" placeholder="Rp 0"/></div>
          <div class="field field-required"><label>Tanggal Jatuh Tempo (paling lambat)</label>
            <input class="input" type="date" name="tanggal_jatuh_tempo" value="${escapeHtml(cur.tanggal_jatuh_tempo)}" required/></div>
          <div class="field"><label>Sumber Anggaran</label>
            <select class="select" name="pakai_anggaran_ga" id="rp-source">
              <option value="true"  ${cur.pakai_anggaran_ga?'selected':''}>Menggunakan Anggaran GA</option>
              <option value="false" ${!cur.pakai_anggaran_ga?'selected':''}>Bukan Anggaran GA</option>
            </select></div>
          <div class="field" id="rp-mata-wrap"><label>Mata Anggaran</label>
            <select class="select" name="mata_anggaran" id="rp-mata">
              <option value="">(kosong)</option>
              ${funds.map(f=>`<option value="${escapeHtml(f.name)}" ${cur.mata_anggaran===f.name?'selected':''}>${f.kode?escapeHtml(f.kode)+' - ':''}${escapeHtml(f.name)}</option>`).join('')}
            </select>
            <span class="hint">Untuk tagihan GA — nominal akan menambah realisasi pada mata anggaran ini.</span>
          </div>
          <div class="field"><label>PIC Pengaju</label>
            <select class="select" name="pic_user_id">
              <option value="">— Pilih PIC —</option>
              ${picUsers.map(u=>`<option value="${u.id}" ${cur.pic_user_id===u.id?'selected':''}>${escapeHtml(u.full_name)} · ${escapeHtml(u.jabatan||u.role)}</option>`).join('')}
            </select></div>
          <div class="field"><label>Status ${canStatus?'':'<span class="hint" style="color:var(--text-mut)">(hanya Admin Payment)</span>'}</label>
            <select class="select" name="status" id="rp-status" ${canStatus?'':'disabled'}>
              ${(cur.pakai_anggaran_ga?GA_PAYMENT_STATUSES:NON_GA_STATUSES).map(o=>{
                const sel = (cur.pakai_anggaran_ga?cur.ga_status:cur.non_ga_status)===o?'selected':''; return `<option ${sel}>${o}</option>`;
              }).join('')}
            </select></div>
          <div class="field full"><label>Keterangan</label>
            <textarea class="textarea" name="keterangan" style="min-height:64px">${escapeHtml(cur.keterangan)}</textarea></div>
        </div>
      </form>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="rp-save"><span class="material-symbols-rounded">save</span>Simpan</button>
    </div>
  `, 'lg');

  // Rupiah formatter
  $('#rp-nominal').addEventListener('input', e => {
    const d = e.target.value.replace(/\D/g,''); e.target.value = d ? 'Rp '+Number(d).toLocaleString('id-ID') : '';
  });
  // Toggle status options & Mata Anggaran visibility when source changes
  const sourceSel = $('#rp-source'), statusSel = $('#rp-status'), mataWrap = $('#rp-mata-wrap');
  function syncSource(){
    const isGA = sourceSel.value === 'true';
    mataWrap.style.display = isGA ? '' : 'none';
    const opts = isGA ? GA_PAYMENT_STATUSES : NON_GA_STATUSES;
    const keep = statusSel.value;
    statusSel.innerHTML = opts.map(o=>`<option ${o===keep?'selected':''}>${o}</option>`).join('');
    if(!opts.includes(statusSel.value)) statusSel.value = opts[0];
  }
  sourceSel.addEventListener('change', syncSource);
  syncSource();

  $('#rp-save').addEventListener('click', async () => {
    const fd = new FormData($('#rp-form'));
    const nama = (fd.get('nama')||'').toString().trim();
    const jenis = (fd.get('jenis')||'').toString().trim();
    const nominal = Number((fd.get('nominal')||'').toString().replace(/\D/g,''))||0;
    const due = fd.get('tanggal_jatuh_tempo');
    if(!nama){ toast('Nama tagihan wajib diisi','warn'); return; }
    if(!jenis){ toast('Jenis wajib diisi','warn'); return; }
    if(nominal<=0){ toast('Nominal wajib diisi','warn'); return; }
    if(!due){ toast('Tanggal jatuh tempo wajib diisi','warn'); return; }
    const isGA = fd.get('pakai_anggaran_ga') === 'true';
    const picUser = picUsers.find(u => u.id === fd.get('pic_user_id'));
    const newStatus = canStatus ? fd.get('status') : (rp ? (isGA?rp.ga_status:rp.non_ga_status) : (isGA?'Not Complete Yet':'On Progress'));

    const payload = {
      nama, jenis, vendor: (fd.get('vendor')||'').toString().trim()||null,
      nominal, pakai_anggaran_ga: isGA, mata_anggaran: isGA ? (fd.get('mata_anggaran')||null) : null,
      pic_user_id: fd.get('pic_user_id')||null, pic_user_name: picUser ? picUser.full_name : (rp?.pic_user_name||null),
      tanggal_jatuh_tempo: due,
      ga_status: isGA ? newStatus : (rp?.ga_status||'Not Complete Yet'),
      non_ga_status: !isGA ? newStatus : (rp?.non_ga_status||'On Progress'),
      keterangan: (fd.get('keterangan')||'').toString().trim()||null
    };
    // jejak perubahan status
    const prevStatus = rp ? (rp.pakai_anggaran_ga?rp.ga_status:rp.non_ga_status) : null;
    if(isNew || prevStatus !== newStatus){
      payload.last_changed_at = new Date().toISOString();
      payload.last_changed_by = me.full_name || me.username || 'Admin';
    }
    // bila tanggal jatuh tempo berubah → reset reminder agar siklus baru memberi peringatan lagi
    if(isNew || (rp && rp.tanggal_jatuh_tempo !== due)) payload.last_warned_threshold = null;

    const btn = $('#rp-save'); btn.disabled = true; btn.innerHTML = '<span class="material-symbols-rounded">hourglass_top</span>Menyimpan…';
    try{
      if(isNew){
        const ins = await db.insertRecurring(payload);
        db.logActivity({ action:'recurring.create', target_type:'recurring', target_id:ins?.id, detail:`Tambah tagihan rutin ${nama} (${fmtRupiah(nominal)}, jatuh tempo ${due})` });
      }else{
        await db.updateRecurring(id, payload);
        db.logActivity({ action:'recurring.update', target_type:'recurring', target_id:id, detail:`Update tagihan rutin ${nama} → status ${newStatus}` });
      }
      closeModal();
      toast('Tagihan rutin tersimpan','success');
      if(typeof onDone === 'function') onDone();
    }catch(err){
      console.error(err); toast('Gagal menyimpan: '+(err.message||''),'error');
      btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded">save</span>Simpan';
    }
  });
}

/* ----- Reminder Pembayaran Rutin: pop-up + lonceng ----- */
async function checkRecurringReminders(user){
  if(_recurringChecked) return;     // cukup sekali per sesi halaman
  _recurringChecked = true;
  try{
    const list = await db.listRecurring();
    const unpaid = list.filter(rp => !recurringIsPaid(rp) && rp.tanggal_jatuh_tempo);
    if(!unpaid.length) return;

    // Penerima lonceng: PIC tagihan + semua Admin Payment & Super Admin
    let recipients = [];
    try{
      const users = await db.listUsers();
      recipients = users.filter(u => u.active !== false && ['admin_payment','superadmin'].includes(u.role)).map(u => u.id);
    }catch{}

    const popupItems = [];
    for(const rp of unpaid){
      const d = daysUntil(rp.tanggal_jatuh_tempo);
      const reached = RECURRING_THRESHOLDS.filter(T => d <= T);
      if(!reached.length) continue;            // belum masuk ambang (mis. masih H-20)
      const curT = Math.min(...reached);        // ambang paling mendesak yang sudah tercapai
      const lastWarned = (rp.last_warned_threshold == null) ? 999 : rp.last_warned_threshold;

      // tampil di pop-up untuk user terkait (PIC sendiri, atau Admin Payment/Admin/Superadmin lihat semua)
      const seesAll = ['admin_payment','superadmin','admin'].includes(user.role);
      if(seesAll || rp.pic_user_id === user.id) popupItems.push({ rp, d });

      // lonceng: hanya saat melewati ambang baru (lebih mendesak) — sekali per ambang
      if(curT < lastWarned){
        const dueTxt = d < 0 ? `terlambat ${Math.abs(d)} hari` : (d === 0 ? 'jatuh tempo hari ini' : `tinggal ${d} hari lagi`);
        const title = d < 0 ? 'Pembayaran rutin terlambat' : 'Pengingat pembayaran rutin';
        const body  = `${rp.nama} (${fmtRupiah(rp.nominal)}) ${dueTxt} — jatuh tempo ${fmtDate(rp.tanggal_jatuh_tempo)}.`;
        const targets = new Set(recipients);
        if(rp.pic_user_id) targets.add(rp.pic_user_id);
        for(const uid of targets){ db.pushNotification({ user_id:uid, type:'recurring_due', title, body }); }
        try{ await db.updateRecurring(rp.id, { last_warned_threshold: curT }); }catch(e){ console.warn('[recurring warn update]', e); }
      }
    }
    if(popupItems.length) showRecurringPopup(popupItems);
  }catch(err){ console.warn('[recurring reminder]', err); }
}

function showRecurringPopup(items){
  // urutkan paling mendesak dulu
  items.sort((a,b) => a.d - b.d);
  const rowHtml = items.slice(0,12).map(({rp,d}) => {
    const badge = d < 0 ? `<span class="badge status-ditolak">Terlambat ${Math.abs(d)} hari</span>`
                : d === 0 ? '<span class="badge status-ditolak">Hari ini</span>'
                : `<span class="badge ${d<=7?'status-belum':'status-tersedia'}">H-${d}</span>`;
    return `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed var(--border-2)">
      <div style="min-width:0">
        <div class="fw-700" style="font-size:13.5px">${escapeHtml(rp.nama)}</div>
        <div class="text-sm muted">${escapeHtml(rp.jenis||'')} · ${fmtRupiah(rp.nominal)} · jatuh tempo ${fmtDate(rp.tanggal_jatuh_tempo)}${rp.pic_user_name?' · PIC '+escapeHtml(rp.pic_user_name):''}</div>
      </div>${badge}
    </div>`;
  }).join('');
  const more = items.length > 12 ? `<div class="text-sm muted mt-2">…dan ${items.length-12} tagihan lainnya.</div>` : '';
  openModal(`
    <div class="modal-head">
      <h3><span class="material-symbols-rounded" style="vertical-align:-6px;color:var(--warning)">notification_important</span> Pengingat Pembayaran Rutin</h3>
      <button class="btn-icon" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div class="modal-body">
      <p class="muted text-sm" style="margin:0 0 8px">Ada <strong>${items.length}</strong> tagihan rutin yang mendekati / melewati jatuh tempo:</p>
      <div>${rowHtml}</div>
      ${more}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Tutup</button>
      <a class="btn btn-primary" href="#/admin/recurring" onclick="closeModal()"><span class="material-symbols-rounded">event_repeat</span>Buka Pembayaran Rutin</a>
    </div>
  `, 'lg');
}

   MODUL PETTY CASH (v2.4) — port dari aplikasi GA Petty Cash
   Satu menu "Petty Cash" dengan sub-modul sebagai TAB:
   Dashboard · Reimbursement (KRT/KND) · Form Input · Master Data ·

const pcdb = {
  _seq(arr, p){ return p + (arr.length+1) + Date.now(); },
  async list(table){
    if(!SUPA_CONFIGURED) return [..._pcDemo[table]];
    const { data, error } = await supa.from('pc_'+table).select('*').order('created_at',{ascending:false});
    if(error) throw error; return data || [];
  },
  async insert(table, row){
    if(!SUPA_CONFIGURED){ const r = { id:this._seq(_pcDemo[table],table[0]), created_at:new Date().toISOString(), ...row }; _pcDemo[table].push(r); return r; }
    const { data, error } = await supa.from('pc_'+table).insert(row).select().single();
    if(error) throw error; return data;
  },
  async update(table, id, patch){
    if(!SUPA_CONFIGURED){ const i=_pcDemo[table].findIndex(x=>x.id===id); if(i>=0) _pcDemo[table][i]={..._pcDemo[table][i],...patch}; return _pcDemo[table][i]; }
    const { data, error } = await supa.from('pc_'+table).update(patch).eq('id',id).select().single();
    if(error) throw error; return data;
  },
  async remove(table, id){
    if(!SUPA_CONFIGURED){ _pcDemo[table]=_pcDemo[table].filter(x=>x.id!==id); return; }
    const { error } = await supa.from('pc_'+table).delete().eq('id',id);
    if(error) throw error;
  },
  async log(aksi, detail){
    const u = session.get();
    const row = { waktu:new Date().toISOString(), user:u?.full_name||'-', aksi, detail:detail||'' };
    try{ await this.insert('log', row); }catch(e){ console.warn('[pc log]', e); }
  }
};

/* ---------- helpers ---------- */
function pcGenKode(tipe){
  const arr = _pcCache.reimburse.filter(r => r.tipe === tipe);
  let max = 0; arr.forEach(r => { const n = parseInt((r.kode||'').split('-')[1]||'0',10); if(n>max) max=n; });
  return `${tipe}-${String(max+1).padStart(4,'0')}`;
}
function pcStageIndex(s){ return PC_STAGES.indexOf(s); }
function pcCanManage(){
  const u=session.get(); if(!u) return false;
  if(u.role==='superadmin') return true;
  const ap = getAllowedPages(u);                 // daftar halaman yang diizinkan per akun (Hak Akses Halaman)
  if(ap) return ap.includes('petty');            // ada daftar eksplisit → harus memuat 'petty' untuk boleh CRUD
  return ['admin','admin_payment','pic'].includes(u.role);  // tanpa daftar eksplisit → default per role
}
/* ---------- workflow helpers (v2.10) ---------- */
function pcWfStage(r){ return (r && r.wf_stage) ? r.wf_stage : 'pic_loket'; }
function pcWfIndex(key){ return PC_WF.findIndex(s=>s.key===key); }
function pcWfDef(key){ return PC_WF.find(s=>s.key===key) || null; }
function pcWfHasPerm(perm){
  const u=session.get(); if(!u) return false;
  if(u.role==='superadmin') return true;
  const ap=getAllowedPages(u);
  return ap ? ap.includes(perm) : false;   // peran workflow harus diberikan eksplisit via Hak Akses Halaman
}
function pcWfAny(){ return pcWfHasPerm('pc_pic_loket')||pcWfHasPerm('pc_pembantu_kas')||pcWfHasPerm('pc_pemegang_kas'); }
function pcSlaHours(stage){ const s=(_pcCache.sla||[]).find(x=>x.stage===stage); return s? (Number(s.sla_hours)||0) : 0; }
// kapan sebuah tahap MULAI aktif (untuk hitung SLA) = saat tahap sebelumnya selesai
function pcWfStageStart(r, key){
  const m = { pic_loket:r.created_at, verifikasi_ppk:r.wf_pic_at||r.created_at, transfer_pk:r.wf_verif_at, spp_ppk:r.wf_pk_at, pengembalian_pk:r.wf_spp_at };
  return m[key] || r.created_at || null;
}
function pcWfStageDone(r, key){
  const m = { pic_loket:r.wf_pic_at, verifikasi_ppk:r.wf_verif_at, transfer_pk:r.wf_pk_at, spp_ppk:r.wf_spp_at, pengembalian_pk:r.wf_return_at };
  return m[key] || null;
}
function pcWfSlaBadge(startIso, hours, doneIso){
  if(!startIso || !hours) return '<span class="badge gray">SLA —</span>';
  const due = new Date(startIso).getTime() + hours*3600*1000;
  const dueStr = new Date(due).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  if(doneIso){ return new Date(doneIso).getTime()<=due ? '<span class="badge status-selesai">On-time</span>' : '<span class="badge status-ditolak">Terlambat</span>'; }
  return Date.now()<=due ? `<span class="badge status-selesai">Dalam SLA · ≤ ${dueStr}</span>` : `<span class="badge status-ditolak">Lewat SLA · ${dueStr}</span>`;
}

      <div class="card-body">
        <div class="toolbar"><div class="search"><span class="material-symbols-rounded">search</span>
          <input class="input" id="pc-reim-search" placeholder="Cari kode / penerima / kegiatan..."/></div>
          <select class="select" id="pc-reim-status" style="max-width:200px"><option value="">Semua Status</option>${PC_STAGES.concat(['Revisi']).map(s=>`<option>${s}</option>`).join('')}</select>
          <select class="select" id="pc-reim-wil" style="max-width:220px"><option value="">Semua Wilayah</option>${pcWilayah().map(w=>`<option>${w}</option>`).join('')}</select>
        </div>
        <div id="pc-reim-host"></div>
      </div>
    </div>`;
  $$('.pc-rt', host).forEach(b => b.addEventListener('click', () => { _pcReimTipe=b.dataset.rt; pcRenderReimburse(host); }));
  const search=$('#pc-reim-search'), fstat=$('#pc-reim-status'), fwil=$('#pc-reim-wil');
  const draw = () => pcDrawReimTable($('#pc-reim-host'), { q:(search.value||'').toLowerCase(), status:fstat.value, wil:fwil.value });
  [search,fstat,fwil].forEach(el => el.addEventListener('input', draw));
  if($('#pc-reim-add')) $('#pc-reim-add').addEventListener('click', () => { _pcReimTipe=_pcReimTipe; pcGoTab('form'); });
  $('#pc-reim-csv').addEventListener('click', () => {
    const rows = _pcCache.reimburse.filter(r=>r.tipe===_pcReimTipe).map(r=>({ Kode:r.kode, Wilayah:r.loket, Penerima:r.penerima, Tanggal:r.tanggal, Kategori:r.kategori, Nominal:r.nominal, Sumber:r.sumber, Status:r.status, No_SPP:r.no_spp||'' }));
    csvDownload('reimburse-'+_pcReimTipe+'-'+new Date().toISOString().slice(0,10)+'.csv', rows);
  });
  draw();
}

function pcDrawReimTable(host, f){
  const manage = pcCanManage();
  let rows = _pcCache.reimburse.filter(r => r.tipe===_pcReimTipe);
  if(f.q) rows = rows.filter(r => (r.kode+' '+r.penerima+' '+(r.kegiatan||'')+' '+(r.driver||'')).toLowerCase().includes(f.q));
  if(f.status) rows = rows.filter(r => r.status===f.status);
  if(f.wil) rows = rows.filter(r => r.loket===f.wil);
  rows.sort((a,b)=> (b.tanggal||'').localeCompare(a.tanggal||''));

  host.innerHTML = `<div class="table-wrap"><table class="t t-dense"><thead><tr>
    <th>Kode</th><th>Wilayah/Loket</th><th>Penerima</th><th>Tanggal</th><th>Kategori</th>
    <th style="text-align:right">Nominal</th><th>Sumber</th><th>Status</th><th>No. SPP</th><th style="text-align:right">Aksi</th>
  </tr></thead><tbody>
    ${rows.length ? rows.map(r=>`<tr>
      <td><span class="code-pill">${escapeHtml(r.kode)}</span></td>
      <td>${escapeHtml((r.loket||'').replace('GA - ',''))}</td>
      <td>${escapeHtml(r.penerima||'—')}${r.tipe==='KND'&&r.no_polisi?`<div class="text-sm muted">${escapeHtml(r.no_polisi)}</div>`:''}</td>
      <td>${fmtDate(r.tanggal)}</td>
      <td>${escapeHtml(r.kategori||'—')}</td>
      <td class="mono" style="text-align:right">${fmtRupiah(r.nominal)}</td>
      <td>${r.sumber==='Fund Non GA'?'<span class="badge gray">Non GA</span>':'<span class="badge status-selesai">GA</span>'}</td>
      <td><span class="badge ${PC_STAGE_CLASS[r.status]||'gray'}">${escapeHtml(r.status)}</span></td>
      <td>${escapeHtml(r.no_spp||'—')}</td>
      <td style="text-align:right"><div class="actions-compact">
        <button class="btn-icon" data-view="${r.id}" title="Detail"><span class="material-symbols-rounded" style="font-size:17px">visibility</span></button>
        ${(manage||pcWfAny())?`<button class="btn-icon" data-proc="${r.id}" title="Proses workflow" style="color:var(--mrt-blue)"><span class="material-symbols-rounded" style="font-size:17px">conveyor_belt</span></button>`:''}
        <button class="btn-icon" data-spp="${r.id}" title="Buat SPP" style="color:var(--mrt-green)"><span class="material-symbols-rounded" style="font-size:17px">print</span></button>
        ${manage?`<button class="btn-icon" data-del="${r.id}" title="Hapus"><span class="material-symbols-rounded" style="font-size:17px">delete</span></button>`:''}
      </div></td></tr>`).join('') : `<tr><td colspan="10" class="empty-row">Belum ada transaksi ${_pcReimTipe}</td></tr>`}
  </tbody></table></div>`;

  $$('button[data-view]', host).forEach(b=>b.addEventListener('click', ()=>pcReimDetail(b.dataset.view)));
  $$('button[data-proc]', host).forEach(b=>b.addEventListener('click', ()=>pcReimProcess(b.dataset.proc)));
  $$('button[data-spp]', host).forEach(b=>b.addEventListener('click', ()=>{ _pcSppData=_pcCache.reimburse.find(x=>x.id===b.dataset.spp); _pcTab='spp'; renderPettyTab(); $$('#pc-tabs .pc-tab-btn').forEach(x=>{const on=x.dataset.tab==='spp'; x.style.cssText=on?'background:var(--mrt-blue);color:#fff':'background:#fff;color:var(--text-2);border:1px solid var(--border)';}); }));
  $$('button[data-del]', host).forEach(b=>b.addEventListener('click', async ()=>{
    const r=_pcCache.reimburse.find(x=>x.id===b.dataset.del); if(!r||!confirm(`Hapus ${r.kode}?`)) return;
    await pcdb.remove('reimburse', r.id); pcdb.log('reimburse.delete', r.kode); await pcLoadAll(); renderPettyTab(); toast('Transaksi dihapus','success');
  }));
}

      <div class="k">Tanggal</div><div class="v">${fmtDate(r.tanggal)}</div>
      <div class="k">Kategori</div><div class="v">${escapeHtml(r.kategori||'—')}</div>
      ${r.tipe==='KRT'?`<div class="k">Kegiatan</div><div class="v">${escapeHtml(r.kegiatan||'—')}</div>`:''}
      <div class="k">Departemen</div><div class="v">${escapeHtml(r.departemen||'—')}</div>

      <div class="k">PIC</div><div class="v">${escapeHtml(r.pic||'—')}</div>

    </div></div>
