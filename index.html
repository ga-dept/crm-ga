/* ============================================================
   TYPESEARCH — ubah <select> panjang menjadi combobox yang bisa diketik.
   Auto-aktif untuk select dengan class .sel-search ATAU ≥ 8 opsi.
   Tambahkan class .no-search untuk mengecualikan sebuah select.
   Native <select> tetap menjadi sumber nilai (FormData & .value tetap jalan).
   ============================================================ */
function enhanceSearchable(scope){
  const root = scope || document;
  const sels = root.querySelectorAll ? root.querySelectorAll('select') : [];
  sels.forEach(sel => {
    if(sel.dataset.seDone) return;
    if(sel.classList.contains('no-search')) return;
    const long = sel.options.length >= 8 || sel.classList.contains('sel-search');
    if(!long) return;
    sel.dataset.seDone = '1';

    const wrap = document.createElement('div'); wrap.className = 'se-wrap';
    sel.parentNode.insertBefore(wrap, sel); wrap.appendChild(sel);
    sel.style.display = 'none';

    const input = document.createElement('input');
    input.type = 'text'; input.className = 'input se-input'; input.autocomplete = 'off';
    input.placeholder = 'Ketik untuk mencari…';
    const menu = document.createElement('div'); menu.className = 'se-menu';
    wrap.appendChild(input); wrap.appendChild(menu);

    const opts = () => Array.from(sel.options).map((o,i) => ({ v:o.value, t:o.textContent, i, dis:o.disabled }));
    const showSel = () => { const o = sel.options[sel.selectedIndex]; input.value = o ? o.textContent : ''; };
    let active = -1;
    function build(filter){
      const f = (filter||'').toLowerCase().trim();
      const list = opts().filter(o => !o.dis && o.t.toLowerCase().includes(f));
      active = list.length ? 0 : -1;
      menu.innerHTML = list.length
        ? list.map((o,idx) => `<div class="se-item${idx===active?' on':''}" data-i="${o.i}">${escapeHtml(o.t)}</div>`).join('')
        : '<div class="se-empty">Tidak ada hasil</div>';
      menu._list = list;
    }
    function place(){
      menu.classList.remove('up');
      requestAnimationFrame(()=>{
        const r=input.getBoundingClientRect();
        const below=window.innerHeight-r.bottom, above=r.top;
        const h=Math.min(menu.scrollHeight||0,240);
        if(below < h+16 && above > below) menu.classList.add('up'); else menu.classList.remove('up');
      });
    }
    function open(){ build(''); menu.classList.add('open'); place(); }
    function close(){ menu.classList.remove('open'); menu.classList.remove('up'); showSel(); }
    function pick(optIndex){ sel.selectedIndex = optIndex; sel.dispatchEvent(new Event('change',{bubbles:true})); showSel(); menu.classList.remove('open'); }

    input.addEventListener('focus', () => { open(); input.select(); });
    input.addEventListener('input', () => { build(input.value); menu.classList.add('open'); place(); });
    input.addEventListener('keydown', (e) => {
      const items = Array.from(menu.querySelectorAll('.se-item'));
      if(e.key === 'ArrowDown'){ e.preventDefault(); active = Math.min(active+1, items.length-1); items.forEach((it,i)=>it.classList.toggle('on',i===active)); items[active]?.scrollIntoView({block:'nearest'}); }
      else if(e.key === 'ArrowUp'){ e.preventDefault(); active = Math.max(active-1, 0); items.forEach((it,i)=>it.classList.toggle('on',i===active)); items[active]?.scrollIntoView({block:'nearest'}); }
      else if(e.key === 'Enter'){ e.preventDefault(); if(items[active]) pick(Number(items[active].dataset.i)); }
      else if(e.key === 'Escape'){ close(); input.blur(); }
    });
    menu.addEventListener('mousedown', (e) => { const it = e.target.closest('.se-item'); if(!it) return; e.preventDefault(); pick(Number(it.dataset.i)); });
    input.addEventListener('blur', () => setTimeout(close, 150));
    showSel();
  });
}
// Panggil setelah opsi sebuah select diganti via kode, agar tampilan combobox ikut sinkron.

function escapeHtml(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function csvDownload(filename, rows){
  if(!rows.length){ toast('Tidak ada data untuk diunduh','warn'); return; }
  const headers = Object.keys(rows[0]);
  const escape = (v) => {
    if(v===null||v===undefined) return '';
    const s = String(v).replace(/"/g,'""');
    return /[",\n]/.test(s) ? `"${s}"` : s;
  };
  const csv = [headers.join(','), ...rows.map(r => headers.map(h => escape(r[h])).join(','))].join('\n');
  const blob = new Blob(['\ufeff'+csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

async function captureDashboardJpg(){
  const host = document.querySelector('#dash-capture-host');
  if(!host){ toast('Dashboard tidak ditemukan','warn'); return; }
  if(typeof html2canvas === 'undefined'){
    toast('Library html2canvas belum termuat. Cek koneksi internet.','error');
    return;
  }
  const btn = document.querySelector('#dash-screenshot');
  const original = btn ? btn.innerHTML : '';
  if(btn){ btn.disabled = true; btn.innerHTML = '<span class="material-symbols-rounded">hourglass_top</span>Mengambil...'; }

  // Save scroll, then make sure no transient state (sticky bars, scroll position) affects capture
  const savedScroll = window.scrollY;
  window.scrollTo(0, 0);
  // Give the layout 2 frames to settle, then a tiny delay so Chart.js animations finish
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
  await new Promise(r => setTimeout(r, 200));

  try{
    // The dashboard may have content wider than offsetWidth on flex/grid layouts,
    // so use the larger of scrollWidth / offsetWidth and add an 8px right buffer
    // to absorb anti-aliasing or sub-pixel issues on the far edge of charts.
    const rawW = Math.max(host.scrollWidth, host.offsetWidth);
    const rawH = Math.max(host.scrollHeight, host.offsetHeight);
    const w = Math.ceil(rawW) + 8;
    const h = Math.ceil(rawH) + 8;

    const canvas = await html2canvas(host, {
      backgroundColor: '#FFFFFF',
      scale: 2,                // hi-DPI for crisp output
      useCORS: true,
      logging: false,
      width:  w,
      height: h,
      windowWidth:  Math.max(w, document.documentElement.clientWidth),
      windowHeight: Math.max(h, document.documentElement.clientHeight),
      x: 0,
      y: 0,
      scrollX: -window.scrollX,
      scrollY: -window.scrollY
    });
    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    const a = document.createElement('a');
    const ts = new Date().toISOString().slice(0,16).replace(/[:T]/g,'-');
    a.href = dataUrl;
    a.download = `dashboard-CRM-GA-${ts}.jpg`;
    a.click();
    toast('Screenshot Dashboard berhasil diunduh','success');
    db.logActivity({ action:'dashboard.screenshot', target_type:'dashboard', target_id:null,
      detail:`Screenshot Dashboard di-download (${a.download})` });
  }catch(err){
    console.error('[screenshot]', err);
    toast('Gagal mengambil screenshot: '+(err.message||''),'error');
  }finally{
    window.scrollTo(0, savedScroll);
    if(btn){ btn.disabled = false; btn.innerHTML = original; }
  }
}

/* ----- Backup Data (ZIP berisi satu .csv per tabel — siap re-import ke Supabase per tabel) ----- */
function rowsToCsv(rows){
  if(!rows || !rows.length) return '';
  const cols=[]; const seen=new Set();
  rows.forEach(r=>Object.keys(r).forEach(k=>{ if(!seen.has(k)){ seen.add(k); cols.push(k); } }));
  const esc=(v)=>{
    if(v===null||v===undefined) return '';
    if(typeof v==='object') v=JSON.stringify(v);
    const s=String(v).replace(/"/g,'""');
    return /[",\n\r]/.test(s) ? `"${s}"` : s;
  };
  const lines=[cols.join(',')];
  rows.forEach(r=>lines.push(cols.map(c=>esc(r[c])).join(',')));
  return lines.join('\n');
}
const BACKUP_TABLES = ['app_users','counters','requests','ratings','version_history','notifications',
  'lokasi_options','tujuan_options','lokasi_kerja_options','activity_logs','sla_targets',
  'mata_anggaran_options','divisi_options','departemen_options','kategori_options','approvals',
  'payments','kendaraan_options','anggaran_funds','anggaran_topups','cdp_plans','recurring_payments',
  'pc_reimburse','pc_master','pc_dropdown','pc_relasi','pc_cash','pc_log','karyawan_options'];
async function downloadBackupZip(){
  if(typeof JSZip === 'undefined'){ toast('Library JSZip belum termuat. Cek koneksi internet.','error'); return; }
  if(!SUPA_CONFIGURED){ toast('Backup per-tabel hanya tersedia saat terhubung ke Supabase.','warn'); return; }
  const btn = document.querySelector('#md-backup');
  const original = btn ? btn.innerHTML : '';
  if(btn){ btn.disabled = true; btn.innerHTML = '<span class="material-symbols-rounded">hourglass_top</span>Menyiapkan…'; }
  try{
    const zip = new JSZip();
    let withData=0, empty=0; const failed=[];
    for(const t of BACKUP_TABLES){
      let rows=[];
      try{ const { data, error } = await supa.from(t).select('*'); if(error) throw error; rows = data||[]; }
      catch(e){ failed.push(t); continue; }
      if(t==='app_users') rows = rows.map(r=>{ const c={...r}; delete c.password_hash; delete c.password; delete c.pass; return c; });
      zip.file(t + '.csv', rowsToCsv(rows));
      if(rows.length) withData++; else empty++;
    }
    const blob = await zip.generateAsync({ type:'blob' });
    const ts = new Date().toISOString().slice(0,10);
    const fname = `backup-supabase-${ts}.zip`;
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=fname; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
    toast(`Backup ZIP siap — ${withData} tabel berisi data${empty?`, ${empty} kosong`:''}${failed.length?`, ${failed.length} gagal/diblokir`:''}`,'success');
    db.logActivity({ action:'backup.download', target_type:'backup', target_id:null, detail:`Backup ZIP per-tabel (${fname})` });
  }catch(err){ console.error('[backup zip]', err); toast('Gagal membuat backup: '+(err.message||''),'error'); }
  finally{ if(btn){ btn.disabled=false; btn.innerHTML=original; } }
}

    // Ratings: walk request ids
    let ratings = [];
    for(const r of reqs){
      try{
        const rt = await db.getRatingByRequest(r.id);
        if(rt) ratings.push({ ...rt, kode_permintaan:r.kode_permintaan, nama_pemesan:r.nama_pemesan });
      }catch{}
    }

    // Notifications (best-effort)
    let notifs = [];
    try{
      if(typeof supa !== 'undefined' && SUPA_CONFIGURED){
        const { data } = await supa.from('notifications').select('*').order('created_at',{ascending:false}).limit(5000);
        notifs = data || [];
      } else {
        notifs = (typeof demo !== 'undefined' && demo.notifications) ? [...demo.notifications] : [];
      }
    }catch{}

    const wb = XLSX.utils.book_new();
    const addSheet = (name, rows) => {
      const ws = XLSX.utils.json_to_sheet(rows && rows.length ? rows : [{ note:'(kosong)' }]);
      XLSX.utils.book_append_sheet(wb, ws, name.slice(0,31));   // Excel sheet name max 31 chars
    };

    // Flatten requests + add SLA info per row
    const slaMap = {}; (slas||[]).forEach(s => slaMap[s.kategori] = s.target_hours);
    const reqsOut = (reqs||[]).map(r => {
      const target = slaMap[r.kategori] || null;
      let resolusiJam = '';
      let slaStatus = 'Belum Selesai';
      if(r.completed_at){
        const ms = new Date(r.completed_at) - new Date(r.created_at);
        resolusiJam = (ms / 36e5).toFixed(2);
        if(target != null) slaStatus = (Number(resolusiJam) <= target) ? 'On-time' : 'Terlambat';
      }
      return {
        ID: r.id,
        Kode_Permintaan: r.kode_permintaan,
        Kode_SmartOffice: r.kode_smartoffice||'',
        Kategori: r.kategori,
        Sumber: r.sumber_pemesanan,
        Nama_Pemesan: r.nama_pemesan,
        Nama_Kegiatan: r.nama_kegiatan||'',
        Divisi: r.divisi||'',
        Departemen: r.departemen||'',
        Mata_Anggaran: r.mata_anggaran||'',
        Lokasi_Kebutuhan: r.lokasi_kebutuhan||'',
        Tujuan_Kebutuhan: r.tujuan_kebutuhan||'',
        Tanggal_Kebutuhan: r.tanggal_kebutuhan,
        Detail: r.detail_kebutuhan,
        Estimasi_Harga: r.estimasi_harga||0,
        Total_Anggaran: r.total_anggaran||0,
        Status: r.status,
        Keterangan: r.keterangan||'',
        Vendor: r.nama_vendor||'',
        PIC_GA: r.nama_pic_ga||'',
        Estimasi_Selesai: r.estimasi_penyelesaian||'',
        Tgl_Dibuat: r.created_at,
        Tgl_Selesai: r.completed_at||'',
        SLA_Target_Jam: target ?? '',
        Resolusi_Jam: resolusiJam,
        SLA_Status: slaStatus,
        Bukti_Foto_URL: r.bukti_foto_url||'',
        Bukti_TandaTerima_URL: r.bukti_tt_url||'',
        Completed_At_Edited_By: r.completed_at_edited_by||'',
        Completed_At_Edited_At: r.completed_at_edited_at||'',
        Completed_At_Edit_Reason: r.completed_at_edit_reason||''
      };
    });

    addSheet('Requests',      reqsOut);
    addSheet('Users',         (users||[]).map(u => ({
      ID:u.id, Username:u.username, Nama_Lengkap:u.full_name, Role:u.role,
      Jabatan:u.jabatan||'', Lokasi_Kerja:u.lokasi_kerja||'',
      Active: u.active === false ? 'Nonaktif' : 'Aktif',
      Dibuat: u.created_at||''
    })));
    addSheet('Ratings',       (ratings||[]).map(r => ({
      ID:r.id, Request_ID:r.request_id, Kode_Permintaan:r.kode_permintaan||'',
      Nama_Pemesan:r.nama_pemesan||'',
      Rating:r.rating, Kritik_Saran:r.kritik_saran||'', Dibuat:r.created_at
    })));
    addSheet('Notifications', (notifs||[]).map(n => ({
      ID:n.id, User_ID:n.user_id, Request_ID:n.request_id,
      Type:n.type, Title:n.title, Body:n.body, Read_At:n.read_at||'', Created_At:n.created_at
    })));
    addSheet('ActivityLogs',  (logs||[]).map(l => ({
      ID:l.id, Waktu:l.created_at, User_ID:l.user_id||'', Username:l.username||'',
      Action:l.action, Target_Type:l.target_type||'', Target_ID:l.target_id||'',
      Detail:l.detail||''
    })));
    addSheet('SlaTargets',    (slas||[]).map(s => ({
      Kategori:s.kategori, Kategori_Kode:s.kategori_kode, Target_Jam:s.target_hours,
      Deskripsi:s.description||'', Updated_At:s.updated_at||''
    })));
    addSheet('MataAnggaran',  (ma||[]).map(m => ({ Nama:m.name, Kode:m.kode||'', Deskripsi:m.description||'' })));
    addSheet('Divisi',        (divs||[]).map(d => ({ ID:d.id, Nama:d.name })));
    addSheet('Departemen',    (deps||[]).map(d => {
      const dv = (divs||[]).find(x => x.id === d.divisi_id);
      return { ID:d.id, Nama:d.name, Divisi:dv?dv.name:'', Divisi_ID:d.divisi_id };
    }));
    addSheet('Lokasi',        (lok||[]).map(o => ({ Nama:o.name })));
    addSheet('LokasiKerja',   (lk||[]).map(o => ({ Nama:o.name })));
    addSheet('Tujuan',        (tuj||[]).map(o => ({ Nama:o.name })));
    addSheet('Version',       (ver||[]).map(v => ({ Versi:v.version, Tanggal:v.release_date, Perubahan:v.changes })));

    const ts = new Date().toISOString().slice(0,10);
    const fname = `backup-CRM-GA-${ts}.xlsx`;
    XLSX.writeFile(wb, fname);
    toast('Backup berhasil diunduh','success');
    db.logActivity({ action:'backup.download', target_type:'backup', target_id:null,
      detail:`Backup XLSX di-download (${fname})` });
  }catch(err){
    console.error('[backup]', err);
    toast('Gagal membuat backup: '+(err.message||''),'error');
  }finally{
    if(btn){ btn.disabled = false; btn.innerHTML = original; }
  }
}

/* Session — persisted in localStorage so closing/reopening tab,
   and bouncing between landing and admin, never logs the user out. */
const session = {
  get(){ try{ return JSON.parse(localStorage.getItem('ga_session')); }catch{ return null; } },
  set(u){ localStorage.setItem('ga_session', JSON.stringify(u)); },
  clear(){ localStorage.removeItem('ga_session'); }
};

/* ============================================================
   ROUTER
   ============================================================ */
function parseHash(){
  const h = location.hash.replace(/^#\/?/, '');
  if(!h || h.startsWith('dashboard') || h.startsWith('tracker') || h.startsWith('howto') || h.startsWith('form')) {
    return { route:'landing', anchor:h };
  }
  const parts = h.split('/');
  return { route: parts[0]||'landing', param: parts[1]||null };
}
function navigate(to){ location.hash = to; }

function mount(templateId){
  const tpl = document.getElementById(templateId);
  $('#app').innerHTML = '';
  $('#app').appendChild(tpl.content.cloneNode(true));
}

async function route(){
  const { route: r, anchor, param } = parseHash();

  if(r === 'login')        return renderLogin();
  if(r === 'admin')        return renderAdmin(param || 'dashboard');
  if(r === 'rate')         return renderRating(param);
  if(r === 'version')      return renderVersionPublic();
  // default
  await renderLanding();
  if(anchor){
    setTimeout(()=>{
      const el = document.getElementById(anchor);
      if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
    }, 100);
  }
}
window.addEventListener('hashchange', route);

/* ============================================================
   DIVISI ↔ DEPARTEMEN FIELDS (cascading + auto-add) — fix #2
   ------------------------------------------------------------
   Bugs fixed vs. the old inline version:
   • After a successful submit the dropdowns + "new" text inputs are now
     reset cleanly (state desync no longer lingers).
   • Newly auto-added Divisi/Departemen are reloaded so they appear on the
     next submission without a full page reload.
   • Master lists (divs/deps) are kept inside the controller and reloaded by
     refresh(), so the change-handler never reads a stale closure array.
   • Choosing "+ Tambah Divisi baru" no longer hard-locks Departemen into
     "new" mode — the user may still leave Departemen empty.
   ============================================================ */
let _divDepCtl = null;
function setupDivisiDepartemenFields(initial){
  const inDiv  = $('#input-divisi');
  const inDep  = $('#input-departemen');
  const menuDiv = $('#menu-divisi');
  const menuDep = $('#menu-departemen');
  if(!inDiv || !inDep) return null;

  let divs = (initial && initial.divs) || [];
  let deps = (initial && initial.deps) || [];
  const lc = s => (s||'').trim().toLowerCase();
  const findDiv = () => divs.find(x => lc(x.name) === lc(inDiv.value)) || null;

  function buildDivItems(){
    const q = lc(inDiv.value);
    let list = divs.slice().sort((a,b)=> a.name.localeCompare(b.name));
    if(q) list = list.filter(d => lc(d.name).includes(q));
    const items = list.map(d => ({ type:'opt', label:d.name }));
    const exact = divs.some(d => lc(d.name) === q);
    if(inDiv.value.trim() && !exact) items.push({ type:'add', label:`Tambah "${inDiv.value.trim()}"`, value:inDiv.value.trim() });
    return items;
  }
  function buildDepItems(){
    const did = findDiv()?.id || null;
    const q = lc(inDep.value);
    let pool = did ? deps.filter(d => d.divisi_id === did) : [];
    pool = pool.slice().sort((a,b)=> a.name.localeCompare(b.name));
    if(q) pool = pool.filter(d => lc(d.name).includes(q));
    const items = pool.map(d => ({ type:'opt', label:d.name }));
    const exact = did && deps.some(d => d.divisi_id===did && lc(d.name)===q);
    if(inDep.value.trim() && !exact) items.push({ type:'add', label:`Tambah "${inDep.value.trim()}"`, value:inDep.value.trim() });
    return items;
  }
  function renderMenu(menu, items){
    if(!items.length){ menu.innerHTML = '<div class="combo-empty">Ketik untuk menambah baru…</div>'; return; }
    menu.innerHTML = items.map((it,i)=>
      `<div class="combo-item ${it.type==='add'?'add':''}" data-i="${i}" role="option">
         <span class="material-symbols-rounded">${it.type==='add'?'add_circle':'corporate_fare'}</span>
         <span>${escapeHtml(it.label)}</span>
       </div>`).join('');
  }
  function bindCombo(input, menu, buildItems, onChoose){
    let items = [], active = -1;
    const open = () => { items = buildItems(); renderMenu(menu, items); menu.classList.add('show'); input.setAttribute('aria-expanded','true'); active = -1; wire(); };
    const close = () => { menu.classList.remove('show'); input.setAttribute('aria-expanded','false'); active = -1; };
    const wire = () => $$('.combo-item', menu).forEach(el =>
      el.addEventListener('mousedown', e => { e.preventDefault(); onChoose(items[+el.dataset.i]); close(); }));
    const paint = () => { const els = $$('.combo-item', menu); els.forEach((el,i)=> el.classList.toggle('active', i===active)); if(els[active]) els[active].scrollIntoView({block:'nearest'}); };
    input.addEventListener('focus', open);
    input.addEventListener('input', () => { if(input===inDiv) syncDepEnabled(); open(); });
    input.addEventListener('keydown', e => {
      if(!menu.classList.contains('show')){ if(e.key==='ArrowDown') open(); return; }
      const els = $$('.combo-item', menu);
      if(e.key==='ArrowDown'){ e.preventDefault(); active = Math.min(active+1, els.length-1); paint(); }
      else if(e.key==='ArrowUp'){ e.preventDefault(); active = Math.max(active-1, 0); paint(); }
      else if(e.key==='Enter'){ if(active>=0 && items[active]){ e.preventDefault(); onChoose(items[active]); close(); } }
      else if(e.key==='Escape'){ close(); }
    });
    input.addEventListener('blur', () => setTimeout(close, 130));
  }
  function syncDepEnabled(){
    const hasDiv = !!inDiv.value.trim();
    inDep.disabled = !hasDiv;
    inDep.placeholder = hasDiv ? 'Ketik untuk mencari Departemen…' : 'Pilih Divisi terlebih dahulu…';
    if(!hasDiv) inDep.value = '';
  }

  bindCombo(inDiv, menuDiv, buildDivItems, (it) => {
    if(!it) return;
    inDiv.value = it.type==='opt' ? it.label : (it.value||'');
    syncDepEnabled();
    inDep.value = '';
  });
  bindCombo(inDep, menuDep, buildDepItems, (it) => {
    if(!it) return;
    inDep.value = it.type==='opt' ? it.label : (it.value||'');
  });

  function reset(){
    inDiv.value=''; inDep.value=''; syncDepEnabled();
    menuDiv.classList.remove('show'); menuDep.classList.remove('show');
  }
  async function refresh(){
    try{ divs = await db.listDivisi().catch(()=>divs); deps = await db.listDepartemen().catch(()=>deps); }
    catch(e){ console.warn('[divdep refresh]', e); }
    reset();
  }
  syncDepEnabled();
  return { refresh, reset, getDivs:()=>divs, getDeps:()=>deps };
}

function setupRequestForm(){
  const formToggle = $('#form-toggle');
  const formBody = $('#form-body');
  if(formToggle && formBody){
    const toggleFn = () => {
      const willOpen = !formToggle.classList.contains('open');
      formToggle.classList.toggle('open', willOpen);
      formBody.classList.toggle('open', willOpen);
      formToggle.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
    };
    formToggle.addEventListener('click', toggleFn);
    formToggle.addEventListener('keydown', e => { if(e.key==='Enter' || e.key===' '){ e.preventDefault(); toggleFn(); } });
    // Auto-open when the user jumps to the form (nav / hero CTA / direct hash)
    const openForm = () => { formToggle.classList.add('open'); formBody.classList.add('open'); formToggle.setAttribute('aria-expanded','true'); };
    $$('a[href="#form"]').forEach(a => a.addEventListener('click', () => setTimeout(openForm, 60)));
    if(location.hash === '#form') setTimeout(openForm, 60);
  }

  const form = $('#request-form');
  if(!form) return;

  const katSel = form.querySelector('select[name="kategori"]');
  const kodePreview = $('#kode-preview');
  const smartoffField = $('#smartoffice-field');
  const inputHarga = $('#input-harga');
  const koSection = $('#ko-section');
  let _koDriversLoaded = false;

  async function ensureKoDrivers(){
    if(_koDriversLoaded) return;
    const sel = $('#ko-driver');
    if(!sel) return;
    try{
      const fleet = await db.listKendaraan().catch(()=>[]);
      sel.innerHTML = '<option value="">— Pilih armada —</option>' +
        fleet.filter(v => v.active !== false).map(v =>
          `<option value="${escapeHtml(v.id)}">${escapeHtml(v.nama_driver)} · ${escapeHtml(v.nomor_polisi||'')} (${escapeHtml(v.keterangan||v.ownership||'')})</option>`).join('');
      _koDriversLoaded = true;
    }catch(e){ console.warn('[ko drivers]', e); }
  }

  if(katSel) katSel.addEventListener('change', () => {
    const k = KATEGORI_KODE[katSel.value];
    if(k){
      if(kodePreview) kodePreview.value = `${k}-${todayKey()}#### (nomor urut otomatis saat submit)`;
      if(smartoffField) smartoffField.style.display = SMARTOFFICE_REQUIRED.includes(k) ? '' : 'none';
    } else {
      if(kodePreview) kodePreview.value = '';
      if(smartoffField) smartoffField.style.display = 'none';
    }
    // Kendaraan Operasional booking section
    const isKO = katSel.value === KO_KATEGORI;
    if(koSection) koSection.style.display = isKO ? '' : 'none';
    if(isKO) ensureKoDrivers();
  });

  // Rupiah formatter
  if(inputHarga) inputHarga.addEventListener('input', e => {
    const digits = e.target.value.replace(/\D/g,'');
    e.target.value = digits ? 'Rp ' + Number(digits).toLocaleString('id-ID') : '';
  });

  // Submit
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = $('#submit-btn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="material-symbols-rounded">hourglass_top</span>Mengirim...';

    try{
      const fd = new FormData(form);
      const kategori = fd.get('kategori');
      if(!kategori) throw new Error('Pilih kategori terlebih dahulu');
      const prefix = KATEGORI_KODE[kategori];
      const kode = await db.generateCode(prefix);

      // Validate file
      const fileInput = $('#input-lampiran');
      let lampiran_url = null;
      if(fileInput && fileInput.files.length){
        const f = fileInput.files[0];
        const okType = ['application/pdf','image/png'].includes(f.type) || /\.(pdf|png)$/i.test(f.name);
        if(!okType) throw new Error('Tipe lampiran harus PDF atau PNG');
        if(f.size > 1*1024*1024) throw new Error('Lampiran melebihi 1 MB');
        try{ lampiran_url = await db.uploadAttachment(f); }
        catch(uerr){ console.warn('Upload skipped:', uerr); }
      }

      const hargaDigits = (fd.get('estimasi_harga')||'').toString().replace(/\D/g,'');

      // Resolve Divisi & Departemen — the user may pick an existing one
      // OR type a brand-new name, which gets auto-added to the master.
      // Fix #2: best-effort auto-add. Even if the master insert is blocked
      // (RLS / race / duplicate), the request still records the typed names
      // and never throws, so the form can't get stuck "sometimes".
      // Resolve Divisi & Departemen from the type-search inputs (name-based).
      // The user types a name; if it does not exist yet it is auto-added to the
      // master (best-effort — a blocked insert still records the typed name so
      // the submit never gets stuck).
      const lcEq = (a,b) => (a||'').trim().toLowerCase() === (b||'').trim().toLowerCase();
      let divList = await db.listDivisi().catch(() => []);
      let divisiName = (fd.get('divisi') || '').toString().trim() || null;
      let resolvedDivisiId = '';
      if(divisiName){
        let d = divList.find(x => lcEq(x.name, divisiName));
        if(!d){
          try{ d = await db.addDivisi({ name: divisiName }); }
          catch(divErr){
            console.warn('addDivisi gagal:', divErr);
            divList = await db.listDivisi().catch(() => divList);
            d = divList.find(x => lcEq(x.name, divisiName));
          }
        }
        if(d){ divisiName = d.name; resolvedDivisiId = d.id; }
      }

      let departemenName = (fd.get('departemen') || '').toString().trim() || null;
      if(departemenName && resolvedDivisiId){
        let depList = await db.listDepartemen().catch(() => []);
        let dep = depList.find(x => x.divisi_id === resolvedDivisiId && lcEq(x.name, departemenName));
        if(!dep){
          try{ dep = await db.addDepartemen({ name: departemenName, divisi_id: resolvedDivisiId }); }
          catch(depErr){
            console.warn('addDepartemen gagal:', depErr);
            depList = await db.listDepartemen().catch(() => depList);
            dep = depList.find(x => x.divisi_id === resolvedDivisiId && lcEq(x.name, departemenName));
          }
        }
        departemenName = dep ? dep.name : departemenName;
      }
      // (departemen typed without a resolvable divisi keeps its typed name)

      // v1.9: Kendaraan Operasional booking detail (when that category is chosen)
      let kendaraan_detail = null;
      if(kategori === KO_KATEGORI){
        const drvSel = $('#ko-driver');
        const drvId = drvSel ? drvSel.value : '';
        const drvLabel = drvId && drvSel.selectedOptions[0] ? drvSel.selectedOptions[0].textContent : '';
        kendaraan_detail = {
          area:        $('#ko-area')?.value || '',
          driver_id:   drvId || '',
          driver_label:drvLabel || '',
          kontak:      $('#ko-kontak')?.value || '',
          prioritas:   $('#ko-prioritas')?.value || '',
          jenis_layanan: $('#ko-layanan')?.value || '',
          jam:         $('#ko-jam')?.value || '',
          titik_jemput:$('#ko-jemput')?.value || '',
          tujuan:      $('#ko-tujuan')?.value || ''
        };
      }

      const payload = {
        kode_permintaan: kode,
        kode_smartoffice: fd.get('kode_smartoffice') || null,
        kategori,
        kategori_kode: prefix,
        sumber_pemesanan: fd.get('sumber_pemesanan'),
        nama_pemesan: fd.get('nama_pemesan'),
        nama_kegiatan: fd.get('nama_kegiatan') || null,
        lokasi_kebutuhan: fd.get('lokasi_kebutuhan') || null,
        tujuan_kebutuhan: fd.get('tujuan_kebutuhan') || null,
        divisi:        divisiName,
        departemen:    departemenName,
        tanggal_kebutuhan: fd.get('tanggal_kebutuhan'),
        detail_kebutuhan: fd.get('detail_kebutuhan'),
        estimasi_harga: hargaDigits ? Number(hargaDigits) : 0,
        lampiran_url,
        pakai_anggaran_ga: true,
        kendaraan_detail,
        status: 'Belum Dikonfirmasi'
      };

      const inserted = await db.insertRequest(payload);
      db.logActivity({
        user_id:null, username:null, full_name:payload.nama_pemesan,
        action:'request.create.public',
        target_type:'request', target_id:inserted?.id,
        detail:`Permintaan baru ${kode} dari ${payload.nama_pemesan} (${payload.kategori})`
      });

      // success popup
      openModal(`
        <div class="modal-body center">
          <div class="success-mark"><span class="material-symbols-rounded">check</span></div>
          <h3 style="margin:0 0 8px;font-size:18px">Terima kasih!</h3>
          <p class="muted" style="margin:0 0 14px">Permintaan Anda dengan kode berikut telah kami terima.</p>
          <div class="flex gap-2 items-center" style="justify-content:center;margin-bottom:8px">
            <span class="code-pill" id="copy-code-src">${escapeHtml(kode)}</span>
            <button class="copy-mini" id="copy-code-btn" title="Salin"><span class="material-symbols-rounded">content_copy</span></button>
          </div>
          <p class="muted text-sm" style="margin:10px 0 0">Mohon tunggu informasi pengambilan yang akan disampaikan oleh tim General Affairs.</p>
        </div>
        <div class="modal-foot" style="justify-content:center">
          <button class="btn btn-primary" onclick="closeModal()"><span class="material-symbols-rounded">close</span>Tutup</button>
        </div>
      `, 'sm');
      $('#copy-code-btn').addEventListener('click', (ev)=> copyText(kode, ev.currentTarget));

      form.reset();
      if(kodePreview) kodePreview.value = '';
      if(smartoffField) smartoffField.style.display='none';
      // Fix #2: reload masters + reset the Divisi/Departemen fields so any
      // freshly auto-added entry shows next time and no stale "new" input lingers.
      if(_divDepCtl){ try{ await _divDepCtl.refresh(); }catch{} }
      toast('Permintaan tersimpan','success');
      // refresh stats lightly
      try{
        const reqs = await db.listRequests();
        const a = $('#stat-total'); if(a) a.textContent = reqs.length;
        const t = $('#stat-today'); if(t) t.textContent = reqs.filter(r=>r.created_at && r.created_at.slice(0,10)===new Date().toISOString().slice(0,10)).length;
      }catch{}
    }catch(err){
      console.error(err);
      toast(err.message || 'Gagal mengirim permintaan','error');
    }finally{
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<span class="material-symbols-rounded">send</span>Submit Permintaan';
    }
  });
}

   ============================================================ */
async function renderAdmin(page){
  if(!session.get()){ navigate('/login'); return; }
  mount('tpl-admin');

  const u = session.get();
  $('#user-name').textContent = u.full_name;
  $('#user-role').textContent = u.role;
  $('#user-avatar').textContent = (u.full_name||'A').slice(0,1).toUpperCase();

  const doLogout = () => {
    db.logActivity({ action:'auth.logout', target_type:'auth', detail:'Logout' });
    if(_bellTimer){ clearInterval(_bellTimer); _bellTimer = null; }
    session.clear(); toast('Berhasil keluar','info'); navigate('/');
  };
  $('#logout-btn-side').onclick = doLogout;
  $('#logout-btn-top').onclick  = doLogout;

  // Sidebar nav
  // v2.0.1: per-user page-access override takes precedence over role defaults.
  const _ap = getAllowedPages(u); // array of allowed routes, or null = use role default
  if(_ap){
    // explicit access list: gate purely by it (dashboard always allowed)
    $$('#admin-nav .nav-item').forEach(it => {
      const route = it.dataset.route;
      if(route !== 'dashboard' && !_ap.includes(route)){ it.style.display = 'none'; return; }
      it.classList.toggle('active', route===page);
      it.addEventListener('click', e => { e.preventDefault(); navigate('/admin/'+route); });
    });
  } else {
    // v2.1: gate whole groups by role, then gate individual items
    $$('#admin-nav .nav-group').forEach(g => {
      const allowed = g.dataset.allowedRoles ? g.dataset.allowedRoles.split(',').map(s=>s.trim()) : null;
      if(allowed && !allowed.includes(u.role)) g.style.display = 'none';
    });
    $$('#admin-nav .sidebar-section-label').forEach(lab => {
      const allowed = lab.dataset.allowedRoles ? lab.dataset.allowedRoles.split(',').map(s=>s.trim()) : null;
      if(allowed && !allowed.includes(u.role)) lab.style.display = 'none';
    });
    $$('#admin-nav .nav-item').forEach(it => {
      const rr = ROUTE_ROLES[it.dataset.route];
      if(rr && !rr.includes(u.role)){ it.style.display = 'none'; return; }
      const reqRole = it.dataset.requiresRole;
      const allowed = it.dataset.allowedRoles ? it.dataset.allowedRoles.split(',').map(s => s.trim()) : null;
      if(reqRole && u.role !== reqRole){ it.style.display = 'none'; return; }
      if(allowed && !allowed.includes(u.role)){ it.style.display = 'none'; return; }
      it.classList.toggle('active', it.dataset.route===page);
      it.addEventListener('click', e => { e.preventDefault(); navigate('/admin/'+it.dataset.route); });
    });
  }

  // v2.1: hide any group whose items are all hidden; collapse/expand wiring
  let collapsedGroups = {};
  try{ collapsedGroups = JSON.parse(localStorage.getItem('gass-nav-groups')||'{}'); }catch{}
  $$('#admin-nav .nav-group').forEach(g => {
    if(g.style.display === 'none') return;
    const items = $$('.nav-item', g);
    const anyVisible = items.some(i => i.style.display !== 'none');
    if(!anyVisible){ g.style.display = 'none'; return; }
    const key = g.dataset.group;
    // restore persisted state; keep the group containing the active route open
    const hasActive = items.some(i => i.dataset.route === page && i.style.display !== 'none');
    if(collapsedGroups[key] && !hasActive) g.classList.add('collapsed');
    const head = $('.nav-group-head', g);
    if(head) head.addEventListener('click', () => {
      g.classList.toggle('collapsed');
      collapsedGroups[key] = g.classList.contains('collapsed');
      try{ localStorage.setItem('gass-nav-groups', JSON.stringify(collapsedGroups)); }catch{}
    });
  });

  // v1.7: Refresh approval badge count
  refreshApprovalBadge(u);

  // Hamburger
  const sidebar = $('#sidebar');
  const backdrop = $('#mobile-backdrop');
  const ham = $('#hamburger-btn');
  const isMobile = () => window.innerWidth <= 768;
  ham.addEventListener('click', () => {
    if(isMobile()){
      sidebar.classList.toggle('mobile-open');
      backdrop.classList.toggle('show', sidebar.classList.contains('mobile-open'));
    } else {
      sidebar.classList.toggle('collapsed');
    }
  });
  backdrop.addEventListener('click', () => {
    sidebar.classList.remove('mobile-open');
    backdrop.classList.remove('show');
  });
  // Close mobile sidebar on nav click
  $$('#admin-nav .nav-item').forEach(it => it.addEventListener('click', ()=>{
    if(isMobile()){ sidebar.classList.remove('mobile-open'); backdrop.classList.remove('show'); }
  }));

  // --- Notification bell ---
  setupBell(u);

  // v2.3: cek reminder Pembayaran Rutin (pop-up + bell) — sekali per sesi halaman
  checkRecurringReminders(u);

  const titles = {
    dashboard:'Dashboard',
    myticket:'Tiket Saya',
    approvals:'Persetujuan',
    requests:'Daftar Permintaan',
    ratings:'Daftar Penilaian',
    payments:'Payment',
    payments_nonga:'Payment Non-GA',
    recurring:'Pembayaran Rutin',
    petty:'Petty Cash',
    masterdata:'Master Data',
    kategori:'Kategori Pemesanan',
    divisi:'Divisi',
    departemen:'Departemen',
    karyawan:'Master Karyawan',
    pettydropdown:'Petty Cash — Kategori',
    kendaraan:'Armada Kendaraan',
    anggaran:'Manajemen Anggaran',
    users:'Manajemen User',
    slatargets:'SLA Target',
    activity:'Log Aktivitas',
    version:'Riwayat Versi'
  };
  $('#admin-title').textContent = titles[page] || 'Admin';
  $('#admin-crumbs').textContent = 'Admin · '+ (titles[page]||'');

  const c = $('#admin-content');

  // Access control for direct URL navigation (mirrors sidebar gating; honors per-user allowed_pages)
  if(!userCanAccess(u, page)){
    const ap = getAllowedPages(u);
    const who = ap ? 'akun Anda (akses telah dibatasi oleh Super Admin)'
                   : (ROUTE_ROLES[page]||[]).map(r => ROLE_LABEL[r] || r).join(' / ');
    c.innerHTML = `
      <div class="card card-pad center" style="background:#FEF3C7;border-color:#FCD34D">
        <span class="material-symbols-rounded" style="font-size:48px;color:#92400E">lock</span>
        <h3 style="margin:8px 0;color:#92400E">Akses Ditolak</h3>
        <p class="muted">Halaman <strong>${titles[page]||page}</strong> tidak dapat diakses oleh ${who}.</p>
        <a class="btn btn-primary" href="#/admin/dashboard" style="margin-top:8px">Kembali ke Dashboard</a>
      </div>`;
    return;
  }

  if(page==='dashboard')       await viewAdminDashboard(c);
  else if(page==='myticket')   await viewAdminMyTicket(c);
  else if(page==='approvals')  await viewAdminApprovals(c);
  else if(page==='requests')   await viewAdminRequests(c);
  else if(page==='ratings')    await viewAdminRatings(c);
  else if(page==='payments')   await viewAdminPayments(c);
  else if(page==='payments_nonga') await viewAdminPaymentsNonGA(c);
  else if(page==='recurring')  await viewAdminRecurring(c);
  else if(page==='petty')      await viewAdminPetty(c);
  else if(page==='anggaran')   await viewAdminAnggaran(c);
  else if(page==='masterdata') await viewAdminMaster(c);
  else if(page==='kategori')   await viewAdminKategori(c);
  else if(page==='divisi')     await viewAdminDivisi(c);
  else if(page==='departemen') await viewAdminDepartemen(c);
  else if(page==='karyawan')   await viewAdminKaryawan(c);
  else if(page==='pettydropdown') await viewAdminPettyDropdown(c);
  else if(page==='kendaraan')  await viewAdminKendaraan(c);
  else if(page==='users')      await viewAdminUsers(c);
  else if(page==='slatargets') await viewAdminSlaTargets(c);
  else if(page==='activity')   await viewAdminActivity(c);
  else if(page==='version')    await viewAdminVersion(c);
  else { navigate('/admin/dashboard'); }
  try{ enhanceSearchable(c); }catch(e){}   // v2.5: typesearch pada dropdown panjang
}

/* ----------- NOTIFICATION BELL ----------- */
let _bellTimer = null;
function setupBell(user){
  const btn = $('#bell-btn');
  const panel = $('#bell-panel');
  const list = $('#bell-list');
  const badge = $('#bell-badge');

  async function refresh(){
    try{
      const items = await db.listNotifications(user.id, { limit: 50 });
      const unread = items.filter(n => !n.read_at).length;
      badge.style.display = unread > 0 ? 'flex' : 'none';
      badge.textContent = unread > 9 ? '9+' : String(unread);

      if(!items.length){
        list.innerHTML = '<div class="bell-empty"><span class="material-symbols-rounded" style="font-size:36px;color:var(--text-soft);display:block;margin-bottom:6px">notifications_off</span>Tidak ada notifikasi</div>';
        return;
      }
      list.innerHTML = items.map(n => {
        const ago = relTime(n.created_at);
        const icon = n.type==='assigned' ? 'assignment_ind' : n.type==='status_change' ? 'sync' : 'notifications';
        return `
          <div class="bell-item ${!n.read_at?'unread':''}" data-id="${n.id}" data-req="${n.request_id||''}">
            <div class="bell-icon"><span class="material-symbols-rounded" style="font-size:20px">${icon}</span></div>
            <div class="bell-content">
              <p class="title">${escapeHtml(n.title)}</p>
              <p class="body">${escapeHtml(n.body||'')}</p>
              <div class="when">${ago}</div>
            </div>
          </div>`;
      }).join('');
      // Click on item -> open request detail (if any)
      $$('.bell-item', list).forEach(el => el.addEventListener('click', () => {
        const reqId = el.dataset.req;
        if(reqId){
          panel.classList.remove('show');
          openRequestDetail(reqId);
        }
      }));
    }catch(err){ console.error('[bell]', err); }
  }

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    panel.classList.toggle('show');
    if(panel.classList.contains('show')) refresh();
  });
  // Remove any prior document listener (when re-entering admin shell)
  if(window._bellDocHandler) document.removeEventListener('click', window._bellDocHandler);
  window._bellDocHandler = (e) => {
    const wrap = document.getElementById('bell-wrap');
    if(!wrap) return;            // admin not mounted right now
    if(!wrap.contains(e.target)) wrap.querySelector('.bell-panel')?.classList.remove('show');
  };
  document.addEventListener('click', window._bellDocHandler);

  $('#mark-all-read').addEventListener('click', async (e) => {
    e.stopPropagation();
    try{
      await db.markAllNotificationsRead(user.id);
      await refresh();
      toast('Semua notifikasi ditandai sudah dibaca','success', 1500);
    }catch(err){ toast('Gagal: '+(err.message||''),'error'); }
  });

  // initial badge + polling
  refresh();
  if(_bellTimer) clearInterval(_bellTimer);
  _bellTimer = setInterval(refresh, 30000);
}

function relTime(iso){
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if(diff < 60)   return 'Baru saja';
  if(diff < 3600) return Math.floor(diff/60) + ' menit lalu';
  if(diff < 86400) return Math.floor(diff/3600) + ' jam lalu';
  if(diff < 604800) return Math.floor(diff/86400) + ' hari lalu';
  return fmtDate(iso);
}

      <div class="stat-card"><div class="stat-icon warn"><span class="material-symbols-rounded">hourglass_top</span></div>
        <div class="stat-body"><span class="stat-label">Belum Diproses</span><span class="stat-value" id="adp-belum">—</span></div></div>
      <div class="stat-card"><div class="stat-icon purple"><span class="material-symbols-rounded">account_balance_wallet</span></div>
        <div class="stat-body"><span class="stat-label">Total Grand Total</span><span class="stat-value" id="adp-grand" style="font-size:18px">—</span></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0" id="adp-charts-row">
      <div class="card" style="margin:0">
        <div class="card-head"><h3>Status Pembayaran</h3></div>
        <div class="card-body"><canvas id="adp-chart-status" height="160"></canvas></div>
      </div>
      <div class="card" style="margin:0">
        <div class="card-head"><h3>Nilai Pembayaran (Lunas vs Outstanding)</h3></div>
        <div class="card-body"><canvas id="adp-chart-value" height="160"></canvas></div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <h3>Daftar Payment — Anggaran GA</h3>
        <a href="#/admin/payments" class="btn btn-ghost btn-sm" data-html2canvas-ignore="true">Buka Payment <span class="material-symbols-rounded" style="font-size:18px">arrow_forward</span></a>
      </div>
      <div class="card-body">
        <div id="adp-ga-list"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <h3>Daftar Permintaan Terbaru</h3>
        <a href="#/admin/requests" class="btn btn-ghost btn-sm" data-html2canvas-ignore="true">Lihat semua <span class="material-symbols-rounded" style="font-size:18px">arrow_forward</span></a>
      </div>
      <div class="card-body">
        <div id="ads-table-host"></div>
      </div>
    </div>
    </div><!-- /#dash-capture-host -->
  `;

  // Wire dashboard action buttons
  $('#dash-screenshot')?.addEventListener('click', () => captureDashboardJpg());

  let reqs;
  try{
    reqs = await db.listRequests();
  }catch(err){
    console.error('[dashboard]', err);
    const msg = /Failed to fetch/i.test(err.message||'')
      ? 'Tidak dapat terhubung ke Supabase. Periksa URL & ANON_KEY di index.html atau koneksi internet.'
      : ('Gagal memuat data: '+(err.message||''));
    $('#ads-table-host').innerHTML = `
      <div class="card-pad" style="background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;color:#991B1B">
        <strong>Gagal memuat data.</strong><br><span class="text-sm">${escapeHtml(msg)}</span>
      </div>`;
    return;
  }
  const targets = await getSlaTargets(true);   // refresh SLA cache
  $('#ads-total').textContent   = reqs.length;
  $('#ads-pending').textContent = reqs.filter(r=>r.status==='Belum Dikonfirmasi').length;
  $('#ads-ongoing').textContent = reqs.filter(r=>['Mencari Penyedia','Sedang Disiapkan','Tersedia'].includes(r.status)).length;
  $('#ads-done').textContent    = reqs.filter(r=>r.status==='Selesai').length;

  // SLA metrics — only over completed tickets
  const completed = reqs.filter(r => r.status === 'Selesai' && r.completed_at);
  const slas = completed.map(r => slaStatusFor(r, targets));
  const onTimeCount = slas.filter(s => s.status === 'ontime').length;
  const lateCount   = slas.filter(s => s.status === 'late').length;
  const evaluated = onTimeCount + lateCount;
  const avgHours = evaluated > 0
    ? slas.reduce((sum, s) => sum + (s.hoursUsed || 0), 0) / evaluated
    : null;
  const compliance = evaluated > 0 ? Math.round(onTimeCount / evaluated * 100) : null;
  $('#ads-avg-sla').textContent    = avgHours !== null ? fmtDurationHours(avgHours) : '—';
  $('#ads-ontime').textContent     = onTimeCount;
  $('#ads-late').textContent       = lateCount;
  $('#ads-compliance').textContent = compliance !== null ? compliance + '%' : '—';

  if(typeof Chart !== 'undefined'){
    const cats = Object.keys(KATEGORI_KODE);
    const counts = cats.map(c => reqs.filter(r=>r.kategori===c).length);
    new Chart($('#ads-chart').getContext('2d'), {
      type:'bar',
      data:{ labels:cats, datasets:[{ data:counts,
        backgroundColor:['#003D7E','#0F4C9C','#1976D2','#00A859','#00C467','#4FC3F7'],
        borderRadius:8, maxBarThickness:40 }]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{ y:{beginAtZero:true,ticks:{precision:0}}, x:{ticks:{font:{size:10}}} } }
    });

    // SLA chart: stacked bar of On-time vs Terlambat per category
    const onTimeByCat = cats.map(c => completed.filter(r => r.kategori === c && slaStatusFor(r, targets).status === 'ontime').length);
    const lateByCat   = cats.map(c => completed.filter(r => r.kategori === c && slaStatusFor(r, targets).status === 'late').length);
    new Chart($('#ads-chart-sla').getContext('2d'), {
      type:'bar',
      data:{
        labels: cats.map(c => KATEGORI_KODE[c] || c.slice(0,8)),
        datasets:[
          { label:'On-time',   data:onTimeByCat, backgroundColor:'#00A859', borderRadius:6, maxBarThickness:32 },
          { label:'Terlambat', data:lateByCat,   backgroundColor:'#DC2626', borderRadius:6, maxBarThickness:32 }
        ]
      },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'bottom', labels:{ font:{size:11} } } },
        scales:{
          x:{ stacked:true, ticks:{font:{size:10}} },
          y:{ stacked:true, beginAtZero:true, ticks:{precision:0} }
        } }
    });
  }

  // v1.8/v2.0: Payment statistics (GA-budget only, single GA status) -------
  try{
    const pays = await db.listPayments().catch(()=>[]);
    const byReq = {}; (pays||[]).forEach(p => { byReq[p.request_id] = p; });
    const merged = reqs.filter(r => reqUsesGABudget(r)).map(r => mergePayment(r, byReq[r.id]));
    const total = merged.length;
    const counts = {}; GA_PAYMENT_STATUSES.forEach(s => counts[s] = 0);
    let grandTotal = 0, paidValue = 0;
    merged.forEach(m => {
      const st = m.ga_payment_status || 'Not Complete Yet';
      counts[st] = (counts[st]||0) + 1;
      const gt = Number(m.grand_total)|| (Number(m.quantity)>0 && Number(m.price)>0 ? Number(m.quantity)*Number(m.price) : Number(m.price)||0);
      grandTotal += gt;
      if(st === 'Paid') paidValue += gt;
    });
    const outstanding = Math.max(0, grandTotal - paidValue);
    const setTxt = (id,v)=>{ const el=$(id); if(el) el.textContent=v; };
    setTxt('#adp-total', total);
    setTxt('#adp-lunas', counts['Paid']||0);
    setTxt('#adp-belum', counts['Not Complete Yet']||0);
    setTxt('#adp-grand', fmtRupiah(grandTotal));

    if(typeof Chart !== 'undefined'){
      const labels = GA_PAYMENT_STATUSES;
      const data = labels.map(l => counts[l]||0);
      const colors = ['#F59E0B','#1976D2','#6D28D9','#DC2626','#00A859'];
      const sc = $('#adp-chart-status');
      if(sc) new Chart(sc.getContext('2d'), {
        type:'doughnut',
        data:{ labels, datasets:[{ data, backgroundColor:colors, borderWidth:2, borderColor:'#fff' }] },
        options:{ responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{ position:'right', labels:{ font:{size:11}, boxWidth:12 } } }, cutout:'58%' }
      });
      const vc = $('#adp-chart-value');
      if(vc) new Chart(vc.getContext('2d'), {
        type:'bar',
        data:{ labels:['Paid','Outstanding'], datasets:[{ data:[paidValue, outstanding],
          backgroundColor:['#00A859','#F59E0B'], borderRadius:8, maxBarThickness:80 }] },
        options:{ responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:(ctx)=>fmtRupiah(ctx.parsed.y) } } },
          scales:{ y:{ beginAtZero:true, ticks:{ callback:(v)=>'Rp '+Number(v).toLocaleString('id-ID'), font:{size:9} } } } }
      });
    }

    // v2.0: GA-budget payment list (most recent 12)
    const gaHost = $('#adp-ga-list');
    if(gaHost){
      const list = merged.slice().sort((a,b)=> new Date(b._req.created_at) - new Date(a._req.created_at)).slice(0,12);
      if(!list.length){ gaHost.innerHTML = '<div class="muted text-sm">Belum ada permintaan ber-anggaran GA.</div>'; }
      else gaHost.innerHTML = `
        <div class="table-wrap"><table class="t t-dense">
          <thead><tr>
            <th>Kode</th><th>Pemesan</th><th>Vendor</th><th style="text-align:right">Grand Total</th><th>Status</th>
          </tr></thead>
          <tbody>
          ${list.map(m=>{
            const gt = Number(m.grand_total)|| (Number(m.quantity)>0 && Number(m.price)>0 ? Number(m.quantity)*Number(m.price) : Number(m.price)||0);
            const ga = m.ga_payment_status||'Not Complete Yet';
            return `<tr>
              <td><span class="code-pill">${escapeHtml(m._req.kode_permintaan)}</span></td>
              <td>${escapeHtml(m._req.nama_pemesan||'—')}</td>
              <td>${escapeHtml(m.vendor_name||'—')}</td>
              <td style="text-align:right">${gt>0?fmtRupiah(gt):'—'}</td>
              <td><span class="badge ${GA_PAYMENT_STATUS_CLASS[ga]||'pay-belum'}">${escapeHtml(ga)}</span></td>
            </tr>`;
          }).join('')}
          </tbody></table></div>`;
    }
  }catch(perr){ console.warn('[dashboard payments]', perr); }

  // Mini table — reuse the requests table renderer in compact mode
  renderRequestsTable($('#ads-table-host'), reqs, { compact:true });
}

let _reqBulkSel = new Set();   // v2.6: pilihan hapus massal (Super Admin)
function renderRequestsTable(host, data, opts){
  const compact = opts && opts.compact;
  const s = _adminReqsState;
  const targets = _slaTargetsCache || [];
  // v2.0: Daftar Permintaan CRUD hanya Superadmin; PIC hanya tiket miliknya.
  const _me = session.get();
  const canEditReq = (r) => !!_me && (_me.role === 'superadmin' || (_me.role === 'pic' && r.nama_pic_ga === _me.full_name));
  const canBulk = !compact && !!_me && _me.role === 'superadmin';   // v2.6

  // Filter
  let rows = data.slice();
  if(s.search){
    rows = rows.filter(r =>
      (r.kode_permintaan||'').toLowerCase().includes(s.search) ||
      (r.nama_pemesan||'').toLowerCase().includes(s.search) ||
      (r.detail_kebutuhan||'').toLowerCase().includes(s.search) ||
      (r.kategori||'').toLowerCase().includes(s.search)
    );
  }
  if(s.filterStatus)   rows = rows.filter(r => r.status===s.filterStatus);
  if(s.filterKategori) rows = rows.filter(r => r.kategori===s.filterKategori);
  if(s.filterSumber)   rows = rows.filter(r => r.sumber_pemesanan===s.filterSumber);
  if(s.filterPic)      rows = rows.filter(r => (r.nama_pic_ga||'')===s.filterPic);
  if(s.filterSla){
    rows = rows.filter(r => {
      const slaSt = slaStatusFor(r, targets).status;
      return slaSt === s.filterSla;
    });
  }

  // Sort
  rows.sort((a,b) => {
    let av = a[s.sort], bv = b[s.sort];
    if(av===null||av===undefined) av='';
    if(bv===null||bv===undefined) bv='';
    if(typeof av==='string') av = av.toLowerCase();
    if(typeof bv==='string') bv = bv.toLowerCase();
    if(av<bv) return s.dir==='asc'?-1:1;
    if(av>bv) return s.dir==='asc'?1:-1;
    return 0;
  });

  const total = rows.length;
  const totalPages = Math.max(1, Math.ceil(total / s.pageSize));
  if(s.page > totalPages) s.page = totalPages;
  const start = (s.page-1)*s.pageSize;
  const pageRows = rows.slice(start, start + s.pageSize);

  const sortIcon = (col) => {
    if(s.sort!==col) return '<span class="material-symbols-rounded sort-ic">unfold_more</span>';
    return `<span class="material-symbols-rounded sort-ic">${s.dir==='asc'?'arrow_drop_up':'arrow_drop_down'}</span>`;
  };
  const sortClass = (col) => s.sort===col ? (s.dir==='asc'?'sort-asc':'sort-desc') : '';

  host.innerHTML = `
    ${canBulk ? `<div class="bulk-bar" id="req-bulk-bar" style="display:${_reqBulkSel.size?'flex':'none'};align-items:center;gap:12px;flex-wrap:wrap;padding:10px 14px;margin-bottom:10px;background:#FEF2F2;border:1px solid #FECACA;border-radius:10px">
      <span class="fw-700" style="color:#991B1B"><span id="req-bulk-count">${_reqBulkSel.size}</span> permintaan terpilih</span>
      <button class="btn btn-sm" id="req-bulk-all" style="background:#fff;border:1px solid var(--border)">Pilih semua hasil filter (${total})</button>
      <button class="btn btn-sm" id="req-bulk-clear" style="background:#fff;border:1px solid var(--border)">Bersihkan</button>
      <button class="btn btn-sm" id="req-bulk-del" style="background:#DC2626;color:#fff;margin-left:auto"><span class="material-symbols-rounded" style="font-size:17px">delete_sweep</span>Hapus Terpilih</button>
    </div>` : ''}
    <div class="table-wrap">
      <table class="t${compact?'':' t-dense'}">
        <thead>
          <tr>
            ${canBulk ? '<th style="width:34px;text-align:center"><input type="checkbox" id="req-selall" title="Pilih semua di halaman ini"></th>' : ''}
            <th style="width:40px">#</th>
            <th class="sortable ${sortClass('kode_permintaan')}" data-col="kode_permintaan">Kode${sortIcon('kode_permintaan')}</th>
            <th class="sortable ${sortClass('kategori')}" data-col="kategori">Kategori${sortIcon('kategori')}</th>
            <th class="sortable ${sortClass('nama_pemesan')}" data-col="nama_pemesan">Pemesan${sortIcon('nama_pemesan')}</th>
            <th class="sortable ${sortClass('tanggal_kebutuhan')}" data-col="tanggal_kebutuhan">Tgl Kebutuhan${sortIcon('tanggal_kebutuhan')}</th>
            <th>Detail</th>
            <th class="sortable ${sortClass('estimasi_harga')}" data-col="estimasi_harga">Estimasi${sortIcon('estimasi_harga')}</th>
            <th class="sortable ${sortClass('status')}" data-col="status">Status${sortIcon('status')}</th>
            ${!compact ? '<th>SLA</th>' : ''}
            <th style="text-align:right">Aksi</th>
          </tr>
        </thead>
        <tbody>
          ${pageRows.length ? pageRows.map((r,i)=>{
            // Compute SLA cell
            let slaCell = '';
            if(!compact){
              const sla = slaStatusFor(r, targets);
              if(sla.status === 'ontime'){
                slaCell = `<td><span class="badge status-selesai" title="Selesai dalam ${fmtDurationHours(sla.hoursUsed)} (target ${fmtDurationHours(sla.hoursTarget)})">On-time</span><div class="text-sm muted" style="margin-top:2px">${fmtDurationHours(sla.hoursUsed)}</div></td>`;
              } else if(sla.status === 'late'){
                slaCell = `<td><span class="badge status-ditolak" title="Selesai dalam ${fmtDurationHours(sla.hoursUsed)} (target ${fmtDurationHours(sla.hoursTarget)})">Terlambat</span><div class="text-sm" style="color:var(--danger);margin-top:2px">+${fmtDurationHours(sla.deltaHours)}</div></td>`;
              } else if(sla.hoursTarget != null){
                slaCell = `<td><span class="text-sm muted">target ${fmtDurationHours(sla.hoursTarget)}</span></td>`;
              } else {
                slaCell = `<td><span class="text-sm muted">—</span></td>`;
              }
            }
            return `
            <tr>
              ${canBulk ? `<td style="text-align:center"><input type="checkbox" class="req-cb" data-id="${r.id}" ${_reqBulkSel.has(r.id)?'checked':''}></td>` : ''}
              <td>${start+i+1}</td>
              <td><span class="code-pill">${escapeHtml(r.kode_permintaan)}</span></td>
              <td><span class="tag">${escapeHtml(r.kategori_kode||'')}</span><span class="kat-name">${escapeHtml(r.kategori)}</span></td>
              <td><div class="fw-700">${escapeHtml(r.nama_pemesan)}</div><div class="text-sm muted">${escapeHtml(r.sumber_pemesanan||'')}</div></td>
              <td>${fmtDate(r.tanggal_kebutuhan)}</td>
              <td style="max-width:190px"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${escapeHtml(r.detail_kebutuhan||'')}">${escapeHtml(r.detail_kebutuhan||'')}</div></td>
              <td class="mono">${fmtRupiah(r.estimasi_harga)}</td>
              <td><span class="badge ${STATUS_CLASS[r.status]||''}">${escapeHtml(r.status)}</span></td>
              ${slaCell}
              <td style="white-space:nowrap">
                <div class="actions-compact">
                  <button class="btn-icon" data-act="view" data-id="${r.id}" title="Detail"><span class="material-symbols-rounded">visibility</span></button>
                  ${!compact?`
                    ${canEditReq(r)?`<button class="btn-icon" data-act="edit" data-id="${r.id}" title="Edit / Update Status"><span class="material-symbols-rounded">edit</span></button>`:''}
                    ${r.status==='Tersedia' ? `<button class="btn-icon" data-act="pdf" data-id="${r.id}" title="Download tanda terima PDF" style="color:var(--mrt-green)"><span class="material-symbols-rounded">picture_as_pdf</span></button>` : ''}
                    ${r.status==='Selesai' ? `<button class="btn-icon" data-act="link" data-id="${r.id}" title="Salin tautan penilaian"><span class="material-symbols-rounded">link</span></button>` : ''}
                    ${canEditReq(r)?`<button class="btn-icon" data-act="del" data-id="${r.id}" title="Hapus"><span class="material-symbols-rounded">delete</span></button>`:''}
                  `:''}
                </div>
              </td>
            </tr>
          `;}).join('') : `<tr><td colspan="${compact?9:(canBulk?11:10)}" class="empty-row">Belum ada permintaan</td></tr>`}
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <div>Menampilkan <strong>${pageRows.length}</strong> dari <strong>${total}</strong> data</div>
      <div class="pages">
        <button class="page-btn" id="pg-prev" ${s.page===1?'disabled':''}><span class="material-symbols-rounded" style="font-size:18px">chevron_left</span></button>
        ${Array.from({length:totalPages}).map((_,i)=>{
          const p=i+1;
          if(totalPages>7){
            if(p!==1 && p!==totalPages && Math.abs(p-s.page)>1){
              if(p===2 || p===totalPages-1) return '<span style="padding:0 4px">…</span>';
              return '';
            }
          }
          return `<button class="page-btn ${p===s.page?'active':''}" data-page="${p}">${p}</button>`;
        }).join('')}
        <button class="page-btn" id="pg-next" ${s.page===totalPages?'disabled':''}><span class="material-symbols-rounded" style="font-size:18px">chevron_right</span></button>
      </div>
    </div>
  `;

  // sort handlers
  $$('th.sortable', host).forEach(th => th.addEventListener('click', () => {
    const col = th.dataset.col;
    if(s.sort===col) s.dir = s.dir==='asc'?'desc':'asc';
    else { s.sort = col; s.dir = 'asc'; }
    renderRequestsTable(host, data, opts);
  }));
  // pagination
  $('#pg-prev', host)?.addEventListener('click', () => { if(s.page>1){ s.page--; renderRequestsTable(host, data, opts); } });
  $('#pg-next', host)?.addEventListener('click', () => { if(s.page<totalPages){ s.page++; renderRequestsTable(host, data, opts); } });
  $$('button[data-page]', host).forEach(b => b.addEventListener('click', () => { s.page = Number(b.dataset.page); renderRequestsTable(host, data, opts); }));
  // row actions
  $$('button[data-act]', host).forEach(b => b.addEventListener('click', async () => {
    const id = b.dataset.id; const act = b.dataset.act;
    if(act==='view')      openRequestDetail(id);
    else if(act==='edit') openRequestEdit(id);
    else if(act==='link') {
      const link = location.origin + location.pathname + '#/rate/' + id;
      copyText(link, b);
      const r = _adminReqsCache.find(x => x.id === id);
      db.logActivity({ action:'request.link_copy', target_type:'request', target_id:id,
                       detail:`Salin tautan penilaian untuk ${r?.kode_permintaan||id}` });
    }
    else if(act==='pdf'){
      const r = _adminReqsCache.find(x => x.id === id);
      if(r){
        downloadTandaTerima(r);
        db.logActivity({ action:'request.pdf_download', target_type:'request', target_id:id,
                         detail:`Download tanda terima ${r.kode_permintaan}` });
      }
    }
    else if(act==='del')  {
      if(confirm('Hapus permintaan ini? Tindakan ini tidak bisa dibatalkan.')){
        try{
          const r = _adminReqsCache.find(x => x.id === id);
          await db.deleteRequest(id);
          db.logActivity({ action:'request.delete', target_type:'request', target_id:id,
                           detail:`Hapus permintaan ${r?.kode_permintaan||id}` });
          _adminReqsCache = await db.listRequests();
          renderRequestsTable(host, _adminReqsCache, opts);
          toast('Permintaan dihapus','success');
        }catch(err){ console.error(err); toast('Gagal menghapus','error'); }
      }
    }
  }));

  // v2.6: hapus massal (Super Admin)
  if(canBulk){
    const bar = $('#req-bulk-bar', host);
    const updateBar = () => {
      const cnt = $('#req-bulk-count', host); if(cnt) cnt.textContent = _reqBulkSel.size;
      if(bar) bar.style.display = _reqBulkSel.size ? 'flex' : 'none';
      const selall = $('#req-selall', host);
      if(selall){ const cbs = $$('.req-cb', host); selall.checked = cbs.length>0 && cbs.every(cb=>cb.checked); }
    };
    $$('.req-cb', host).forEach(cb => cb.addEventListener('change', () => {
      if(cb.checked) _reqBulkSel.add(cb.dataset.id); else _reqBulkSel.delete(cb.dataset.id);
      updateBar();
    }));
    $('#req-selall', host)?.addEventListener('change', (e) => {
      $$('.req-cb', host).forEach(cb => { cb.checked = e.target.checked; if(e.target.checked) _reqBulkSel.add(cb.dataset.id); else _reqBulkSel.delete(cb.dataset.id); });
      updateBar();
    });
    $('#req-bulk-all', host)?.addEventListener('click', () => { rows.forEach(r => _reqBulkSel.add(r.id)); renderRequestsTable(host, data, opts); });
    $('#req-bulk-clear', host)?.addEventListener('click', () => { _reqBulkSel.clear(); renderRequestsTable(host, data, opts); });
    $('#req-bulk-del', host)?.addEventListener('click', async () => {
      const ids = [..._reqBulkSel];
      if(!ids.length) return;
      if(!confirm(`Hapus ${ids.length} permintaan terpilih? Tindakan ini permanen dan tidak bisa dibatalkan.`)) return;
      const btn = $('#req-bulk-del', host); btn.disabled = true; btn.innerHTML = '<span class="material-symbols-rounded" style="font-size:17px">hourglass_top</span>Menghapus…';
      let ok = 0, fail = 0;
      for(const id of ids){ try{ await db.deleteRequest(id); ok++; }catch(e){ fail++; } }
      db.logActivity({ action:'request.bulk_delete', target_type:'request', detail:`Hapus massal ${ok} permintaan${fail?` (${fail} gagal)`:''}` });
      _reqBulkSel.clear();
      _adminReqsCache = await db.listRequests();
      renderRequestsTable(host, _adminReqsCache, opts);
      toast(`${ok} permintaan dihapus${fail?`, ${fail} gagal`:''}`, fail?'warn':'success');
    });
    updateBar();
  }
}

async function openRequestEdit(id){
  const r = await db.getRequest(id);
  if(!r) return;
  const me = session.get();
  const isSuperadmin = me?.role === 'superadmin';
  // v2.0: only Superadmin (any ticket) or the assigned PIC may edit a request.
  const mayEdit = me && (me.role === 'superadmin' || (me.role === 'pic' && r.nama_pic_ga === me.full_name));
  if(!mayEdit){ toast('Hanya Superadmin atau PIC yang ditugaskan yang dapat mengubah permintaan ini.','warn'); return; }
  const [lok, tuj, picUsers, ma, divs, deps] = await Promise.all([
    db.listLokasi(), db.listTujuan(), db.listPicUsers(),
    db.listMataAnggaran(), db.listDivisi(), db.listDepartemen()
  ]);

  // Resolve the divisi for the existing departemen (if any), so the dropdown starts correct
  const initialDivisiId = (() => {
    if(!r.departemen) {
      // user might have selected divisi without departemen; match by name
      const d = divs.find(x => x.name === r.divisi);
      return d ? d.id : '';
    }
    const dep = deps.find(d => d.name === r.departemen);
    return dep ? dep.divisi_id : '';
  })();

  // Pre-format the existing completed_at for display in the optional override input
  const completedLocal = r.completed_at
    ? new Date(r.completed_at).toISOString().slice(0,16)  // for datetime-local input
    : '';

  // v1.7: For DP tickets, check approval status to display a banner in the modal
  let approvalBanner = '';
  if(r.kategori === 'Direct Purchase'){
    let lastApr = null;
    try{
      if(SUPA_CONFIGURED){
        const { data } = await supa.from('approvals').select('*')
          .eq('request_id', r.id).eq('approval_type','dp_prepare')
